<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المدية نظيفة 2026</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --gold: #D4AF37; --red: #d21034; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        
        body { 
            margin: 0; min-height: 100vh;
            background: linear-gradient(135deg, rgba(27,94,32,0.2) 0%, rgba(255,255,255,0.9) 50%, rgba(210,16,52,0.2) 100%),
                        url('https://raw.githubusercontent.com/rabf09-droid/rabf09-droid.github.io/main/1000052240.webp');
            background-size: cover; background-position: center; background-attachment: fixed;
        }

        .header { background: rgba(255,255,255,0.95); padding: 10px; text-align: center; border-bottom: 5px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .page { display: none; padding: 15px; animation: fadeIn 0.4s; max-width: 800px; margin: auto; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .btn { border: none; padding: 15px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; color: white; font-size: 1.1rem; }
        .input { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 10px; text-align: center; }

        /* الرئيسية */
        .giant-btn { background: var(--forest); height: 230px; flex-direction: column; border-radius: 50px; font-size: 2.1rem; border: 6px solid white; box-shadow: 0 15px 45px rgba(46, 125, 50, 0.4); margin: 10px 0; }
        .giant-btn i { font-size: 6.5rem; margin-bottom: 5px; }

        /* صفحة التبليغ - حسب الصورة 1000052318 */
        .cam-container { position: relative; height: 200px; border: 3px dashed #bbb; border-radius: 20px; background: #fff; overflow: hidden; margin-bottom: 10px; }
        .cam-overlay-btn { position: absolute; bottom: 10px; background: var(--navy); padding: 8px 15px; border-radius: 20px; color: white; cursor: pointer; font-size: 0.9rem; }

        /* صفحة الإدارة - حسب الصورة 1000052326 */
        .admin-nav-item { background: white; color: var(--navy); border: 2px solid var(--navy); justify-content: space-between; padding: 0 20px; height: 60px; }
        .admin-nav-item i { color: var(--forest); }
        .sub-sec { display: none; padding: 10px; background: rgba(255,255,255,0.5); border-radius: 15px; }

        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; }
        .modal-content { background:white; padding:30px; border-radius:30px; text-align:center; width:90%; max-width:400px; }
    </style>
</head>
<body onload="initApp()">

<div id="choice-modal" class="modal">
    <div class="modal-content">
        <h2 style="color: var(--forest)">تم الإرسال ✅</h2>
        <p>هل تود إرسال تبليغ آخر؟</p>
        <div style="display: flex; gap: 10px;">
            <button class="btn" style="background:var(--forest)" onclick="modalResponse(true)">نعم</button>
            <button class="btn" style="background:var(--red)" onclick="modalResponse(false)">خروج</button>
        </div>
    </div>
</div>

<div class="header">
    <div style="font-size: 0.75rem;">الجمهورية الجزائرية الديمقراطية الشعبية</div>
    <div style="font-size: 1.6rem; font-weight: 900; color: var(--emerald);">المـديـة نظيـفة</div>
    <div id="clock" style="font-weight: bold; color: var(--navy);">00:00:00</div>
</div>

<div id="pg-home" class="page active">
    <div style="text-align: center;">
        <button class="btn giant-btn" onclick="navTo('pg-report')">
            <i class="fas fa-truck-loading"></i>
            <span>إرســـــال تبلـيـــغ</span>
        </button>
    </div>
    <div class="card" style="background: rgba(255,255,255,0.6); border: 2px dashed var(--navy);">
        <p style="text-align: center; font-weight: bold;">رواق الموظفين والمسؤولين</p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn" style="background:var(--navy)" onclick="auth('admin')">الإدارة</button>
            <button class="btn" style="background:var(--gold)" onclick="auth('driver')">السائقين</button>
        </div>
    </div>
</div>

<div id="pg-report" class="page">
    <div class="card">
        <div class="cam-container">
            <i id="ico-cam" class="fas fa-camera fa-5x" style="color:#ddd; position: absolute; top: 30%; left: 38%;"></i>
            <img id="out-img" style="width:100%; height:100%; object-fit:cover; display:none;">
            <label class="cam-overlay-btn">
                <i class="fas fa-camera"></i> أخذ صورة
                <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="handleImg(this, 'citizen')">
            </label>
        </div>
        <button class="btn" style="background:var(--forest)" onclick="getLoc()"><i class="fas fa-map-marker-alt"></i> تحديد الموقع</button>
        <input type="text" id="in-addr" class="input" placeholder="اسم الحي / العنوان">
        <input type="text" id="in-gps" class="input" readonly placeholder="إحداثيات GPS">
        <button class="btn" style="background:var(--emerald); height: 70px; font-size:1.4rem;" onclick="sendReport()">إرسال البلاغ الآن</button>
        <button class="btn" style="background:#888;" onclick="navTo('pg-home')">رجوع</button>
    </div>
</div>

<div id="pg-admin" class="page">
    <button class="btn admin-nav-item" onclick="toggleSec('sec-new')">بلاغات النفايات <i class="fas fa-clipboard-list"></i></button>
    <div id="sec-new" class="sub-sec"></div>

    <button class="btn admin-nav-item" onclick="toggleSec('sec-done')">البلاغات المنجزة <i class="fas fa-check-double"></i></button>
    <div id="sec-done" class="sub-sec"></div>

    <button class="btn admin-nav-item" onclick="toggleSec('sec-staff')">إضافة موظف <i class="fas fa-user-plus"></i></button>
    <div id="sec-staff" class="sub-sec">
        <div id="boss-area" class="card" style="display:none; border:2px solid var(--gold);">
            <p>إضافة مسؤول (مشرف):</p>
            <input type="text" id="a-name" class="input" placeholder="اسم المسؤول">
            <button class="btn" style="background:var(--navy)" onclick="addAdmin()">حفظ المسؤول</button>
        </div>
        <div class="card">
            <p>إضافة سائق جديد:</p>
            <input type="text" id="d-name" class="input" placeholder="اسم السائق">
            <input type="text" id="d-phone" class="input" placeholder="رقم الهاتف">
            <input type="text" id="d-truck" class="input" placeholder="رقم الشاحنة">
            <select id="d-sec" class="input">
                <option value="البلدية">البلدية</option>
                <option value="قطاع خاص">القطاع الخاص</option>
            </select>
            <button class="btn" style="background:var(--emerald)" onclick="addDriver()">حفظ السائق</button>
        </div>
    </div>
    <button class="btn" style="background:var(--red); margin-top:20px;" onclick="navTo('pg-home')">خروج</button>
</div>

<div id="pg-driver" class="page">
    <div id="dr-header" class="card" style="background:var(--forest); color:white; text-align:center;"></div>
    <div id="dr-tasks"></div>
    <button class="btn" style="background:#444;" onclick="navTo('pg-home')"><i class="fas fa-undo"></i> رجوع</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://medea-clean-2026-v4-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let appData = { reports: [], drivers: [], admins: ["فتحي"] };
    let tempImgCit = "", tempImgDrv = "", currentLoggedUser = "";

    function initApp() {
        db.ref('APP_DATA_V4').on('value', snap => { if(snap.exists()){ appData = snap.val(); updateUI(); } });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
    }

    function toggleSec(id) {
        const s = document.getElementById(id);
        s.style.display = (s.style.display === 'block' ? 'none' : 'block');
    }

    function handleImg(input, role) {
        const reader = new FileReader();
        reader.onload = e => {
            if(role === 'citizen') {
                tempImgCit = e.target.result;
                document.getElementById('out-img').src = tempImgCit;
                document.getElementById('out-img').style.display = 'block';
                document.getElementById('ico-cam').style.display = 'none';
            } else { tempImgDrv = e.target.result; alert("تم التقاط صورة الإنجاز!"); }
        };
        reader.readAsDataURL(input.files[0]);
    }

    function getLoc() {
        navigator.geolocation.getCurrentPosition(p => {
            document.getElementById('in-gps').value = p.coords.latitude.toFixed(6) + "," + p.coords.longitude.toFixed(6);
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${p.coords.latitude}&lon=${p.coords.longitude}&accept-language=ar`).then(r=>r.json()).then(d=>{
                document.getElementById('in-addr').value = d.display_name.split(',').slice(0,3).join(',');
            });
        });
    }

    function sendReport() {
        if(!tempImgCit) return alert("الرجاء التقاط صورة!");
        const rep = {
            id: Date.now(), img: tempImgCit, addr: document.getElementById('in-addr').value, gps: document.getElementById('in-gps').value,
            time: new Date().toLocaleTimeString('fr-FR'), date: "08 أفريل 2026", status: 'new'
        };
        if(!appData.reports) appData.reports = [];
        appData.reports.push(rep);
        db.ref('APP_DATA_V4').set(appData).then(() => { document.getElementById('choice-modal').style.display = 'flex'; });
    }

    function modalResponse(keep) {
        document.getElementById('choice-modal').style.display = 'none';
        tempImgCit=""; document.getElementById('out-img').style.display='none'; document.getElementById('ico-cam').style.display='block';
        if(!keep) navTo('pg-home');
    }

    function updateUI() {
        const rs = appData.reports || [];
        // بلاغات المواطن
        document.getElementById('sec-new').innerHTML = rs.filter(r=>r.status==='new').map(r => `
            <div class="card">
                <img src="${r.img}" style="width:100%; border-radius:15px;">
                <p>📍 ${r.addr}<br>🌐 GPS: ${r.gps}<br>⏰ ${r.time} - ${r.date}</p>
                <button class="btn" style="background:var(--forest)" onclick="assignTask(${r.id})">توجيه للسائق</button>
            </div>
        `).join('') || 'لا توجد بلاغات';

        // المنجزة
        document.getElementById('sec-done').innerHTML = rs.filter(r=>r.status==='done').map(r => `
            <div class="card" style="border-right:10px solid green;">
                <p>السائق: ${r.driver}</p>
                <img src="${r.doneImg}" style="width:100%; border-radius:15px;">
                <p>📅 ${r.doneDate} | ⏰ ${r.doneTime}</p>
            </div>
        `).join('') || 'لا توجد منجزات';

        // مهام السائق
        if(currentLoggedUser) {
            document.getElementById('dr-header').innerHTML = `السائق: ${currentLoggedUser}`;
            document.getElementById('dr-tasks').innerHTML = rs.filter(r=>r.driver===currentLoggedUser && r.status==='sent').map(t => `
                <div class="card">
                    <img src="${t.img}" style="width:100%; border-radius:15px;">
                    <p>📍 ${t.addr}<br>⏰ ${t.time} - ${t.date}<br>🌐 ${t.gps}</p>
                    <button class="btn" style="background:var(--navy)" onclick="window.open('https://www.google.com/maps?q=${t.gps}')"><i class="fas fa-map"></i> الولوج للخريطة</button>
                    <label class="btn" style="background:var(--gold)"><i class="fas fa-camera"></i> صورة الإنجاز<input type="file" capture="environment" style="display:none;" onchange="handleImg(this, 'driver')"></label>
                    <button class="btn" style="background:var(--forest)" onclick="finishTask(${t.id})">إرسال الإنجاز</button>
                </div>
            `).join('');
        }
    }

    function assignTask(id) {
        const dr = prompt("اسم السائق:");
        if(dr) {
            const r = appData.reports.find(x => x.id === id);
            r.status = 'sent'; r.driver = dr;
            db.ref('APP_DATA_V4').set(appData);
        }
    }

    function finishTask(id) {
        if(!tempImgDrv) return alert("صور الإنجاز أولاً!");
        const r = appData.reports.find(x => x.id === id);
        r.status = 'done'; r.doneImg = tempImgDrv; r.doneTime = new Date().toLocaleTimeString('fr-FR'); r.doneDate = "08 أفريل 2026";
        db.ref('APP_DATA_V4').set(appData).then(() => { tempImgDrv=""; alert("تم بنجاح!"); });
    }

    function auth(role) {
        const u = prompt("الاسم:"), p = prompt("الرمز:");
        if(role==='admin' && (appData.admins||[]).includes(u) && p==='1234') {
            document.getElementById('boss-area').style.display = (u==='فتحي'?'block':'none');
            navTo('pg-admin');
        } else if(role==='driver' && p==='5678') { currentLoggedUser = u; navTo('pg-driver'); }
    }

    function navTo(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
    function addAdmin() { const n = document.getElementById('a-name').value; if(n){ appData.admins.push(n); db.ref('APP_DATA_V4').set(appData); alert("تم إضافة مسؤول"); }}
    function addDriver() {
        const n = document.getElementById('d-name').value;
        if(n){
            if(!appData.drivers) appData.drivers = [];
            appData.drivers.push({name:n, phone:document.getElementById('d-phone').value, truck:document.getElementById('d-truck').value});
            db.ref('APP_DATA_V4').set(appData); alert("تم حفظ السائق");
        }
    }
</script>
</body>
</html>
