<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظافة المدية 2026 - د. رابحي فتحي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --glass: rgba(255, 255, 255, 0.98); --gold: #D4AF37; --red: #d21034; --orange: #fb8c00; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; transition: 0.3s; }
        body { margin: 0; background: url('https://www.shutterstock.com/shutterstock/photos/1932338633/display_1500/stock-photo-garbage-truck-on-the-street-1932338633.jpg') no-repeat center center fixed; background-size: cover; }
        .overlay { background: rgba(0,0,0,0.7); min-height: 100vh; padding-bottom: 180px; }
        .top-bar { background: var(--glass); padding: 15px; text-align: center; border-bottom: 4px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .screen { display: none; padding: 20px; animation: slideIn 0.4s; }
        .active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--glass); border-radius: 25px; padding: 20px; margin-bottom: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-main { border: none; padding: 15px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; color: white; font-size: 1.1rem; }
        .input-box { width: 100%; padding: 14px; border-radius: 15px; border: 2px solid #ddd; margin-bottom: 12px; font-size: 1rem; text-align: center; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 2000; background: var(--glass); padding: 15px; border-top: 3px solid var(--gold); }
        .lang-bar { display: flex; gap: 10px; margin-bottom: 10px; }
        .lang-btn { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid #ccc; background: #f9f9f9; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body onload="initApp()">
<div class="overlay">
    <div class="top-bar">
        <div style="font-size: 0.8rem; font-weight: bold;" id="t-country">الجمهورية الجزائرية الديمقراطية الشعبية</div>
        <div style="font-size: 1.4rem; font-weight: 800; color: var(--emerald);" id="t-title">نظافة المدية 2026</div>
        <div style="display: flex; justify-content: space-between; padding: 5px 20px; font-weight: bold; color: var(--navy);">
            <div id="live-clock">00:00:00</div>
            <div id="static-date">06 أفريل 2026</div>
        </div>
    </div>

    <div id="scr-main" class="screen active">
        <div class="card" onclick="navTo('scr-report')">
            <i class="fas fa-bullhorn fa-4x" style="color:var(--forest)"></i>
            <h2 id="m-report">التبليغ</h2>
        </div>
        <div class="card" onclick="auth('admin')">
            <i class="fas fa-chart-pie fa-4x" style="color:var(--emerald)"></i>
            <h2 id="m-admin">الإدارة</h2>
        </div>
        <div class="card" onclick="auth('driver')">
            <i class="fas fa-truck-moving fa-4x" style="color:var(--gold)"></i>
            <h2 id="m-driver">السائق</h2>
        </div>
        <div class="bottom-nav">
            <div class="lang-bar">
                <button class="lang-btn" onclick="changeLang('ar')">العربية</button>
                <button class="lang-btn" onclick="changeLang('fr')">Français</button>
                <button class="lang-btn" onclick="changeLang('en')">English</button>
            </div>
            <button class="btn-main" style="background:var(--red); margin:0;" onclick="location.reload()" id="m-exit"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </div>

    <div id="scr-report" class="screen">
        <div class="card">
            <div id="cam-preview" style="height:250px; border:3px dashed var(--forest); border-radius:20px; display:flex; align-items:center; justify-content:center; margin-bottom:15px; overflow:hidden; background:#eee;">
                <i id="cam-icon" class="fas fa-camera-retro fa-4x" style="color:#aaa"></i>
                <img id="img-display" style="width:100%; height:100%; object-fit:cover; display:none;">
            </div>
            <label class="btn-main" style="background:var(--navy);">
                <i class="fas fa-camera"></i> <span id="r-photo">التقاط صورة للنفايات</span>
                <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="processFile(this, 'citizen')">
            </label>
            <button class="btn-main" style="background:var(--forest);" onclick="getLocation()"><i class="fas fa-map-marker-alt"></i> <span id="r-gps">تحديد موقعي الآن</span></button>
            <input type="text" id="inp-address" class="input-box" placeholder="العنوان التقريبي">
            <input type="text" id="inp-coords" class="input-box" placeholder="الإحداثيات الجغرافية" readonly style="background:#f0f0f0;">
            <button class="btn-main" style="background:var(--emerald);" onclick="submitReport()"><i class="fas fa-paper-plane"></i> <span id="r-send">إرسال التبليغ فوراً</span></button>
            <button class="btn-main" style="background:#777;" onclick="navTo('scr-main')" id="r-back">رجوع</button>
        </div>
    </div>
        <div id="scr-admin" class="screen">
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <div style="flex:1; background:var(--red); color:white; padding:15px; border-radius:20px; text-align:center; box-shadow: 0 4px 10px rgba(210,16,52,0.3);">
                <i class="fas fa-bell"></i><br>جديد<br><span id="st-new" style="font-size:1.5rem; font-weight:bold;">0</span>
            </div>
            <div style="flex:1; background:var(--orange); color:white; padding:15px; border-radius:20px; text-align:center; box-shadow: 0 4px 10px rgba(251,140,0,0.3);">
                <i class="fas fa-truck"></i><br>مبعوث<br><span id="st-sent" style="font-size:1.5rem; font-weight:bold;">0</span>
            </div>
            <div style="flex:1; background:var(--forest); color:white; padding:15px; border-radius:20px; text-align:center; box-shadow: 0 4px 10px rgba(46,125,50,0.3);">
                <i class="fas fa-check-circle"></i><br>تمت<br><span id="st-done" style="font-size:1.5rem; font-weight:bold;">0</span>
            </div>
        </div>

        <button class="btn-main" style="background:var(--navy)" onclick="toggleDiv('admin-reps')"><i class="fas fa-list"></i> التبليغات الواردة</button>
        <div id="admin-reps" style="display:none;"></div>

        <button class="btn-main" style="background:var(--forest)" onclick="toggleDiv('admin-drvs')"><i class="fas fa-user-plus"></i> إضافة سائق جديد</button>
        <div id="admin-drvs" style="display:none;" class="card">
            <input type="text" id="d-name" class="input-box" placeholder="اسم السائق">
            <input type="tel" id="d-phone" class="input-box" placeholder="رقم الهاتف">
            <input type="text" id="d-truck" class="input-box" placeholder="رقم الشاحنة">
            <select id="d-sector" class="input-box">
                <option value="البلدية">البلدية</option>
                <option value="القطاع الخاص">القطاع الخاص</option>
            </select>
            <button class="btn-main" style="background:var(--emerald)" onclick="saveDriver()">حفظ السائق (تصفير)</button>
            <div id="list-drivers-ui"></div>
        </div>

        <div id="super-admin" style="display:none;">
            <button class="btn-main" style="background:var(--gold); color:black;" onclick="toggleDiv('admin-mgrs')"><i class="fas fa-user-shield"></i> إدارة المسؤولين</button>
            <div id="admin-mgrs" style="display:none;" class="card">
                <input type="text" id="new-adm" class="input-box" placeholder="اسم المسؤول">
                <button class="btn-main" style="background:var(--navy)" onclick="saveAdmin()">إضافة مسؤول (تصفير)</button>
                <div id="list-admins-ui"></div>
            </div>
        </div>
        <button class="btn-main" style="background:#444;" onclick="navTo('scr-main')">رجوع</button>
    </div>

    <div id="scr-driver" class="screen">
        <div id="driver-profile" class="card" style="background:var(--emerald); color:white; padding:15px;"></div>
        <div id="driver-tasks"></div>
        <button class="btn-main" style="background:#444;" onclick="navTo('scr-main')">خروج</button>
    </div>
</div>

<script>
    // تكوين Firebase (نفس قاعدة بياناتك)
    const firebaseConfig = { databaseURL: "https://medea-clean-2026-v9-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database();

    let db = { reports: [], drivers: [], admins: ["فتحي"] };
    let tempImgCitizen = "", tempImgDriver = "", activeSession = "";

    function sync() { dbRef.ref('FINAL_APP_V9').set(db); }

    function initApp() {
        dbRef.ref('FINAL_APP_V9').on('value', (snap) => { if(snap.exists()){ db=snap.val(); renderData(); } });
        setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
    }

    function changeLang(l) {
        const t = {
            ar: {country: "الجمهورية الجزائرية الديمقراطية الشعبية", title: "نظافة المدية 2026", report: "التبليغ", admin: "الإدارة", driver: "السائق", exit: "خروج"},
            fr: {country: "République Algérienne", title: "Médéa Propre 2026", report: "Signalement", admin: "Administration", driver: "Chauffeur", exit: "Quitter"},
            en: {country: "People's Democratic Republic", title: "Clean Medea 2026", report: "Reporting", admin: "Management", driver: "Driver", exit: "Exit"}
        };
        document.getElementById('t-country').innerText = t[l].country;
        document.getElementById('t-title').innerText = t[l].title;
        document.getElementById('m-report').innerText = t[l].report;
        document.getElementById('m-admin').innerText = t[l].admin;
        document.getElementById('m-driver').innerText = t[l].driver;
        document.getElementById('m-exit').innerHTML = `<i class="fas fa-sign-out-alt"></i> ${t[l].exit}`;
        alert("Language changed to: " + l);
    }

    function processFile(input, user) {
        const reader = new FileReader();
        reader.onload = e => {
            if(user === 'citizen') {
                tempImgCitizen = e.target.result;
                document.getElementById('img-display').src = tempImgCitizen;
                document.getElementById('img-display').style.display = 'block';
                document.getElementById('cam-icon').style.display = 'none';
            } else { tempImgDriver = e.target.result; alert("📸 تم التقاط صورة الإنجاز بنجاح"); }
        };
        reader.readAsDataURL(input.files[0]);
    }

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                const lat = p.coords.latitude, lng = p.coords.longitude;
                document.getElementById('inp-coords').value = `${lat.toFixed(6)},${lng.toFixed(6)}`;
                fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
                .then(r => r.json()).then(d => {
                    document.getElementById('inp-address').value = d.display_name.split(',').slice(0,3).join(',');
                });
            }, (err) => alert("يرجى تفعيل الـ GPS في الهاتف"));
        }
    }

    function submitReport() {
        const addr = document.getElementById('inp-address').value;
        const coords = document.getElementById('inp-coords').value;
        if(!tempImgCitizen || !addr || !coords) return alert("خطأ: يرجى التقاط الصورة وتحديد الموقع أولاً");
        
        const newRep = {
            id: Date.now(), img: tempImgCitizen, address: addr, coords: coords,
            time: new Date().toLocaleTimeString('fr-FR'), date: "06 أفريل 2026", status: 'new'
        };
        if(!db.reports) db.reports = [];
        db.reports.push(newRep); sync();
        alert("✅ تم الإرسال بنجاح (سيظهر عند الإدارة فوراً)");
        location.reload();
    }

    function saveDriver() {
        const name = document.getElementById('d-name').value;
        const phone = document.getElementById('d-phone').value;
        const truck = document.getElementById('d-truck').value;
        const sector = document.getElementById('d-sector').value;
        if(name && phone) {
            if(!db.drivers) db.drivers = [];
            db.drivers.push({ id: Date.now(), name, phone, truck, sector });
            sync();
            document.getElementById('d-name').value=""; document.getElementById('d-phone').value=""; document.getElementById('d-truck').value="";
            alert("✅ تم الحفظ وتصفير الحقول");
        }
    }

    function saveAdmin() {
        const name = document.getElementById('new-adm').value;
        if(name) { if(!db.admins) db.admins = []; db.admins.push(name); sync(); document.getElementById('new-adm').value=""; alert("✅ تمت الإضافة"); }
    }

    function auth(role) {
        const u = prompt("الاسم:"); const p = prompt("الرمز:");
        if(role === 'admin' && (db.admins||[]).includes(u) && p === '1234') {
            activeSession = u; document.getElementById('super-admin').style.display = (u === "فتحي" ? 'block' : 'none');
            navTo('scr-admin');
        } else if(role === 'driver' && p === '5678') {
            const d = (db.drivers||[]).find(x => x.name === u);
            if(d) { activeSession = u; document.getElementById('driver-profile').innerHTML = `<h3>${u}</h3><p>شاحنة: ${d.truck} | ${d.sector}</p>`; navTo('scr-driver'); }
            else alert("سائق غير مسجل في النظام");
        }
    }

    function navTo(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        renderData();
    }

    function renderData() {
        const reps = db.reports || [];
        document.getElementById('st-new').innerText = reps.filter(r => r.status === 'new').length;
        document.getElementById('st-sent').innerText = reps.filter(r => r.status === 'sent').length;
        document.getElementById('st-done').innerText = reps.filter(r => r.status === 'done').length;

        // إدارة البلاغات
        document.getElementById('admin-reps').innerHTML = reps.slice().reverse().map(r => `
            <div class="card" style="text-align:right;">
                <img src="${r.img}" style="width:100%; border-radius:15px; margin-bottom:10px;">
                <p>📍 <b>العنوان:</b> ${r.address}</p>
                <p>🛰 <b>الإحداثيات:</b> ${r.coords}</p>
                <p>🕒 <b>التوقيت:</b> ${r.time} | 📅 ${r.date}</p>
                ${r.status === 'new' ? `
                    <select id="sel-${r.id}" class="input-box">
                        <option value="">توجيه لسائق...</option>
                        ${(db.drivers||[]).map(d => `<option value="${d.name}">${d.name} (${d.sector})</option>`).join('')}
                    </select>
                    <button class="btn-main" style="background:var(--forest)" onclick="assignJob(${r.id})">إرسال المهمة للسائق</button>
                ` : `<p style="color:var(--orange); font-weight:bold;">🚚 مبعوث لـ: ${r.assignedTo}</p>`}
                <i class="fas fa-trash-alt" style="color:red; cursor:pointer;" onclick="delItem('rep', ${r.id})"> حذف التبليغ</i>
            </div>
        `).join('');

        // قائمة السائقين
        document.getElementById('list-drivers-ui').innerHTML = (db.drivers||[]).map(d => `
            <div style="background:#eee; padding:10px; margin-top:5px; border-radius:10px; text-align:right;">
                <b>${d.name}</b> | 🚛 ${d.truck}<br>📞 ${d.phone} | 🏢 ${d.sector}
                <i class="fas fa-trash-alt" style="float:left; color:red" onclick="delItem('drv', ${d.id})"></i>
            </div>
        `).join('');

        // قائمة المسؤولين
        document.getElementById('list-admins-ui').innerHTML = (db.admins||[]).map(a => `
            <div style="background:#eee; padding:10px; margin-top:5px; border-radius:10px;">
                🔑 ${a} ${a !== 'فتحي' ? `<i class="fas fa-times-circle" style="float:left; color:red" onclick="delItem('adm', '${a}')"></i>` : ""}
            </div>
        `).join('');

        // مهام السائق (هنا الربط الكامل)
        const myJobs = reps.filter(r => r.assignedTo === activeSession && r.status === 'sent');
        document.getElementById('driver-tasks').innerHTML = myJobs.map(r => `
            <div class="card" style="text-align:right; border:3px solid var(--orange);">
                <h3 style="color:var(--red)">🚨 مهمة جديدة كاملة:</h3>
                <img src="${r.img}" style="width:100%; border-radius:15px;">
                <p>📍 <b>الموقع:</b> ${r.address}</p>
                <p>🕒 <b>التاريخ:</b> ${r.date} | ${r.time}</p>
                <p>🛰 <b>GPS:</b> ${r.coords}</p>
                <button class="btn-main" style="background:var(--navy)" onclick="window.open('https://www.google.com/maps?q=${r.coords}')"><i class="fas fa-map-marked-alt"></i> الزاوج إلى الخريطة (GPS)</button>
                <hr>
                <label class="btn-main" style="background:var(--gold);">
                    <i class="fas fa-camera"></i> تصوير النفايات بعد التنظيف
                    <input type="file" capture="environment" style="display:none;" onchange="processFile(this, 'driver')">
                </label>
                <button class="btn-main" style="background:var(--emerald)" onclick="confirmFinish(${r.id})">إرسال تقرير الإنجاز للدائرة</button>
            </div>
        `).join('');
    }

    function assignJob(id) {
        const dName = document.getElementById(`sel-${id}`).value;
        if(dName) {
            const r = db.reports.find(x => x.id === id);
            r.status = 'sent'; r.assignedTo = dName; sync(); alert("✅ تم إرسال الحزمة كاملة للسائق");
        }
    }

    function confirmFinish(id) {
        if(!tempImgDriver) return alert("يجب تصوير النتيجة أولاً");
        const r = db.reports.find(x => x.id === id);
        r.status = 'done'; r.doneImg = tempImgDriver; sync(); alert("✅ تم إبلاغ الإدارة بالإنجاز");
    }

    function delItem(type, id) {
        if(!confirm("هل أنت متأكد من الحذف؟")) return;
        if(type==='rep') db.reports = db.reports.filter(x=>x.id!==id);
        if(type==='drv') db.drivers = db.drivers.filter(x=>x.id!==id);
        if(type==='adm') db.admins = db.admins.filter(x=>x!==id);
        sync();
    }

    function toggleDiv(id) { const e = document.getElementById(id); e.style.display = e.style.display==='none'?'block':'none'; }
</script>
</body>
</html>
