<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المدية نظيفة 2026</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* الحفاظ على نفس ستايل الهيكل الذي أرسلته */
        :root { --emerald: #1B5E20; --forest: #2E7D32; --gold: #D4AF37; --red: #d21034; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { margin: 0; background-image: url('https://raw.githubusercontent.com/rabf09-droid/rabf09-droid.github.io/main/1000052240.webp'); background-size: cover; background-attachment: fixed; }
        .header { background: rgba(255,255,255,0.9); padding: 10px; text-align: center; border-bottom: 5px solid var(--gold); }
        .page { display: none; padding: 15px; max-width: 800px; margin: auto; }
        .page.active { display: block; }
        .card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn { border: none; padding: 15px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; color: white; }
        .input { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 10px; text-align: center; }
        .giant-btn { background: var(--forest); height: 230px; flex-direction: column; border-radius: 50px; font-size: 2.1rem; border: 6px solid white; }
        .giant-btn i { font-size: 6.5rem; }
        .footer { background: white; padding: 15px; text-align: center; border-top: 4px solid var(--gold); margin-top: 10px; }
    </style>
</head>
<body onload="initApp()">

<div class="header">
    <div style="font-size: 0.75rem; font-weight: bold;">الجمهورية الجزائرية الديمقراطية الشعبية</div>
    <div style="font-size: 1.6rem; font-weight: 900; color: var(--emerald);">المـديـة نظيـفة</div>
    <div style="display: flex; justify-content: space-around; margin-top: 5px;">
        <div id="clock" style="font-weight: bold;">00:00:00</div>
        <div style="font-weight: bold;">09 أفريل 2026</div>
    </div>
</div>

<div id="pg-home" class="page active">
    <button class="btn giant-btn" onclick="navTo('pg-report')">
        <i class="fas fa-truck-loading"></i>
        <span>إرســـــال تبلـيـــغ</span>
    </button>
    <div class="card" style="border: 2px dashed var(--navy);">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <button class="btn" style="background:var(--navy)" onclick="auth('admin')">الإدارة</button>
            <button class="btn" style="background:var(--gold)" onclick="auth('driver')">السائقين</button>
        </div>
    </div>
</div>

<div id="pg-report" class="page">
    <div class="card">
        <div style="height:200px; border:2px solid #ccc; border-radius:15px; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden;">
            <i id="cam-icon" class="fas fa-camera fa-4x" style="color:#ccc"></i>
            <img id="prev-img" style="width:100%; height:100%; object-fit:cover; display:none;">
            <input type="file" accept="image/*" capture="environment" id="file-in" style="display:none" onchange="preview(this)">
            <button class="btn" style="position:absolute; bottom:5px; width:auto; background:var(--navy)" onclick="document.getElementById('file-in').click()">تصوير</button>
        </div>
        <button class="btn" style="background:var(--forest); margin-top:10px;" onclick="getLoc()">تحديد الموقع GPS</button>
        <input type="text" id="rep-addr" class="input" placeholder="اسم الحي">
        <input type="text" id="rep-gps" class="input" readonly placeholder="الإحداثيات">
        <button class="btn" style="background:var(--emerald)" onclick="submitReport()">إرسال الآن</button>
        <button class="btn" style="background:#888" onclick="navTo('pg-home')">رجوع</button>
    </div>
</div>

<div id="pg-admin" class="page">
    <div class="card">
        <h3>لوحة الإدارة</h3>
        <button class="btn" style="background:var(--orange)" onclick="downloadArchive()"><i class="fas fa-file-download"></i> تحميل الأرشيف (Excel)</button>
        <hr>
        <div id="admin-list"></div>
        <button class="btn" style="background:var(--red)" onclick="location.reload()">خروج</button>
    </div>
</div>

<div id="pg-driver" class="page">
    <div class="card" style="background:var(--emerald); color:white; text-align:center;">
        <h3 id="dr-name">صفحة المهام</h3>
    </div>
    <div id="driver-list"></div>
    <button class="btn" style="background:#444" onclick="location.reload()">خروج</button>
</div>

<div class="footer">إشراف د. رابحي فتحي - بلدية المدية 2026 ©</div>

<script>
    // تهيئة Firebase (يرجى التأكد من بياناتك)
    const firebaseConfig = { databaseURL: "https://medea-clean-2026-v4-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let localData = { reports: [], staff: [] };
    let currentImg = "";

    function initApp() {
        db.ref('APP_DATA_2026').on('value', s => { if(s.exists()) localData = s.val(); renderData(); });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
    }

    function navTo(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    function preview(input) {
        const reader = new FileReader();
        reader.onload = e => {
            currentImg = e.target.result;
            document.getElementById('prev-img').src = currentImg;
            document.getElementById('prev-img').style.display = 'block';
            document.getElementById('cam-icon').style.display = 'none';
        };
        reader.readAsDataURL(input.files[0]);
    }

    function getLoc() {
        navigator.geolocation.getCurrentPosition(p => {
            document.getElementById('rep-gps').value = p.coords.latitude.toFixed(6) + "," + p.coords.longitude.toFixed(6);
        });
    }

    // إصلاح إرسال الرسائل ببيانات كاملة
    function submitReport() {
        if(!currentImg || !document.getElementById('rep-addr').value) return alert("الرجاء ملئ البيانات");
        const newReport = {
            id: Date.now(),
            image: currentImg,
            address: document.getElementById('rep-addr').value,
            gps: document.getElementById('rep-gps').value,
            time: new Date().toLocaleTimeString('ar-DZ'),
            date: new Date().toLocaleDateString('ar-DZ'),
            status: 'new'
        };
        if(!localData.reports) localData.reports = [];
        localData.reports.push(newReport);
        db.ref('APP_DATA_2026').set(localData).then(() => {
            alert("شكراً لك! تم استقبال التبليغ بنجاح");
            location.reload(); // لتصفير كل شيء
        });
    }

    function auth(role) {
        const n = prompt("ادخل الاسم:");
        if(n) { 
            if(role === 'driver') document.getElementById('dr-name').innerText = "السائق: " + n;
            navTo(role === 'admin' ? 'pg-admin' : 'pg-driver'); 
        }
    }

    function renderData() {
        // عرض البيانات للإدارة وللسائق بدقة
        const list = localData.reports || [];
        const adminDiv = document.getElementById('admin-list');
        const driverDiv = document.getElementById('driver-list');
        
        const html = list.map(r => `
            <div class="card" style="border-right: 5px solid ${r.status==='new'?'red':'green'}">
                <img src="${r.image}" style="width:100px; border-radius:10px;">
                <p><b>الموقع:</b> ${r.address}<br><b>GPS:</b> ${r.gps}<br><b>الوقت:</b> ${r.time} - ${r.date}</p>
            </div>
        `).join('');
        
        if(adminDiv) adminDiv.innerHTML = html;
        if(driverDiv) driverDiv.innerHTML = html;
    }

    // وظيفة تحميل الأرشيف
    function downloadArchive() {
        let csv = "ID,العنوان,GPS,الوقت,التاريخ,الحالة\n";
        (localData.reports || []).forEach(r => {
            csv += `${r.id},${r.address},${r.gps},${r.time},${r.date},${r.status}\n`;
        });
        const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "ارشيف_المدية_نظيفة.csv";
        link.click();
    }
</script>
</body>
</html>
