<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المدية نظيفة - المرحلة التجريبية 2026</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --gold: #D4AF37; --red: #d21034; --navy: #14213D; --white: #ffffff; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        
        body { 
            margin: 0; min-height: 100vh;
            /* خلفية ثلاثية الألوان مع صورة البلدية خفيفة */
            background: linear-gradient(135deg, rgba(27,94,32,0.15) 0%, rgba(255,255,255,0.9) 50%, rgba(210,16,52,0.15) 100%),
                        url('https://raw.githubusercontent.com/rabf09-droid/rabf09-droid.github.io/main/1000052240.webp');
            background-size: cover; background-position: center; background-attachment: fixed;
        }

        .header { background: rgba(255,255,255,0.95); padding: 15px; text-align: center; border-bottom: 5px solid var(--gold); position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .page { display: none; padding: 20px; animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); max-width: 800px; margin: auto; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: rgba(255, 255, 255, 0.98); border-radius: 30px; padding: 25px; margin-bottom: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.05); transition: 0.3s; }
        .btn { border: none; padding: 15px; border-radius: 18px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 12px; color: white; transition: 0.3s; }
        .btn:active { transform: scale(0.96); }
        .input { width: 100%; padding: 14px; border-radius: 15px; border: 2px solid #eee; margin-bottom: 12px; text-align: center; font-size: 1rem; outline: none; }
        .input:focus { border-color: var(--forest); }

        /* أيقونة التبليغ العملاقة */
        .report-master-btn {
            background: linear-gradient(45deg, var(--emerald), var(--forest));
            height: 280px; flex-direction: column; border-radius: 50px;
            font-size: 2.3rem; box-shadow: 0 20px 50px rgba(27, 94, 32, 0.4); border: 8px solid white;
        }
        .report-master-btn i { font-size: 8rem; margin-bottom: 15px; text-shadow: 2px 4px 10px rgba(0,0,0,0.2); }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-item { padding: 15px; border-radius: 20px; color: white; text-align: center; font-weight: bold; font-size: 0.9rem; }
        
        .list-row { background: #f8f9fa; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-right: 5px solid var(--emerald); }
        
        .footer { background: white; padding: 20px; text-align: center; border-top: 5px solid var(--gold); margin-top: 40px; }
    </style>
</head>
<body onload="initApp()">

<div class="header">
    <div style="font-size: 0.8rem; font-weight: bold; color: #666;">الجمهورية الجزائرية الديمقراطية الشعبية</div>
    <div style="font-size: 0.9rem; color: var(--forest); font-weight: bold;">ولاية المدية - بلدية المدية</div>
    <div style="font-size: 2rem; font-weight: 900; color: var(--emerald); letter-spacing: -1px;">نظام المدية نظيفة</div>
    <div style="display: flex; justify-content: space-around; margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee;">
        <div id="clock" style="font-weight: bold; color: var(--navy); font-size: 1.1rem;">00:00:00</div>
        <div style="font-weight: bold; color: var(--red);">07 أفريل 2026</div>
    </div>
</div>

<div id="pg-home" class="page active">
    <div style="text-align: center; margin: 40px 0;">
        <button class="btn report-master-btn" onclick="navTo('pg-citizen')">
            <i class="fas fa-truck-pickup"></i>
            <span>إرســــال تبلـيـــغ</span>
        </button>
    </div>

    <div class="card" style="margin-top: 120px; border: 2px dashed var(--gold); background: rgba(255,255,255,0.7);">
        <p style="text-align: center; font-weight: bold; color: var(--navy);">فضاء العمل الرسمي</p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <button class="btn" style="background:var(--navy); height: 60px;" onclick="auth('admin')"><i class="fas fa-user-shield"></i> الإدارة</button>
            <button class="btn" style="background:var(--gold); height: 60px;" onclick="auth('driver')"><i class="fas fa-truck"></i> السائقين</button>
        </div>
    </div>
</div>

<div id="pg-citizen" class="page">
    <div class="card">
        <div id="cam-box" style="height:260px; border:3px dashed #ccc; border-radius:25px; display:flex; align-items:center; justify-content:center; background:#fff; margin-bottom:15px; overflow:hidden;">
            <i id="cam-icon" class="fas fa-camera fa-5x" style="color:#ddd"></i>
            <img id="cam-preview" style="width:100%; height:100%; object-fit:cover; display:none;">
        </div>
        <label class="btn" style="background:var(--navy);"><i class="fas fa-camera"></i> التقاط صورة النفايات<input type="file" accept="image/*" capture="environment" style="display:none;" onchange="previewFile(this)"></label>
        <button class="btn" style="background:var(--forest);" onclick="getLocation()"><i class="fas fa-map-marker-alt"></i> تحديد الموقع</button>
        <input type="text" id="c-addr" class="input" placeholder="اسم الحي أو الشارع">
        <input type="text" id="c-gps" class="input" readonly placeholder="إحداثيات الموقع الجغرافي">
        <button class="btn" style="background:var(--emerald); height: 75px; font-size: 1.4rem;" onclick="submitFinalReport()">إرسال التبليغ الآن</button>
        <button class="btn" style="background:#888;" onclick="navTo('pg-home')">رجوع</button>
    </div>
</div>

<div id="pg-admin" class="page">
    <div class="card" style="background: var(--navy); color: white; display: flex; justify-content: space-between; align-items: center; padding: 15px 25px;">
        <h3 style="margin:0;">لوحة التحكم بالإدارة</h3>
        <button onclick="logoutAdmin()" style="background:var(--red); color:white; border:none; padding:10px 20px; border-radius:12px; cursor:pointer; font-weight:bold;"><i class="fas fa-power-off"></i> خروج</button>
    </div>

    <div class="stat-grid">
        <div class="stat-item" style="background:var(--red);">جديد<br><span id="st1">0</span></div>
        <div class="stat-item" style="background:var(--orange);">مرسل<br><span id="st2">0</span></div>
        <div class="stat-item" style="background:var(--forest);">منجز<br><span id="st3">0</span></div>
    </div>

    <div id="admin-list-area"></div>

    <div class="card">
        <h4><i class="fas fa-plus-circle"></i> إضافة سائق جديد</h4>
        <input type="text" id="new-dr-name" class="input" placeholder="اسم السائق">
        <input type="text" id="new-dr-phone" class="input" placeholder="رقم الهاتف">
        <input type="text" id="new-dr-truck" class="input" placeholder="رقم الشاحنة">
        <select id="new-dr-type" class="input">
            <option value="البلدية">شاحنة بلدية</option>
            <option value="القطاع الخاص">قطاع خاص</option>
        </select>
        <button class="btn" style="background:var(--emerald)" onclick="addDriver()">حفظ البيانات</button>
        <div id="ui-dr-list"></div>
    </div>

    <div class="card" id="boss-tools" style="display:none;">
        <h4><i class="fas fa-user-cog"></i> النظافة مسؤولية (إدارة المسؤولين)</h4>
        <input type="text" id="new-ad-name" class="input" placeholder="اسم المسؤول الجديد">
        <button class="btn" style="background:var(--navy)" onclick="addAdmin()">إضافة مسؤول</button>
        <div id="ui-ad-list"></div>
    </div>
</div>

<div id="pg-driver" class="page">
    <div id="dr-welcome" class="card" style="background:var(--forest); color:white; text-align:center;"></div>
    <div id="dr-tasks-area"></div>
    <button class="btn" style="background:#444;" onclick="navTo('pg-home')">تسجيل الخروج</button>
</div>

<div class="footer">
    <div style="margin-bottom: 15px;">
        <button onclick="setLang('ar')" style="border:1px solid #ddd; background:white; padding:8px 15px; border-radius:10px;">العربية</button>
        <button onclick="setLang('fr')" style="border:1px solid #ddd; background:white; padding:8px 15px; border-radius:10px;">Français</button>
        <button onclick="setLang('en')" style="border:1px solid #ddd; background:white; padding:8px 15px; border-radius:10px;">English</button>
    </div>
    <div style="font-size: 0.8rem; color: var(--navy); font-weight: bold;">تطوير مشترك: د. رابحي فتحي & المساعد الذكي © 2026</div>
</div>

<script>
    // تهيئة قاعدة البيانات (Firebase)
    const firebaseConfig = { databaseURL: "https://medea-smart-clean-2026-v5-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let appData = { reports: [], drivers: [], admins: ["فتحي"] };
    let tempImgCit = "", tempImgDrv = "", currentLoggedUser = "";

    function initApp() {
        db.ref('APP_V5_DATA').on('value', snap => { if(snap.exists()){ appData = snap.val(); updateUI(); } });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
    }

    function previewFile(input) {
        const reader = new FileReader();
        reader.onload = e => {
            tempImgCit = e.target.result;
            document.getElementById('cam-preview').src = tempImgCit;
            document.getElementById('cam-preview').style.display = 'block';
            document.getElementById('cam-icon').style.display = 'none';
        };
        reader.readAsDataURL(input.files[0]);
    }

    function getLocation() {
        navigator.geolocation.getCurrentPosition(p => {
            const lat = p.coords.latitude, lng = p.coords.longitude;
            document.getElementById('c-gps').value = lat.toFixed(6) + "," + lng.toFixed(6);
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=ar`).then(r=>r.json()).then(d=>{
                document.getElementById('c-addr').value = d.display_name.split(',').slice(0,3).join(',');
            });
        });
    }

    function submitFinalReport() {
        const addr = document.getElementById('c-addr').value;
        if(!tempImgCit || !addr) return alert("يرجى التقاط صورة وتحديد الموقع أولاً");
        const rep = {
            id: Date.now(), img: tempImgCit, addr: addr, gps: document.getElementById('c-gps').value,
            time: new Date().toLocaleTimeString('fr-FR'), date: "07 أفريل 2026", status: 'new'
        };
        if(!appData.reports) appData.reports = [];
        appData.reports.push(rep);
        db.ref('APP_V5_DATA').set(appData).then(() => {
            alert("تم الإرسال بنجاح.. شكراً على تفاعلك");
            // تصفير الواجهة
            tempImgCit=""; document.getElementById('cam-preview').style.display='none'; document.getElementById('cam-icon').style.display='block';
            document.getElementById('c-addr').value=""; document.getElementById('c-gps').value="";
            navTo('pg-home');
        });
    }

    function updateUI() {
        const rs = appData.reports || [];
        document.getElementById('st1').innerText = rs.filter(r=>r.status==='new').length;
        document.getElementById('st2').innerText = rs.filter(r=>r.status==='sent').length;
        document.getElementById('st3').innerText = rs.filter(r=>r.status==='done').length;

        // تحديث الإدارة
        document.getElementById('admin-list-area').innerHTML = rs.slice().reverse().map(r => `
            <div class="card" style="border-right:12px solid ${r.status==='done'?'#2E7D32':(r.status==='sent'?'#fb8c00':'#d21034')};">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <b style="font-size:0.8rem;">📅 ${r.time} | ${r.date}</b>
                    <i class="fas fa-trash" style="color:red; cursor:pointer;" onclick="deleteReport(${r.id})"></i>
                </div>
                <div style="display:flex; gap:10px; margin:15px 0;">
                    <div style="flex:1;"><p style="font-size:0.6rem;">البلاغ</p><img src="${r.img}" style="width:100%; border-radius:15px;"></div>
                    ${r.status==='done' ? `<div style="flex:1;"><p style="font-size:0.6rem; color:green;">الإنجاز</p><img src="${r.doneImg}" style="width:100%; border-radius:15px; border:2px solid green;"></div>` : ''}
                </div>
                <p style="font-size:0.85rem;">📍 ${r.addr}<br>🌍 ${r.gps}</p>
                ${r.status==='new' ? `<button class="btn" style="background:var(--forest)" onclick="assignDriver(${r.id})">توجيه للسائق</button>` : `<div style="background:#fff3e0; padding:10px; border-radius:10px; color:orange; font-weight:bold;">🚚 السائق: ${r.driver}</div>`}
                ${r.status==='done' ? `<p style="color:green; font-weight:bold; font-size:0.8rem;">✅ تم الإنجاز في: ${r.doneTime}</p>` : ''}
            </div>
        `).join('');

        document.getElementById('ui-dr-list').innerHTML = (appData.drivers || []).map(d => `<div class="list-row"><span>${d.name} (${d.phone})</span><i class="fas fa-trash" style="color:red" onclick="removeDr(${d.id})"></i></div>`).join('');
        document.getElementById('ui-ad-list').innerHTML = (appData.admins || []).map(a => `<div class="list-row"><span>${a}</span>${a!=='فتحي'?`<i class="fas fa-trash" style="color:red" onclick="removeAd('${a}')"></i>`:''}</div>`).join('');

        // تحديث السائق (المحرك المباشر)
        if(currentLoggedUser) {
            document.getElementById('dr-welcome').innerHTML = `<h3>مرحباً بالسائق: ${currentLoggedUser}</h3>`;
            const myTasks = rs.filter(r => r.driver === currentLoggedUser && r.status === 'sent');
            document.getElementById('dr-tasks-area').innerHTML = myTasks.length ? myTasks.map(t => `
                <div class="card">
                    <p style="color:red; font-weight:bold; text-align:center;">📥 بلاغ جديد موجه لك:</p>
                    <img src="${t.img}" style="width:100%; border-radius:20px; margin-bottom:15px;">
                    <p style="font-size:0.9rem;">📍 العنوان: ${t.addr}<br>⏰ الوقت: ${t.time}</p>
                    <button class="btn" style="background:var(--navy)" onclick="window.open('https://www.google.com/maps?q=${t.gps}')"><i class="fas fa-map-marked-alt"></i> تحديد الموقع على الخريطة</button>
                    <label class="btn" style="background:var(--gold)"><i class="fas fa-camera"></i> أخذ صورة بعد الإنجاز<input type="file" capture="environment" style="display:none;" onchange="handleDrvImg(this)"></label>
                    <button class="btn" style="background:var(--forest)" onclick="finishJob(${t.id})">تأكيد الإنجاز النهائي</button>
                </div>
            `).join('') : '<p style="text-align:center; padding:20px;">لا توجد مهام مرسلة حالياً</p>';
        }
    }

    function addDriver() {
        const n = document.getElementById('new-dr-name').value;
        if(n) {
            if(!appData.drivers) appData.drivers = [];
            appData.drivers.push({id: Date.now(), name: n, phone: document.getElementById('new-dr-phone').value, truck: document.getElementById('new-dr-truck').value});
            db.ref('APP_V5_DATA').set(appData);
            document.getElementById('new-dr-name').value=""; document.getElementById('new-dr-phone').value=""; document.getElementById('new-dr-truck').value="";
        }
    }

    function assignDriver(id) {
        const dName = prompt("اكتب اسم السائق المختار بدقة من القائمة:");
        if(dName) {
            const r = appData.reports.find(x => x.id === id);
            r.status = 'sent'; r.driver = dName;
            db.ref('APP_V5_DATA').set(appData);
        }
    }

    function handleDrvImg(input) {
        const reader = new FileReader();
        reader.onload = e => { tempImgDrv = e.target.result; alert("تم حفظ صورة الإنجاز، اضغط تأكيد"); };
        reader.readAsDataURL(input.files[0]);
    }

    function finishJob(id) {
        if(!tempImgDrv) return alert("يرجى أخذ صورة للعمل المنجز أولاً");
        const r = appData.reports.find(x => x.id === id);
        r.status = 'done'; r.doneImg = tempImgDrv; r.doneTime = new Date().toLocaleTimeString('fr-FR');
        db.ref('APP_V5_DATA').set(appData).then(() => { tempImgDrv=""; alert("تم إرسال التقرير للإدارة بنجاح"); });
    }

    function auth(role) {
        const u = prompt("الاسم:"), p = prompt("الرمز:");
        if(role==='admin' && (appData.admins||[]).includes(u) && p==='1234') { 
            document.getElementById('boss-tools').style.display = (u==='فتحي'?'block':'none');
            navTo('pg-admin'); 
        } else if(role==='driver' && p==='5678') {
            if((appData.drivers||[]).find(x=>x.name===u)){ currentLoggedUser=u; navTo('pg-driver'); } else alert("الاسم غير مسجل");
        }
    }

    function logoutAdmin() { document.getElementById('admin-list-area').innerHTML = ""; navTo('pg-home'); }
    function navTo(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
    function deleteReport(id) { if(confirm("حذف؟")){ appData.reports=appData.reports.filter(x=>x.id!==id); db.ref('APP_V5_DATA').set(appData); }}
    function addAdmin() { const n=document.getElementById('new-ad-name').value; if(n){ appData.admins.push(n); db.ref('APP_V5_DATA').set(appData); document.getElementById('new-ad-name').value=""; }}
    function removeDr(id) { if(confirm("حذف؟")){ appData.drivers=appData.drivers.filter(x=>x.id!==id); db.ref('APP_V5_DATA').set(appData); }}
    function removeAd(n) { if(confirm("حذف؟")){ appData.admins=appData.admins.filter(x=>x!==n); db.ref('APP_V5_DATA').set(appData); }}
    function setLang(l) { alert("سيتم تفعيل اللغات في الإصدار النهائي"); }
</script>
</body>
</html>
