<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدية خضراء 2026 - د. رابحي فتحي</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --glass: rgba(255, 255, 255, 0.95); --gold: #D4AF37; --red: #d21034; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; transition: 0.3s; }
        body { margin: 0; background: url('https://w0.peakpx.com/wallpaper/842/630/HD-wallpaper-garbage-truck-garbage-recycling-environment-trucks.jpg') no-repeat center center fixed; background-size: cover; min-height: 100vh; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: -1; }
        .top-bar { background: var(--glass); padding: 15px; text-align: center; border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .live-panel { display: flex; justify-content: space-between; padding: 5px 15px; font-weight: bold; color: var(--emerald); font-size: 0.85rem; background: rgba(255,255,255,0.5); border-radius: 10px; margin-top: 5px; }
        .screen { display: none; padding: 20px; padding-bottom: 100px; }
        .active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .glass-card { background: var(--glass); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); text-align: center; }
        .btn-prime { border: none; padding: 14px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; color: white; border: 1px solid rgba(255,255,255,0.2); }
        .input-style { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ccc; margin-bottom: 10px; font-size: 0.9rem; }
        #map { height: 250px; border-radius: 20px; border: 3px solid white; margin-bottom: 10px; }
        .item-box { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: right; border-right: 6px solid var(--gold); position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .report-img-view { width: 100%; border-radius: 12px; margin: 10px 0; border: 1px solid #eee; }
        .del-icon { color: var(--red); cursor: pointer; float: left; font-size: 1.1rem; padding: 5px; }
        .footer-sig { position: fixed; bottom: 0; width: 100%; background: var(--glass); padding: 12px; text-align: center; font-weight: bold; color: var(--forest); border-top: 2px solid var(--gold); z-index: 1000; }
    </style>
</head>
<body onload="initApp()">

<div class="top-bar">
    <div id="lg-gov">الجمهورية الجزائرية الديمقراطية الشعبية</div>
    <div id="lg-dept" style="font-size: 1.1rem; font-weight: 700; color: var(--emerald);">بلدية المدية - مصلحة النظافة</div>
    <div class="live-panel"><div id="clock">00:00:00</div><div id="date-display">--</div></div>
</div>

<div id="scr-main" class="screen active">
    <div class="glass-card" onclick="navTo('scr-report')"><i class="fas fa-bullhorn fa-3x" style="color:var(--forest)"></i><h3 id="lg-main-rep">تبليغ مواطن جديد</h3></div>
    <div class="glass-card" onclick="auth('admin')"><i class="fas fa-user-shield fa-3x" style="color:var(--emerald)"></i><h3 id="lg-main-adm">مصلحة النظافة (الإدارة)</h3></div>
    <div class="glass-card" onclick="auth('driver')"><i class="fas fa-truck-pickup fa-3x" style="color:var(--gold)"></i><h3 id="lg-main-drv">واجهة السائق الميداني</h3></div>
    <div style="display: flex; gap: 10px;">
        <div class="glass-card" onclick="navTo('scr-settings')" style="flex:1;"><i class="fas fa-language fa-2x"></i><h4 id="lg-main-set">اللغة</h4></div>
        <div class="glass-card" onclick="location.reload()" style="flex:1; color:var(--red)"><i class="fas fa-power-off fa-2x"></i><h4 id="lg-main-ext">خروج</h4></div>
    </div>
</div>

<div id="scr-settings" class="screen">
    <div class="glass-card">
        <h3 id="lg-set-title">اختر اللغة / Select Language</h3>
        <button class="btn-prime" style="background:var(--emerald)" onclick="setLang('ar')">العربية</button>
        <button class="btn-prime" style="background:var(--navy)" onclick="setLang('fr')">Français</button>
        <button class="btn-prime" style="background:var(--forest)" onclick="setLang('en')">English</button>
    </div>
    <button class="btn-prime" style="background:#666;" onclick="navTo('scr-main')" id="lg-back-1">رجوع</button>
</div>

<div id="scr-report" class="screen">
    <div id="map"></div>
    <button class="btn-prime" style="background:var(--forest);" onclick="getMyLocation()"><i class="fas fa-location-arrow"></i> <span id="lg-rep-loc">تحديد موقعي الحالي</span></button>
    <input type="text" id="rep-addr" class="input-style" placeholder="العنوان...">
    <input type="text" id="rep-geo" class="input-style" placeholder="الإحداثيات" readonly>
    <label class="btn-prime" style="background:var(--navy);"><i class="fas fa-camera"></i> <span id="lg-rep-cam">تصوير النفايات</span> <input type="file" id="img-input" accept="image/*" capture="environment" style="display:none;" onchange="handleImg(this)"></label>
    <div id="img-status" style="display:none; color:var(--emerald); font-weight:bold; margin-bottom:10px; text-align:center;">✅ Photo Ready</div>
    <button class="btn-prime" style="background:var(--emerald);" onclick="submitReport()" id="lg-rep-send">إرسال</button>
    <button class="btn-prime" style="background:#666;" onclick="navTo('scr-main')" id="lg-back-2">رجوع</button>
</div>

<div id="scr-admin" class="screen">
    <div id="admin-summary" class="glass-card" style="display:flex; justify-content:space-around; padding:10px;">
        <div style="color:var(--red)">🆕 <span id="st-new">0</span></div>
        <div style="color:var(--orange)">🚚 <span id="st-sent">0</span></div>
        <div style="color:var(--emerald)">✅ <span id="st-done">0</span></div>
    </div>
    
    <button class="btn-prime" style="background:var(--navy)" onclick="toggleView('admin-list')" id="lg-adm-view">عرض التبليغات</button>
    <div id="admin-list" style="display:none;"></div>
    
    <button class="btn-prime" style="background:var(--forest)" onclick="toggleView('driver-mgr')" id="lg-adm-drvs">إدارة السائقين</button>
    <div id="driver-mgr" style="display:none;" class="glass-card">
        <input type="text" id="d-name" class="input-style" placeholder="اسم السائق">
        <button class="btn-prime" style="background:var(--emerald)" onclick="addDriver()" id="lg-adm-add-d">إضافة سائق</button>
        <div id="d-list-display" style="margin-top:10px;"></div>
    </div>

    <div id="super-admin-section" style="display:none;">
        <button class="btn-prime" style="background:var(--gold); color:black;" onclick="toggleView('admin-users-mgr')">إدارة المسؤولين</button>
        <div id="admin-users-mgr" style="display:none;" class="glass-card">
            <input type="text" id="new-adm-name" class="input-style" placeholder="اسم مسؤول جديد">
            <button class="btn-prime" style="background:var(--navy)" onclick="addNewAdmin()">حفظ</button>
            <div id="adm-list-display"></div>
        </div>
    </div>
    <button class="btn-prime" style="background:#333;" onclick="navTo('scr-main')" id="lg-back-3">خروج</button>
</div>

<div id="scr-driver" class="screen">
    <h2 id="drv-hi" style="color:white; text-align:center;"></h2>
    <div id="driver-tasks-container"></div>
    <button class="btn-prime" style="background:#333;" onclick="navTo('scr-main')" id="lg-back-4">خروج</button>
</div>

<div class="footer-sig">د. رابحي فتحي | Medea Green 2026</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- الإعدادات والبيانات ---
    const firebaseConfig = { databaseURL: "https://medea-green-2026-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();

    let db = { reports: [], drivers: [], admins: ["فتحي"] };
    let map, marker, currentImg = "", currentLang = "ar", currentUser = "";

    const translations = {
        ar: {
            gov: "الجمهورية الجزائرية الديمقراطية الشعبية", dept: "بلدية المدية - مصلحة النظافة",
            rep: "تبليغ مواطن جديد", adm: "مصلحة النظافة (الإدارة)", drv: "واجهة السائق الميداني",
            set: "اللغة", ext: "خروج", back: "رجوع", loc: "تحديد موقعي الحالي", cam: "تصوير النفايات",
            send: "إرسال", view: "عرض التبليغات", drvs: "إدارة السائقين", add_d: "إضافة",
            done_btn: "تم التنظيف ✅", status_new: "جديد", status_sent: "قيد التنفيذ", status_done: "مكتمل"
        },
        fr: {
            gov: "République Algérienne Démocratique et Populaire", dept: "Commune de Médéa - Service d'Hygiène",
            rep: "Nouveau Signalement", adm: "Administration", drv: "Interface Chauffeur",
            set: "Langue", ext: "Quitter", back: "Retour", loc: "Ma Position", cam: "Prendre Photo",
            send: "Envoyer", view: "Voir Signalements", drvs: "Gestion Chauffeurs", add_d: "Ajouter",
            done_btn: "Terminé ✅", status_new: "Nouveau", status_sent: "En cours", status_done: "Terminé"
        },
        en: {
            gov: "People's Democratic Republic of Algeria", dept: "Medea Municipality - Hygiene Dept",
            rep: "New Report", adm: "Administration", drv: "Driver Interface",
            set: "Language", ext: "Exit", back: "Back", loc: "My Location", cam: "Take Photo",
            send: "Submit", view: "View Reports", drvs: "Manage Drivers", add_d: "Add",
            done_btn: "Cleaned ✅", status_new: "New", status_sent: "In Progress", status_done: "Done"
        }
    };

    // --- الوظائف الأساسية ---
    function save() { rtdb.ref('medea_data').set(db); }

    function initApp() {
        rtdb.ref('medea_data').on('value', (snap) => {
            if (snap.exists()) {
                db = snap.val();
                if(!db.admins) db.admins = ["فتحي"];
                updateStats();
                refreshUI();
            }
        });
        setInterval(updateClock, 1000);
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('fr-FR');
        const monthsAr = ["جانفي", "فيفري", "مارس", "أفريل", "ماي", "جوان", "جويلية", "أوت", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
        document.getElementById('date-display').innerText = currentLang === 'ar' ? 
            `${now.getDate()} ${monthsAr[now.getMonth()]} ${now.getFullYear()}` : now.toLocaleDateString();
    }

    function setLang(lang) {
        currentLang = lang;
        const t = translations[lang];
        document.getElementById('lg-gov').innerText = t.gov;
        document.getElementById('lg-dept').innerText = t.dept;
        document.getElementById('lg-main-rep').innerText = t.rep;
        document.getElementById('lg-main-adm').innerText = t.adm;
        document.getElementById('lg-main-drv').innerText = t.drv;
        document.getElementById('lg-main-set').innerText = t.set;
        document.getElementById('lg-main-ext').innerText = t.ext;
        document.getElementById('lg-back-1').innerText = t.back;
        document.getElementById('lg-back-2').innerText = t.back;
        document.getElementById('lg-back-3').innerText = t.back;
        document.getElementById('lg-back-4').innerText = t.back;
        document.getElementById('lg-rep-loc').innerText = t.loc;
        document.getElementById('lg-rep-cam').innerText = t.cam;
        document.getElementById('lg-rep-send').innerText = t.send;
        document.getElementById('lg-adm-view').innerText = t.view;
        document.getElementById('lg-adm-drvs').innerText = t.drvs;
        document.getElementById('lg-adm-add-d').innerText = t.add_d;
        document.dir = lang === 'ar' ? 'rtl' : 'ltr';
        navTo('scr-main');
    }

    function refreshUI() {
        if(document.getElementById('scr-admin').classList.contains('active')) {
            renderReports(); renderDrivers(); renderAdminsList();
        }
        if(document.getElementById('scr-driver').classList.contains('active')) {
            renderDriverTasks(currentUser);
        }
    }

    // --- نظام الخرائط والموقع ---
    function navTo(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'scr-report') setTimeout(initMap, 500);
        refreshUI();
    }

    function initMap() {
        if(map) { map.invalidateSize(); return; }
        map = L.map('map').setView([36.2642, 2.7539], 16);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri' }).addTo(map);
        marker = L.marker([36.2642, 2.7539], {draggable: true}).addTo(map);
        marker.on('dragend', () => { 
            const p = marker.getLatLng(); 
            document.getElementById('rep-geo').value = `${p.lat.toFixed(6)}, ${p.lng.toFixed(6)}`;
        });
    }

    function getMyLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude, lng = pos.coords.longitude;
                map.setView([lat, lng], 18); marker.setLatLng([lat, lng]);
                document.getElementById('rep-geo').value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
            }, () => alert("GPS Error"));
        }
    }

    // --- التعامل مع الصور والبلاغات ---
    function handleImg(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 600;
                let width = img.width, height = img.height;
                if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                canvas.width = width; canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                currentImg = canvas.toDataURL('image/jpeg', 0.7);
                document.getElementById('img-status').style.display = 'block';
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function submitReport() {
        if(!currentImg) return alert("Photo required!");
        if(!db.reports) db.reports = [];
        db.reports.push({
            id: Date.now(),
            addr: document.getElementById('rep-addr').value || "Medea",
            geo: document.getElementById('rep-geo').value,
            img: currentImg,
            status: 'new',
            time: new Date().toLocaleString()
        });
        save(); currentImg = ""; document.getElementById('img-status').style.display='none';
        alert("Done ✅"); navTo('scr-main');
    }

    // --- الإدارة والسائقين ---
    function auth(role) {
        const user = prompt("Name:");
        const pass = prompt("Pin:");
        if(role === 'admin' && db.admins.includes(user) && pass === '1234') {
            currentUser = user;
            document.getElementById('super-admin-section').style.display = (user === "فتحي" ? 'block' : 'none');
            navTo('scr-admin');
        } else if(role === 'driver' && pass === '5678') {
            const d = (db.drivers || []).find(x => x.name === user);
            if(d) { 
                currentUser = user; 
                document.getElementById('drv-hi').innerText = user;
                navTo('scr-driver'); 
            } else alert("Not Found!");
        } else alert("Access Denied");
    }

    function renderReports() {
        const t = translations[currentLang];
        const list = document.getElementById('admin-list');
        list.innerHTML = (db.reports || []).slice().reverse().map(r => `
            <div class="item-box">
                <i class="fas fa-trash del-icon" onclick="deleteItem('reports', ${r.id})"></i>
                <img src="${r.img}" class="report-img-view">
                📍 ${r.addr}<br>🕒 ${r.time}<br>
                <b>Status: ${t['status_'+r.status]}</b>
                <hr>
                ${r.status === 'new' ? `
                    <select id="sel-${r.id}" class="input-style">
                        <option value="">-- Driver --</option>
                        ${(db.drivers||[]).map(d=>`<option value="${d.name}">${d.name}</option>`).join('')}
                    </select>
                    <button class="btn-prime" style="background:var(--orange)" onclick="assignTask(${r.id})">Assign</button>
                ` : `Sent to: ${r.assignedTo}`}
            </div>
        `).join('');
    }

    function assignTask(id) {
        const d = document.getElementById(`sel-${id}`).value;
        if(d) {
            const rep = db.reports.find(x=>x.id===id);
            rep.status = 'sent';
            rep.assignedTo = d;
            save();
        }
    }

    function renderDriverTasks(name) {
        const t = translations[currentLang];
        const container = document.getElementById('driver-tasks-container');
        const tasks = (db.reports || []).filter(r => r.assignedTo === name && r.status === 'sent');
        container.innerHTML = tasks.length ? tasks.map(r => `
            <div class="item-box">
                <img src="${r.img}" class="report-img-view">
                📍 ${r.addr}
                <button class="btn-prime" style="background:var(--emerald)" onclick="completeTask(${r.id})">${t.done_btn}</button>
            </div>
        `).join('') : "<p style='color:white;text-align:center;'>No tasks</p>";
    }

    function completeTask(id) {
        const rep = db.reports.find(x => x.id === id);
        rep.status = 'done';
        save();
    }

    function deleteItem(path, id) {
        if(confirm("Confirm Delete?")) {
            db[path] = db[path].filter(x => x.id !== id);
            save();
        }
    }

    function addDriver() {
        const n = document.getElementById('d-name').value;
        if(!n) return;
        if(!db.drivers) db.drivers = [];
        db.drivers.push({ id: Date.now(), name: n });
        save(); document.getElementById('d-name').value = "";
    }

    function renderDrivers() {
        document.getElementById('d-list-display').innerHTML = (db.drivers || []).map(d => `
            <div style="background:#eee; padding:10px; margin:5px; border-radius:10px;">
                👤 ${d.name} 
                ${currentUser === 'فتحي' ? `<i class="fas fa-trash del-icon" onclick="deleteItem('drivers', ${d.id})"></i>` : ''}
            </div>
        `).join('');
    }

    function updateStats() {
        if(!db.reports) return;
        document.getElementById('st-new').innerText = db.reports.filter(r => r.status === 'new').length;
        document.getElementById('st-sent').innerText = db.reports.filter(r => r.status === 'sent').length;
        document.getElementById('st-done').innerText = db.reports.filter(r => r.status === 'done').length;
    }

    function toggleView(id) {
        const e = document.getElementById(id);
        e.style.display = e.style.display === 'none' ? 'block' : 'none';
    }
</script>
</body>
    </html>
