<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظافة المدية 2026 - د. رابحي فتحي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --glass: rgba(255, 255, 255, 0.98); --gold: #D4AF37; --red: #d21034; --orange: #fb8c00; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: #333; }
        .main-wrapper { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://www.shutterstock.com/shutterstock/photos/1932338633/display_1500/stock-photo-garbage-truck-on-the-street-1932338633.jpg'); background-size: cover; background-position: center; min-height: 100vh; padding-bottom: 180px; }
        .top-bar { background: var(--glass); padding: 15px; text-align: center; border-bottom: 4px solid var(--gold); position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .screen { display: none; padding: 20px; animation: slideUp 0.3s ease-out; }
        .active { display: block; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .card { background: var(--glass); border-radius: 25px; padding: 20px; margin-bottom: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-action { border: none; padding: 16px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; color: white; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .btn-action:active { transform: scale(0.97); }
        .input-field { width: 100%; padding: 14px; border-radius: 15px; border: 2px solid #ddd; margin-bottom: 12px; font-size: 1rem; text-align: center; background: #fff; }
        .footer-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--glass); padding: 15px; border-top: 3px solid var(--gold); z-index: 2000; }
        .lang-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .lang-item { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid #ccc; background: white; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
    </style>
</head>
<body onload="initSystem()">
<div class="main-wrapper">
    <div class="top-bar">
        <div style="font-size: 0.75rem; font-weight: bold;" id="t-country">الجمهورية الجزائرية الديمقراطية الشعبية</div>
        <div style="font-size: 1.4rem; font-weight: 800; color: var(--emerald);" id="t-title">نظافة المدية 2026</div>
        <div style="display: flex; justify-content: space-between; padding: 5px 20px; font-weight: bold; color: var(--navy);">
            <div id="live-timer">00:00:00</div>
            <div>06 أفريل 2026</div>
        </div>
    </div>

    <div id="scr-home" class="screen active">
        <div class="card" onclick="navTo('scr-report')">
            <i class="fas fa-bullhorn fa-4x" style="color:var(--forest)"></i>
            <h2 id="b-report">التبليغ</h2>
        </div>
        <div class="card" onclick="loginPortal('admin')">
            <i class="fas fa-tasks fa-4x" style="color:var(--emerald)"></i>
            <h2 id="b-admin">الإدارة</h2>
        </div>
        <div class="card" onclick="loginPortal('driver')">
            <i class="fas fa-truck-loading fa-4x" style="color:var(--gold)"></i>
            <h2 id="b-driver">السائق</h2>
        </div>
        <div class="footer-nav">
            <div class="lang-row">
                <button class="lang-item" onclick="setLang('ar')">العربية</button>
                <button class="lang-item" onclick="setLang('fr')">Français</button>
                <button class="lang-item" onclick="setLang('en')">English</button>
            </div>
            <button class="btn-action" style="background:var(--red); margin:0;" onclick="appExit()" id="b-exit"><i class="fas fa-power-off"></i> خروج</button>
        </div>
    </div>

    <div id="scr-report" class="screen">
        <div class="card">
            <div id="cam-view" style="height:220px; border:3px dashed var(--forest); border-radius:20px; display:flex; align-items:center; justify-content:center; margin-bottom:15px; overflow:hidden; background:#fff;">
                <i id="cam-hint" class="fas fa-camera fa-4x" style="color:#ccc"></i>
                <img id="img-preview" style="width:100%; height:100%; object-fit:cover; display:none;">
            </div>
            <label class="btn-action" style="background:var(--navy);">
                <i class="fas fa-camera"></i> <span id="l-photo">تصوير النفايات</span>
                <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="handleCapture(this, 'cit')">
            </label>
            <button class="btn-action" style="background:var(--forest);" onclick="fetchLocation()"><i class="fas fa-map-marker-alt"></i> <span id="l-gps">تحديد الموقع الآن</span></button>
            <input type="text" id="inp-addr" class="input-field" placeholder="العنوان...">
            <input type="text" id="inp-gps" class="input-field" readonly placeholder="الإحداثيات الجغرافية">
            <button class="btn-action" style="background:var(--emerald);" onclick="confirmAndSend()"><i class="fas fa-paper-plane"></i> <span id="l-send">إرسال التبليغ فوراً</span></button>
            <button class="btn-action" style="background:#666;" onclick="navTo('scr-home')">رجوع</button>
        </div>
    </div>
        <div id="scr-admin" class="screen">
        <div style="display: flex; gap: 8px; margin-bottom: 20px;">
            <div style="flex:1; background:var(--red); color:white; padding:12px; border-radius:15px; text-align:center;">
                <i class="fas fa-plus-circle"></i> جديد<br><b id="st-new" style="font-size:1.4rem;">0</b>
            </div>
            <div style="flex:1; background:var(--orange); color:white; padding:12px; border-radius:15px; text-align:center;">
                <i class="fas fa-clock"></i> مرسل<br><b id="st-sent" style="font-size:1.4rem;">0</b>
            </div>
            <div style="flex:1; background:var(--forest); color:white; padding:12px; border-radius:15px; text-align:center;">
                <i class="fas fa-check"></i> تم<br><b id="st-done" style="font-size:1.4rem;">0</b>
            </div>
        </div>

        <button class="btn-action" style="background:var(--navy)" onclick="toggleUI('ui-reps')">📦 قائمة البلاغات</button>
        <div id="ui-reps" style="display:none;"></div>

        <button class="btn-action" style="background:var(--forest)" onclick="toggleUI('ui-drvs')">🚛 إدارة السائقين</button>
        <div id="ui-drvs" style="display:none;" class="card">
            <input type="text" id="new-d-name" class="input-field" placeholder="اسم السائق">
            <input type="tel" id="new-d-phone" class="input-field" placeholder="رقم الهاتف">
            <input type="text" id="new-d-truck" class="input-field" placeholder="رقم الشاحنة">
            <select id="new-d-sector" class="input-field">
                <option value="البلدية">البلدية</option>
                <option value="القطاع الخاص">القطاع الخاص</option>
            </select>
            <button class="btn-action" style="background:var(--emerald)" onclick="addDriver()">حفظ السائق وتصفير الحقول</button>
            <div id="list-drivers"></div>
        </div>

        <div id="super-power" style="display:none;">
            <button class="btn-action" style="background:var(--gold); color:black;" onclick="toggleUI('ui-mgrs')">🔑 إدارة المسؤولين</button>
            <div id="ui-mgrs" style="display:none;" class="card">
                <input type="text" id="adm-name-inp" class="input-field" placeholder="اسم المسؤول الجديد">
                <button class="btn-action" style="background:var(--navy)" onclick="addManager()">إضافة وتصفير</button>
                <div id="list-admins"></div>
            </div>
        </div>
        <button class="btn-action" style="background:#444;" onclick="navTo('scr-home')">رجوع</button>
    </div>

    <div id="scr-driver" class="screen">
        <div id="driver-bar" class="card" style="background:var(--emerald); color:white;"></div>
        <div id="driver-list"></div>
        <button class="btn-action" style="background:#444;" onclick="navTo('scr-home')">خروج</button>
    </div>
</div>

<script>
    // تكوين Firebase مع نظام PRO
    const firebaseConfig = { databaseURL: "https://medea-smart-clean-2026-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let store = { reports: [], drivers: [], admins: ["فتحي"] };
    let citPic = "", drvPic = "", activeMe = "";

    function save() { db.ref('MEDEA_FINAL_V12').set(store); }

    function initSystem() {
        db.ref('MEDEA_FINAL_V12').on('value', (s) => { if(s.exists()){ store=s.val(); refresh(); } });
        setInterval(() => { document.getElementById('live-timer').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
    }

    function appExit() {
        if(confirm("هل تريد الخروج من التطبيق؟")) {
            // حل مشكلة الخروج في APK
            if(navigator.app) { navigator.app.exitApp(); } 
            else if(navigator.device) { navigator.device.exitApp(); }
            else { window.location.href = "about:blank"; }
        }
    }

    function setLang(l) {
        const d = {
            ar: {country: "الجمهورية الجزائرية الديمقراطية الشعبية", title: "نظافة المدية 2026", report: "التبليغ", admin: "الإدارة", driver: "السائق", exit: "خروج", photo: "تصوير النفايات", gps: "تحديد الموقع الآن", send: "إرسال التبليغ فوراً"},
            fr: {country: "République Algérienne", title: "Médéa Propre 2026", report: "Signalement", admin: "Admin", driver: "Chauffeur", exit: "Quitter", photo: "Prendre Photo", gps: "Localiser", send: "Envoyer"},
            en: {country: "People's Democratic Republic", title: "Clean Medea 2026", report: "Reporting", admin: "Management", driver: "Driver", exit: "Exit", photo: "Take Photo", gps: "Get GPS", send: "Submit"}
        };
        document.getElementById('t-country').innerText = d[l].country;
        document.getElementById('t-title').innerText = d[l].title;
        document.getElementById('b-report').innerText = d[l].report;
        document.getElementById('b-admin').innerText = d[l].admin;
        document.getElementById('b-driver').innerText = d[l].driver;
        document.getElementById('b-exit').innerHTML = `<i class="fas fa-power-off"></i> ${d[l].exit}`;
        document.getElementById('l-photo').innerText = d[l].photo;
        document.getElementById('l-gps').innerText = d[l].gps;
        document.getElementById('l-send').innerText = d[l].send;
    }

    // ضغط الصورة لضمان وصول الرسالة (حل مشكلة عدم وصول البيانات)
    function handleCapture(input, mode) {
        const reader = new FileReader();
        reader.onload = e => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const scale = 400 / img.width;
                canvas.width = 400; canvas.height = img.height * scale;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                const result = canvas.toDataURL('image/jpeg', 0.5); // ضغط عالي لسرعة الإرسال
                if(mode==='cit') {
                    citPic = result; document.getElementById('img-preview').src = result;
                    document.getElementById('img-preview').style.display='block';
                    document.getElementById('cam-hint').style.display='none';
                } else { drvPic = result; alert("📸 تم التقاط صورة الإنجاز"); }
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }

    function fetchLocation() {
        navigator.geolocation.getCurrentPosition(p => {
            const lat = p.coords.latitude, lng = p.coords.longitude;
            document.getElementById('inp-gps').value = `${lat.toFixed(6)},${lng.toFixed(6)}`;
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
            .then(r => r.json()).then(d => { document.getElementById('inp-addr').value = d.display_name.split(',').slice(0,3).join(','); });
        }, () => alert("تأكد من فتح GPS الهاتف"));
    }

    function confirmAndSend() {
        const ad = document.getElementById('inp-addr').value;
        const gp = document.getElementById('inp-gps').value;
        if(!citPic || !ad) return alert("الرجاء تصوير الموقع وتحديده");
        const rep = { id: Date.now(), img: citPic, addr: ad, geo: gp, time: new Date().toLocaleTimeString('fr-FR'), date: "06 أفريل 2026", status: 'new' };
        if(!store.reports) store.reports = [];
        store.reports.push(rep); save(); alert("✅ وصلت الرسالة للإدارة بنجاح"); location.reload();
    }

    function loginPortal(role) {
        const u = prompt("الاسم:"), p = prompt("الرمز:");
        if(role==='admin' && (store.admins||[]).includes(u) && p==='1234') { activeMe=u; document.getElementById('super-power').style.display=(u==="فتحي"?'block':'none'); navTo('scr-admin'); }
        else if(role==='driver' && p==='5678') {
            const d = (store.drivers||[]).find(x => x.name === u);
            if(d) { activeMe=u; document.getElementById('driver-bar').innerHTML = `<h3>${u}</h3><p>🚛 شاحنة: ${d.truck}</p>`; navTo('scr-driver'); }
            else alert("سائق غير مسجل");
        }
    }

    function navTo(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); refresh(); }

    function refresh() {
        const rs = store.reports || [];
        document.getElementById('st-new').innerText = rs.filter(r => r.status === 'new').length;
        document.getElementById('st-sent').innerText = rs.filter(r => r.status === 'sent').length;
        document.getElementById('st-done').innerText = rs.filter(r => r.status === 'done').length;

        document.getElementById('ui-reps').innerHTML = rs.slice().reverse().map(r => `
            <div class="card" style="text-align:right;">
                <img src="${r.img}" style="width:100%; border-radius:15px; height:160px; object-fit:cover;">
                <p>📍 ${r.addr}</p><p>🕒 ${r.time} | 📅 ${r.date}</p>
                ${r.status === 'new' ? `
                    <select id="sel-${r.id}" class="input-field">
                        <option value="">توجيه التبليغ للسائق...</option>
                        ${(store.drivers||[]).map(d => `<option value="${d.name}">${d.name}</option>`).join('')}
                    </select>
                    <button class="btn-action" style="background:var(--forest)" onclick="assignToDriver(${r.id})">إرسال التبليغ للسائق</button>
                ` : `<p style="color:var(--orange); font-weight:bold;">🚚 الملف عند: ${r.assignedTo}</p>`}
                <button style="color:red; background:none; border:none;" onclick="delItem('rep', ${r.id})"><i class="fas fa-trash"></i> حذف</button>
            </div>
        `).join('');

        document.getElementById('list-drivers').innerHTML = (store.drivers||[]).map(d => `<div style="background:#eee; padding:10px; margin-top:5px; border-radius:10px; text-align:right;">👤 ${d.name} | ${d.truck} <i class="fas fa-trash" style="color:red; float:left;" onclick="delItem('drv', ${d.id})"></i></div>`).join('');
        document.getElementById('list-admins').innerHTML = (store.admins||[]).map(a => `<div style="background:#eee; padding:10px; margin-top:5px; border-radius:10px;">🔑 ${a} ${a!=='فتحي'?`<i class="fas fa-times" style="color:red; float:left;" onclick="delItem('adm', '${a}')"></i>`:''}</div>`).join('');

        const jobs = rs.filter(r => r.assignedTo === activeMe && r.status === 'sent');
        document.getElementById('driver-list').innerHTML = jobs.map(r => `
            <div class="card" style="border:3px solid var(--orange); text-align:right;">
                <h3 style="color:var(--red)">🚨 بلاغ جديد كامل:</h3>
                <img src="${r.img}" style="width:100%; border-radius:15px;">
                <p>📍 الموقع: ${r.addr}</p>
                <button class="btn-action" style="background:var(--navy)" onclick="window.open('https://www.google.com/maps?q=${r.geo}')"><i class="fas fa-map-marked-alt"></i> الزاوج إلى الخريطة (GPS)</button>
                <hr>
                <label class="btn-action" style="background:var(--gold);">📷 تصوير النتيجة <input type="file" capture="environment" style="display:none;" onchange="handleCapture(this, 'drv')"></label>
                <button class="btn-action" style="background:var(--emerald)" onclick="finishJob(${r.id})">تأكيد الإنجاز للإدارة</button>
            </div>
        `).join('');
    }

    function addDriver() {
        const n=document.getElementById('new-d-name').value, p=document.getElementById('new-d-phone').value;
        if(n && p) {
            if(!store.drivers) store.drivers=[];
            store.drivers.push({id:Date.now(), name:n, phone:p, truck:document.getElementById('new-d-truck').value, sector:document.getElementById('new-d-sector').value});
            save(); document.getElementById('new-d-name').value=""; document.getElementById('new-d-phone').value=""; document.getElementById('new-d-truck').value="";
            alert("✅ تم الحفظ وتصفير الحقول");
        }
    }

    function addManager() { const n=document.getElementById('adm-name-inp').value; if(n){ if(!store.admins) store.admins=[]; store.admins.push(n); save(); document.getElementById('adm-name-inp').value=""; alert("✅ تمت الإضافة وتصفير الحقل"); } }
    function assignToDriver(id) { const d=document.getElementById('sel-'+id).value; if(d){ const r=store.reports.find(x=>x.id===id); r.status='sent'; r.assignedTo=d; save(); alert("🚀 تم الإرسال الفوري للسائق"); } }
    function finishJob(id) { if(!drvPic) return alert("يجب تصوير الموقع بعد التنظيف"); const r=store.reports.find(x=>x.id===id); r.status='done'; r.doneImg=drvPic; save(); alert("✅ تم إبلاغ الإدارة بالإنجاز"); }
    function delItem(t, id) { if(confirm("حذف؟")) { if(t==='rep') store.reports=store.reports.filter(x=>x.id!==id); if(t==='drv') store.drivers=store.drivers.filter(x=>x.id!==id); if(t==='adm') store.admins=store.admins.filter(x=>x!==id); save(); } }
    function toggleUI(id) { const e=document.getElementById(id); e.style.display=e.style.display==='none'?'block':'none'; }
</script>
</body>
</html>
