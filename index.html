<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المدية نظيفة 2026 - المرحلة التجريبية</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --gold: #D4AF37; --red: #d21034; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        
        body { 
            margin: 0; min-height: 100vh;
            background: linear-gradient(135deg, rgba(27,94,32,0.2) 0%, rgba(255,255,255,0.8) 50%, rgba(210,16,52,0.2) 100%),
                        url('https://raw.githubusercontent.com/rabf09-droid/rabf09-droid.github.io/main/1000052240.webp');
            background-size: cover; background-position: center; background-attachment: fixed;
            display: flex; justify-content: center;
        }

        .app-container { width: 100%; max-width: 480px; background: rgba(255,255,255,0.95); min-height: 100vh; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        
        .header { background: white; padding: 20px 15px; text-align: center; border-bottom: 5px solid var(--gold); }
        .header-top { font-size: 0.85rem; font-weight: bold; color: #333; margin-bottom: 2px; }
        .header-mid { font-size: 0.95rem; color: var(--forest); font-weight: bold; margin-bottom: 5px; }
        .header-main { font-size: 2.3rem; font-weight: 900; color: var(--emerald); line-height: 1; letter-spacing: -1px; }
        
        .time-bar { display: flex; justify-content: space-between; padding: 10px 20px; background: #f8f9fa; border-top: 1px solid #eee; font-weight: bold; color: var(--navy); font-size: 0.9rem; }

        .content { flex: 1; padding: 20px; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .main-btn {
            background: var(--forest); border-radius: 50px; height: 280px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; border: 8px solid white; box-shadow: 0 15px 35px rgba(46,125,50,0.3);
            cursor: pointer; margin: 20px 0; transition: 0.3s;
        }
        .main-btn i { font-size: 8rem; margin-bottom: 10px; }
        .main-btn span { font-size: 2.5rem; font-weight: bold; }

        .staff-portal { border: 3px dashed var(--navy); border-radius: 30px; padding: 20px; margin-top: 40px; background: rgba(255,255,255,0.5); text-align: center; }
        .portal-title { font-weight: bold; color: var(--navy); margin-bottom: 15px; font-size: 1.1rem; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-entry { border: none; border-radius: 15px; height: 65px; color: white; font-weight: bold; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .footer { padding: 20px; text-align: center; background: white; border-top: 2px solid #eee; }
        .signature { font-weight: bold; color: var(--navy); font-size: 0.9rem; }
    </style>
</head>
<body onload="initApp()">

<div class="app-container">
    <div class="header">
        <div class="header-top">الجمهورية الجزائرية الديمقراطية الشعبية</div>
        <div class="header-mid">مصلحة النظافة لبلدية المدية</div>
        <div class="header-main">المدية نظيفة</div>
    </div>
    <div class="time-bar">
        <div id="clock">00:00:00</div>
        <div>07 أفريل 2026</div>
    </div>

    <div class="content">
        <div id="pg-home" class="page active">
            <div class="main-btn" onclick="navTo('pg-report')">
                <i class="fas fa-truck-pickup"></i>
                <span>إرســــال تبلـيـــغ</span>
            </div>

            <div class="staff-portal">
                <div class="portal-title">رواق الموظفين والمسؤولين</div>
                <div class="btn-grid">
                    <button class="btn-entry" style="background:var(--navy)" onclick="auth('admin')">
                        <i class="fas fa-user-shield"></i> الإدارة
                    </button>
                    <button class="btn-entry" style="background:var(--gold)" onclick="auth('driver')">
                        <i class="fas fa-truck"></i> السائقين
                    </button>
                </div>
            </div>
        </div>

        <div id="pg-report" class="page">
            <div style="background:white; padding:20px; border-radius:25px; box-shadow:0 10px 20px rgba(0,0,0,0.05);">
                 <h3 style="text-align:center; color:var(--forest);">نموذج التبليغ عن نفايات</h3>
                 <button class="btn-entry" style="background:#888; width:100%; margin-top:20px;" onclick="navTo('pg-home')">رجوع</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="signature">إشراف د. رابحي فتحي - بلدية المدية 2026 ©</div>
    </div>
</div>

<script>
    // الإعدادات الأصلية المعتمدة في index html2
    const firebaseConfig = { databaseURL: "https://medea-clean-2026-v4-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function initApp() {
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR');
        }, 1000);
    }

    function navTo(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function auth(role) {
        const u = prompt("الاسم:");
        const p = prompt("الرمز:");
        if(role === 'admin' && p === '1234') alert("مرحباً سيادة المدير " + u);
        else if(role === 'driver' && p === '5678') alert("مرحباً أيها السائق " + u);
        else alert("خطأ في البيانات");
    }
</script>
</body>
</html>
