<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المدية نظيفة 2026</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --gold: #D4AF37; --red: #d21034; --navy: #14213D; --orange: #f39c12; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        
        body { margin: 0; min-height: 100vh; background: linear-gradient(135deg, rgba(27,94,32,0.2) 0%, rgba(255,255,255,0.9) 50%, rgba(210,16,52,0.2) 100%), url('https://raw.githubusercontent.com/rabf09-droid/rabf09-droid.github.io/main/1000052240.webp'); background-size: cover; background-position: center; background-attachment: fixed; }

        /* الترويسة العلوية */
        .header { background: rgba(255,255,255,0.95); padding: 10px; text-align: center; border-bottom: 5px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        
        .page { display: none; padding: 15px; max-width: 800px; margin: auto; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .btn { border: none; padding: 15px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; color: white; font-size: 1.1rem; }
        .input { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 10px; text-align: center; }

        .giant-btn { background: var(--forest); height: 230px; flex-direction: column; border-radius: 50px; font-size: 2.1rem; border: 6px solid white; box-shadow: 0 15px 45px rgba(46, 125, 50, 0.4); }
        .giant-btn i { font-size: 6.5rem; }

        /* شاشة الشكر */
        #thanks-overlay { display:none; position:fixed; inset:0; background:var(--forest); color:white; flex-direction:column; align-items:center; justify-content:center; z-index:10000; text-align:center; padding: 20px; }

        /* التذييل السفلي */
        .footer { background: white; padding: 15px; text-align: center; border-top: 4px solid var(--gold); margin-top: 20px; font-weight: bold; }

        .modal { display: none; position: fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; }
        .modal-content { background:white; padding:30px; border-radius:30px; width:90%; max-width:400px; }
    </style>
</head>
<body onload="initApp()">

<div id="thanks-overlay">
    <i class="fas fa-heart fa-6x" style="color:var(--gold); margin-bottom:20px;"></i>
    <h1 style="font-size:2.8rem; font-weight:900;">شكراً لكم!</h1>
    <p style="font-size:1.5rem;">تم إرسال بلاغكم بنجاح.<br>معاً لمدية أنظف 2026</p>
</div>

<div class="header">
    <div style="font-size: 0.75rem; font-weight: bold;">الجمهورية الجزائرية الديمقراطية الشعبية</div>
    <div style="font-size: 1.6rem; font-weight: 900; color: var(--emerald);">المـديـة نظيـفة</div>
    <div style="display: flex; justify-content: space-around; font-weight: bold; color: var(--navy); border-top: 1px solid #eee; margin-top: 5px;">
        <div id="clock">00:00:00</div>
        <div>09 أفريل 2026</div>
    </div>
</div>

<div id="pg-home" class="page active">
    <button class="btn giant-btn" onclick="navTo('pg-report')">
        <i class="fas fa-truck-loading"></i>
        <span>إرســـــال تبلـيـــغ</span>
    </button>
    <div class="card" style="border: 2px dashed var(--navy); background: rgba(255,255,255,0.7);">
        <p style="text-align: center; font-weight: bold; color: var(--navy);">رواق الموظفين والمسؤولين</p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <button class="btn" style="background:var(--navy)" onclick="auth('admin')"><i class="fas fa-user-shield"></i> الإدارة</button>
            <button class="btn" style="background:var(--gold)" onclick="auth('driver')"><i class="fas fa-truck"></i> السائقين</button>
        </div>
    </div>
</div>

<div id="pg-report" class="page">
    <div class="card">
        <div style="height:200px; border:3px dashed #bbb; border-radius:20px; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; background:#f9f9f9;">
            <i id="rep-ico" class="fas fa-camera fa-5x" style="color:#ddd"></i>
            <img id="rep-img-prev" style="width:100%; height:100%; object-fit:cover; display:none;">
            <label style="position:absolute; bottom:10px; background:var(--navy); color:white; padding:8px 15px; border-radius:20px; cursor:pointer;">
                <i class="fas fa-camera"></i> تصوير
                <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="previewRep(this)">
            </label>
        </div>
        <button class="btn" style="background:var(--forest); margin-top:15px;" onclick="getLocation()">تحديد الموقع</button>
        <input type="text" id="rep-addr" class="input" placeholder="اسم الحي أو الشارع">
        <input type="text" id="rep-gps" class="input" readonly placeholder="إحداثيات GPS">
        <button class="btn" style="background:var(--emerald); height:70px; font-size:1.5rem;" onclick="submitReport()">إرسال الآن</button>
        <button class="btn" style="background:#888;" onclick="navTo('pg-home')">رجوع</button>
    </div>
</div>

<div id="pg-admin" class="page">
    <div class="card">
        <h3>لوحة التحكم والإدارة</h3>
        <button class="btn" style="background:blue" onclick="document.getElementById('m-staff').style.display='flex'">+ إضافة موظف جديد</button>
        <div id="staff-list-ui" style="margin-top:15px;"></div>
        <button class="btn" style="background:var(--red); margin-top:20px;" onclick="location.reload()">تسجيل خروج</button>
    </div>
</div>

<div id="pg-driver" class="page">
    <div class="card" style="background:var(--emerald); color:white; text-align:center;">
        <h2 id="driver-welcome">صفحة المهام</h2>
    </div>
    <div id="driver-tasks"></div>
    <button class="btn" style="background:#444;" onclick="location.reload()">خروج</button>
</div>

<div id="m-staff" class="modal">
    <div class="modal-content">
        <h3>إضافة طاقم جديد</h3>
        <select id="st-role" class="input">
            <option value="سائق">سائق</option>
            <option value="مسؤول">مسؤول</option>
        </select>
        <input type="text" id="st-name" class="input" placeholder="الاسم الكامل">
        <input type="text" id="st-phone" class="input" placeholder="رقم الهاتف">
        <button class="btn" style="background:var(--forest)" onclick="addNewStaff()">حفظ</button>
        <button class="btn" style="background:var(--red)" onclick="document.getElementById('m-staff').style.display='none'">إلغاء</button>
    </div>
</div>

<div class="footer">
    إشراف د. رابحي فتحي - بلدية المدية 2026 ©
</div>

<script>
    const firebaseConfig = { databaseURL: "https://medea-clean-2026-v4-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let localData = { reports: [], staff: [] };
    let tempImg = "";

    function initApp() {
        db.ref('APP_MEDEA_2026').on('value', snap => { if(snap.exists()){ localData = snap.val(); renderStaff(); } });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
    }

    function navTo(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    function previewRep(input) {
        const reader = new FileReader();
        reader.onload = e => {
            tempImg = e.target.result;
            document.getElementById('rep-img-prev').src = tempImg;
            document.getElementById('rep-img-prev').style.display = 'block';
            document.getElementById('rep-ico').style.display = 'none';
        };
        reader.readAsDataURL(input.files[0]);
    }

    function getLocation() {
        navigator.geolocation.getCurrentPosition(p => {
            document.getElementById('rep-gps').value = p.coords.latitude.toFixed(6) + "," + p.coords.longitude.toFixed(6);
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${p.coords.latitude}&lon=${p.coords.longitude}&accept-language=ar`)
            .then(r=>r.json()).then(d => {
                document.getElementById('rep-addr').value = d.address.road || d.address.suburb || "المدية";
            });
        });
    }

    // الإرسال مع تصفير الخانات ورسالة الشكر
    function submitReport() {
        if(!tempImg || !document.getElementById('rep-addr').value) return alert("أكمل البيانات أولاً");
        const rep = { id: Date.now(), img: tempImg, addr: document.getElementById('rep-addr').value, gps: document.getElementById('rep-gps').value, status: 'new' };
        if(!localData.reports) localData.reports = [];
        localData.reports.push(rep);
        
        db.ref('APP_MEDEA_2026').set(localData).then(() => {
            document.getElementById('thanks-overlay').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('thanks-overlay').style.display = 'none';
                // تصفير الخانات بالكامل
                tempImg = "";
                document.getElementById('rep-img-prev').style.display = 'none';
                document.getElementById('rep-ico').style.display = 'block';
                document.getElementById('rep-addr').value = "";
                document.getElementById('rep-gps').value = "";
                navTo('pg-home');
            }, 3500);
        });
    }

    // الدخول بالاسم فقط وفصل الصلاحيات
    function auth(roleType) {
        const name = prompt("الرجاء إدخال الاسم الكامل:");
        if(!name) return;

        // حالة خاصة للمدير
        if(name === "فتحي" && roleType === 'admin') { navTo('pg-admin'); return; }

        const found = (localData.staff || []).find(s => s.name.trim() === name.trim());
        if(found) {
            if(roleType === 'admin' && found.role === 'مسؤول') {
                navTo('pg-admin');
            } else if(roleType === 'driver' && found.role === 'سائق') {
                document.getElementById('driver-welcome').innerText = "السائق: " + found.name;
                navTo('pg-driver');
            } else {
                alert("عذراً، هذا الاسم مسجل كـ (" + found.role + ") وليس كـ " + roleType);
            }
        } else {
            alert("الاسم غير مسجل في النظام");
        }
    }

    // إضافة موظف مع تصفير الخانات
    function addNewStaff() {
        const n = document.getElementById('st-name'), p = document.getElementById('st-phone'), r = document.getElementById('st-role').value;
        if(!n.value) return;
        if(!localData.staff) localData.staff = [];
        localData.staff.push({ name: n.value.trim(), phone: p.value, role: r });
        
        db.ref('APP_MEDEA_2026').set(localData).then(() => {
            alert("تمت الإضافة بنجاح");
            n.value = ""; p.value = ""; // تصفير
            document.getElementById('m-staff').style.display = 'none';
        });
    }

    function renderStaff() {
        const ui = document.getElementById('staff-list-ui');
        if(ui) ui.innerHTML = (localData.staff || []).map(s => `<div class="card" style="padding:10px; margin-bottom:5px;">👤 ${s.name} (${s.role})</div>`).join('');
    }
</script>
</body>
</html>
