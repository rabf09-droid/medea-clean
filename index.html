<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المدية نظيفة 2026 - النسخة النهائية</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --gold: #D4AF37; --red: #d21034; --navy: #14213D; --orange: #f39c12; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { margin: 0; min-height: 100vh; background: linear-gradient(135deg, rgba(27,94,32,0.2) 0%, rgba(255,255,255,0.9) 50%, rgba(210,16,52,0.2) 100%), url('https://raw.githubusercontent.com/rabf09-droid/rabf09-droid.github.io/main/1000052240.webp'); background-size: cover; background-position: center; background-attachment: fixed; }
        .header { background: rgba(255,255,255,0.95); padding: 10px; text-align: center; border-bottom: 5px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .page { display: none; padding: 15px; max-width: 800px; margin: auto; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn { border: none; padding: 15px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; color: white; margin-bottom: 10px; }
        .input { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 10px; text-align: center; }
        .giant-btn { background: var(--forest); height: 200px; flex-direction: column; border-radius: 40px; font-size: 2rem; border: 5px solid white; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .giant-btn i { font-size: 5rem; }
        .cam-box { height: 200px; border: 3px dashed #bbb; border-radius: 20px; display: flex; align-items: center; justify-content: center; background: #fff; margin-bottom: 15px; position: relative; overflow: hidden; }
        #thanks-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--forest); color:white; flex-direction:column; align-items:center; justify-content:center; z-index:2000; text-align:center; }
    </style>
</head>
<body onload="initApp()">

<div id="thanks-overlay">
    <i class="fas fa-heart fa-6x" style="color:var(--gold); margin-bottom:20px;"></i>
    <h1>شكراً لكم!</h1>
    <h2 style="margin:10px;">معاً سنجعل بيئتنا نظيفة</h2>
</div>

<div class="header">
    <div style="font-size: 0.8rem; color: var(--forest); font-weight: bold;">مصلحة النظافة لبلدية المدية</div>
    <div style="font-size: 1.6rem; font-weight: 900; color: var(--emerald);">المـديـة نظيـفة</div>
    <div style="display: flex; justify-content: space-around; font-weight: bold; font-size: 0.9rem; border-top: 1px solid #eee; margin-top: 5px;">
        <span id="clock">00:00:00</span>
        <span id="date-now">09 أفريل 2026</span>
    </div>
</div>

<div id="pg-home" class="page active">
    <button class="btn giant-btn" onclick="navTo('pg-report')">
        <i class="fas fa-truck-loading"></i>
        <span>إرســـــال تبلـيـــغ</span>
    </button>
    <div class="card" style="border: 2px dashed var(--navy); background: rgba(255,255,255,0.8);">
        <p style="text-align:center; font-weight:bold;">رواق الموظفين</p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn" style="background:var(--navy)" onclick="auth('admin')">الإدارة</button>
            <button class="btn" style="background:var(--gold)" onclick="auth('driver')">السائقين</button>
        </div>
    </div>
</div>

<div id="pg-report" class="page">
    <div class="card">
        <div class="cam-box">
            <i id="ico-cam" class="fas fa-camera fa-4x" style="color:#ccc"></i>
            <img id="out-img" style="width:100%; height:100%; object-fit:cover; display:none;">
            <label style="position:absolute; bottom:10px; background:var(--navy); color:white; padding:8px 15px; border-radius:20px; cursor:pointer;">
                تصوير النفايات <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="handleImg(this, 'citizen')">
            </label>
        </div>
        <button class="btn" style="background:var(--forest)" onclick="getLoc()">تحديد الموقع تلقائياً</button>
        <input type="text" id="in-addr" class="input" placeholder="اسم الحي أو الشارع">
        <input type="text" id="in-gps" class="input" readonly placeholder="إحداثيات GPS">
        <button id="send-btn" class="btn" style="background:var(--emerald); height: 60px;" onclick="sendReport()">إرسال البلاغ الآن</button>
        <button class="btn" style="background:#888" onclick="navTo('pg-home')">رجوع</button>
    </div>
</div>

<div id="pg-admin" class="page">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>لوحة التحكم</h3>
        <button class="btn" style="background:var(--red); width:auto; padding:5px 15px;" onclick="location.reload()">خروج</button>
    </div>
    <div class="admin-nav-grid">
        <button class="nav-card-btn" style="background:orange; width:48%; border-radius:15px; border:none; color:white; padding:15px; font-weight:bold;" onclick="showAdminList('new')">بلاغات جديدة</button>
        <button class="nav-card-btn" style="background:var(--forest); width:48%; border-radius:15px; border:none; color:white; padding:15px; font-weight:bold;" onclick="showAdminList('done')">منجزة</button>
    </div>
    <div id="admin-list-container" style="margin-top:15px;"></div>
    
    <div id="fathi-management" style="display:none" class="card">
        <h4 style="color:blue; text-align:center;">إدارة الموظفين (المشرف)</h4>
        <button class="btn" style="background:blue" onclick="openStaffModal()">+ إضافة موظف جديد</button>
        <div id="staff-list-ui"></div>
    </div>
</div>

<div id="pg-driver" class="page">
    <div id="dr-header" class="card" style="background:var(--emerald); color:white; text-align:center;"></div>
    <div id="dr-tasks"></div>
    <button class="btn" style="background:#444" onclick="location.reload()">خروج</button>
</div>

<div id="staff-modal" class="modal">
    <div class="modal-content">
        <h3>إضافة موظف</h3>
        <select id="st-role" class="input" onchange="toggleFields()">
            <option value="سائق">سائق</option>
            <option value="مسؤول">مسؤول</option>
        </select>
        <input type="text" id="st-name" class="input" placeholder="الاسم الكامل">
        <div id="dr-fields">
            <input type="text" id="st-phone" class="input" placeholder="رقم الهاتف">
            <input type="text" id="st-truck" class="input" placeholder="رقم الشاحنة">
            <select id="st-sector" class="input">
                <option value="البلدية">بلدية</option>
                <option value="خاص">قطاع خاص</option>
            </select>
        </div>
        <button class="btn" style="background:var(--forest)" onclick="saveStaff()">حفظ</button>
        <button class="btn" style="background:var(--red)" onclick="closeStaffModal()">إلغاء</button>
    </div>
</div>

<script>
    // اسم ملف التخزين كما طلبت: MEDEA_CLEAN_DATA
    const firebaseConfig = { databaseURL: "https://medea-clean-2026-v4-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let appData = { reports: [], staff: [] };
    let currentLoggedUser = "", tempImgCit = "", tempImgDrv = "";

    function initApp() {
        db.ref('MEDEA_CLEAN_DATA').on('value', snap => { 
            if(snap.exists()){ appData = snap.val(); updateUI(); } 
        });
        setInterval(() => { 
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR');
        }, 1000);
    }

    function navTo(id) { 
        document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); 
        document.getElementById(id).classList.add('active'); 
    }

    function handleImg(input, role) {
        const reader = new FileReader();
        reader.onload = e => {
            if(role === 'citizen') {
                tempImgCit = e.target.result;
                document.getElementById('out-img').src = tempImgCit;
                document.getElementById('out-img').style.display = 'block';
                document.getElementById('ico-cam').style.display = 'none';
            } else { tempImgDrv = e.target.result; }
        };
        reader.readAsDataURL(input.files[0]);
    }

    function getLoc() {
        navigator.geolocation.getCurrentPosition(p => {
            const lat = p.coords.latitude, lng = p.coords.longitude;
            document.getElementById('in-gps').value = lat.toFixed(6) + "," + lng.toFixed(6);
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=ar`).then(r=>r.json()).then(d=>{
                document.getElementById('in-addr').value = d.display_name.split(',').slice(0,3).join(',');
            });
        });
    }

    function sendReport() {
        const addr = document.getElementById('in-addr').value;
        if(!tempImgCit || !addr) return alert("يرجى التقاط صورة وكتابة العنوان");
        
        const rep = { 
            id: Date.now(), img: tempImgCit, addr: addr, 
            gps: document.getElementById('in-gps').value,
            time: new Date().toLocaleTimeString('ar-DZ'),
            date: new Date().toLocaleDateString('ar-DZ'),
            status: 'new'
        };

        if(!appData.reports) appData.reports = [];
        appData.reports.push(rep);

        db.ref('MEDEA_CLEAN_DATA').set(appData).then(() => {
            document.getElementById('thanks-overlay').style.display = 'flex';
            setTimeout(() => { location.reload(); }, 4000);
        });
    }

    function auth(role) {
        const name = prompt("الاسم المسجل:");
        if(!name) return;
        const isFathi = (name === "فتحي");
        const found = (appData.staff || []).find(s => s.name === name);

        if(role === 'admin' && (isFathi || (found && found.role === 'مسؤول'))) {
            currentLoggedUser = name;
            navTo('pg-admin');
            if(isFathi) document.getElementById('fathi-management').style.display = 'block';
        } else if(role === 'driver' && found && found.role === 'سائق') {
            currentLoggedUser = name;
            navTo('pg-driver');
            updateUI();
        } else { alert("الاسم غير مسجل"); }
    }

    function showAdminList(type) {
        const container = document.getElementById('admin-list-container');
        const list = (appData.reports || []).filter(r => type === 'new' ? r.status !== 'done' : r.status === 'done');
        
        container.innerHTML = list.map(r => `
            <div class="card" style="border-right: 5px solid ${type==='new'?'red':'green'}">
                <img src="${r.img}" style="width:100%; border-radius:15px;">
                <p>📍 ${r.addr}<br>🕒 ${r.time} - ${r.date}</p>
                <p style="font-size:0.8rem; color:grey;">GPS: ${r.gps}</p>
                ${type==='new' ? `<button class="btn" style="background:var(--forest)" onclick="assignTo(${r.id})">توجيه لسائق</button>` : `<p style="color:green; font-weight:bold;">أنجزها: ${r.driverName}</p>`}
                ${currentLoggedUser === 'فتحي' ? `<i class="fas fa-trash-alt" style="color:red; float:left;" onclick="deleteRep(${r.id})"></i>` : ''}
            </div>
        `).join('') || "لا توجد بيانات";
    }

    function openStaffModal() { document.getElementById('staff-modal').style.display = 'flex'; }
    function closeStaffModal() { document.getElementById('staff-modal').style.display = 'none'; }
    function toggleFields() { document.getElementById('dr-fields').style.display = document.getElementById('st-role').value==='سائق'?'block':'none'; }

    function saveStaff() {
        const name = document.getElementById('st-name').value;
        if(!name) return;
        const s = {
            name: name, role: document.getElementById('st-role').value,
            phone: document.getElementById('st-phone').value,
            truck: document.getElementById('st-truck').value,
            sector: document.getElementById('st-sector').value
        };
        if(!appData.staff) appData.staff = [];
        appData.staff.push(s);
        db.ref('MEDEA_CLEAN_DATA').set(appData).then(() => {
            document.getElementById('st-name').value = "";
            document.getElementById('st-phone').value = "";
            document.getElementById('st-truck').value = "";
            closeStaffModal();
        });
    }

    function assignTo(id) {
        const d = prompt("اسم السائق المكلف:");
        if(d) {
            const r = appData.reports.find(x => x.id === id);
            r.status = 'sent'; r.driverName = d;
            db.ref('MEDEA_CLEAN_DATA').set(appData);
        }
    }

    function finishTask(id) {
        if(!tempImgDrv) return alert("صور النتيجة");
        const r = appData.reports.find(x => x.id === id);
        r.status = 'done'; r.doneImg = tempImgDrv;
        r.doneTime = new Date().toLocaleTimeString('ar-DZ') + " " + new Date().toLocaleDateString('ar-DZ');
        db.ref('MEDEA_CLEAN_DATA').set(appData).then(() => { alert("تم"); location.reload(); });
    }

    function deleteRep(id) { if(confirm("حذف نهائي؟")) { appData.reports = appData.reports.filter(r=>r.id !== id); db.ref('MEDEA_CLEAN_DATA').set(appData); } }
    function deleteStaff(n) { if(confirm("حذف الموظف؟")) { appData.staff = appData.staff.filter(s=>s.name !== n); db.ref('MEDEA_CLEAN_DATA').set(appData); } }

    function updateUI() {
        if(currentLoggedUser && document.getElementById('pg-driver').classList.contains('active')) {
            const tasks = (appData.reports || []).filter(r => r.driverName === currentLoggedUser && r.status === 'sent');
            document.getElementById('dr-header').innerText = "السائق: " + currentLoggedUser;
            document.getElementById('dr-tasks').innerHTML = tasks.map(t => `
                <div class="card">
                    <img src="${t.img}" style="width:100%; border-radius:15px;">
                    <p>📍 ${t.addr}<br>🕒 ${t.time}</p>
                    <label class="btn" style="background:orange">تصوير النتيجة <input type="file" capture="environment" style="display:none;" onchange="handleImg(this, 'driver')"></label>
                    <button class="btn" style="background:green" onclick="finishTask(${t.id})">تأكيد الإنجاز</button>
                </div>
            `).join('') || "لا توجد مهام حالياً";
        }
        const staffUI = document.getElementById('staff-list-ui');
        if(staffUI) {
            staffUI.innerHTML = (appData.staff || []).map(s => `
                <div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
                    <span>${s.name} (${s.role}) - ${s.truck || ''}</span>
                    <i class="fas fa-user-minus" style="color:red" onclick="deleteStaff('${s.name}')"></i>
                </div>
            `).join('');
        }
    }
</script>
</body>
</html>
