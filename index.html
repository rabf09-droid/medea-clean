<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المدية نظيفة - النسخة المعتمدة</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --gold: #D4AF37; --red: #d21034; --orange: #fb8c00; --navy: #14213D; --white-glass: rgba(255, 255, 255, 0.95); }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        
        body { 
            margin: 0; 
            background: #f0f0f0 url('https://raw.githubusercontent.com/rabf09-droid/rabf09-droid.github.io/main/1000052240.webp') no-repeat center center fixed; 
            background-size: cover;
            min-height: 100vh;
        }

        .glass-layer { background: rgba(0, 0, 0, 0.55); min-height: 100vh; padding-bottom: 120px; }

        .header { background: var(--white-glass); padding: 15px; text-align: center; border-bottom: 5px solid var(--gold); position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .page { display: none; padding: 20px; animation: fadeIn 0.5s; max-width: 900px; margin: auto; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--white-glass); border-radius: 25px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .btn { border: none; padding: 15px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; color: white; transition: 0.3s; font-size: 1.1rem; }
        .input { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #ccc; margin-bottom: 12px; font-size: 1rem; text-align: center; background: white; }
        
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--white-glass); padding: 12px; border-top: 3px solid var(--gold); text-align: center; z-index: 1000; }
        .item-list { background: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; border-right: 6px solid var(--emerald); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .counter-box { flex:1; text-align: center; padding: 10px; border-radius: 15px; color: white; font-weight: bold; }
    </style>
</head>
<body onload="initApp()">

<div class="glass-layer">
    <div class="header">
        <div id="txt-country" style="font-weight: bold; font-size: 0.9rem;">الجمهورية الجزائرية الديمقراطية الشعبية</div>
        <div id="txt-dept" style="color: var(--forest); font-weight: bold; margin: 4px 0;">ولاية المدية - بلدية المدية</div>
        <div id="txt-title" style="font-size: 1.8rem; font-weight: 900; color: var(--emerald);">نظام المـدية نظيـفة</div>
        <div style="display: flex; justify-content: space-around; padding-top: 10px; border-top: 1px solid #ddd;">
            <div id="clock" style="color: var(--navy); font-weight: bold;">00:00:00</div>
            <div style="font-weight: bold;">07 أفريل 2026</div>
        </div>
    </div>

    <div id="pg-welcome" class="page active">
        <div class="card" style="text-align: center;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Mairie_de_M%C3%A9d%C3%A9a.jpg/300px-Mairie_de_M%C3%A9d%C3%A9a.jpg" style="width: 120px; margin-bottom: 15px;">
            <h2>مرحباً بكم في النظام الموحد</h2>
            <button class="btn" style="background:var(--forest); height: 70px; font-size: 1.3rem;" onclick="navTo('pg-report')">
                <i class="fas fa-bullhorn"></i> إرسال تبليغ
            </button>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;">
                <button class="btn" style="background:var(--navy)" onclick="auth('admin')"><i class="fas fa-user-shield"></i> الإدارة</button>
                <button class="btn" style="background:var(--gold)" onclick="auth('driver')"><i class="fas fa-truck"></i> السائقين</button>
            </div>
        </div>
    </div>

    <div id="pg-report" class="page">
        <div class="card">
            <h3><i class="fas fa-camera"></i> تصوير المفرغة</h3>
            <div id="cam-box" style="height:250px; border:3px dashed var(--forest); border-radius:20px; display:flex; align-items:center; justify-content:center; background:#f9f9f9; margin-bottom:15px; overflow:hidden;">
                <i id="ico-cam" class="fas fa-image fa-4x" style="color:#ccc"></i>
                <img id="out-img" style="width:100%; height:100%; object-fit:cover; display:none;">
            </div>
            <label class="btn" style="background:var(--navy);"><i class="fas fa-camera"></i> التقاط الصورة<input type="file" accept="image/*" capture="environment" style="display:none;" onchange="handleImg(this, 'citizen')"></label>
            <button class="btn" style="background:var(--forest);" onclick="getLoc()"><i class="fas fa-map-marker-alt"></i> تحديد الموقع</button>
            <input type="text" id="in-addr" class="input" placeholder="اسم الحي أو الشارع">
            <input type="text" id="in-gps" class="input" readonly placeholder="إحداثيات الموقع">
            <button class="btn" style="background:var(--emerald); height:60px;" onclick="sendReport()"><i class="fas fa-paper-plane"></i> تأكيد وإرسال البلاغ</button>
            <button class="btn" style="background:#666;" onclick="navTo('pg-welcome')">رجوع</button>
        </div>
    </div>

    <div id="pg-admin" class="page">
        <div class="card" style="display: flex; gap: 10px; padding: 15px;">
            <div class="counter-box" style="background:var(--red);">جديد<br><b id="c1">0</b></div>
            <div class="counter-box" style="background:var(--orange);">مرسل<br><b id="c2">0</b></div>
            <div class="counter-box" style="background:var(--forest);">منجز<br><b id="c3">0</b></div>
        </div>

        <div id="admin-list-reports"></div>

        <div class="card">
            <h4><i class="fas fa-plus-circle"></i> إضافة سائق جديد</h4>
            <input type="text" id="dr-n" class="input" placeholder="اسم السائق">
            <input type="text" id="dr-p" class="input" placeholder="رقم الهاتف">
            <input type="text" id="dr-t" class="input" placeholder="رقم الشاحنة">
            <select id="dr-s" class="input">
                <option value="البلدية">شاحنة بلدية</option>
                <option value="القطاع الخاص">قطاع خاص</option>
            </select>
            <button class="btn" style="background:var(--emerald)" onclick="addDr()">حفظ السائق</button>
            <div id="ui-drivers-list"></div>
        </div>

        <div class="card" id="root-tools" style="display:none;">
            <h4><i class="fas fa-user-tie"></i> النظافة مسؤولية</h4>
            <input type="text" id="ad-n" class="input" placeholder="اسم المسؤول الجديد">
            <button class="btn" style="background:var(--navy)" onclick="addAd()">إضافة مسؤول</button>
            <div id="ui-admins-list"></div>
        </div>
        
        <button class="btn" style="background:#444;" onclick="location.reload()">تسجيل الخروج</button>
    </div>

    <div id="pg-driver" class="page">
        <div id="dr-info" class="card" style="background:var(--emerald); color:white; text-align: center;"></div>
        <div id="dr-tasks"></div>
        <button class="btn" style="background:#444;" onclick="navTo('pg-welcome')">رجوع</button>
    </div>
</div>

<div class="footer">
    <div style="margin-bottom: 8px;">
        <button class="btn" style="display:inline-block; width:auto; padding:5px 15px; background:white; color:black; border:1px solid #ccc;" onclick="setLang('ar')">عربية</button>
        <button class="btn" style="display:inline-block; width:auto; padding:5px 15px; background:white; color:black; border:1px solid #ccc;" onclick="setLang('fr')">Français</button>
        <button class="btn" style="display:inline-block; width:auto; padding:5px 15px; background:white; color:black; border:1px solid #ccc;" onclick="setLang('en')">English</button>
    </div>
    <div style="font-size: 0.75rem; font-weight: bold; color: var(--navy);">إعداد د. رابحي فتحي</div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://medea-smart-city-2026-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let appData = { reports: [], drivers: [], admins: ["فتحي"] };
    let curImgCit = "", curImgDrv = "", curUser = "";

    function initApp() {
        db.ref('OFFICIAL_SYSTEM').on('value', s => { if(s.exists()){ appData=s.val(); updateUI(); } });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
    }

    function handleImg(input, role) {
        const reader = new FileReader();
        reader.onload = e => {
            if(role === 'citizen') {
                curImgCit = e.target.result;
                document.getElementById('out-img').src = curImgCit;
                document.getElementById('out-img').style.display = 'block';
                document.getElementById('ico-cam').style.display = 'none';
            } else { curImgDrv = e.target.result; alert("تم التقاط صورة الإنجاز"); }
        };
        reader.readAsDataURL(input.files[0]);
    }

    function getLoc() {
        navigator.geolocation.getCurrentPosition(p => {
            const lat = p.coords.latitude, lng = p.coords.longitude;
            document.getElementById('in-gps').value = lat.toFixed(6) + "," + lng.toFixed(6);
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=ar`)
            .then(r=>r.json()).then(d=>{ document.getElementById('in-addr').value = d.display_name.split(',').slice(0,3).join(','); });
        });
    }

    function sendReport() {
        const addr = document.getElementById('in-addr').value;
        if(!curImgCit || !addr) return alert("يرجى التقاط صورة وتحديد العنوان");

        const report = {
            id: Date.now(), img: curImgCit, addr: addr, gps: document.getElementById('in-gps').value,
            time: new Date().toLocaleTimeString('fr-FR'), date: "07 أفريل 2026", status: 'new'
        };
        if(!appData.reports) appData.reports = [];
        appData.reports.push(report);

        db.ref('OFFICIAL_SYSTEM').set(appData).then(() => {
            // تصفير الخانات
            curImgCit=""; document.getElementById('out-img').style.display='none'; 
            document.getElementById('ico-cam').style.display='block';
            document.getElementById('in-addr').value=""; document.getElementById('in-gps').value="";
            
            if(confirm("هل لديك تبليغ آخر؟")) { window.scrollTo(0,0); } 
            else { alert("تم الإرسال بنجاح"); navTo('pg-welcome'); }
        });
    }

    function updateUI() {
        const rs = appData.reports || [];
        document.getElementById('c1').innerText = rs.filter(r=>r.status==='new').length;
        document.getElementById('c2').innerText = rs.filter(r=>r.status==='sent').length;
        document.getElementById('c3').innerText = rs.filter(r=>r.status==='done').length;

        // سجل الإدارة
        document.getElementById('admin-list-reports').innerHTML = rs.slice().reverse().map(r => `
            <div class="card" style="border-right:10px solid ${r.status==='done'?'#2E7D32':(r.status==='sent'?'#fb8c00':'#d21034')};">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:bold; color:var(--navy)">📦 بلاغ: ${r.time}</span>
                    <i class="fas fa-trash-alt" style="color:red; cursor:pointer;" onclick="delRep(${r.id})"></i>
                </div>
                <img src="${r.img}" style="width:100%; border-radius:15px; margin:12px 0;">
                <p>📍 ${r.addr} | 🌍 ${r.gps}</p>
                ${r.status==='new' ? `<button class="btn" style="background:var(--forest)" onclick="assign(${r.id})">توجيه للسائق</button>` : `<p style="color:var(--orange)">🚚 السائق: ${r.driver}</p>`}
                ${r.status==='done' ? `<div style="border-top:2px dashed green; padding-top:10px;">
                    <p style="color:green; font-weight:bold;">✅ تم التنظيف:</p>
                    <img src="${r.doneImg}" style="width:100%; border-radius:10px;">
                    <p>🕒 وقت الإنجاز: ${r.doneTime} - ${r.doneDate}</p></div>` : ''}
            </div>
        `).join('');

        // قوائم السائقين والمسؤولين
        document.getElementById('ui-drivers-list').innerHTML = (appData.drivers || []).map(d => `
            <div class="item-list"><span><b>${d.name}</b> (${d.phone}) - ${d.truck} [${d.sector}]</span><i class="fas fa-user-minus" style="color:red" onclick="delDr(${d.id})"></i></div>
        `).join('');
        document.getElementById('ui-admins-list').innerHTML = (appData.admins || []).map(a => `
            <div class="item-list"><span>${a}</span>${a!=='فتحي'?`<i class="fas fa-times-circle" style="color:red" onclick="delAd('${a}')"></i>`:''}</div>
        `).join('');

        // واجهة السائق
        if(curUser) {
            document.getElementById('dr-info').innerHTML = `<h3>مهمات السائق: ${curUser}</h3>`;
            const jobs = rs.filter(r=>r.driver===curUser && r.status==='sent');
            document.getElementById('dr-tasks').innerHTML = jobs.map(j => `
                <div class="card">
                    <p style="color:red; font-weight:bold;">مهمة جديدة من الإدارة:</p>
                    <img src="${j.img}" style="width:100%; border-radius:15px; margin-bottom:10px;">
                    <p>📍 ${j.addr}</p>
                    <button class="btn" style="background:var(--navy)" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${j.gps}')"><i class="fas fa-directions"></i> تحديد على الخريطة</button>
                    <label class="btn" style="background:var(--gold)"><i class="fas fa-camera"></i> تصوير بعد التنظيف<input type="file" capture="environment" style="display:none;" onchange="handleImg(this, 'driver')"></label>
                    <button class="btn" style="background:var(--forest)" onclick="finishJob(${j.id})">تأكيد الإنجاز</button>
                </div>
            `).join('');
        }
    }

    function addDr() {
        const n=document.getElementById('dr-n').value;
        if(n) {
            if(!appData.drivers) appData.drivers = [];
            appData.drivers.push({id:Date.now(), name:n, phone:document.getElementById('dr-p').value, truck:document.getElementById('dr-t').value, sector:document.getElementById('dr-s').value});
            db.ref('OFFICIAL_SYSTEM').set(appData);
            document.getElementById('dr-n').value=""; document.getElementById('dr-p').value=""; document.getElementById('dr-t').value="";
        }
    }

    function addAd() { const n=document.getElementById('ad-n').value; if(n){ appData.admins.push(n); db.ref('OFFICIAL_SYSTEM').set(appData); document.getElementById('ad-n').value=""; }}
    function delDr(id) { if(confirm("حذف؟")){ appData.drivers=appData.drivers.filter(x=>x.id!==id); db.ref('OFFICIAL_SYSTEM').set(appData); }}
    function delAd(n) { if(confirm("حذف؟")){ appData.admins=appData.admins.filter(x=>x!==n); db.ref('OFFICIAL_SYSTEM').set(appData); }}
    function delRep(id) { if(confirm("حذف البلاغ؟")){ appData.reports=appData.reports.filter(x=>x.id!==id); db.ref('OFFICIAL_SYSTEM').set(appData); }}
    
    function assign(id) { 
        const n = prompt("اسم السائق المكلف:"); 
        if(n) { const r = appData.reports.find(x=>x.id===id); r.status='sent'; r.driver=n; db.ref('OFFICIAL_SYSTEM').set(appData); }
    }

    function finishJob(id) {
        if(!curImgDrv) return alert("يجب التقاط صورة النتيجة أولاً");
        const r = appData.reports.find(x=>x.id===id);
        r.status='done'; r.doneImg=curImgDrv; r.doneTime=new Date().toLocaleTimeString('fr-FR'); r.doneDate="07 أفريل 2026";
        db.ref('OFFICIAL_SYSTEM').set(appData).then(() => { curImgDrv=""; alert("تم إبلاغ الإدارة بالإنجاز"); });
    }

    function auth(role) {
        const u = prompt("الاسم:"), p = prompt("الرمز:");
        if(role==='admin' && (appData.admins||[]).includes(u) && p==='1234') { 
            document.getElementById('root-tools').style.display = (u==='فتحي')?'block':'none'; navTo('pg-admin'); 
        } else if(role==='driver' && p==='5678') { 
            if((appData.drivers||[]).find(x=>x.name===u)){ curUser=u; navTo('pg-driver'); } else alert("غير مسجل");
        }
    }

    function setLang(l) {
        const t = {
            ar: { c: "الجمهورية الجزائرية الديمقراطية الشعبية", d: "ولاية المدية - بلدية المدية", t: "نظام المـدية نظيـفة" },
            fr: { c: "République Algérienne Démocratique et Populaire", d: "Médéa - Commune de Médéa", t: "Système Médéa Propre" },
            en: { c: "People's Democratic Republic of Algeria", d: "Medea - Municipality of Medea", t: "Clean Medea System" }
        }[l];
        document.getElementById('txt-country').innerText = t.c;
        document.getElementById('txt-dept').innerText = t.d;
        document.getElementById('txt-title').innerText = t.t;
        document.dir = (l === 'ar' ? 'rtl' : 'ltr');
    }

    function navTo(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
</script>
</body>
        </html>
