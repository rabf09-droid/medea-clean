<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>المدية نظيفة 2026</title>
<style>
    /* إعدادات الخطوط والأساسيات */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* خلفية ثلاثية الألوان: أخضر في الأعلى، أبيض في الوسط، أحمر في الأسفل */
    body {
        background: linear-gradient(to bottom, #006233 0%, #ffffff 45%, #D21034 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* البطاقة الرئيسية في الوسط */
    .splash-card {
        background: rgba(255, 255, 255, 0.95);
        border: 5px solid #006233; /* إطار أخضر */
        border-radius: 30px;
        padding: 40px 25px;
        width: 90%;
        max-width: 500px;
        text-align: center;
        box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        position: relative;
        overflow: hidden;
    }

    /* أيقونة العلم */
    .flag-icon {
        font-size: 4.5rem;
        margin-bottom: 10px;
        display: block;
        filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
    }

    /* النصوص */
    .text-top {
        color: #D21034; /* أحمر */
        font-size: 1.3rem;        font-weight: bold;
        margin-bottom: 15px;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
    }

    .text-middle {
        color: #006233; /* أخضر */
        font-size: 2.8rem;
        font-weight: bold;
        margin-bottom: 10px;
        line-height: 1.2;
    }

    .text-city {
        color: #D21034; /* أحمر */
        font-size: 2.2rem;
        font-weight: bold;
        margin-bottom: 30px;
        line-height: 1.2;
    }

    .select-text {
        color: #333;
        font-size: 1.3rem;
        margin-bottom: 30px;
        font-weight: 600;
    }

    /* حاوية الأزرار */
    .button-container {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 40px;
    }

    /* أزرار الأجهزة */
    .device-btn {
        width: 130px;
        height: 130px;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }
    .device-btn:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 25px rgba(0,0,0,0.25);
    }

    .device-btn:active {
        transform: scale(0.95);
    }

    .btn-computer {
        background: linear-gradient(135deg, #006233, #008040); /* أخضر متدرج */
    }

    .btn-phone {
        background: linear-gradient(135deg, #D21034, #e52b50); /* أحمر متدرج */
    }

    .device-icon {
        font-size: 3.5rem;
        color: white;
        margin-bottom: 10px;
        filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }

    .btn-text {
        color: white;
        font-weight: bold;
        font-size: 1.1rem;
    }

    /* النص السفلي */
    .footer-text {
        color: #444;
        font-size: 0.95rem;
        line-height: 1.8;
        border-top: 2px solid #eee;
        padding-top: 20px;
    }

    .footer-text strong {
        color: #006233;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="splash-card">
    <span class="flag-icon">🇩</span>    <div class="text-top">العلم الجزائري الأعلى وفي الوسط</div>
    <div class="text-middle">النظافة من الإيمان</div>
    <div class="text-city">المدية نظيفة</div>
    <div class="select-text">اختر نوع الجهاز</div>
    
    <div class="button-container">
        <button class="device-btn btn-computer" onclick="selectDevice('computer')">
            <span class="device-icon">💻</span>
            <span class="btn-text">الكمبيوتر</span>
        </button>
        <button class="device-btn btn-phone" onclick="selectDevice('phone')">
            <span class="device-icon">📱</span>
            <span class="btn-text">الهاتف</span>
        </button>
    </div>

    <div class="footer-text">
        مصلحة النظافة والوقاية الصحية - بلدية المدية<br>
        التطبيق من إعداد <strong>د.رابحي فتحي</strong><br>
        سيتم حفظ اختيارك للزيارات القادمة
    </div>
</div>

<script>
    function selectDevice(type) {
        // حفظ اختيار المستخدم في المتصفح
        localStorage.setItem('app_mode', type);
        
        // تأثير بسيط عند الضغط
        const btn = event.currentTarget;
        btn.style.transform = "scale(0.9)";
        
        setTimeout(() => {
            // هنا يتم الانتقال للصفحة الرئيسية للتطبيق
            // يمكنك تغيير 'index.html' إلى اسم ملف صفحتك الرئيسية
            alert('تم اختيار: ' + (type === 'computer' ? 'الكمبيوتر' : 'الهاتف') + '\nجاري الانتقال للتطبيق...');
            // window.location.href = 'index.html'; 
        }, 300);
    }
</script>
</body>
</html>
