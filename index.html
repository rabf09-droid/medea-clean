<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المدية نظيفة 2026</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --gold: #D4AF37; --red: #d21034; --navy: #14213D; --orange: #f39c12; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        
        body { margin: 0; min-height: 100vh; background: linear-gradient(135deg, rgba(27,94,32,0.2) 0%, rgba(255,255,255,0.9) 50%, rgba(210,16,52,0.2) 100%), url('https://raw.githubusercontent.com/rabf09-droid/rabf09-droid.github.io/main/1000052240.webp'); background-size: cover; background-position: center; background-attachment: fixed; }

        .header { background: rgba(255,255,255,0.95); padding: 10px; text-align: center; border-bottom: 5px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .page { display: none; padding: 15px; max-width: 800px; margin: auto; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .btn { border: none; padding: 15px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; color: white; font-size: 1.1rem; }
        .input { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 10px; text-align: center; font-size: 1rem; }

        .giant-btn { background: var(--forest); height: 230px; flex-direction: column; border-radius: 50px; font-size: 2.1rem; box-shadow: 0 15px 45px rgba(46, 125, 50, 0.4); border: 6px solid white; margin: 10px 0; }
        .giant-btn i { font-size: 6.5rem; }

        #thanks-overlay { display:none; position:fixed; inset:0; background:var(--forest); color:white; flex-direction:column; align-items:center; justify-content:center; z-index:100000; text-align:center; padding: 20px; }
        .modal { display: none; position: fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; }
        .modal-content { background:white; padding:30px; border-radius:30px; text-align:center; width:90%; max-width:400px; }
        .footer { background: white; padding: 15px; text-align: center; border-top: 4px solid var(--gold); margin-top: 10px; }
    </style>
</head>
<body onload="initApp()">

<div id="thanks-overlay">
    <i class="fas fa-check-circle fa-6x" style="color:var(--gold); margin-bottom:20px;"></i>
    <h1 style="font-size:2.8rem; font-weight:900;">شكراً لكم!</h1>
    <p style="font-size:1.5rem;">تم إرسال بلاغكم لبلدية المدية بنجاح.</p>
    <div style="margin-top:30px; font-weight:bold; color:var(--gold); border:2px solid var(--gold); padding:10px 30px; border-radius:50px;">معاً لمدية أنظف 2026</div>
</div>

<div class="header">
    <div style="font-size: 0.75rem; font-weight: bold;">الجمهورية الجزائرية الديمقراطية الشعبية</div>
    <div style="font-size: 0.8rem; color: var(--forest); font-weight: bold;">مصلحة النظافة لبلدية المدية</div>
    <div style="font-size: 1.6rem; font-weight: 900; color: var(--emerald);">المـديـة نظيـفة</div>
    <div style="display: flex; justify-content: space-around; border-top: 1px solid #eee; margin-top: 5px; padding-top: 5px;">
        <div id="clock" style="font-weight: bold; color: var(--navy);">00:00:00</div>
        <div style="font-weight: bold;">09 أفريل 2026</div>
    </div>
</div>

<div id="pg-home" class="page active">
    <button class="btn giant-btn" onclick="navTo('pg-report')">
        <i class="fas fa-truck-loading"></i>
        <span>إرســـــال تبلـيـــغ</span>
    </button>
    <div class="card" style="background: rgba(255,255,255,0.6); border: 2px dashed var(--navy);">
        <p style="text-align: center; font-weight: bold; color: var(--navy); margin: 0 0 10px 0;">دخول الموظفين والمسؤولين</p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <button class="btn" style="background:var(--navy); height: 60px;" onclick="auth('admin')"><i class="fas fa-user-shield"></i> الإدارة</button>
            <button class="btn" style="background:var(--gold); height: 60px;" onclick="auth('driver')"><i class="fas fa-truck"></i> السائقين</button>
        </div>
    </div>
</div>

<div id="pg-report" class="page">
    <div class="card">
        <div style="height: 200px; border: 3px dashed #bbb; border-radius: 20px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; background: #fff;">
            <i id="ico-c" class="fas fa-camera fa-5x" style="color:#ddd"></i>
            <img id="img-p" style="width:100%; height:100%; object-fit:cover; display:none;">
            <label style="position:absolute; bottom:15px; background:var(--navy); color:white; padding:8px 15px; border-radius:20px; cursor:pointer;">
                <i class="fas fa-camera"></i> تصوير
                <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="preview(this)">
            </label>
        </div>
        <button class="btn" style="background:var(--forest); margin-top:15px;" onclick="getLoc()"><i class="fas fa-map-marker-alt"></i> تحديد الموقع</button>
        <input type="text" id="in-addr" class="input" placeholder="اسم الحي">
        <input type="text" id="in-gps" class="input" readonly placeholder="إحداثيات GPS">
        <button class="btn" style="background:var(--emerald); height: 70px;" onclick="send()">إرسال الآن</button>
        <button class="btn" style="background:#888;" onclick="navTo('pg-home')">رجوع</button>
    </div>
</div>

<div id="pg-admin" class="page">
    <div class="card">
        <h3>لوحة التحكم</h3>
        <button class="btn" style="background:blue" onclick="document.getElementById('m-staff').style.display='flex'">+ إضافة موظف</button>
        <div id="staff-ui" style="margin-top:10px;"></div>
        <button class="btn" style="background:var(--red); margin-top:15px;" onclick="location.reload()">خروج</button>
    </div>
</div>

<div id="pg-driver" class="page">
    <div id="dr-header" class="card" style="background:var(--emerald); color:white; text-align:center;"></div>
    <div id="dr-tasks"></div>
    <button class="btn" style="background:#444;" onclick="location.reload()">خروج</button>
</div>

<div id="m-staff" class="modal">
    <div class="modal-content">
        <h3>إضافة موظف جديد</h3>
        <select id="s-role" class="input"><option value="سائق">سائق</option><option value="مسؤول">مسؤول</option></select>
        <input type="text" id="s-name" class="input" placeholder="الاسم الكامل">
        <input type="text" id="s-phone" class="input" placeholder="رقم الهاتف">
        <button class="btn" style="background:var(--forest)" onclick="saveS()">حفظ</button>
        <button class="btn" style="background:var(--red)" onclick="document.getElementById('m-staff').style.display='none'">إلغاء</button>
    </div>
</div>

<div class="footer">
    إشراف د. رابحي فتحي - بلدية المدية 2026 ©
</div>

<script>
    const firebaseConfig = { databaseURL: "https://medea-clean-2026-v4-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let data = { reports: [], staff: [] };
    let im = "";

    function initApp() {
        db.ref('CLEAN_DATA').on('value', s => { if(s.exists()) data = s.val(); render(); });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
    }

    function navTo(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    function preview(input) {
        const r = new FileReader();
        r.onload = e => {
            im = e.target.result;
            document.getElementById('img-p').src = im;
            document.getElementById('img-p').style.display = 'block';
            document.getElementById('ico-c').style.display = 'none';
        };
        r.readAsDataURL(input.files[0]);
    }

    function getLoc() {
        navigator.geolocation.getCurrentPosition(p => {
            document.getElementById('in-gps').value = p.coords.latitude.toFixed(6) + "," + p.coords.longitude.toFixed(6);
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${p.coords.latitude}&lon=${p.coords.longitude}&accept-language=ar`).then(r=>r.json()).then(d=>{
                document.getElementById('in-addr').value = d.address.road || d.address.suburb || "المدية";
            });
        });
    }

    function send() {
        if(!im || !document.getElementById('in-addr').value) return alert("أكمل البيانات");
        const r = { id: Date.now(), img: im, addr: document.getElementById('in-addr').value, gps: document.getElementById('in-gps').value, status: 'new' };
        if(!data.reports) data.reports = [];
        data.reports.push(r);
        db.ref('CLEAN_DATA').set(data).then(() => {
            document.getElementById('thanks-overlay').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('thanks-overlay').style.display = 'none';
                // التصفير الكامل
                im = ""; document.getElementById('img-p').style.display='none'; document.getElementById('ico-c').style.display='block';
                document.getElementById('in-addr').value=""; document.getElementById('in-gps').value="";
                navTo('pg-home');
            }, 3000);
        });
    }

    function auth(type) {
        const n = prompt("الاسم المسجل:");
        if(!n) return;
        if(n === "فتحي" && type === 'admin') { navTo('pg-admin'); return; }
        const u = (data.staff || []).find(s => s.name.trim() === n.trim());
        if(u) {
            if(type === 'admin' && u.role === 'مسؤول') navTo('pg-admin');
            else if(type === 'driver' && u.role === 'سائق') {
                document.getElementById('dr-header').innerHTML = `<h3>السائق: ${u.name}</h3>`;
                navTo('pg-driver');
            } else alert("صلاحية الدخول خاطئة");
        } else alert("الاسم غير مسجل");
    }

    function saveS() {
        const n = document.getElementById('s-name'), p = document.getElementById('s-phone'), r = document.getElementById('s-role').value;
        if(!n.value) return;
        if(!data.staff) data.staff = [];
        data.staff.push({ name: n.value.trim(), phone: p.value, role: r });
        db.ref('CLEAN_DATA').set(data).then(() => {
            alert("تمت الإضافة");
            n.value = ""; p.value = ""; // التصفير
            document.getElementById('m-staff').style.display = 'none';
        });
    }

    function render() {
        const ui = document.getElementById('staff-ui');
        if(ui) ui.innerHTML = (data.staff || []).map(s => `<div class="card" style="padding:10px; margin-bottom:5px;">${s.name} (${s.role})</div>`).join('');
    }
</script>
</body>
</html>
