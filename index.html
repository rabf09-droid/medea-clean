<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>المدية نظيفة 2026 - النظام المتكامل</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
/* دمج التصميم المطور (ألوان العلم الوطني) */
:root {
  --red: #C41E3A;
  --white: #FFFFFF;
  --green: #006233;
  --dark-green: #1B5E20;
  --gray: #f5f7fa;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
html, body { overflow-x: hidden; width: 100%; background: var(--gray); min-height: 100vh; }

/* شاشة التحميل (Splash) من الكود الأول */
#splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--green); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: 0.5s; }
.loader { width: 60px; height: 60px; border: 5px solid var(--white); border-top-color: var(--red); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* التنسيق العام والتبويبات */
.header { background: var(--green); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--red); }
.nav-bar { display: flex; overflow-x: auto; background: white; padding: 10px; gap: 10px; sticky: top 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
.tab-btn { padding: 10px 15px; border: none; border-radius: 20px; cursor: pointer; white-space: nowrap; font-weight: bold; background: #eee; }
.tab-btn.active { background: var(--green); color: white; }

/* الخرائط والبطاقات */
#mainMap { height: 350px; width: calc(100% - 20px); margin: 10px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
.card { background: white; margin: 10px; padding: 15px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

/* أنماط الجداول والتقارير المفقودة */
table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
th { background: var(--green); color: white; padding: 10px; text-align: right; }
td { padding: 10px; border-bottom: 1px solid #ddd; text-align: right; }

.btn-action { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
.btn-green { background: var(--green); color: white; }
.btn-red { background: var(--red); color: white; }
</style>
</head>
<body>

<div id="splash">
    <div class="loader"></div>
    <h2 style="color:white; margin-top:20px;">المدية نظيفة 2026</h2>
</div>

<div class="header">
    <h1>المدية نظيفة 🌿</h1>
    <p>نظام تسيير النفايات - 190 طن يومياً</p>
</div>

<div class="nav-bar" id="navBar">
    <button class="tab-btn active" onclick="switchTab('citizen')">📢 تبليغ</button>
    <button class="tab-btn" onclick="switchTab('driver')">🚚 السائق</button>
    <button class="tab-btn" onclick="switchTab('admin')">📊 الإدارة</button>
    <button class="tab-btn" onclick="switchTab('tonnage')">⚖️ الميزان</button>
</div>

<div id="citizen" class="tab-content">
    <div class="card">
        <h3>📍 تحديد موقع النقطة السوداء</h3>
        <div id="mainMap"></div>
        <select id="sectorSelect"></select>
        <input type="text" id="neighborhood" placeholder="اسم الحي...">
        <input type="file" accept="image/*" capture="camera" id="photoFile">
        <button class="btn-action btn-green" onclick="handleSubmission()">إرسال البلاغ الميداني</button>
    </div>
</div>

<div id="admin" class="tab-content" style="display:none;">
    <div class="card">
        <h3>📊 مراقبة الـ 14 قطاعاً</h3>
        <div id="adminStats">
            </div>
        <button class="btn-action btn-red" onclick="exportFullReport()">تحميل تقرير PDF للولاية</button>
    </div>
</div>

<script>
// إعدادات Firebase من ملفاتك (يجب وضع بياناتك هنا لتعمل)
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    databaseURL: "YOUR_DATABASE_URL",
    projectId: "YOUR_PROJECT_ID",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// وظائف التبويبات
function switchTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
    document.getElementById(tabId).style.display = 'block';
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    event.currentTarget.classList.add('active');
    if(tabId === 'citizen') setTimeout(() => map.invalidateSize(), 200);
}

// استرجاع منطق الخرائط المتقدم من الكود 2
let map;
function initMap() {
    map = L.map('mainMap').setView([36.2642, 2.7539], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    
    map.locate({setView: true, maxZoom: 16});
    map.on('locationfound', e => {
        L.marker(e.latlng).addTo(map).bindPopup("موقعك الحالي").openPopup();
    });
}

// إخفاء شاشة Splash
window.addEventListener('load', () => {
    setTimeout(() => {
        document.getElementById('splash').style.opacity = '0';
        setTimeout(() => document.getElementById('splash').style.display = 'none', 500);
        initMap();
    }, 2000);
});

// وظيفة PDF المفقودة
function exportFullReport() {
    const element = document.getElementById('adminStats');
    html2pdf().from(element).set({
        margin: 10,
        filename: 'تقرير_المدية_نظيفة.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    }).save();
}

// دمج منطق القطاعات الـ 14
const sectors = Array.from({length: 14}, (_, i) => `القطاع ${i + 1}`);
const select = document.getElementById('sectorSelect');
sectors.forEach(s => {
    let opt = document.createElement('option');
    opt.value = s;
    opt.innerHTML = s;
    select.appendChild(opt);
});

</script>
</body>
</html>
