<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المدينة نظيفة - 2026</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --green: #1B5E20;
            --gold: #D4AF37;
            --red: #d21034;
            --navy: #14213D;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Tajawal', sans-serif; }
        body {
            background: linear-gradient(135deg, #f0f4f0, #ffffff);
            min-height: 100vh;
        }
        .header {
            background: white;
            padding: 12px;
            text-align: center;
            border-bottom: 5px solid var(--gold);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        .btn {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        .green-btn { background: var(--green); }
        .red-btn { background: var(--red); }
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin: 15px 0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 12px;
            text-align: center;
            font-size: 1rem;
        }
        .giant-btn {
            height: 220px;
            font-size: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
    </style>
</head>
<body onload="initApp()">

    <!-- Header -->
    <div class="header">
        <div style="font-size:0.9rem; font-weight:bold;">الجمهورية الجزائرية الديمقراطية الشعبية</div>
        <div style="color:var(--green); font-weight:bold;">مصلحة النظافة لبلدية المدية</div>
        <div style="font-size:1.8rem; font-weight:900; color:var(--green);">المدينة نظيفة</div>
        <div style="display:flex; justify-content:space-around; margin-top:8px; font-weight:bold;">
            <span id="clock">00:00:00</span>
            <span>09 أفريل 2026</span>
        </div>
    </div>

    <!-- صفحة الرئيسية -->
    <div id="pg-home" class="page active">
        <div class="card">
            <button class="btn green-btn giant-btn" onclick="navTo('pg-report')">
                <i class="fas fa-truck fa-3x"></i>
                <span>إرسال تبليغ</span>
            </button>
        </div>

        <div class="card">
            <p style="text-align:center; font-weight:bold; margin-bottom:15px;">رواق الموظفين والمسؤولين</p>
            <button class="btn" style="background:var(--navy);" onclick="auth('admin')">
                <i class="fas fa-user-shield"></i> الإدارة
            </button>
            <button class="btn" style="background:#D4AF37; color:black;" onclick="auth('driver')">
                <i class="fas fa-truck"></i> السائقين
            </button>
        </div>
    </div>

    <!-- صفحة إرسال البلاغ -->
    <div id="pg-report" class="page">
        <div class="card">
            <div style="border:3px dashed #ccc; border-radius:20px; height:220px; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden;">
                <i id="ico-cam" class="fas fa-camera fa-5x" style="color:#ddd"></i>
                <img id="out-img" style="width:100%; height:100%; object-fit:cover; display:none;">
                <label style="position:absolute; bottom:15px; background:#14213D; color:white; padding:10px 20px; border-radius:30px; cursor:pointer;">
                    <i class="fas fa-camera"></i> التقاط الصورة
                    <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="handleImg(this, 'citizen')">
                </label>
            </div>

            <button class="btn green-btn" onclick="getLoc()">
                <i class="fas fa-map-marker-alt"></i> تحديد الموقع
            </button>

            <input type="text" id="in-addr" class="input" placeholder="اسم الشارع أو الحي">

            <button class="btn green-btn" onclick="sendReport()">
                إرسال البلاغ الآن
            </button>
            <button class="btn red-btn" onclick="navTo('pg-home')">رجوع</button>
        </div>
    </div>

    <!-- Thanks Overlay -->
    <div id="thanks-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--green); color:white; flex-direction:column; align-items:center; justify-content:center; z-index:9999; text-align:center; padding:20px;">
        <i class="fas fa-heart fa-6x" style="color:#D4AF37; margin-bottom:20px;"></i>
        <h1 style="font-size:2.5rem;">شكراً لك!</h1>
        <p style="font-size:1.3rem; margin:15px 0;">تم إرسال بلاغك بنجاح<br>نقدّر حرصك على نظافة مدينتنا</p>
        <div style="margin-top:30px; font-size:1.4rem; font-weight:bold;">معاً لمدينة أنظف 2026</div>
    </div>

    <script>
        // ==================== Firebase Config ====================
        const firebaseConfig = {
            apiKey: "AIzaSyxxxxxxxxxxxxxxxxxxxxxxxxxxxx",   // ← غيّر هذا
            authDomain: "your-project.firebaseapp.com",
            databaseURL: "https://your-project-default-rtdb.firebaseio.com",
            projectId: "your-project",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:xxxxxxxxxxxxxxxx"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let appData = { reports: [], staff: [] };
        let currentLoggedUser = null;
        let tempImgCitizen = null;
        let tempImgDrv = null;

        function initApp() {
            db.ref('CLEAN_MEDEA_FINAL').on('value', (snap) => {
                appData = snap.val() || { reports: [], staff: [] };
            });

            setInterval(() => {
                document.getElementById('clock').textContent = new Date().toLocaleTimeString('ar-DZ');
            }, 1000);
        }

        function navTo(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(page).classList.add('active');
        }

        function handleImg(input, type) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                if (type === 'citizen') {
                    tempImgCitizen = e.target.result;
                    document.getElementById('out-img').src = e.target.result;
                    document.getElementById('out-img').style.display = 'block';
                    document.getElementById('ico-cam').style.display = 'none';
                }
            };
            reader.readAsDataURL(file);
        }

        function getLoc() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const lat = pos.coords.latitude.toFixed(5);
                    const lng = pos.coords.longitude.toFixed(5);
                    document.getElementById('in-addr').value = `GPS: ${lat}, ${lng}`;
                    alert("✅ تم تحديد الموقع");
                }, () => alert("❌ فشل تحديد الموقع"));
            }
        }

        function sendReport() {
            if (!tempImgCitizen) return alert("يرجى التقاط صورة أولاً");
            const addr = document.getElementById('in-addr').value || "غير محدد";

            const report = {
                id: Date.now(),
                img: tempImgCitizen,
                addr: addr,
                date: new Date().toLocaleDateString('ar-DZ'),
                time: new Date().toLocaleTimeString('ar-DZ'),
                status: 'new'
            };

            appData.reports.unshift(report);
            db.ref('CLEAN_MEDEA_FINAL').set(appData).then(() => {
                document.getElementById('thanks-overlay').style.display = 'flex';
                setTimeout(() => location.reload(), 4000);
            });
        }

        function auth(type) {
            if (type === 'admin') {
                currentLoggedUser = "الإدارة";
                alert("✅ تم الدخول كإدارة");
            } else {
                const name = prompt("أدخل اسم السائق:");
                if (name) {
                    currentLoggedUser = name;
                    alert("✅ مرحباً " + name);
                }
            }
        }

        window.onload = initApp;
    </script>
</body>
    </html>
