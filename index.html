<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المدية نظيفة - اختيار الجهاز</title>
    <style>
        /* إعدادات الصفحة الأساسية */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(180deg, #006233 0%, #ffffff 50%, #D21034 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* حاوية المحتوى الرئيسية */
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 600px;
            width: 90%;
            backdrop-filter: blur(10px);
        }

        /* تصميم العلم والعناوين */
        .flag {
            font-size: 5rem;
            margin-bottom: 10px;
            display: block;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        h1 {
            color: #006233;
            font-size: 2.5rem;
            margin-bottom: 5px;
            font-weight: 800;
        }

        h2 {
            color: #D21034;
            font-size: 1.8rem;
            margin-bottom: 30px;
            font-weight: 600;
        }

        /* حاوية الأزرار */
        .buttons-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        /* تصميم الأزرار بشكل جميل ومنظم */
        .device-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 180px;
            height: 180px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            text-decoration: none;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .device-btn:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.3);
        }

        .device-btn:active {
            transform: translateY(-5px);
        }

        /* أيقونات كبيرة وواضحة */
        .icon {
            font-size: 4rem;
            margin-bottom: 10px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .text {
            font-size: 1.5rem;
            font-weight: bold;
        }

        /* ألوان الأزرار */
        .btn-phone {
            background: linear-gradient(135deg, #D21034, #ff4d4d);
        }

        .btn-computer {
            background: linear-gradient(135deg, #006233, #008040);
        }

        /* النص السفلي */
        .footer-text {
            color: #555;
            font-size: 1rem;
            line-height: 1.6;
            margin-top: 10px;
        }

        .footer-text strong {
            color: #006233;
        }

        /* تجاوب مع الشاشات الصغيرة */
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            h1 { font-size: 1.8rem; }
            h2 { font-size: 1.3rem; }
            .device-btn {
                width: 100%;
                height: 120px;
                flex-direction: row;
                gap: 15px;
            }
            .icon { font-size: 3rem; margin-bottom: 0; }
            .text { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- العلم الجزائري -->
        <span class="flag">🇩🇿</span>
        
        <!-- العناوين -->
        <h1>المدية نظيفة</h1>
        <h2>النظافة من الإيمان</h2>

        <!-- أزرار الاختيار -->
        <div class="buttons-container">
            <!-- زر الهاتف -->
            <div class="device-btn btn-phone" onclick="selectDevice('phone')">
                <span class="icon">📱</span>
                <span class="text">الهاتف</span>
            </div>
            
            <!-- زر الكمبيوتر -->
            <div class="device-btn btn-computer" onclick="selectDevice('computer')">
                <span class="icon">💻</span>
                <span class="text">الكمبيوتر</span>
            </div>
        </div>

        <!-- النص السفلي -->
        <div class="footer-text">
            <p>مصلحة النظافة والوقاية الصحية - بلدية المدية</p>
            <p>التطبيق من إعداد <strong>د. رابحي فتحي</strong></p>
            <p>سيتم حفظ اختيارك للزيارات القادمة</p>
        </div>
    </div>

    <script>
        function selectDevice(device) {
            // حفظ اختيار المستخدم
            localStorage.setItem('selectedDevice', device);
            
            // توجيه المستخدم للصفحة المناسبة
            if (device === 'phone') {
                window.location.href = 'phone.html'; // ضع رابط صفحة الهاتف هنا
            } else {
                window.location.href = 'computer.html'; // ضع رابط صفحة الكمبيوتر هنا
            }
        }
    </script>
</body>
</html>
