<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المدية نظيفة 2026 - د. رابحي فتحي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --glass: rgba(255, 255, 255, 0.98); --gold: #D4AF37; --red: #d21034; --orange: #fb8c00; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { margin: 0; background: url('https://w0.peakpx.com/wallpaper/842/630/HD-wallpaper-garbage-truck-garbage-recycling-environment-trucks.jpg') no-repeat center center fixed; background-size: cover; }
        .overlay { background: rgba(0,0,0,0.65); min-height: 100vh; padding-bottom: 160px; }
        .top-bar { background: var(--glass); padding: 15px; text-align: center; border-bottom: 4px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .screen { display: none; padding: 20px; animation: fadeIn 0.4s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--glass); border-radius: 25px; padding: 25px; margin-bottom: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: pointer; border: 1px solid rgba(255,255,255,0.3); }
        .btn-p { border: none; padding: 15px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; color: white; }
        .inp { width: 100%; padding: 14px; border-radius: 15px; border: 1px solid #ccc; margin-bottom: 12px; font-size: 1rem; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 2000; background: var(--glass); padding: 15px; border-radius: 25px 25px 0 0; }
        .lang-flex { display: flex; gap: 8px; margin-bottom: 10px; }
        .lang-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #ddd; background: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body onload="init()">
<div class="overlay">
    <div class="top-bar">
        <div style="font-size: 0.8rem; font-weight: bold;">الجمهورية الجزائرية الديمقراطية الشعبية</div>
        <div style="font-size: 1.4rem; font-weight: 800; color: var(--emerald);">نظام نظافة المدية 2026</div>
        <div style="display: flex; justify-content: space-between; padding: 5px 20px; font-weight: bold; color: var(--navy);">
            <div id="clock">00:00:00</div>
            <div>06 أفريل 2026</div>
        </div>
    </div>

    <div id="scr-main" class="screen active">
        <div class="card" onclick="nav('scr-rep')">
            <i class="fas fa-bullhorn fa-4x" style="color:var(--forest)"></i>
            <h2>تبليغ مواطن</h2>
        </div>
        <div class="card" onclick="auth('admin')">
            <i class="fas fa-user-shield fa-4x" style="color:var(--emerald)"></i>
            <h2>منصة الإدارة</h2>
        </div>
        <div class="card" onclick="auth('driver')">
            <i class="fas fa-truck-pickup fa-4x" style="color:var(--gold)"></i>
            <h2>واجهة السائق</h2>
        </div>
        
        <div class="bottom-nav">
            <div class="lang-flex">
                <button class="lang-btn" onclick="setLang('ar')">العربية</button>
                <button class="lang-btn" onclick="setLang('fr')">Français</button>
                <button class="lang-btn" onclick="setLang('en')">English</button>
            </div>
            <button class="btn-p" style="background:var(--red); margin-bottom:0;" onclick="location.reload()"><i class="fas fa-power-off"></i> خروج</button>
        </div>
    </div>

    <div id="scr-rep" class="screen">
        <div class="card">
            <div id="cam-box" style="height:220px; border:3px dashed #ccc; border-radius:20px; display:flex; align-items:center; justify-content:center; margin-bottom:15px; overflow:hidden;">
                <i id="cam-icon" class="fas fa-camera fa-4x" style="color:#ccc"></i>
                <img id="prev-img" style="width:100%; height:100%; object-fit:cover; display:none;">
            </div>
            <label class="btn-p" style="background:var(--navy);">
                <i class="fas fa-camera"></i> تصوير النفايات
                <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="handleImg(this, 'cit')">
            </label>
            <button class="btn-p" style="background:var(--forest);" onclick="getGeo()"><i class="fas fa-map-marker-alt"></i> تحديد الموقع GPS</button>
            <input type="text" id="inp-addr" class="inp" placeholder="العنوان...">
            <input type="text" id="inp-geo" class="inp" placeholder="الإحداثيات" readonly>
            <button class="btn-p" style="background:var(--emerald);" onclick="sendReport()">إرسال البلاغ فوراً</button>
            <button class="btn-p" style="background:#666;" onclick="nav('scr-main')">رجوع</button>
        </div>
    </div>
        <div id="scr-admin" class="screen">
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <div style="flex:1; background:var(--red); color:white; padding:15px; border-radius:15px; text-align:center;">
                <i class="fas fa-bell"></i> جديد<br><span id="st-new" style="font-weight:bold; font-size:1.2rem;">0</span>
            </div>
            <div style="flex:1; background:var(--orange); color:white; padding:15px; border-radius:15px; text-align:center;">
                <i class="fas fa-paper-plane"></i> مرسل<br><span id="st-sent" style="font-weight:bold; font-size:1.2rem;">0</span>
            </div>
            <div style="flex:1; background:var(--forest); color:white; padding:15px; border-radius:15px; text-align:center;">
                <i class="fas fa-check-double"></i> تمت<br><span id="st-done" style="font-weight:bold; font-size:1.2rem;">0</span>
            </div>
        </div>

        <button class="btn-p" style="background:var(--navy)" onclick="toggle('adm-reps')">📦 عرض التبليغات</button>
        <div id="adm-reps" style="display:none;"></div>

        <button class="btn-p" style="background:var(--forest)" onclick="toggle('adm-drvs')">👥 إدارة السائقين</button>
        <div id="adm-drvs" style="display:none;" class="card">
            <input type="text" id="d-name" class="inp" placeholder="اسم السائق">
            <input type="tel" id="d-phone" class="inp" placeholder="الهاتف">
            <input type="text" id="d-truck" class="inp" placeholder="رقم الشاحنة">
            <input type="text" id="d-sector" class="inp" placeholder="القطاع (بلدية/خاص)">
            <button class="btn-p" style="background:var(--emerald)" onclick="addDrv()">حفظ وتصفير</button>
            <div id="drv-ui-list"></div>
        </div>

        <div id="super-admin" style="display:none;">
            <button class="btn-p" style="background:var(--gold); color:black;" onclick="toggle('adm-mgrs')">🔑 إدارة المسؤولين</button>
            <div id="adm-mgrs" style="display:none;" class="card">
                <input type="text" id="new-adm" class="inp" placeholder="اسم المسؤول">
                <button class="btn-p" style="background:var(--navy)" onclick="addAdm()">إضافة وتصفير</button>
                <div id="adm-ui-list"></div>
            </div>
        </div>
        <button class="btn-p" style="background:#333;" onclick="nav('scr-main')">رجوع</button>
    </div>

    <div id="scr-driver" class="screen">
        <div id="drv-info" class="card" style="background:var(--emerald); color:white;"></div>
        <div id="drv-tasks"></div>
        <button class="btn-p" style="background:#333;" onclick="nav('scr-main')">خروج</button>
    </div>
</div>

<script>
    // إعدادات Firebase
    const firebaseConfig = { databaseURL: "https://medea-smart-clean-2026-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();

    let db = { reports: [], drivers: [], admins: ["فتحي"] };
    let cImg = "", dImg = "", activeUser = "";

    function sync() { rtdb.ref('SYSTEM_V7').set(db); }

    function init() {
        rtdb.ref('SYSTEM_V7').on('value', (s) => { if(s.exists()){ db=s.val(); render(); } });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
    }

    function setLang(l) { alert("Language set to: " + l); }

    function handleImg(input, type) {
        const reader = new FileReader();
        reader.onload = e => {
            if(type === 'cit') {
                cImg = e.target.result;
                document.getElementById('prev-img').src = cImg;
                document.getElementById('prev-img').style.display = 'block';
                document.getElementById('cam-icon').style.display = 'none';
            } else { dImg = e.target.result; alert("📸 تم تصوير الإنجاز"); }
        };
        reader.readAsDataURL(input.files[0]);
    }

    function getGeo() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                const lat = p.coords.latitude, lng = p.coords.longitude;
                document.getElementById('inp-geo').value = `${lat.toFixed(6)},${lng.toFixed(6)}`;
                fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
                .then(r => r.json()).then(d => {
                    document.getElementById('inp-addr').value = d.display_name.split(',').slice(0,3).join(',');
                });
            });
        }
    }

    function sendReport() {
        const addr = document.getElementById('inp-addr').value;
        if(!cImg || !addr) return alert("يرجى التصوير وتحديد الموقع");
        const report = {
            id: Date.now(), img: cImg, addr: addr, geo: document.getElementById('inp-geo').value,
            time: new Date().toLocaleTimeString('fr-FR'), date: "06 أفريل 2026", status: 'new'
        };
        if(!db.reports) db.reports = [];
        db.reports.push(report); sync(); alert("✅ تم إرسال البلاغ"); location.reload();
    }

    function addDrv() {
        const n = document.getElementById('d-name').value;
        const p = document.getElementById('d-phone').value;
        const t = document.getElementById('d-truck').value;
        const s = document.getElementById('d-sector').value;
        if(n && p) {
            if(!db.drivers) db.drivers = [];
            db.drivers.push({ id: Date.now(), name: n, phone: p, truck: t, sector: s });
            sync(); alert("✅ تم الحفظ وتصفير الحقول");
            document.getElementById('d-name').value=""; document.getElementById('d-phone').value="";
            document.getElementById('d-truck').value=""; document.getElementById('d-sector').value="";
        }
    }

    function addAdm() {
        const n = document.getElementById('new-adm').value;
        if(n) { if(!db.admins) db.admins = []; db.admins.push(n); sync(); document.getElementById('new-adm').value=""; alert("✅ تمت الإضافة"); }
    }

    function auth(role) {
        const u = prompt("الاسم:"); const p = prompt("الرمز:");
        if(role === 'admin' && (db.admins||[]).includes(u) && p === '1234') {
            activeUser = u; document.getElementById('super-admin').style.display = (u === "فتحي" ? 'block' : 'none');
            nav('scr-admin');
        } else if(role === 'driver' && p === '5678') {
            const d = (db.drivers||[]).find(x => x.name === u);
            if(d) { activeUser = u; document.getElementById('drv-info').innerHTML = `<h3>${u}</h3><p>شاحنة: ${d.truck} | ${d.sector}</p>`; nav('scr-driver'); }
            else alert("سائق غير مسجل");
        }
    }

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        render();
    }

    function render() {
        const rs = db.reports || [];
        document.getElementById('st-new').innerText = rs.filter(r => r.status === 'new').length;
        document.getElementById('st-sent').innerText = rs.filter(r => r.status === 'sent').length;
        document.getElementById('st-done').innerText = rs.filter(r => r.status === 'done').length;

        document.getElementById('adm-reps').innerHTML = rs.slice().reverse().map(r => `
            <div class="card" style="text-align:right;">
                <img src="${r.img}" style="width:100%; border-radius:15px;">
                <p>📍 <b>العنوان:</b> ${r.addr}</p>
                <p>🕒 <b>التوقيت:</b> ${r.time} | 📅 ${r.date}</p>
                ${r.status === 'new' ? `
                    <select id="sel-${r.id}" class="inp">
                        <option value="">توجيه لسائق...</option>
                        ${(db.drivers||[]).map(d => `<option value="${d.name}">${d.name} (${d.sector})</option>`).join('')}
                    </select>
                    <button class="btn-p" style="background:var(--forest)" onclick="assign(${r.id})">إرسال المهمة</button>
                ` : `<p style="color:var(--orange)">🚚 في عهدة: ${r.assignedTo}</p>`}
                <i class="fas fa-trash" style="color:red" onclick="delRep(${r.id})"> حذف</i>
            </div>
        `).join('');

        document.getElementById('drv-ui-list').innerHTML = (db.drivers||[]).map(d => `
            <div style="background:#eee; padding:10px; margin-top:5px; border-radius:10px; text-align:right;">
                👤 <b>${d.name}</b> | 🚛 ${d.truck}<br>📞 ${d.phone} | 🏛 ${d.sector}
                <i class="fas fa-trash-alt" style="float:left; color:red" onclick="delDrv(${d.id})"></i>
            </div>
        `).join('');

        document.getElementById('adm-ui-list').innerHTML = (db.admins||[]).map(a => `
            <div style="background:#eee; padding:10px; margin-top:5px; border-radius:10px;">
                🔑 ${a} ${a !== 'فتحي' ? `<i class="fas fa-times-circle" style="float:left; color:red" onclick="delAdm('${a}')"></i>` : ""}
            </div>
        `).join('');

        const myJobs = rs.filter(r => r.assignedTo === activeUser && r.status === 'sent');
        document.getElementById('drv-tasks').innerHTML = myJobs.map(r => `
            <div class="card" style="text-align:right; border:2px solid var(--orange);">
                <h4 style="color:var(--red)">🚨 مهمة واردة كاملة البيانات:</h4>
                <img src="${r.img}" style="width:100%; border-radius:15px;">
                <p>📍 <b>العنوان:</b> ${r.addr}</p>
                <p>🕒 <b>الوقت:</b> ${r.time} | 📅 ${r.date}</p>
                <p>🛰 <b>الإحداثيات:</b> ${r.geo}</p>
                <button class="btn-p" style="background:var(--navy)" onclick="window.open('https://www.google.com/maps?q=${r.geo}')">🗺 فتح الخريطة GPS</button>
                <hr>
                <label class="btn-p" style="background:var(--gold);">
                    <i class="fas fa-camera"></i> تصوير التنفيذ (بعد)
                    <input type="file" capture="environment" style="display:none;" onchange="handleImg(this, 'drv')">
                </label>
                <button class="btn-p" style="background:var(--emerald)" onclick="finish(${r.id})">تأكيد الإنجاز للدائرة</button>
            </div>
        `).join('');
    }

    function assign(id) {
        const d = document.getElementById(`sel-${id}`).value;
        if(d) {
            const r = db.reports.find(x => x.id === id);
            r.status = 'sent'; r.assignedTo = d; sync(); alert("✅ تم تحويل الملف الكامل للسائق");
        }
    }

    function finish(id) {
        if(!dImg) return alert("يجب تصوير النتيجة أولاً");
        const r = db.reports.find(x => x.id === id);
        r.status = 'done'; r.doneImg = dImg; sync(); alert("✅ تم إبلاغ الإدارة بالإنجاز");
    }

    function delRep(id) { if(confirm("حذف؟")) { db.reports = db.reports.filter(x=>x.id!==id); sync(); } }
    function delDrv(id) { if(confirm("حذف؟")) { db.drivers = db.drivers.filter(x=>x.id!==id); sync(); } }
    function delAdm(n) { if(confirm("حذف؟")) { db.admins = db.admins.filter(x=>x!==n); sync(); } }
    function toggle(id) { const e = document.getElementById(id); e.style.display = e.style.display==='none'?'block':'none'; }
</script>
</body>
</html>
