<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المدية نظيفة 2026 - د. رابحي فتحي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --glass: rgba(255, 255, 255, 0.98); --gold: #D4AF37; --red: #d21034; --orange: #fb8c00; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; transition: all 0.3s ease; }
        body { margin: 0; background: #f0f2f5; overflow-x: hidden; }
        .overlay { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://www.shutterstock.com/shutterstock/photos/1932338633/display_1500/stock-photo-garbage-truck-on-the-street-1932338633.jpg'); background-size: cover; min-height: 100vh; padding-bottom: 180px; }
        .top-bar { background: var(--glass); padding: 15px; text-align: center; border-bottom: 4px solid var(--gold); position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .screen { display: none; padding: 20px; animation: slideIn 0.3s ease-out; }
        .active { display: block; }
        @keyframes slideIn { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
        .card { background: var(--glass); border-radius: 25px; padding: 20px; margin-bottom: 20px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .btn-m { border: none; padding: 15px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; color: white; font-size: 1.1rem; border: 2px solid transparent; }
        .btn-m:active { transform: scale(0.95); }
        .inp { width: 100%; padding: 14px; border-radius: 15px; border: 2px solid #ddd; margin-bottom: 12px; font-size: 1rem; text-align: center; outline: none; }
        .inp:focus { border-color: var(--emerald); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 2000; background: var(--glass); padding: 15px; border-top: 3px solid var(--gold); box-shadow: 0 -5px 20px rgba(0,0,0,0.1); }
        .lang-grid { display: flex; gap: 8px; margin-bottom: 10px; }
        .lang-btn { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid #ccc; background: white; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        .lang-active { background: var(--navy); color: white; border-color: var(--navy); }
    </style>
</head>
<body onload="startSystem()">
<div class="overlay">
    <div class="top-bar">
        <div style="font-size: 0.8rem; font-weight: bold;" id="txt-country">الجمهورية الجزائرية الديمقراطية الشعبية</div>
        <div style="font-size: 1.5rem; font-weight: 800; color: var(--emerald);" id="txt-title">نظافة المدية 2026</div>
        <div style="display: flex; justify-content: space-between; padding: 5px 20px; font-weight: bold; color: var(--navy);">
            <div id="live-time">00:00:00</div>
            <div id="fixed-date">06 أفريل 2026</div>
        </div>
    </div>

    <div id="scr-main" class="screen active">
        <div class="card" onclick="navTo('scr-rep')">
            <i class="fas fa-bullhorn fa-4x" style="color:var(--forest)"></i>
            <h2 id="btn-rep-text">التبليغ</h2>
        </div>
        <div class="card" onclick="openAuth('admin')">
            <i class="fas fa-chart-line fa-4x" style="color:var(--emerald)"></i>
            <h2 id="btn-adm-text">الإدارة</h2>
        </div>
        <div class="card" onclick="openAuth('driver')">
            <i class="fas fa-truck-pickup fa-4x" style="color:var(--gold)"></i>
            <h2 id="btn-drv-text">السائق</h2>
        </div>
        
        <div class="bottom-nav">
            <div class="lang-grid">
                <button class="lang-btn" id="ln-ar" onclick="setLanguage('ar')">العربية</button>
                <button class="lang-btn" id="ln-fr" onclick="setLanguage('fr')">Français</button>
                <button class="lang-btn" id="ln-en" onclick="setLanguage('en')">English</button>
            </div>
            <button class="btn-m" style="background:var(--red); margin:0;" onclick="window.close()" id="btn-exit-text"><i class="fas fa-power-off"></i> خروج</button>
        </div>
    </div>

    <div id="scr-rep" class="screen">
        <div class="card">
            <div id="cam-box" style="height:250px; border:3px dashed var(--forest); border-radius:20px; display:flex; align-items:center; justify-content:center; margin-bottom:15px; overflow:hidden; background:#fff;">
                <i id="cam-icon" class="fas fa-camera-retro fa-4x" style="color:#ccc"></i>
                <img id="img-prev" style="width:100%; height:100%; object-fit:cover; display:none;">
            </div>
            <label class="btn-m" style="background:var(--navy);">
                <i class="fas fa-camera"></i> <span id="txt-take-photo">التقاط صورة للنفايات</span>
                <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="handleFile(this, 'cit')">
            </label>
            <button class="btn-m" style="background:var(--forest);" onclick="getMyLocation()"><i class="fas fa-map-marker-alt"></i> <span id="txt-get-gps">تحديد موقعي الآن</span></button>
            <input type="text" id="inp-addr" class="inp" placeholder="العنوان التقريبي...">
            <input type="text" id="inp-geo" class="inp" placeholder="الإحداثيات الجغرافية" readonly style="background:#eee;">
            <button class="btn-m" style="background:var(--emerald);" onclick="sendFullReport()"><i class="fas fa-paper-plane"></i> <span id="txt-send-now">إرسال التبليغ فوراً</span></button>
            <button class="btn-m" style="background:#666;" onclick="navTo('scr-main')" id="txt-back">رجوع</button>
        </div>
    </div>
        <div id="scr-admin" class="screen">
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <div style="flex:1; background:var(--red); color:white; padding:15px; border-radius:15px; text-align:center;">
                <i class="fas fa-bell"></i><br>جديد<br><span id="st-new" style="font-size:1.5rem; font-weight:bold;">0</span>
            </div>
            <div style="flex:1; background:var(--orange); color:white; padding:15px; border-radius:15px; text-align:center;">
                <i class="fas fa-truck"></i><br>مبعوث<br><span id="st-sent" style="font-size:1.5rem; font-weight:bold;">0</span>
            </div>
            <div style="flex:1; background:var(--forest); color:white; padding:15px; border-radius:15px; text-align:center;">
                <i class="fas fa-check-circle"></i><br>تمت<br><span id="st-done" style="font-size:1.5rem; font-weight:bold;">0</span>
            </div>
        </div>

        <button class="btn-m" style="background:var(--navy)" onclick="toggle('adm-reps')">📋 البلاغات الواردة</button>
        <div id="adm-reps" style="display:none;"></div>

        <button class="btn-m" style="background:var(--forest)" onclick="toggle('adm-drvs')">🚛 إضافة سائق جديد</button>
        <div id="adm-drvs" style="display:none;" class="card">
            <input type="text" id="d-name" class="inp" placeholder="اسم السائق">
            <input type="tel" id="d-phone" class="inp" placeholder="رقم الهاتف">
            <input type="text" id="d-truck" class="inp" placeholder="رقم الشاحنة">
            <select id="d-sector" class="inp">
                <option value="البلدية">البلدية</option>
                <option value="القطاع الخاص">القطاع الخاص</option>
            </select>
            <button class="btn-m" style="background:var(--emerald)" onclick="saveNewDriver()">حفظ وتصفير</button>
            <div id="list-drvs"></div>
        </div>

        <div id="super-zone" style="display:none;">
            <button class="btn-m" style="background:var(--gold); color:black;" onclick="toggle('adm-mgrs')">🔑 إدارة المسؤولين</button>
            <div id="adm-mgrs" style="display:none;" class="card">
                <input type="text" id="m-name" class="inp" placeholder="اسم المسؤول الجديد">
                <button class="btn-m" style="background:var(--navy)" onclick="saveNewAdmin()">إضافة وتصفير</button>
                <div id="list-adms"></div>
            </div>
        </div>
        <button class="btn-m" style="background:#333;" onclick="navTo('scr-main')">رجوع</button>
    </div>

    <div id="scr-driver" class="screen">
        <div id="drv-header" class="card" style="background:var(--emerald); color:white;"></div>
        <div id="drv-tasks"></div>
        <button class="btn-m" style="background:#333;" onclick="navTo('scr-main')">خروج</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://medea-smart-clean-2026-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database();

    let appData = { reports: [], drivers: [], admins: ["فتحي"] };
    let picC = "", picD = "", curUser = "";

    function sync() { dbRef.ref('CLEAN_MEDEA_V10').set(appData); }

    function startSystem() {
        dbRef.ref('CLEAN_MEDEA_V10').on('value', (s) => { if(s.exists()){ appData=s.val(); refreshUI(); } });
        setInterval(() => { document.getElementById('live-time').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
        setLanguage('ar');
    }

    function setLanguage(l) {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('lang-active'));
        document.getElementById('ln-'+l).classList.add('lang-active');
        const dict = {
            ar: {country: "الجمهورية الجزائرية الديمقراطية الشعبية", title: "نظافة المدية 2026", rep: "التبليغ", adm: "الإدارة", drv: "السائق", exit: "خروج", photo: "التقاط صورة للنفايات", gps: "تحديد موقعي الآن", send: "إرسال التبليغ فوراً", back: "رجوع"},
            fr: {country: "République Algérienne", title: "Médéa Propre 2026", rep: "Signalement", adm: "Admin", drv: "Chauffeur", exit: "Quitter", photo: "Prendre Photo", gps: "Localiser moi", send: "Envoyer", back: "Retour"},
            en: {country: "People's Democratic Republic", title: "Clean Medea 2026", rep: "Reporting", adm: "Admin", drv: "Driver", exit: "Logout", photo: "Take Photo", gps: "Get Location", send: "Submit", back: "Back"}
        };
        document.getElementById('txt-country').innerText = dict[l].country;
        document.getElementById('txt-title').innerText = dict[l].title;
        document.getElementById('btn-rep-text').innerText = dict[l].rep;
        document.getElementById('btn-adm-text').innerText = dict[l].adm;
        document.getElementById('btn-drv-text').innerText = dict[l].drv;
        document.getElementById('btn-exit-text').innerHTML = `<i class="fas fa-power-off"></i> ${dict[l].exit}`;
        document.getElementById('txt-take-photo').innerText = dict[l].photo;
        document.getElementById('txt-get-gps').innerText = dict[l].gps;
        document.getElementById('txt-send-now').innerText = dict[l].send;
        document.getElementById('txt-back').innerText = dict[l].back;
    }

    function handleFile(input, mode) {
        const reader = new FileReader();
        reader.onload = e => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 400; canvas.height = (img.height/img.width)*400; // تصغير الصورة لسرعة الإرسال
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                if(mode==='cit') { picC = dataUrl; document.getElementById('img-prev').src=dataUrl; document.getElementById('img-prev').style.display='block'; document.getElementById('cam-icon').style.display='none'; }
                else { picD = dataUrl; alert("📸 تم حفظ صورة الإنجاز"); }
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }

    function getMyLocation() {
        navigator.geolocation.getCurrentPosition(p => {
            const lat = p.coords.latitude, lng = p.coords.longitude;
            document.getElementById('inp-geo').value = `${lat.toFixed(6)},${lng.toFixed(6)}`;
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
            .then(r => r.json()).then(d => { document.getElementById('inp-addr').value = d.display_name.split(',').slice(0,3).join(','); });
        }, () => alert("يرجى تفعيل GPS"));
    }

    function sendFullReport() {
        const ad = document.getElementById('inp-addr').value, ge = document.getElementById('inp-geo').value;
        if(!picC || !ad || !ge) return alert("أكمل البيانات أولاً");
        const r = { id: Date.now(), img: picC, addr: ad, geo: ge, time: new Date().toLocaleTimeString('fr-FR'), date: "06 أفريل 2026", status: 'new' };
        if(!appData.reports) appData.reports = [];
        appData.reports.push(r); sync(); alert("✅ تم التبليغ بنجاح"); location.reload();
    }

    function saveNewDriver() {
        const n = document.getElementById('d-name').value, p = document.getElementById('d-phone').value;
        if(n && p) {
            if(!appData.drivers) appData.drivers = [];
            appData.drivers.push({ id: Date.now(), name: n, phone: p, truck: document.getElementById('d-truck').value, sector: document.getElementById('d-sector').value });
            sync(); document.getElementById('d-name').value=""; document.getElementById('d-phone').value=""; alert("✅ تم الحفظ");
        }
    }

    function saveNewAdmin() {
        const n = document.getElementById('m-name').value;
        if(n) { if(!appData.admins) appData.admins = []; appData.admins.push(n); sync(); document.getElementById('m-name').value=""; alert("✅ تمت الإضافة"); }
    }

    function openAuth(role) {
        const u = prompt("الاسم:"), p = prompt("الرمز:");
        if(role==='admin' && (appData.admins||[]).includes(u) && p==='1234') { curUser=u; document.getElementById('super-zone').style.display=(u==="فتحي"?'block':'none'); navTo('scr-admin'); }
        else if(role==='driver' && p==='5678') {
            const d = (appData.drivers||[]).find(x => x.name === u);
            if(d) { curUser=u; document.getElementById('drv-header').innerHTML = `<h3>${u}</h3><p>🚛 ${d.truck} | ${d.sector}</p>`; navTo('scr-driver'); }
            else alert("غير مسجل");
        }
    }

    function navTo(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); refreshUI(); }

    function refreshUI() {
        const rs = appData.reports || [];
        document.getElementById('st-new').innerText = rs.filter(r => r.status === 'new').length;
        document.getElementById('st-sent').innerText = rs.filter(r => r.status === 'sent').length;
        document.getElementById('st-done').innerText = rs.filter(r => r.status === 'done').length;

        document.getElementById('adm-reps').innerHTML = rs.slice().reverse().map(r => `
            <div class="card" style="text-align:right;">
                <img src="${r.img}" style="width:100%; border-radius:15px; height:150px; object-fit:cover;">
                <p>📍 ${r.addr}</p><p>🕒 ${r.time} | 📅 ${r.date}</p>
                ${r.status === 'new' ? `
                    <select id="s-${r.id}" class="inp">
                        <option value="">اختر سائق...</option>
                        ${(appData.drivers||[]).map(d => `<option value="${d.name}">${d.name}</option>`).join('')}
                    </select>
                    <button class="btn-m" style="background:var(--forest)" onclick="assign(${r.id})">إرسال المهمة</button>
                ` : `<p style="color:var(--orange)">🚚 مرسل لـ: ${r.assignedTo}</p>`}
                <button style="color:red; background:none; border:none;" onclick="delItem('rep', ${r.id})"><i class="fas fa-trash"></i> حذف</button>
            </div>
        `).join('');

        document.getElementById('list-drvs').innerHTML = (appData.drivers||[]).map(d => `
            <div style="background:#eee; padding:10px; margin-top:5px; border-radius:10px; text-align:right;">
                ${d.name} | ${d.truck} <i class="fas fa-trash" style="color:red; float:left;" onclick="delItem('drv', ${d.id})"></i>
            </div>
        `).join('');

        document.getElementById('list-adms').innerHTML = (appData.admins||[]).map(a => `
            <div style="background:#eee; padding:10px; margin-top:5px; border-radius:10px;">${a} ${a!=='فتحي'?`<i class="fas fa-times" style="color:red; float:left;" onclick="delItem('adm', '${a}')"></i>`:''}</div>
        `).join('');

        const myTasks = rs.filter(r => r.assignedTo === curUser && r.status === 'sent');
        document.getElementById('drv-tasks').innerHTML = myTasks.map(r => `
            <div class="card" style="border:2px solid var(--orange);">
                <img src="${r.img}" style="width:100%; border-radius:15px;">
                <p>📍 ${r.addr}</p><p>🕒 ${r.time} | 📅 ${r.date}</p>
                <button class="btn-m" style="background:var(--navy)" onclick="window.open('https://www.google.com/maps?q=${r.geo}')"><i class="fas fa-map-marked-alt"></i> الخريطة (GPS)</button>
                <label class="btn-m" style="background:var(--gold);">📷 تصوير النتيجة <input type="file" capture="environment" style="display:none;" onchange="handleFile(this, 'drv')"></label>
                <button class="btn-m" style="background:var(--emerald)" onclick="done(${r.id})">تأكيد الإنجاز</button>
            </div>
        `).join('');
    }

    function assign(id) {
        const d = document.getElementById('s-'+id).value;
        if(d) { const r = appData.reports.find(x => x.id === id); r.status='sent'; r.assignedTo=d; sync(); alert("🚀 تم الإرسال للسائق"); }
    }

    function done(id) {
        if(!picD) return alert("صور النتيجة أولاً");
        const r = appData.reports.find(x => x.id === id); r.status='done'; r.doneImg=picD; sync(); alert("✅ أحسنت");
    }

    function delItem(t, id) {
        if(!confirm("حذف؟")) return;
        if(t==='rep') appData.reports = appData.reports.filter(x=>x.id!==id);
        if(t==='drv') appData.drivers = appData.drivers.filter(x=>x.id!==id);
        if(t==='adm') appData.admins = appData.admins.filter(x=>x!==id);
        sync();
    }

    function toggle(id) { const e = document.getElementById(id); e.style.display = e.style.display==='none'?'block':'none'; }
</script>
</body>
</html>
