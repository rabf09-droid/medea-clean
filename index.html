<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المدية نظيفة 2026</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --gold: #D4AF37; --red: #d21034; --navy: #14213D; --orange: #f39c12; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { margin: 0; min-height: 100vh; background: linear-gradient(135deg, rgba(27,94,32,0.2) 0%, rgba(255,255,255,0.9) 50%, rgba(210,16,52,0.2) 100%), url('https://raw.githubusercontent.com/rabf09-droid/rabf09-droid.github.io/main/1000052240.webp'); background-size: cover; background-position: center; background-attachment: fixed; }
        
        .header { background: rgba(255,255,255,0.95); padding: 10px; text-align: center; border-bottom: 5px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .page { display: none; padding: 15px; animation: fadeIn 0.4s; max-width: 800px; margin: auto; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn { border: none; padding: 15px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; color: white; font-size: 1.1rem; }
        .input { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 10px; text-align: center; font-size: 1rem; }

        /* تعديل تكبير أيقونات لوحة التحكم (180px) كما في الصورة */
        .admin-nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .nav-card-btn { height: 180px; border-radius: 30px; border: none; color: white; font-size: 1.4rem; font-weight: 900; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); transition: 0.3s; }
        .nav-card-btn i { font-size: 4.5rem; }

        /* واجهة الشكر التفصيلية المحدثة */
        #thanks-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--forest); color:white; flex-direction:column; align-items:center; justify-content:center; z-index:100000; text-align:center; padding: 20px; overflow-y: auto; }
        .thanks-box { background: white; color: #333; padding: 15px; border-radius: 20px; width: 95%; max-width: 400px; text-align: right; margin: 15px 0; font-size: 0.9rem; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; }
        .modal-content { background:white; padding:30px; border-radius:30px; width:90%; max-width:400px; }
        
        .footer { background: white; padding: 15px; text-align: center; border-top: 4px solid var(--gold); margin-top: 20px; }
    </style>
</head>
<body onload="initApp()">

<div id="thanks-overlay">
    <i class="fas fa-check-circle fa-5x" style="color:var(--gold);"></i>
    <h1 style="font-size:1.8rem;">شكراً! معاً سنجعل بيئتنا نظيفة</h1>
    <div id="thanks-data" class="thanks-box"></div>
    <button class="btn" style="background:var(--navy); width:180px;" onclick="location.reload()">إغلاق والعودة</button>
</div>

<div class="header">
    <div style="font-size: 1.6rem; font-weight: 900; color: var(--emerald);">المـديـة نظيـفة 2026</div>
    <div style="display: flex; justify-content: space-around; font-weight: bold; margin-top: 5px;">
        <div id="clock">00:00:00</div>
        <div id="date-now">--/--/2026</div>
    </div>
</div>

<div id="pg-home" class="page active">
    <button class="btn" style="background:var(--forest); height: 230px; flex-direction: column; border-radius: 50px; font-size: 2rem; border: 5px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 20px;" onclick="navTo('pg-report')">
        <i class="fas fa-truck-loading" style="font-size: 6rem;"></i> إرســـــال تبلـيـــغ
    </button>
    <div class="card" style="background: rgba(255,255,255,0.7);">
        <p style="text-align:center; font-weight:bold; margin-top:0;">رواق الموظفين</p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn" style="background:var(--navy); height: 65px;" onclick="auth('admin')">الإدارة</button>
            <button class="btn" style="background:var(--gold); height: 65px;" onclick="auth('driver')">السائقين</button>
        </div>
    </div>
</div>

<div id="pg-report" class="page">
    <div class="card">
        <div id="cam-box" style="height:220px; border:3px dashed #ccc; border-radius:20px; display:flex; align-items:center; justify-content:center; overflow:hidden; margin-bottom:15px; position:relative; background:#f9f9f9;">
            <img id="out-img" style="width:100%; height:100%; object-fit:cover; display:none;">
            <label id="cam-label" style="background:var(--navy); color:white; padding:12px 25px; border-radius:15px; cursor:pointer;">
                <i class="fas fa-camera"></i> تصوير النفايات
                <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="handleImg(this, 'citizen')">
            </label>
        </div>
        <button class="btn" style="background:var(--forest); margin-bottom:10px;" onclick="getLoc()">تحديد الموقع تلقائياً</button>
        <input type="text" id="in-addr" class="input" placeholder="اسم الحي أو الشارع">
        <input type="text" id="in-gps" class="input" readonly placeholder="إحداثيات GPS">
        <button id="send-btn" class="btn" style="background:var(--emerald); height: 80px; font-size:1.5rem;" onclick="sendReport()">إرسال الآن</button>
        <button class="btn" style="background:#888; margin-top:10px;" onclick="navTo('pg-home')">رجوع</button>
    </div>
</div>

<div id="pg-admin" class="page">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h2 style="margin:0;">لوحة الإدارة</h2>
        <button class="btn" style="background:var(--red); width:auto; padding:5px 15px;" onclick="location.reload()">خروج</button>
    </div>
    <div class="admin-nav-grid">
        <button class="nav-card-btn" style="background:var(--orange);" onclick="showAdminList('new')">
            <i class="fas fa-exclamation-triangle"></i> بلاغات النفايات
        </button>
        <button class="nav-card-btn" style="background:var(--forest);" onclick="showAdminList('done')">
            <i class="fas fa-check-double"></i> البلاغات المنجزة
        </button>
    </div>
    <div id="admin-list-container"></div>
    
    <div class="card" style="border: 2px solid blue;">
        <h4 style="text-align:center; color:blue; margin-top:0;">إدارة الموظفين (المشرف/السائق)</h4>
        <button class="btn" style="background:blue; margin-bottom:10px;" onclick="openStaffModal()">+ إضافة موظف جديد</button>
        <button class="btn" style="background:var(--navy);" onclick="downloadLog()">💾 حفظ سجل "مدية نظيفة"</button>
        <div id="staff-list-ui" style="margin-top:15px; border-top:1px solid #eee; padding-top:10px;"></div>
    </div>
</div>

<div id="pg-driver" class="page">
    <div id="dr-header" class="card" style="background:var(--emerald); color:white; text-align:center;"></div>
    <div id="dr-tasks"></div>
    <button class="btn" style="background:#444;" onclick="location.reload()">تسجيل خروج</button>
</div>

<div id="staff-modal" class="modal">
    <div class="modal-content">
        <h3 style="text-align:center;">إضافة موظف للنظام</h3>
        <select id="st-role" class="input" onchange="toggleStaffFields()">
            <option value="سائق">سائق</option>
            <option value="مسؤول">مسؤول (مشرف)</option>
        </select>
        <input type="text" id="st-name" class="input" placeholder="الاسم الكامل">
        <input type="text" id="st-phone" class="input" placeholder="رقم الهاتف">
        <div id="driver-specifics">
            <input type="text" id="st-truck" class="input" placeholder="رقم الشاحنة">
            <select id="st-sector" class="input">
                <option value="بلدية">قطاع البلدية</option>
                <option value="خاص">قطاع خاص</option>
            </select>
        </div>
        <button class="btn" style="background:var(--forest)" onclick="saveStaff()">حفظ وتصفير</button>
        <button class="btn" style="background:var(--red); margin-top:5px;" onclick="closeStaffModal()">إلغاء</button>
    </div>
</div>

<div class="footer">
    <div style="font-size: 0.8rem; color: var(--navy); font-weight: bold;">إشراف د. رابحي فتحي - بلدية المدية 2026 ©</div>
</div>
<script>
    // تكوين Firebase
    const firebaseConfig = { databaseURL: "https://medea-clean-2026-v4-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let appData = { reports: [], staff: [] };
    let currentLoggedUser = "", tempImgCit = "", tempImgDrv = "";

    function initApp() {
        db.ref('CLEAN_MEDEA_FINAL').on('value', snap => { 
            if(snap.exists()){ 
                appData = snap.val(); 
                updateUI(); 
            } 
        });
        setInterval(() => { 
            const n = new Date();
            document.getElementById('clock').innerText = n.toLocaleTimeString('ar-DZ'); 
            document.getElementById('date-now').innerText = n.toLocaleDateString('ar-DZ');
        }, 1000);
    }

    function navTo(id) { 
        document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); 
        document.getElementById(id).classList.add('active'); 
    }

    function handleImg(input, role) {
        const reader = new FileReader();
        reader.onload = e => {
            if(role === 'citizen') {
                tempImgCit = e.target.result;
                document.getElementById('out-img').src = tempImgCit;
                document.getElementById('out-img').style.display = 'block';
                document.getElementById('cam-label').style.display = 'none';
            } else { tempImgDrv = e.target.result; }
        };
        reader.readAsDataURL(input.files[0]);
    }

    function getLoc() {
        navigator.geolocation.getCurrentPosition(p => {
            const lat = p.coords.latitude.toFixed(6), lng = p.coords.longitude.toFixed(6);
            document.getElementById('in-gps').value = lat + "," + lng;
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=ar`).then(r=>r.json()).then(d=>{
                document.getElementById('in-addr').value = d.display_name.split(',').slice(0,3).join(',');
            });
        }, () => alert("يرجى تفعيل الـ GPS"));
    }

    // إرسال البلاغ ورسالة الشكر التفصيلية
    function sendReport() {
        const addr = document.getElementById('in-addr').value;
        const gps = document.getElementById('in-gps').value;
        if(!tempImgCit || !addr) return alert("يرجى التقاط صورة وتحديد العنوان");

        const rep = { 
            id: Date.now(), img: tempImgCit, addr: addr, gps: gps, 
            time: new Date().toLocaleTimeString('ar-DZ'), 
            date: new Date().toLocaleDateString('ar-DZ'), status: 'new' 
        };

        if(!appData.reports) appData.reports = [];
        appData.reports.push(rep);

        db.ref('CLEAN_MEDEA_FINAL').set(appData).then(() => {
            const thanksBox = document.getElementById('thanks-data');
            thanksBox.innerHTML = `
                <img src="${rep.img}" style="width:100%; border-radius:10px; margin-bottom:10px;">
                <b>📍 العنوان:</b> ${rep.addr}<br>
                <b>🌍 GPS:</b> ${rep.gps}<br>
                <b>🕒 التاريخ والوقت:</b> ${rep.date} | ${rep.time}
            `;
            document.getElementById('thanks-overlay').style.display = 'flex';
        });
    }

    // الدخول بالاسم فقط (الالتزام بطلبك)
    function auth(role) {
        const name = prompt("الرجاء إدخال اسمك الكامل المسجل:");
        if(!name) return;
        
        // التحقق من الاسم في قاعدة البيانات أو المشرف الرئيسي "فتحي"
        const isFathi = (name === "فتحي");
        const isRegistered = (appData.staff || []).find(s => s.name === name && (role === 'admin' ? s.role === 'مسؤول' : s.role === 'سائق'));

        if(isFathi || isRegistered) {
            currentLoggedUser = name;
            navTo(role === 'admin' ? 'pg-admin' : 'pg-driver');
            updateUI();
        } else {
            alert("عذراً، هذا الاسم غير مسجل لدينا في قائمة " + (role === 'admin' ? 'المسؤولين' : 'السائقين'));
        }
    }

    // إضافة الموظف وتصفير الخانات فوراً
    function saveStaff() {
        const nameField = document.getElementById('st-name');
        const phoneField = document.getElementById('st-phone');
        const truckField = document.getElementById('st-truck');
        const roleField = document.getElementById('st-role');
        const sectorField = document.getElementById('st-sector');
        
        const s = { 
            role: roleField.value, 
            name: nameField.value, 
            phone: phoneField.value, 
            truck: truckField.value || '---', 
            sector: sectorField.value 
        };

        if(!s.name) return alert("الاسم الكامل ضروري");
        
        if(!appData.staff) appData.staff = [];
        appData.staff.push(s);

        db.ref('CLEAN_MEDEA_FINAL').set(appData).then(() => {
            // تصفير الخانات فوراً
            nameField.value = "";
            phoneField.value = "";
            truckField.value = "";
            alert("تمت الإضافة بنجاح وتصفير الخانات.");
            closeStaffModal();
            updateUI();
        });
    }

    // تخزين البلاغات في ملف نصي (للمشرف)
    function downloadLog() {
        let content = "--- سجل بلاغات نظام مدية نظيفة 2026 ---\n\n";
        (appData.reports || []).forEach(r => {
            content += `التاريخ: ${r.date} ${r.time}\nالعنوان: ${r.addr}\nGPS: ${r.gps}\nالحالة: ${r.status}\nبواسطة: ${r.driverName || '---'}\n--------------------------\n`;
        });
        const blob = new Blob([content], { type: 'text/plain' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'مدية_نظيفة_أرشيف.txt';
        link.click();
    }

    function showAdminList(type) {
        const container = document.getElementById('admin-list-container');
        const filtered = (appData.reports || []).filter(r => type === 'new' ? r.status !== 'done' : r.status === 'done');
        
        container.innerHTML = filtered.map(r => `
            <div class="card" style="border-right: 12px solid ${type==='done'?'#2E7D32':'#d21034'}">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <img src="${r.img}" style="width:100px; height:100px; border-radius:15px; object-fit:cover; border:1px solid #ddd;">
                    ${r.doneImg ? `<img src="${r.doneImg}" style="width:100px; height:100px; border-radius:15px; border:3px solid green; object-fit:cover;">` : ''}
                    ${type === 'done' ? `<i class="fas fa-trash-alt" style="color:red; cursor:pointer;" onclick="deleteReport(${r.id})"></i>` : ''}
                </div>
                <p>📍 ${r.addr}<br>🌍 ${r.gps}<br>🕒 ${r.time} | ${r.date}</p>
                ${r.status==='new' ? `<button class="btn" style="background:var(--forest)" onclick="assignTo(${r.id})">توجيه لسائق</button>` : `<p style="color:green; font-weight:bold;">✅ أنجز بواسطة: ${r.driverName}</p>`}
            </div>
        `).join('') || "<p style='text-align:center'>لا يوجد بيانات</p>";
    }

    function deleteReport(id) { 
        if(confirm("سيتم حذف البلاغ نهائياً، هل أنت متأكد؟")) { 
            appData.reports = appData.reports.filter(r => r.id !== id); 
            db.ref('CLEAN_MEDEA_FINAL').set(appData); 
        } 
    }

    function updateUI() {
        // تحديث قائمة الموظفين في الأسفل
        const list = document.getElementById('staff-list-ui');
        if(list) {
            list.innerHTML = "<b>الموظفين المسجلين:</b><br>" + 
                (appData.staff || []).map(s => `<div style="background:#f8f9fa; padding:8px; margin:5px 0; border-radius:10px; font-size:0.9rem;">👤 ${s.name} - 📱 ${s.phone} (${s.role})</div>`).join('');
        }

        // مهام السائق
        if(currentLoggedUser && document.getElementById('pg-driver').classList.contains('active')) {
            const tasks = (appData.reports || []).filter(r => r.driverName === currentLoggedUser && r.status === 'sent');
            document.getElementById('dr-header').innerHTML = `<h3>مرحباً: ${currentLoggedUser}</h3><p>لديك (${tasks.length}) مهام موكلة إليك</p>`;
            document.getElementById('dr-tasks').innerHTML = tasks.map(t => `
                <div class="card">
                    <img src="${t.img}" style="width:100%; border-radius:15px;">
                    <p>📍 الموقع: ${t.addr}<br>🌍 الإحداثيات: ${t.gps}</p>
                    <label class="btn" style="background:orange">📸 تصوير النتيجة <input type="file" capture="environment" style="display:none;" onchange="handleImg(this, 'driver')"></label>
                    <button class="btn" style="background:green; margin-top:10px;" onclick="finishTask(${t.id})">تأكيد الإنجاز</button>
                </div>
            `).join('') || "<p style='text-align:center'>لا توجد مهام حالية.</p>";
        }
    }

    function assignTo(id) {
        const name = prompt("أدخل اسم السائق المكلف بالعملية (يجب أن يكون مسجلاً):");
        if(name) {
            const r = appData.reports.find(x => x.id === id);
            r.status = 'sent'; r.driverName = name;
            db.ref('CLEAN_MEDEA_FINAL').set(appData).then(() => alert("تم التوجيه"));
        }
    }

    function finishTask(id) {
        if(!tempImgDrv) return alert("يجب تصوير المكان بعد التنظيف");
        const r = appData.reports.find(x => x.id === id);
        r.status = 'done'; r.doneImg = tempImgDrv;
        db.ref('CLEAN_MEDEA_FINAL').set(appData).then(() => { 
            alert("أحسنت! تم إتمام المهمة"); 
            tempImgDrv=""; 
            updateUI(); 
        });
    }

    function openStaffModal() { document.getElementById('staff-modal').style.display = 'flex'; }
    function closeStaffModal() { document.getElementById('staff-modal').style.display = 'none'; }
    function toggleStaffFields() { document.getElementById('driver-specifics').style.display = document.getElementById('st-role').value==='سائق'?'block':'none'; }
</script>
</body>
    </html>
