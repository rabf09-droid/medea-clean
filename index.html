<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المدينة نظيفة</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root { --emerald: #1B5E20; --gold: #D4AF37; --red: #d21034; --navy: #14213D; }
        * { font-family: 'Tajawal', sans-serif; }
        body { margin:0; background: linear-gradient(135deg, #f0f4f0, #fff); }
        .header { background:rgba(255,255,255,0.97); padding:10px; text-align:center; border-bottom:5px solid var(--gold); position:sticky; top:0; z-index:100; }
        .page { display:none; padding:15px; }
        .page.active { display:block; }
        .btn { width:100%; padding:15px; margin:10px 0; border:none; border-radius:15px; font-weight:bold; font-size:1.1rem; color:white; }
        .green { background:var(--emerald); }
        .red { background:var(--red); }
        .navy { background:var(--navy); }
        .card, .modal-content { background:white; border-radius:20px; padding:20px; box-shadow:0 10px 25px rgba(0,0,0,0.1); }
        .input, select { width:100%; padding:12px; margin:8px 0; border:2px solid #ddd; border-radius:12px; text-align:center; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; }
    </style>
</head>
<body onload="initApp()">

<div class="header">
    <div style="font-size:0.75rem;font-weight:bold;">الجمهورية الجزائرية الديمقراطية الشعبية</div>
    <div style="color:var(--emerald);font-weight:bold;">مصلحة النظافة لبلدية المدية</div>
    <div style="font-size:1.8rem;font-weight:900;color:var(--emerald);">المدينة نظيفة</div>
    <div style="display:flex;justify-content:space-around;margin-top:5px;font-weight:bold;">
        <span id="clock">00:00:00</span>
        <span>09 أفريل 2026</span>
    </div>
</div>

<!-- صفحاتك الأصلية -->
<div id="pg-home" class="page active"> ... (سأكملها في الرد إذا احتجت) </div>

<!-- Modal إضافة موظف (محسن) -->
<div id="staff-modal" class="modal">
    <div class="modal-content">
        <h3>إضافة موظف جديد</h3>
        <select id="st-role" class="input" onchange="toggleFields()">
            <option value="سائق">سائق</option>
            <option value="مسؤول">مسؤول (مشرف)</option>
        </select>
        <input type="text" id="st-name" class="input" placeholder="الاسم الكامل">
        <input type="text" id="st-phone" class="input" placeholder="رقم الهاتف">
        <div id="driver-fields">
            <input type="text" id="st-truck" class="input" placeholder="رقم الشاحنة">
            <select id="st-sector" class="input">
                <option value="البلدية">قطاع البلدية</option>
            </select>
        </div>
        <button class="btn green" onclick="saveStaff()">حفظ البيانات</button>
        <button class="btn red" onclick="closeModal()">إغلاق</button>
    </div>
</div>

<script>
// ===================== Firebase =====================
const firebaseConfig = { /* ضع config الخاص بك هنا */ };

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let appData = { reports: [], staff: [] };

function initApp() {
    db.ref('CLEAN_MEDEA_FINAL').on('value', snap => {
        appData = snap.val() || { reports: [], staff: [] };
        console.log("✅ تم تحميل البيانات");
    });

    setInterval(() => document.getElementById('clock').textContent = new Date().toLocaleTimeString('ar-DZ'), 1000);
}

function toggleFields() {
    document.getElementById('driver-fields').style.display = 
        document.getElementById('st-role').value === 'سائق' ? 'block' : 'none';
}

function saveStaff() {
    const name = document.getElementById('st-name').value.trim();
    if (!name) return alert("الاسم مطلوب!");

    const staffMember = {
        role: document.getElementById('st-role').value,
        name: name,
        phone: document.getElementById('st-phone').value || '',
        truck: document.getElementById('st-truck') ? document.getElementById('st-truck').value : '',
        sector: document.getElementById('st-sector') ? document.getElementById('st-sector').value : '',
        addedBy: "د. رابحي فتحي - بلدية المدية 2026",
        date: new Date().toLocaleDateString('ar-DZ')
    };

    if (!appData.staff) appData.staff = [];
    appData.staff.push(staffMember);

    db.ref('CLEAN_MEDEA_FINAL').set(appData).then(() => {
        alert("✅ تم حفظ الموظف بنجاح");
        closeModal();
        // تنظيف الحقول
        document.getElementById('st-name').value = '';
        document.getElementById('st-phone').value = '';
        if(document.getElementById('st-truck')) document.getElementById('st-truck').value = '';
    }).catch(err => alert("خطأ: " + err.message));
}

function closeModal() {
    document.getElementById('staff-modal').style.display = 'none';
}

function openStaffModal() {
    document.getElementById('staff-modal').style.display = 'flex';
}

// باقي الدوال (sendReport, getLoc, etc.) يمكن إضافتها حسب الحاجة
</script>
</body>
</html>
