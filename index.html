<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المدينة نظيفة - 2026</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root { --emerald: #1B5E20; --gold: #D4AF37; --red: #d21034; --navy: #14213D; }
        * { font-family: 'Tajawal', sans-serif; box-sizing: border-box; }
        body { margin:0; background: linear-gradient(135deg, rgba(27,94,32,0.08), #fff); min-height:100vh; }
        .header { background:rgba(255,255,255,0.97); padding:12px; text-align:center; border-bottom:6px solid var(--gold); position:sticky; top:0; z-index:100; }
        .page { display:none; padding:15px; }
        .page.active { display:block; }
        .btn { width:100%; padding:16px; margin:12px 0; border:none; border-radius:15px; font-size:1.15rem; font-weight:bold; color:white; }
        .green { background:var(--emerald); }
        .red { background:var(--red); }
        .navy { background:var(--navy); }
        .card { background:white; border-radius:22px; padding:20px; margin:15px 0; box-shadow:0 10px 25px rgba(0,0,0,0.1); }
        .input { width:100%; padding:14px; margin:10px 0; border:2px solid #ddd; border-radius:12px; text-align:center; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; }
        .modal-content { background:white; padding:25px; border-radius:25px; width:92%; max-width:420px; }
    </style>
</head>
<body onload="initApp()">

<div class="header">
    <div style="font-size:0.75rem; font-weight:bold;">الجمهورية الجزائرية الديمقراطية الشعبية</div>
    <div style="color:var(--emerald); font-weight:bold;">مصلحة النظافة لبلدية المدية</div>
    <div style="font-size:1.85rem; font-weight:900; color:var(--emerald);">المدينة نظيفة</div>
    <div style="display:flex; justify-content:space-around; margin-top:8px; font-weight:bold;">
        <span id="clock">00:00:00</span>
        <span>09 أفريل 2026</span>
    </div>
</div>

<!-- الصفحة الرئيسية -->
<div id="pg-home" class="page active">
    <button class="btn green" style="height:240px; font-size:2.1rem;" onclick="navTo('pg-report')">
        <i class="fas fa-truck-loading fa-3x"></i><br>إرسال تبليغ
    </button>
    
    <div class="card">
        <button class="btn navy" onclick="navTo('pg-admin')">لوحة التحكم</button>
    </div>
</div>

<!-- صفحة إرسال التبليغ -->
<div id="pg-report" class="page">
    <div class="card">
        <div style="border:3px dashed #999; border-radius:20px; height:230px; position:relative; overflow:hidden; background:#f9f9f9;">
            <i id="ico-cam" class="fas fa-camera fa-5x" style="color:#ccc; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);"></i>
            <img id="out-img" style="width:100%; height:100%; object-fit:cover; display:none;">
            <label style="position:absolute
                <!-- لوحة التحكم -->
<div id="pg-admin" class="page">
    <div class="card">
        <h3 style="text-align:center; color:var(--navy);">لوحة التحكم</h3>
        <button class="btn" style="background:#D4AF37;" onclick="alert('سيتم إضافة تحميل Excel قريباً')">تحميل سجل البلاغات (Excel)</button>
        
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:15px 0;">
            <button class="btn green">البلاغات المنجزة</button>
            <button class="btn" style="background:#f39c12;">بلاغات النفايات</button>
        </div>

        <button class="btn navy" onclick="openStaffModal()">+ إضافة موظف (مسؤول / سائق)</button>
    </div>
    <button class="btn red" onclick="navTo('pg-home')">رجوع</button>
</div>

<!-- Modal إضافة موظف -->
<div id="staff-modal" class="modal">
    <div class="modal-content">
        <h3>إضافة موظف جديد</h3>
        <select id="st-role" class="input" onchange="toggleStaffFields()">
            <option value="سائق">سائق</option>
            <option value="مسؤول">مسؤول (مشرف)</option>
        </select>
        <input type="text" id="st-name" class="input" placeholder="الاسم الكامل">
        <input type="text" id="st-phone" class="input" placeholder="رقم الهاتف">
        <div id="driver-fields" style="display:none;">
            <input type="text" id="st-truck" class="input" placeholder="رقم الشاحنة">
        </div>
        <button class="btn green" onclick="saveStaff()">حفظ البيانات</button>
        <button class="btn red" onclick="closeStaffModal()">إغلاق</button>
    </div>
</div>

<script>
// ===================== Firebase =====================
const firebaseConfig = {
    apiKey: "YOUR_API_KEY_HERE",
    authDomain: "your-project.firebaseapp.com",
    databaseURL: "https://your-project-default-rtdb.firebaseio.com",
    projectId: "your-project",
    storageBucket: "your-project.appspot.com",
    messagingSenderId: "123456789",
    appId: "1:123456789:web:xxxxxxxxxxxxxxxx"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let appData = { reports: [], staff: [] };
let tempImg = null;

function initApp() {
    db.ref('CLEAN_MEDEA_FINAL').on('value', (snap) => {
        appData = snap.val() || { reports: [], staff: [] };
    });

    setInterval(() => {
        document.getElementById('clock').textContent = new Date().toLocaleTimeString('ar-DZ');
    }, 1000);
}

function navTo(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(page).classList.add('active');
}

function handleImg(input) {
    const reader = new FileReader();
    reader.onload = e => {
        tempImg = e.target.result;
        document.getElementById('out-img').src = tempImg;
        document.getElementById('out-img').style.display = 'block';
        document.getElementById('ico-cam').style.display = 'none';
    };
    reader.readAsDataURL(input.files[0]);
}

function getLoc() {
    navigator.geolocation.getCurrentPosition(p => {
        document.getElementById('in-addr').value = `GPS: ${p.coords.latitude.toFixed(5)}, ${p.coords.longitude.toFixed(5)}`;
    });
}

function sendReport() {
    if (!tempImg) return alert("يرجى التقاط صورة أولاً");
    alert("✅ تم إرسال البلاغ بنجاح");
    // يمكنك إضافة Thanks Overlay لاحقاً
}

function openStaffModal() { document.getElementById('staff-modal').style.display = 'flex'; }
function closeStaffModal() { document.getElementById('staff-modal').style.display = 'none'; }

function toggleStaffFields() {
    document.getElementById('driver-fields').style.display = 
        (document.getElementById('st-role').value === 'سائق') ? 'block' : 'none';
}

function saveStaff() {
    const name = document.getElementById('st-name').value.trim();
    if (!name) return alert("الاسم مطلوب!");

    if (!appData.staff) appData.staff = [];
    
    appData.staff.push({
        role: document.getElementById('st-role').value,
        name: name,
        phone: document.getElementById('st-phone').value || '',
        truck: document.getElementById('st-truck') ? document.getElementById('st-truck').value : '',
        addedBy: "إعداد وإشراف د. رابحي فتحي - بلدية المدية 2026",
        date: new Date().toLocaleDateString('ar-DZ')
    });

    db.ref('CLEAN_MEDEA_FINAL').set(appData).then(() => {
        alert("✅ تم حفظ الموظف بنجاح");
        closeStaffModal();
        document.getElementById('st-name').value = '';
    });
}

window.onload = initApp;
</script>
</body>
    </html>
