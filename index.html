<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المدية نظيفة 2026 - د. رابحي فتحي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --glass: rgba(255, 255, 255, 0.95); --gold: #D4AF37; --red: #d21034; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; transition: 0.3s; }
        body { margin: 0; background: url('https://w0.peakpx.com/wallpaper/842/630/HD-wallpaper-garbage-truck-garbage-recycling-environment-trucks.jpg') no-repeat center center fixed; background-size: cover; min-height: 100vh; }
        .top-bar { background: var(--glass); padding: 15px; text-align: center; border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .screen { display: none; padding: 20px; padding-bottom: 100px; }
        .active { display: block !important; }
        .glass-card { background: var(--glass); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); text-align: center; cursor: pointer; }
        .btn-prime { border: none; padding: 14px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; color: white; }
        #map { height: 250px; border-radius: 20px; border: 3px solid white; margin-bottom: 10px; background: #eee; }
        .footer-sig { position: fixed; bottom: 0; width: 100%; background: var(--glass); padding: 12px; text-align: center; font-weight: bold; color: var(--forest); border-top: 2px solid var(--gold); }
    </style>
</head>
<body onload="initApp()">

<div class="top-bar">
    <div style="font-size: 0.8rem;">الجمهورية الجزائرية الديمقراطية الشعبية</div>
    <div style="font-size: 1.1rem; font-weight: 700; color: var(--emerald);">بلدية المدية - المدية نظيفة</div>
    <div id="clock" style="font-weight: bold; color: var(--emerald);">00:00:00</div>
</div>

<div id="scr-main" class="screen active">
    <div class="glass-card" onclick="navTo('scr-report')"><i class="fas fa-bullhorn fa-3x" style="color:var(--forest)"></i><h3>تبليغ مواطن جديد</h3></div>
    <div class="glass-card" onclick="auth('admin')"><i class="fas fa-user-shield fa-3x" style="color:var(--emerald)"></i><h3>مصلحة النظافة (الإدارة)</h3></div>
    <div class="glass-card" onclick="auth('driver')"><i class="fas fa-truck-pickup fa-3x" style="color:var(--gold)"></i><h3>واجهة السائق الميداني</h3></div>
</div>

<div id="scr-report" class="screen">
    <div class="glass-card">
        <div id="map"></div>
        <button class="btn-prime" style="background:var(--forest);" onclick="getMyLocation()">تحديد موقعي الحالي</button>
        <input type="text" id="rep-addr" style="width:100%; padding:12px; border-radius:12px; border:1px solid #ccc; margin:10px 0;" placeholder="العنوان...">
        <label class="btn-prime" style="background:#14213D;"><i class="fas fa-camera"></i> تصوير النفايات <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="handleImg(this)"></label>
        <div id="img-ok" style="display:none; color:green; font-weight:bold;">✅ تم التقاط الصورة</div>
        <button class="btn-prime" style="background:var(--emerald);" onclick="submitReport()">إرسال التقرير</button>
        <button class="btn-prime" style="background:#666;" onclick="navTo('scr-main')">رجوع</button>
    </div>
</div>

<div id="scr-admin" class="screen">
    <div id="admin-list"></div>
    <button class="btn-prime" style="background:#333;" onclick="navTo('scr-main')">خروج</button>
</div>

<div class="footer-sig">د. رابحي فتحي | Medea Clean 2026</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const firebaseConfig = { databaseURL: "https://medea-green-2026-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();
    let db = { reports: [] };
    let map, marker, currentImg = "";

    function initApp() {
        rtdb.ref('medea_data').on('value', (snap) => { if (snap.exists()) { db = snap.val(); renderAdmin(); } });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    }

    function navTo(id) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        if(id === 'scr-report') setTimeout(initMap, 400);
    }

    function initMap() {
        if(map) { map.invalidateSize(); return; }
        map = L.map('map').setView([36.26, 2.75], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{y}/{x}.png').addTo(map);
        marker = L.marker([36.26, 2.75], {draggable: true}).addTo(map);
    }

    function getMyLocation() {
        navigator.geolocation.getCurrentPosition((pos) => {
            const l = [pos.coords.latitude, pos.coords.longitude];
            map.setView(l, 16); marker.setLatLng(l);
        }, () => alert("فعل الـ GPS"));
    }

    function handleImg(input) {
        const reader = new FileReader();
        reader.onload = e => { currentImg = e.target.result; document.getElementById('img-ok').style.display='block'; };
        if(input.files[0]) reader.readAsDataURL(input.files[0]);
    }

    function submitReport() {
        const addr = document.getElementById('rep-addr').value;
        if(!currentImg || !addr) return alert("أكمل البيانات");
        if(!db.reports) db.reports = [];
        db.reports.push({ id: Date.now(), addr: addr, img: currentImg, status: 'new', time: new Date().toLocaleString() });
        rtdb.ref('medea_data').set(db);
        alert("تم الإرسال ✅"); navTo('scr-main');
    }

    function auth(role) {
        const pass = prompt("كلمة المرور (1234):");
        if(pass === '1234') navTo(role === 'admin' ? 'scr-admin' : 'scr-main');
    }

    function renderAdmin() {
        const list = document.getElementById('admin-list');
        if(!list) return;
        list.innerHTML = (db.reports || []).slice().reverse().map(r => `
            <div class="glass-card" style="text-align:right;">
                <img src="${r.img}" style="width:100%; border-radius:10px;">
                <p>📍 ${r.addr}</p>
                <button onclick="delR(${r.id})" style="color:red; border:none; background:none;">حذف 🗑️</button>
            </div>
        `).join('');
    }

    function delR(id) { if(confirm("حذف؟")) { db.reports = db.reports.filter(x=>x.id!==id); rtdb.ref('medea_data').set(db); } }
</script>
</body>
</html>
