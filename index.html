<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المدية نظيفة 2026 - النسخة الرسمية</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --gold: #D4AF37; --red: #d21034; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        
        body { 
            margin: 0; background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7)),
            url('https://raw.githubusercontent.com/rabf09-droid/rabf09-droid.github.io/main/1000052240.webp');
            background-size: cover; background-position: center; background-attachment: fixed;
            display: flex; justify-content: center; min-height: 100vh;
        }

        .container { width: 100%; max-width: 480px; background: rgba(255,255,255,0.95); min-height: 100vh; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.1); }
        
        /* استعادة الهيدر كما في الصورة 1000052268 */
        .header { background: white; padding: 20px 15px; text-align: center; border-bottom: 5px solid var(--gold); }
        .header .country { font-size: 0.85rem; font-weight: bold; color: #333; margin-bottom: 2px; }
        .header .dept { font-size: 0.9rem; color: var(--forest); font-weight: bold; margin-bottom: 5px; }
        .header .title { font-size: 2.2rem; font-weight: 900; color: var(--emerald); line-height: 1; }
        
        .time-bar { display: flex; justify-content: space-between; padding: 10px 20px; border-top: 1px solid #eee; margin-top: 10px; font-weight: bold; }

        .page { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* زر التبليغ الأصلي - صورة 1000052264 */
        .main-report-card {
            background: var(--forest); border-radius: 50px; height: 280px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; border: 8px solid white; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            cursor: pointer; margin: 30px 0; text-decoration: none;
        }
        .main-report-card i { font-size: 8rem; margin-bottom: 10px; }
        .main-report-card span { font-size: 2.5rem; font-weight: bold; }

        /* رواق الموظفين المنقط كما في الصورة */
        .staff-section {
            border: 3px dashed var(--navy); border-radius: 30px; padding: 20px; margin-top: 50px;
            background: rgba(255,255,255,0.5); text-align: center;
        }
        .staff-title { font-weight: bold; color: var(--navy); margin-bottom: 15px; font-size: 1.1rem; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-staff { border: none; border-radius: 15px; height: 65px; color: white; font-weight: bold; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 12px; text-align: center; font-size: 1rem; }
    </style>
</head>
<body onload="initApp()">

<div class="container">
    <div class="header">
        <div class="country">الجمهورية الجزائرية الديمقراطية الشعبية</div>
        <div class="dept">مصلحة النظافة لبلدية المدية</div>
        <div class="title">المدية نظيفة</div>
        <div class="time-bar">
            <div id="clock">00:00:00</div>
            <div>07 أفريل 2026</div>
        </div>
    </div>

    <div id="pg-home" class="page active">
        <div class="main-report-card" onclick="navTo('pg-report')">
            <i class="fas fa-truck-pickup"></i>
            <span>إرســــال تبلـيـــغ</span>
        </div>

        <div class="staff-section">
            <div class="staff-title">رواق الموظفين والمسؤولين</div>
            <div class="btn-grid">
                <button class="btn-staff" style="background:var(--navy)" onclick="auth('admin')">
                    <i class="fas fa-user-shield"></i> الإدارة
                </button>
                <button class="btn-staff" style="background:var(--gold)" onclick="auth('driver')">
                    <i class="fas fa-truck"></i> السائقين
                </button>
            </div>
        </div>
    </div>

    <div id="pg-report" class="page">
        <div class="card">
            <div id="cam-box" style="height:250px; border:3px dashed #bbb; border-radius:20px; display:flex; align-items:center; justify-content:center; background:#f9f9f9; overflow:hidden; margin-bottom:15px;">
                <i id="ico-cam" class="fas fa-camera fa-5x" style="color:#ddd"></i>
                <img id="out-img" style="width:100%; height:100%; object-fit:cover; display:none;">
            </div>
            <label class="btn-staff" style="background:var(--navy); width:100%;"><i class="fas fa-camera"></i> تصوير النفايات<input type="file" accept="image/*" capture="environment" style="display:none;" onchange="handleImg(this)"></label>
            <button class="btn-staff" style="background:var(--forest); width:100%; margin-top:10px;" onclick="getLoc()"><i class="fas fa-map-marker-alt"></i> تحديد الموقع</button>
            <input type="text" id="in-addr" class="input" placeholder="اسم الحي أو الشارع" style="margin-top:10px;">
            <input type="text" id="in-gps" class="input" readonly placeholder="إحداثيات GPS">
            <button class="btn-staff" style="background:var(--emerald); width:100%; height:80px; font-size:1.5rem;" onclick="sendReport()">إرسال الآن</button>
            <button class="btn-staff" style="background:#888; width:100%; margin-top:10px;" onclick="navTo('pg-home')">رجوع</button>
        </div>
    </div>

    <div id="pg-admin" class="page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2>لوحة التحكم</h2>
            <button onclick="navTo('pg-home')" style="border:none; background:var(--red); color:white; padding:5px 15px; border-radius:10px;">خروج</button>
        </div>
        <div id="admin-feed"></div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://medea-clean-2026-v4-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let appData = { reports: [], drivers: [], admins: ["فتحي"] };
    let tempImgCit = "";

    function initApp() {
        db.ref('APP_DATA_V4').on('value', snap => { if(snap.exists()){ appData = snap.val(); } });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
    }

    function handleImg(input) {
        const reader = new FileReader();
        reader.onload = e => {
            tempImgCit = e.target.result;
            document.getElementById('out-img').src = tempImgCit;
            document.getElementById('out-img').style.display = 'block';
            document.getElementById('ico-cam').style.display = 'none';
        };
        reader.readAsDataURL(input.files[0]);
    }

    function getLoc() {
        navigator.geolocation.getCurrentPosition(p => {
            document.getElementById('in-gps').value = p.coords.latitude.toFixed(6) + "," + p.coords.longitude.toFixed(6);
            document.getElementById('in-addr').value = "جاري تحديد الحي...";
        });
    }

    function sendReport() {
        if(!tempImgCit) return alert("صور أولاً");
        const rep = { id: Date.now(), img: tempImgCit, addr: document.getElementById('in-addr').value, gps: document.getElementById('in-gps').value, status: 'new' };
        if(!appData.reports) appData.reports = [];
        appData.reports.push(rep);
        db.ref('APP_DATA_V4').set(appData).then(() => { alert("تم الإرسال"); location.reload(); });
    }

    function auth(role) {
        const p = prompt("الرمز:");
        if(p==='1234' && role==='admin') navTo('pg-admin');
        else if(p==='5678' && role==='driver') alert("واجهة السائقين");
    }

    function navTo(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
</script>
</body>
    </html>
