<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المدية نظيفة 2026 - الإصدار المعتمد</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --gold: #D4AF37; --red: #d21034; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { margin: 0; background: #f4f4f4; background-image: url('https://raw.githubusercontent.com/rabf09-droid/rabf09-droid.github.io/main/1000052240.webp'); background-size: cover; background-attachment: fixed; }
        
        .app-header { background: white; padding: 15px; text-align: center; border-bottom: 5px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .page { display: none; padding: 20px; max-width: 500px; margin: auto; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: rgba(255,255,255,0.95); border-radius: 25px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn { border: none; padding: 15px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; color: white; font-size: 1.1rem; margin-bottom: 10px; }
        .giant-btn { background: var(--forest); height: 260px; flex-direction: column; border-radius: 45px; border: 7px solid white; font-size: 2.3rem; }
        .giant-btn i { font-size: 7rem; }
        
        .input { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 10px; text-align: center; font-size: 1rem; }
        .footer-note { text-align: center; padding: 15px; background: white; font-weight: bold; color: var(--navy); border-top: 3px solid var(--gold); position: relative; bottom: 0; width: 100%; }
        
        img.preview { width: 100%; border-radius: 15px; margin-bottom: 15px; border: 2px solid var(--emerald); }
    </style>
</head>
<body onload="initApp()">

<div class="app-header">
    <div style="font-size: 0.8rem; font-weight: bold;">الجمهورية الجزائرية الديمقراطية الشعبية</div>
    <div style="font-size: 0.9rem; color: var(--forest); font-weight: bold;">مصلحة النظافة لبلدية المدية</div>
    <div style="font-size: 2.2rem; font-weight: 900; color: var(--emerald);">المـديـة نظيـفة</div>
    <div id="clock" style="font-weight: bold; color: var(--navy); margin-top: 5px;">00:00:00</div>
</div>

<div id="pg-home" class="page active">
    <button class="btn giant-btn" onclick="navTo('pg-report')">
        <i class="fas fa-truck-loading"></i>
        <span>إرســـــال تبلـيـــغ</span>
    </button>
    <div class="card" style="margin-top: 40px; border: 2px dashed var(--navy);">
        <p style="text-align: center; font-weight: bold; color: var(--navy);">بوابة الموظفين</p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn" style="background:var(--navy)" onclick="auth('admin')">الإدارة</button>
            <button class="btn" style="background:var(--gold)" onclick="auth('driver')">السائق</button>
        </div>
    </div>
</div>

<div id="pg-report" class="page">
    <div class="card">
        <div id="img-container">
            <i class="fas fa-camera fa-5x" id="cam-placeholder" style="display:block; text-align:center; color:#ddd; margin: 30px 0;"></i>
            <img id="img-display" class="preview" style="display:none;">
        </div>
        <label class="btn" style="background:var(--navy);">
            <i class="fas fa-camera"></i> التقاط الصورة 
            <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="processImage(this)">
        </label>
        <button class="btn" style="background:var(--forest);" onclick="getExactLocation()">
            <i class="fas fa-map-marker-alt"></i> تحديد العنوان بدقة
        </button>
        <input type="text" id="loc-addr" class="input" placeholder="سيظهر اسم النهج/الشارع هنا">
        <input type="text" id="loc-gps" class="input" readonly placeholder="إحداثيات GPS">
        <button class="btn" style="background:var(--emerald); height: 70px; font-size: 1.4rem;" onclick="sendFinalReport()">تأكيد الإرسال</button>
        <button class="btn" style="background:#888;" onclick="navTo('pg-home')">إلغاء</button>
    </div>
</div>

<div id="pg-admin" class="page">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h3>البلاغات الجديدة</h3>
        <button onclick="navTo('pg-home')" style="border:none; background:var(--red); color:white; padding:10px; border-radius:10px;">خروج</button>
    </div>
    <div id="admin-feed"></div>
</div>

<div class="footer-note">
    إشراف د. رابحي فتحي - بلدية المدية 2026 ©
</div>

<script>
    const firebaseConfig = { databaseURL: "https://medea-clean-2026-v4-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentImageBase64 = "";

    function initApp() {
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
        db.ref('APP_DATA_V4/reports').on('value', snap => {
            if(snap.exists()) renderAdmin(snap.val());
        });
    }

    function processImage(input) {
        const reader = new FileReader();
        reader.onload = e => {
            currentImageBase64 = e.target.result;
            document.getElementById('img-display').src = currentImageBase64;
            document.getElementById('img-display').style.display = 'block';
            document.getElementById('cam-placeholder').style.display = 'none';
        };
        reader.readAsDataURL(input.files[0]);
    }

    function getExactLocation() {
        navigator.geolocation.getCurrentPosition(pos => {
            const lat = pos.coords.latitude, lon = pos.coords.longitude;
            document.getElementById('loc-gps').value = lat.toFixed(6) + "," + lon.toFixed(6);
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=ar`)
            .then(r => r.json()).then(data => {
                const addr = data.address;
                // جلب أدق تفاصيل للعنوان (اسم النهج، الحي، رقم المبنى)
                const street = addr.road || addr.suburb || addr.neighbourhood || "نهج غير مسمى";
                const city = addr.city || addr.town || "المدية";
                document.getElementById('loc-addr').value = street + "، " + city;
            });
        });
    }

    function sendFinalReport() {
        if(!currentImageBase64 || !document.getElementById('loc-addr').value) return alert("الرجاء تصوير النفايات وتحديد الموقع أولاً");
        const report = {
            id: Date.now(),
            img: currentImageBase64,
            addr: document.getElementById('loc-addr').value,
            gps: document.getElementById('loc-gps').value,
            time: new Date().toLocaleTimeString('fr-FR'),
            status: 'new'
        };
        db.ref('APP_DATA_V4/reports').push(report).then(() => {
            alert("شكراً لك! تم إرسال البلاغ بنجاح");
            location.reload();
        });
    }

    function renderAdmin(reports) {
        const feed = document.getElementById('admin-feed');
        feed.innerHTML = Object.values(reports).reverse().map(r => `
            <div class="card">
                <img src="${r.img}" style="width:100%; border-radius:15px; margin-bottom:10px;">
                <p>📍 <b>العنوان:</b> ${r.addr}</p>
                <p>⏰ <b>الوقت:</b> ${r.time}</p>
                <button class="btn" style="background:var(--forest)" onclick="alert('جاري التوجيه...')">إرسال للسائق</button>
            </div>
        `).join('');
    }

    function auth(role) {
        const p = prompt("كلمة السر:");
        if(p === '1234') navTo('pg-admin');
    }

    function navTo(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
            </html>
