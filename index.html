<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المدية نظيفة 2026 - د. رابحي فتحي</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --glass: rgba(255, 255, 255, 0.95); --gold: #D4AF37; --red: #d21034; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; transition: 0.3s; }
        body { margin: 0; background: url('https://w0.peakpx.com/wallpaper/842/630/HD-wallpaper-garbage-truck-garbage-recycling-environment-trucks.jpg') no-repeat center center fixed; background-size: cover; min-height: 100vh; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: -1; }
        .top-bar { background: var(--glass); padding: 15px; text-align: center; border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .live-panel { display: flex; justify-content: space-between; padding: 5px 15px; font-weight: bold; color: var(--emerald); font-size: 0.85rem; }
        .screen { display: none; padding: 20px; padding-bottom: 100px; }
        .active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .glass-card { background: var(--glass); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); text-align: center; }
        .btn-prime { border: none; padding: 14px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; color: white; border: 1px solid rgba(255,255,255,0.2); }
        .input-style { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ccc; margin-bottom: 10px; font-size: 0.9rem; }
        #photo-view-area { height: 200px; border-radius: 20px; border: 3px dashed var(--forest); margin-bottom: 10px; background: rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #preview-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .item-box { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: right; border-right: 6px solid var(--gold); position: relative; }
        .rep-img { width: 100%; height: 180px; object-fit: cover; border-radius: 12px; margin-top: 10px; }
        .del-btn { color: var(--red); cursor: pointer; float: left; font-size: 1.2rem; }
        .footer-sig { position: fixed; bottom: 0; width: 100%; background: var(--glass); padding: 12px; text-align: center; font-weight: bold; color: var(--forest); border-top: 2px solid var(--gold); z-index: 1000; }
    </style>
</head>
<body onload="initApp()">

<div class="top-bar">
    <div>الجمهورية الجزائرية الديمقراطية الشعبية</div>
    <div style="font-size: 1.2rem; font-weight: 700; color: var(--emerald);">بلدية المدية - منصة النظافة الذكية</div>
    <div class="live-panel"><div id="clock">00:00:00</div><div id="date-display">--</div></div>
</div>

<div id="scr-main" class="screen active">
    <div class="glass-card" onclick="navTo('scr-report')"><i class="fas fa-bullhorn fa-3x" style="color:var(--forest)"></i><h3>تبليغ مواطن جديد</h3></div>
    <div class="glass-card" onclick="auth('admin')"><i class="fas fa-user-shield fa-3x" style="color:var(--emerald)"></i><h3>الإدارة والمسؤولين</h3></div>
    <div class="glass-card" onclick="auth('driver')"><i class="fas fa-truck fa-3x" style="color:var(--gold)"></i><h3>واجهة السائقين</h3></div>
    <button class="btn-prime" style="background:var(--red)" onclick="location.reload()">خروج</button>
</div>

<div id="scr-report" class="screen">
    <div id="photo-view-area">
        <i id="cam-placeholder" class="fas fa-camera fa-4x" style="color:var(--forest)"></i>
        <img id="preview-img">
    </div>
    <label class="btn-prime" style="background:var(--navy);"><i class="fas fa-camera"></i> التقط صورة النفايات <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="processImg(this, 'citizen')"></label>
    <button class="btn-prime" style="background:var(--forest);" onclick="getLocation()"><i class="fas fa-location-arrow"></i> تحديد العنوان والإحداثيات</button>
    <input type="text" id="inp-addr" class="input-style" placeholder="العنوان الظاهر هنا...">
    <input type="text" id="inp-geo" class="input-style" placeholder="الإحداثيات" readonly>
    <button class="btn-prime" style="background:var(--emerald);" onclick="sendReport()">إرسال التبليغ للإدارة</button>
    <button class="btn-prime" style="background:#666;" onclick="navTo('scr-main')">رجوع</button>
</div>
<div id="scr-admin" class="screen">
    <div id="stats" class="glass-card" style="display:flex; justify-content:space-around;">
        <div style="color:var(--red)">جديد: <span id="s-new">0</span></div>
        <div style="color:var(--emerald)">تم: <span id="s-done">0</span></div>
    </div>
    
    <button class="btn-prime" style="background:var(--navy)" onclick="toggle('list-reps')">📦 عرض التبليغات الواردة</button>
    <div id="list-reps" style="display:none;"></div>
    
    <button class="btn-prime" style="background:var(--forest)" onclick="toggle('mgr-drivers')">👥 إدارة السائقين والقطاعات</button>
    <div id="mgr-drivers" style="display:none;" class="glass-card">
        <input type="text" id="new-d-name" class="input-style" placeholder="اسم السائق">
        <input type="tel" id="new-d-phone" class="input-style" placeholder="رقم الهاتف">
        <input type="text" id="new-d-truck" class="input-style" placeholder="رقم الشاحنة">
        <input type="text" id="new-d-sector" class="input-style" placeholder="القطاع (البلدية)">
        <button class="btn-prime" style="background:var(--emerald)" onclick="addNewDriver()">حفظ السائق</button>
        <div id="display-drivers"></div>
    </div>

    <div id="super-admin" style="display:none;">
        <button class="btn-prime" style="background:var(--gold); color:black;" onclick="toggle('mgr-admins')">🔑 إدارة المسؤولين</button>
        <div id="mgr-admins" style="display:none;" class="glass-card">
            <input type="text" id="new-adm-name" class="input-style" placeholder="اسم المسؤول الجديد">
            <button class="btn-prime" style="background:var(--navy)" onclick="addNewAdmin()">إضافة مسؤول</button>
            <div id="display-admins"></div>
        </div>
    </div>
    <button class="btn-prime" style="background:#333;" onclick="navTo('scr-main')">خروج</button>
</div>

<div id="scr-driver" class="screen">
    <h3 id="drv-head" style="color:white; text-align:center;"></h3>
    <div id="driver-tasks"></div>
    <button class="btn-prime" style="background:#333;" onclick="navTo('scr-main')">خروج</button>
</div>

<div class="footer-sig">تصميم وتطوير: د. رابحي فتحي | 2026</div>

<script>
    const firebaseConfig = { databaseURL: "https://medea-green-2026-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();

    let data = { reports: [], drivers: [], admins: ["فتحي"] };
    let tempImg = "", currentUser = "";

    function sync() { rtdb.ref('medea_clean').set(data); }

    function initApp() {
        rtdb.ref('medea_clean').on('value', (snap) => {
            if (snap.exists()) { 
                data = snap.val(); 
                if(!data.admins) data.admins = ["فتحي"];
                if(!data.drivers) data.drivers = [];
                if(!data.reports) data.reports = [];
                updateUI();
            }
        });
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR');
            document.getElementById('date-display').innerText = new Date().toLocaleDateString('ar-DZ');
        }, 1000);
    }

    function processImg(input, type) {
        const reader = new FileReader();
        reader.onload = e => { 
            tempImg = e.target.result;
            if(type === 'citizen') {
                document.getElementById('preview-img').src = tempImg;
                document.getElementById('preview-img').style.display = 'block';
                document.getElementById('cam-placeholder').style.display = 'none';
            } else { alert("📸 تم التقاط صورة النتيجة"); }
        };
        reader.readAsDataURL(input.files[0]);
    }

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude, lng = pos.coords.longitude;
                document.getElementById('inp-geo').value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
                    .then(res => res.json()).then(d => {
                        document.getElementById('inp-addr').value = d.display_name.split(',').slice(0,3).join(',');
                    });
            });
        }
    }

    function sendReport() {
        const addr = document.getElementById('inp-addr').value;
        const geo = document.getElementById('inp-geo').value;
        if(!tempImg || !addr) return alert("الرجاء تصوير النفايات وتحديد العنوان");
        data.reports.push({ id: Date.now(), addr, geo, img: tempImg, status: 'new' });
        sync(); alert("✅ تم الإرسال بنجاح"); location.reload();
    }

    // إصلاح إضافة السائق بكافة بياناته
    function addNewDriver() {
        const name = document.getElementById('new-d-name').value;
        const phone = document.getElementById('new-d-phone').value;
        const truck = document.getElementById('new-d-truck').value;
        const sector = document.getElementById('new-d-sector').value;

        if(name && phone) {
            data.drivers.push({ id: Date.now(), name, phone, truck, sector });
            sync(); alert("✅ تم حفظ السائق");
            document.getElementById('new-d-name').value = ""; document.getElementById('new-d-phone').value = "";
        } else alert("أدخل الإسم والهاتف");
    }

    function addNewAdmin() {
        const name = document.getElementById('new-adm-name').value;
        if(name) { data.admins.push(name); sync(); alert("✅ تم إضافة مسؤول"); }
    }

    function deleteAdmin(name) {
        if(name === "فتحي") return alert("لا يمكن حذف المدير العام");
        if(confirm("حذف المسؤول؟")) { data.admins = data.admins.filter(a => a !== name); sync(); }
    }

    function deleteDriver(id) {
        if(confirm("حذف السائق؟")) { data.drivers = data.drivers.filter(d => d.id !== id); sync(); }
    }

    function deleteReport(id) {
        if(confirm("حذف التقرير؟")) { data.reports = data.reports.filter(r => r.id !== id); sync(); }
    }

    function auth(role) {
        const user = prompt("الإسم:");
        const pass = prompt("الرمز:");
        if(role === 'admin' && data.admins.includes(user) && pass === '1234') { 
            currentUser = user; 
            document.getElementById('super-admin').style.display = (user === "فتحي" ? 'block' : 'none');
            navTo('scr-admin'); 
        } else if(role === 'driver' && pass === '5678') {
            if(data.drivers.find(d => d.name === user)) { currentUser = user; navTo('scr-driver'); }
            else alert("اسم السائق غير مسجل");
        }
    }

    function navTo(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        updateUI();
    }

    function updateUI() {
        // تحديث الإحصائيات
        document.getElementById('s-new').innerText = data.reports.filter(r => r.status === 'new').length;
        document.getElementById('s-done').innerText = data.reports.filter(r => r.status === 'done').length;

        // قائمة البلاغات للإدارة
        document.getElementById('list-reps').innerHTML = data.reports.slice().reverse().map(r => `
            <div class="item-box">
                <i class="fas fa-trash del-btn" onclick="deleteReport(${r.id})"></i>
                <img src="${r.img}" class="rep-img">
                📍 ${r.addr}<br>
                ${r.status === 'new' ? `
                    <select id="assign-${r.id}" class="input-style">
                        <option value="">-- اختر سائقاً --</option>
                        ${data.drivers.map(d => `<option value="${d.name}">${d.name} (${d.sector})</option>`).join('')}
                    </select>
                    <button class="btn-prime" style="background:var(--forest)" onclick="assignTask(${r.id})">إرسال المهمة</button>
                ` : `🚚 السائق: ${r.assignedTo}`}
            </div>`).join('');

        // قائمة السائقين
        document.getElementById('display-drivers').innerHTML = data.drivers.map(d => `
            <div class="item-box" style="border-right-color:var(--forest)">
                <i class="fas fa-user-minus del-btn" onclick="deleteDriver(${d.id})"></i>
                👤 <b>${d.name}</b> | 📞 ${d.phone}<br>🚛 ${d.truck} | 🏛 ${d.sector}
            </div>`).join('');

        // قائمة المسؤولين
        document.getElementById('display-admins').innerHTML = data.admins.map(a => `
            <div style="background:#eee; padding:10px; margin-bottom:5px; border-radius:10px;">
                🔑 ${a} ${a !== 'فتحي' ? `<i class="fas fa-times-circle" style="float:left; color:red; cursor:pointer;" onclick="deleteAdmin('${a}')"></i>` : ""}
            </div>`).join('');
    }

    function assignTask(id) {
        const drv = document.getElementById(`assign-${id}`).value;
        if(drv) {
            const rep = data.reports.find(r => r.id === id);
            rep.status = 'sent'; rep.assignedTo = drv; sync();
            alert("✅ تم توجيه السائق");
        }
    }

    function toggle(id) { const e = document.getElementById(id); e.style.display = e.style.display==='none'?'block':'none'; }
</script>
</body>
</html>
