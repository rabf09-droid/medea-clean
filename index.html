<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدية خضراء 2026</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --glass: rgba(255, 255, 255, 0.95); --gold: #D4AF37; --red: #d21034; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; transition: 0.3s; }
        body { margin: 0; background: #f0f0f0 url('https://w0.peakpx.com/wallpaper/842/630/HD-wallpaper-garbage-truck-garbage-recycling-environment-trucks.jpg') no-repeat center center fixed; background-size: cover; min-height: 100vh; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: -1; }
        .top-bar { background: var(--glass); padding: 15px; text-align: center; border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .live-panel { display: flex; justify-content: space-between; padding: 5px 15px; font-weight: bold; color: var(--emerald); font-size: 0.85rem; }
        .screen { display: none; padding: 20px; padding-bottom: 100px; }
        .active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .glass-card { background: var(--glass); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); text-align: center; cursor: pointer; }
        .btn-prime { border: none; padding: 14px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; color: white; }
        .input-style { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ccc; margin-bottom: 10px; font-size: 0.9rem; }
        #map { height: 250px; border-radius: 20px; border: 3px solid white; margin-bottom: 10px; }
        .item-box { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: right; border-right: 6px solid var(--gold); position: relative; }
        .report-img-view { width: 100%; border-radius: 12px; margin: 10px 0; border: 1px solid #eee; }
        .footer-sig { position: fixed; bottom: 0; width: 100%; background: var(--glass); padding: 12px; text-align: center; font-weight: bold; color: var(--forest); border-top: 2px solid var(--gold); }
    </style>
</head>
<body onload="initApp()">

<div class="top-bar">
    <div>الجمهورية الجزائرية الديمقراطية الشعبية</div>
    <div style="font-size: 1.1rem; font-weight: 700; color: var(--emerald);">بلدية المدية - مصلحة النظافة</div>
    <div class="live-panel"><div id="clock">00:00:00</div><div id="date-display">--</div></div>
</div>

<div id="scr-main" class="screen active">
    <div class="glass-card" onclick="navTo('scr-report')"><i class="fas fa-bullhorn fa-3x" style="color:var(--forest)"></i><h3>تبليغ مواطن جديد</h3></div>
    <div class="glass-card" onclick="auth('admin')"><i class="fas fa-user-shield fa-3x" style="color:var(--emerald)"></i><h3>مصلحة النظافة (الإدارة)</h3></div>
    <div class="glass-card" onclick="auth('driver')"><i class="fas fa-truck-pickup fa-3x" style="color:var(--gold)"></i><h3>واجهة السائق الميداني</h3></div>
    <div class="glass-card" onclick="location.reload()" style="color:var(--red)"><i class="fas fa-power-off fa-2x"></i><h4>خروج</h4></div>
</div>

<div id="scr-report" class="screen">
    <div id="map"></div>
    <input type="text" id="rep-addr" class="input-style" placeholder="العنوان...">
    <input type="text" id="rep-geo" class="input-style" placeholder="الإحداثيات" readonly>
    <label class="btn-prime" style="background:var(--navy);"><i class="fas fa-camera"></i> <span>تصوير النفايات</span> <input type="file" id="img-input" accept="image/*" capture="environment" style="display:none;" onchange="handleImg(this)"></label>
    <div id="img-status" style="display:none; color:var(--emerald); font-weight:bold; margin-bottom:10px; text-align:center;">✅ الصورة جاهزة</div>
    <button class="btn-prime" style="background:var(--emerald);" onclick="submitReport()">إرسال التبليغ</button>
    <button class="btn-prime" style="background:#666;" onclick="navTo('scr-main')">رجوع</button>
</div>

<div id="scr-admin" class="screen">
    <div id="admin-summary" class="glass-card" style="display:flex; justify-content:space-around; padding:10px;">
        <div style="color:var(--red)">جديد: <span id="st-new">0</span></div>
        <div style="color:var(--orange)">محال: <span id="st-sent">0</span></div>
        <div style="color:var(--emerald)">تم: <span id="st-done">0</span></div>
    </div>
    <button class="btn-prime" style="background:var(--navy)" onclick="toggleView('admin-list')">عرض التبليغات</button>
    <div id="admin-list" style="display:none;"></div>
    
    <button class="btn-prime" style="background:var(--forest)" onclick="toggleView('driver-mgr')">إدارة السائقين</button>
    <div id="driver-mgr" style="display:none;" class="glass-card">
        <input type="text" id="d-name" class="input-style" placeholder="اسم السائق">
        <input type="tel" id="d-phone" class="input-style" placeholder="رقم الهاتف">
        <button class="btn-prime" style="background:var(--emerald)" onclick="addDriver()">إضافة سائق</button>
        <div id="d-list-display" style="margin-top:10px;"></div>
    </div>
    <button class="btn-prime" style="background:#333;" onclick="navTo('scr-main')">خروج</button>
</div>

<div id="scr-driver" class="screen">
    <div id="driver-tasks-container"></div>
    <button class="btn-prime" style="background:#333;" onclick="navTo('scr-main')">خروج</button>
</div>

<div class="footer-sig">د. رابحي فتحي | Medea Green 2026</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const firebaseConfig = { databaseURL: "https://medea-green-2026-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();

    let db = { reports: [], drivers: [], admins: ["فتحي"] };
    let map, marker, currentImg = "", tempDriverImg = "";

    function save() { rtdb.ref('medea_data').set(db); }

    function initApp() {
        rtdb.ref('medea_data').on('value', (snap) => {
            if (snap.exists()) {
                db = snap.val();
                updateStats();
                if(document.getElementById('scr-admin').classList.contains('active')) { renderReports(); renderDrivers(); }
            }
        });
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('fr-FR'); 
            document.getElementById('date-display').innerText = now.toLocaleDateString('ar-DZ');
        }, 1000);
    }

    function navTo(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'scr-report') setTimeout(initMap, 500);
        if(id === 'scr-admin') { renderReports(); renderDrivers(); }
    }

    function initMap() {
        if(map) { map.invalidateSize(); return; }
        map = L.map('map').setView([36.2642, 2.7539], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        marker = L.marker([36.2642, 2.7539], {draggable: true}).addTo(map);
        marker.on('dragend', () => {
            const p = marker.getLatLng();
            document.getElementById('rep-geo').value = p.lat.toFixed(6) + "," + p.lng.toFixed(6);
        });
    }

    function handleImg(input) {
        const r = new FileReader();
        r.onload = e => { currentImg = e.target.result; document.getElementById('img-status').style.display='block'; };
        if(input.files[0]) r.readAsDataURL(input.files[0]);
    }

    function submitReport() {
        if(!currentImg) return alert("الرجاء تصوير النفايات أولاً");
        if(!db.reports) db.reports = [];
        db.reports.push({ id: Date.now(), addr: document.getElementById('rep-addr').value || "المدية", geo: document.getElementById('rep-geo').value, img: currentImg, status: 'new', time: new Date().toLocaleString('ar-DZ') });
        save(); alert("تم إرسال التبليغ بنجاح ✅"); navTo('scr-main');
    }

    function auth(role) {
        const user = prompt("الاسم:");
        const pass = prompt("الرمز:");
        if(role === 'admin' && user === "فتحي" && pass === '1234') navTo('scr-admin');
        else if(role === 'driver' && pass === '5678') {
            const d = (db.drivers || []).find(x => x.name === user);
            if(d) { navTo('scr-driver'); renderDriverTasks(user); } else alert("السائق غير مسجل!");
        } else alert("خطأ في البيانات!");
    }

    function addDriver() {
        const n = document.getElementById('d-name').value;
        if(!n) return;
        if(!db.drivers) db.drivers = [];
        db.drivers.push({ id: Date.now(), name: n });
        save(); renderDrivers();
    }

    function renderDrivers() {
        document.getElementById('d-list-display').innerHTML = (db.drivers || []).map(d => `<div style="background:#eee; padding:5px; margin:5px; border-radius:10px;">👤 ${d.name}</div>`).join('');
    }

    function renderReports() {
        const list = document.getElementById('admin-list');
        list.innerHTML = (db.reports || []).slice().reverse().map(r => `
            <div class="item-box">
                <img src="${r.img}" class="report-img-view">
                📍 <b>العنوان:</b> ${r.addr}<br>
                🕒 <b>الوقت:</b> ${r.time}<br>
                <hr>
                ${r.status === 'new' ? `
                    <select id="sel-${r.id}" class="input-style">
                        <option value="">-- اختر سائقاً --</option>
                        ${(db.drivers||[]).map(d=>`<option value="${d.name}">${d.name}</option>`).join('')}
                    </select>
                    <button class="btn-prime" style="background:var(--orange)" onclick="assignTask(${r.id})">إرسال للميدان</button>
                ` : `<b style="color:var(--orange)">محالة إلى: ${r.assignedTo}</b>`}
            </div>`).join('');
    }

    function renderDriverTasks(name) {
        const ts = (db.reports || []).filter(x => x.assignedTo === name && x.status === 'sent');
        document.getElementById('driver-tasks-container').innerHTML = `<h3>مهام السائق: ${name}</h3>` + ts.map(t => `
            <div class="item-box">
                <img src="${t.img}" class="report-img-view">
                📍 <b>الموقع:</b> ${t.addr}<br>
                <button class="btn-prime" style="background:var(--emerald)" onclick="doneTask(${t.id},'${name}')">إتمام المهمة ✅</button>
            </div>`).join('') || "<p>لا توجد مهام حالياً</p>";
    }

    function assignTask(id) {
        const d = document.getElementById(`sel-${id}`).value;
        if(d) {
            const r = db.reports.find(x=>x.id===id);
            r.status='sent'; r.assignedTo=d;
            save(); renderReports();
        }
    }

    function doneTask(id, name) {
        const r = db.reports.find(x=>x.id===id);
        r.status = 'done';
        save(); renderDriverTasks(name);
    }

    function updateStats() {
        if(!db.reports) return;
        document.getElementById('st-new').innerText = db.reports.filter(r => r.status === 'new').length;
        document.getElementById('st-sent').innerText = db.reports.filter(r => r.status === 'sent').length;
        document.getElementById('st-done').innerText = db.reports.filter(r => r.status === 'done').length;
    }

    function toggleView(id) {
        const e = document.getElementById(id);
        e.style.display = e.style.display==='none'?'block':'none';
    }
</script>
</body>
</html>
