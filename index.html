<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظافة المدية 2026 - د. رابحي فتحي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --glass: rgba(255, 255, 255, 0.98); --gold: #D4AF37; --red: #d21034; --orange: #fb8c00; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { margin: 0; background: #eee; }
        .main-bg { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://www.shutterstock.com/shutterstock/photos/1932338633/display_1500/stock-photo-garbage-truck-on-the-street-1932338633.jpg'); background-size: cover; min-height: 100vh; padding-bottom: 180px; }
        .top-bar { background: var(--glass); padding: 15px; text-align: center; border-bottom: 4px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .screen { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--glass); border-radius: 25px; padding: 20px; margin-bottom: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .btn-act { border: none; padding: 15px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; color: white; font-size: 1.1rem; }
        .inp-style { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 10px; text-align: center; }
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: var(--glass); padding: 15px; border-top: 3px solid var(--gold); }
        .lang-flex { display: flex; gap: 5px; margin-bottom: 10px; }
        .lang-btn { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #ccc; background: white; font-size: 0.8rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body onload="initSystem()">
<div class="main-bg">
    <div class="top-bar">
        <div style="font-size: 0.7rem; font-weight: bold;" id="l-country">الجمهورية الجزائرية الديمقراطية الشعبية</div>
        <div style="font-size: 1.4rem; font-weight: 800; color: var(--emerald);" id="l-title">نظافة المدية 2026</div>
        <div style="display: flex; justify-content: space-between; padding: 5px 20px; font-weight: bold; color: var(--navy);">
            <div id="clock">00:00:00</div>
            <div>06 أفريل 2026</div>
        </div>
    </div>

    <div id="scr-home" class="screen active">
        <div class="card" onclick="navTo('scr-report')">
            <i class="fas fa-bullhorn fa-4x" style="color:var(--forest)"></i>
            <h2 id="l-btn-rep">التبليغ</h2>
        </div>
        <div class="card" onclick="login('admin')">
            <i class="fas fa-user-shield fa-4x" style="color:var(--emerald)"></i>
            <h2 id="l-btn-adm">الإدارة</h2>
        </div>
        <div class="card" onclick="login('driver')">
            <i class="fas fa-truck fa-4x" style="color:var(--gold)"></i>
            <h2 id="l-btn-drv">السائق</h2>
        </div>
        <div class="nav-bottom">
            <div class="lang-flex">
                <button class="lang-btn" onclick="changeLang('ar')">العربية</button>
                <button class="lang-btn" onclick="changeLang('fr')">Français</button>
                <button class="lang-btn" onclick="changeLang('en')">English</button>
            </div>
            <button class="btn-act" style="background:var(--red); margin:0;" onclick="location.reload()" id="l-btn-exit"><i class="fas fa-power-off"></i> خروج</button>
        </div>
    </div>

    <div id="scr-report" class="screen">
        <div class="card">
            <div id="preview-box" style="height:200px; border:2px dashed #aaa; border-radius:15px; margin-bottom:15px; display:flex; align-items:center; justify-content:center; background:#fff; overflow:hidden;">
                <i id="cam-icon" class="fas fa-camera fa-3x" style="color:#ccc"></i>
                <img id="img-tag" style="width:100%; height:100%; object-fit:cover; display:none;">
            </div>
            <label class="btn-act" style="background:var(--navy);">
                <i class="fas fa-camera"></i> <span id="l-take-pic">تصوير النفايات</span>
                <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="processPic(this, 'citizen')">
            </label>
            <button class="btn-act" style="background:var(--forest);" onclick="getGPS()"><i class="fas fa-map-marker-alt"></i> <span id="l-get-gps">تحديد الموقع</span></button>
            <input type="text" id="in-addr" class="inp-style" placeholder="العنوان...">
            <input type="text" id="in-gps" class="inp-style" readonly placeholder="الإحداثيات">
            <button class="btn-act" style="background:var(--emerald);" onclick="sendNow()"><i class="fas fa-paper-plane"></i> <span id="l-send">إرسال التبليغ فوراً</span></button>
            <button class="btn-act" style="background:#666;" onclick="navTo('scr-home')">رجوع</button>
        </div>
    </div>
        <div id="scr-admin" class="screen">
        <div style="display: flex; gap: 8px; margin-bottom: 20px;">
            <div style="flex:1; background:var(--red); color:white; padding:10px; border-radius:15px; text-align:center; font-size:0.8rem;">
                <i class="fas fa-plus-circle"></i> جديد<br><b id="st-1" style="font-size:1.2rem;">0</b>
            </div>
            <div style="flex:1; background:var(--orange); color:white; padding:10px; border-radius:15px; text-align:center; font-size:0.8rem;">
                <i class="fas fa-truck-loading"></i> مرسل<br><b id="st-2" style="font-size:1.2rem;">0</b>
            </div>
            <div style="flex:1; background:var(--forest); color:white; padding:10px; border-radius:15px; text-align:center; font-size:0.8rem;">
                <i class="fas fa-check-double"></i> تم<br><b id="st-3" style="font-size:1.2rem;">0</b>
            </div>
        </div>

        <button class="btn-act" style="background:var(--navy)" onclick="toggleView('box-reps')">📦 البلاغات</button>
        <div id="box-reps" style="display:none;"></div>

        <button class="btn-act" style="background:var(--forest)" onclick="toggleView('box-drvs')">🚛 إدارة السائقين</button>
        <div id="box-drvs" style="display:none;" class="card">
            <input type="text" id="drv-n" class="inp-style" placeholder="اسم السائق">
            <input type="tel" id="drv-p" class="inp-style" placeholder="رقم الهاتف">
            <input type="text" id="drv-t" class="inp-style" placeholder="رقم الشاحنة">
            <select id="drv-s" class="inp-style"><option>البلدية</option><option>القطاع الخاص</option></select>
            <button class="btn-act" style="background:var(--emerald)" onclick="addDriver()">حفظ وتصفير الحقول</button>
            <div id="ui-drvs-list"></div>
        </div>

        <div id="super-admin" style="display:none;">
            <button class="btn-act" style="background:var(--gold); color:black;" onclick="toggleView('box-adms')">🔑 المسؤولين</button>
            <div id="box-adms" style="display:none;" class="card">
                <input type="text" id="adm-n" class="inp-style" placeholder="اسم المسؤول">
                <button class="btn-act" style="background:var(--navy)" onclick="addAdmin()">إضافة وتصفير</button>
                <div id="ui-adms-list"></div>
            </div>
        </div>
        <button class="btn-act" style="background:#444;" onclick="navTo('scr-home')">رجوع</button>
    </div>

    <div id="scr-driver" class="screen">
        <div id="drv-info" class="card" style="background:var(--emerald); color:white;"></div>
        <div id="drv-jobs"></div>
        <button class="btn-act" style="background:#444;" onclick="navTo('scr-home')">خروج</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://medea-smart-clean-2026-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();

    let data = { reports: [], drivers: [], admins: ["فتحي"] };
    let tempC = "", tempD = "", currentName = "";

    function push() { rtdb.ref('PRO_SYNC_V11').set(data); }

    function initSystem() {
        rtdb.ref('PRO_SYNC_V11').on('value', (s) => { if(s.exists()){ data=s.val(); render(); } });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
    }

    function changeLang(l) {
        const dict = {
            ar: {c:"الجمهورية الجزائرية الديمقراطية الشعبية", t:"نظافة المدية 2026", r:"التبليغ", a:"الإدارة", d:"السائق", e:"خروج", p:"تصوير النفايات", g:"تحديد الموقع", s:"إرسال التبليغ فوراً"},
            fr: {c:"République Algérienne", t:"Médéa Propre 2026", r:"Signalement", a:"Admin", d:"Chauffeur", e:"Quitter", p:"Prendre Photo", g:"Localiser", s:"Envoyer"},
            en: {c:"People's Democratic Republic", t:"Clean Medea 2026", r:"Reporting", a:"Management", d:"Driver", e:"Exit", p:"Take Photo", g:"Get GPS", s:"Send Now"}
        };
        document.getElementById('l-country').innerText = dict[l].c;
        document.getElementById('l-title').innerText = dict[l].t;
        document.getElementById('l-btn-rep').innerText = dict[l].r;
        document.getElementById('l-btn-adm').innerText = dict[l].a;
        document.getElementById('l-btn-drv').innerText = dict[l].d;
        document.getElementById('l-btn-exit').innerHTML = `<i class="fas fa-power-off"></i> ${dict[l].e}`;
        document.getElementById('l-take-pic').innerText = dict[l].p;
        document.getElementById('l-get-gps').innerText = dict[l].g;
        document.getElementById('l-send').innerText = dict[l].s;
    }

    // الدالة السحرية لضغط الصورة لضمان وصولها في ثوانٍ
    function processPic(input, user) {
        const reader = new FileReader();
        reader.onload = e => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 500; // تقليل الحجم لضمان الإرسال
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * (MAX_WIDTH / img.width);
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                const compressed = canvas.toDataURL('image/jpeg', 0.6); // ضغط 60%
                if(user === 'citizen') {
                    tempC = compressed; document.getElementById('img-tag').src = compressed;
                    document.getElementById('img-tag').style.display='block'; document.getElementById('cam-icon').style.display='none';
                } else { tempD = compressed; alert("📸 تم حفظ صورة الإنجاز"); }
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }

    function getGPS() {
        navigator.geolocation.getCurrentPosition(p => {
            const lat = p.coords.latitude, lng = p.coords.longitude;
            document.getElementById('in-gps').value = `${lat.toFixed(6)},${lng.toFixed(6)}`;
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
            .then(r => r.json()).then(d => { document.getElementById('in-addr').value = d.display_name.split(',').slice(0,3).join(','); });
        });
    }

    function sendNow() {
        const ad = document.getElementById('in-addr').value, ge = document.getElementById('in-gps').value;
        if(!tempC || !ad) return alert("يرجى التصوير وتحديد الموقع");
        const rep = { id: Date.now(), img: tempC, addr: ad, geo: ge, time: new Date().toLocaleTimeString('fr-FR'), date: "06 أفريل 2026", status: 'new' };
        if(!data.reports) data.reports = [];
        data.reports.push(rep); push(); alert("✅ تم وصول التبليغ للإدارة"); location.reload();
    }

    function login(role) {
        const u = prompt("الاسم:"), p = prompt("الرمز:");
        if(role==='admin' && (data.admins||[]).includes(u) && p==='1234') { currentName=u; document.getElementById('super-admin').style.display=(u==="فتحي"?'block':'none'); navTo('scr-admin'); }
        else if(role==='driver' && p==='5678') {
            const d = (data.drivers||[]).find(x => x.name === u);
            if(d) { currentName=u; document.getElementById('drv-info').innerHTML = `<h3>${u}</h3><p>🚛 ${d.truck}</p>`; navTo('scr-driver'); }
            else alert("غير مسجل");
        }
    }

    function navTo(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); render(); }

    function render() {
        const rs = data.reports || [];
        document.getElementById('st-1').innerText = rs.filter(r => r.status === 'new').length;
        document.getElementById('st-2').innerText = rs.filter(r => r.status === 'sent').length;
        document.getElementById('st-3').innerText = rs.filter(r => r.status === 'done').length;

        document.getElementById('box-reps').innerHTML = rs.slice().reverse().map(r => `
            <div class="card" style="text-align:right;">
                <img src="${r.img}" style="width:100%; border-radius:15px; height:150px; object-fit:cover;">
                <p>📍 ${r.addr}</p><p>🕒 ${r.time} | 📅 ${r.date}</p>
                ${r.status === 'new' ? `
                    <select id="s-${r.id}" class="inp-style">
                        <option value="">اختر سائق لإرسال الملف...</option>
                        ${(data.drivers||[]).map(d => `<option value="${d.name}">${d.name}</option>`).join('')}
                    </select>
                    <button class="btn-act" style="background:var(--forest)" onclick="assign(${r.id})">إرسال المهمة كاملة</button>
                ` : `<p style="color:var(--orange)">🚚 في عهدة: ${r.assignedTo}</p>`}
                <button style="color:red; background:none; border:none;" onclick="delItem('rep', ${r.id})"><i class="fas fa-trash"></i> حذف</button>
            </div>
        `).join('');

        document.getElementById('ui-drvs-list').innerHTML = (data.drivers||[]).map(d => `<div style="background:#eee; padding:10px; margin-top:5px; border-radius:10px; text-align:right;">${d.name} | ${d.truck} <i class="fas fa-trash" style="color:red; float:left;" onclick="delItem('drv', ${d.id})"></i></div>`).join('');
        document.getElementById('ui-adms-list').innerHTML = (data.admins||[]).map(a => `<div style="background:#eee; padding:10px; margin-top:5px; border-radius:10px;">🔑 ${a} ${a!=='فتحي'?`<i class="fas fa-times" style="color:red; float:left;" onclick="delItem('adm', '${a}')"></i>`:''}</div>`).join('');

        const tasks = rs.filter(r => r.assignedTo === currentName && r.status === 'sent');
        document.getElementById('drv-jobs').innerHTML = tasks.map(r => `
            <div class="card" style="border:3px solid var(--orange); text-align:right;">
                <h3 style="color:var(--red)">مهمة جديدة:</h3>
                <img src="${r.img}" style="width:100%; border-radius:15px;">
                <p>📍 العنوان: ${r.addr}</p><p>🕒 الوقت: ${r.time} | ${r.date}</p>
                <button class="btn-act" style="background:var(--navy)" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${r.geo}')"><i class="fas fa-map-marked-alt"></i> الزاوج إلى الخريطة (GPS)</button>
                <label class="btn-act" style="background:var(--gold);">📷 تصوير النتيجة <input type="file" capture="environment" style="display:none;" onchange="processPic(this, 'driver')"></label>
                <button class="btn-act" style="background:var(--emerald)" onclick="done(${r.id})">تأكيد التنظيف</button>
            </div>
        `).join('');
    }

    function addDriver() {
        const n=document.getElementById('drv-n').value, p=document.getElementById('drv-p').value;
        if(n && p) { if(!data.drivers) data.drivers=[]; data.drivers.push({id:Date.now(), name:n, phone:p, truck:document.getElementById('drv-t').value, sector:document.getElementById('drv-s').value}); push(); document.getElementById('drv-n').value=""; document.getElementById('drv-p').value=""; alert("✅ تم الحفظ وتصفير الحقول"); }
    }

    function addAdmin() { const n=document.getElementById('adm-n').value; if(n){ if(!data.admins) data.admins=[]; data.admins.push(n); push(); document.getElementById('adm-n').value=""; alert("✅ تمت الإضافة وتصفير الحقل"); } }

    function assign(id) { const d=document.getElementById('s-'+id).value; if(d){ const r=data.reports.find(x=>x.id===id); r.status='sent'; r.assignedTo=d; push(); alert("🚀 تم تحويل الملف كاملاً للسائق"); } }
    function done(id) { if(!tempD) return alert("صور الإنجاز أولاً"); const r=data.reports.find(x=>x.id===id); r.status='done'; r.doneImg=tempD; push(); alert("✅ أحسنت"); }
    function delItem(t, id) { if(confirm("حذف؟")) { if(t==='rep') data.reports=data.reports.filter(x=>x.id!==id); if(t==='drv') data.drivers=data.drivers.filter(x=>x.id!==id); if(t==='adm') data.admins=data.admins.filter(x=>x!==id); push(); } }
    function toggleView(id) { const e=document.getElementById(id); e.style.display=e.style.display==='none'?'block':'none'; }
</script>
</body>
                                                                                                                      </html>
