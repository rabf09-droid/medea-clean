<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المدية نظيفة 2026 - النسخة الرسمية</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --gold: #D4AF37; --red: #d21034; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        
        body { 
            margin: 0; min-height: 100vh;
            background: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.8)), 
                        url('https://raw.githubusercontent.com/rabf09-droid/rabf09-droid.github.io/main/1000052240.webp');
            background-size: cover; background-position: center; background-attachment: fixed;
            display: flex; justify-content: center;
        }

        .app-container {
            width: 100%; max-width: 450px; background: rgba(255,255,255,0.7);
            min-height: 100vh; position: relative; border: 1px solid #ddd;
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
        }

        .header { background: #fff; padding: 15px; text-align: center; border-bottom: 5px solid var(--gold); border-top: 8px solid var(--forest); }
        .page { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: white; border-radius: 20px; padding: 15px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        .btn { border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; color: white; }
        .input { width: 100%; padding: 12px; border-radius: 10px; border: 1.5px solid #ddd; margin-bottom: 10px; text-align: center; }

        /* أيقونة التبليغ الكبرى التي طلبتها */
        .giant-btn {
            background: var(--forest); height: 220px; flex-direction: column; border-radius: 35px;
            font-size: 1.8rem; box-shadow: 0 10px 25px rgba(46, 125, 50, 0.3); border: 4px solid white;
        }
        .giant-btn i { font-size: 6rem; margin-bottom: 10px; }

        .stat-circle { width: 55px; height: 55px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; margin: auto; }
        .report-img { width: 100%; border-radius: 15px; border: 2px solid var(--emerald); }
    </style>
</head>
<body onload="initApp()">

<div class="app-container">
    <div class="header">
        <div style="font-size: 0.7rem; font-weight: bold;">الجمهورية الجزائرية الديمقراطية الشعبية</div>
        <div style="font-size: 1.4rem; font-weight: 900; color: var(--emerald);">المـديـة نظيـفة 2026</div>
        <div id="clock" style="font-weight: bold; color: var(--navy);">00:00:00</div>
    </div>

    <div id="pg-home" class="page active">
        <div style="text-align: center; margin: 40px 0;">
            <button class="btn giant-btn" onclick="navTo('pg-report')">
                <i class="fas fa-truck-loading"></i>
                <span id="txt-main-btn">إرسال تبليغ عن نفايات</span>
            </button>
        </div>

        <div style="margin-top: 60px; border-top: 2px solid var(--gold); padding-top: 20px;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn" style="background:var(--navy)" onclick="auth('admin')"><i class="fas fa-user-shield"></i> الإدارة</button>
                <button class="btn" style="background:var(--gold)" onclick="auth('driver')"><i class="fas fa-truck"></i> السائق</button>
            </div>
            <div style="text-align: center; margin-top: 15px; font-size: 0.8rem;">
                <span onclick="setLang('ar')" style="cursor:pointer; font-weight:bold;">عربي</span> | 
                <span onclick="setLang('fr')" style="cursor:pointer;">Fr</span> | 
                <span onclick="setLang('en')" style="cursor:pointer;">En</span>
            </div>
        </div>
    </div>

    <div id="pg-report" class="page">
        <div class="card">
            <div id="cam-box" style="height:200px; border:2px dashed #ccc; border-radius:15px; display:flex; align-items:center; justify-content:center; background:#f9f9f9; overflow:hidden; margin-bottom:10px;">
                <i id="ico-cam" class="fas fa-camera fa-4x" style="color:#ccc"></i>
                <img id="out-img" style="width:100%; height:100%; object-fit:cover; display:none;">
            </div>
            <label class="btn" style="background:var(--navy);"><i class="fas fa-camera"></i> التقاط صورة<input type="file" accept="image/*" capture="environment" style="display:none;" onchange="handleImg(this, 'cit')"></label>
            <button class="btn" style="background:var(--forest);" onclick="getLoc()"><i class="fas fa-map-marker-alt"></i> تحديد الموقع</button>
            <input type="text" id="in-addr" class="input" placeholder="اسم الحي">
            <input type="text" id="in-gps" class="input" readonly placeholder="الإحداثيات">
            <button class="btn" style="background:var(--emerald); height: 60px;" onclick="sendReport()">إرسال الآن</button>
            <button class="btn" style="background:#666;" onclick="navTo('pg-home')">إلغاء</button>
        </div>
    </div>

    <div id="pg-admin" class="page">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3>لوحة الإدارة</h3>
            <button class="btn" style="background:var(--red); width:auto; padding:5px 15px;" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; text-align: center; margin-bottom: 15px;">
            <div><div class="stat-circle" style="background:var(--red);" id="s1">0</div><small>جديد</small></div>
            <div><div class="stat-circle" style="background:orange;" id="s2">0</div><small>مرسل</small></div>
            <div><div class="stat-circle" style="background:var(--forest);" id="s3">0</div><small>منجز</small></div>
        </div>

        <div id="admin-feed"></div>

        <div class="card">
            <h4>إضافة سائق / مسؤول</h4>
            <input id="new-n" class="input" placeholder="الاسم">
            <input id="new-p" class="input" placeholder="الهاتف">
            <select id="new-t" class="input"><option value="driver">سائق</option><option value="admin">مسؤول</option></select>
            <button class="btn" style="background:var(--emerald)" onclick="addNewUser()">إضافة</button>
            <div id="users-list" style="font-size: 0.8rem; margin-top: 10px;"></div>
        </div>
    </div>

    <div id="pg-driver" class="page">
        <div id="dr-header" class="card" style="background:var(--emerald); color:white; text-align:center;"></div>
        <div id="dr-tasks"></div>
        <button class="btn" style="background:#444;" onclick="navTo('pg-home')">خروج</button>
    </div>

    <div style="text-align: center; padding: 20px; font-size: 0.7rem; color: #888;">بلدية المدية 2026 ©</div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://medea-smart-v11-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let appData = { reports: [], drivers: [], admins: ["فتحي"] };
    let tempImgCit = "", tempImgDrv = "", curUser = "";

    function initApp() {
        db.ref('V11_ROOT').on('value', s => { if(s.exists()){ appData=s.val(); updateUI(); } });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
    }

    function handleImg(input, role) {
        const r = new FileReader();
        r.onload = e => {
            if(role==='cit') { tempImgCit = e.target.result; document.getElementById('out-img').src=tempImgCit; document.getElementById('out-img').style.display='block'; document.getElementById('ico-cam').style.display='none'; }
            else { tempImgDrv = e.target.result; alert("تم التقاط صورة الإنجاز"); }
        };
        r.readAsDataURL(input.files[0]);
    }

    function getLoc() {
        navigator.geolocation.getCurrentPosition(p => {
            document.getElementById('in-gps').value = p.coords.latitude.toFixed(5) + "," + p.coords.longitude.toFixed(5);
            document.getElementById('in-addr').value = "حي بوسط المدية";
        });
    }

    function sendReport() {
        if(!tempImgCit || !document.getElementById('in-addr').value) return alert("أكمل البيانات");
        const rep = {
            id: Date.now(), img: tempImgCit, addr: document.getElementById('in-addr').value, gps: document.getElementById('in-gps').value,
            time: new Date().toLocaleTimeString('fr-FR'), date: "07 أفريل 2026", status: 'new'
        };
        if(!appData.reports) appData.reports = [];
        appData.reports.push(rep);
        db.ref('V11_ROOT').set(appData).then(() => {
            alert("تم الإرسال شكراً على تفاعلك");
            location.reload(); 
        });
    }

    function updateUI() {
        const rs = appData.reports || [];
        document.getElementById('s1').innerText = rs.filter(r=>r.status==='new').length;
        document.getElementById('s2').innerText = rs.filter(r=>r.status==='sent').length;
        document.getElementById('s3').innerText = rs.filter(r=>r.status==='done').length;

        document.getElementById('admin-feed').innerHTML = rs.slice().reverse().map(r => `
            <div class="card" style="border-right: 8px solid ${r.status==='done'?'green':(r.status==='sent'?'orange':'red')}">
                <div style="display:flex; justify-content:space-between;"><b>${r.time}</b><i class="fas fa-trash" style="color:red" onclick="delItem(${r.id})"></i></div>
                <img src="${r.img}" class="report-img">
                <p>📍 ${r.addr}</p>
                ${r.status==='new' ? `<button class="btn" style="background:var(--forest)" onclick="assign(${r.id})">توجيه للسائق</button>` : `<small>المكلف: ${r.driver}</small>`}
                ${r.status==='done' ? `<img src="${r.doneImg}" class="report-img" style="border-color:green">` : ''}
            </div>
        `).join('');

        if(curUser) {
            document.getElementById('dr-header').innerText = "السائق: " + curUser;
            const tasks = rs.filter(r => r.driver === curUser && r.status === 'sent');
            document.getElementById('dr-tasks').innerHTML = tasks.length ? tasks.map(t => `
                <div class="card">
                    <img src="${t.img}" class="report-img">
                    <p>📍 ${t.addr}<br>⏰ ${t.time} | ${t.date}</p>
                    <button class="btn" style="background:var(--navy)" onclick="window.open('https://www.google.com/maps?q=${t.gps}')"><i class="fas fa-map-marker-alt"></i> الخريطة</button>
                    <label class="btn" style="background:var(--gold)"><i class="fas fa-camera"></i> تصوير التنفيذ<input type="file" capture="environment" style="display:none" onchange="handleImg(this, 'dr')"></label>
                    <button class="btn" style="background:var(--forest)" onclick="finish(${t.id})">تم الإنجاز</button>
                </div>
            `).join('') : '<p>لا توجد مهام</p>';
        }
    }

    function auth(role) {
        const u = prompt("الاسم:"), p = prompt("الرمز:");
        if(role==='admin' && p==='1234') navTo('pg-admin');
        else if(role==='driver' && p==='5678') { curUser=u; navTo('pg-driver'); }
    }

    function assign(id) {
        const n = prompt("اسم السائق:");
        if(n) {
            const r = appData.reports.find(x=>x.id===id);
            r.status='sent'; r.driver=n;
            db.ref('V11_ROOT').set(appData);
        }
    }

    function finish(id) {
        if(!tempImgDrv) return alert("صور النتيجة أولاً");
        const r = appData.reports.find(x=>x.id===id);
        r.status='done'; r.doneImg=tempImgDrv;
        db.ref('V11_ROOT').set(appData).then(()=>alert("تم بنجاح"));
    }

    function logout() { document.getElementById('admin-feed').innerHTML=""; navTo('pg-home'); }
    function navTo(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function setLang(l) { 
        const t = { ar: "إرسال تبليغ عن نفايات", fr: "Signaler des déchets", en: "Report Waste" };
        document.getElementById('txt-main-btn').innerText = t[l];
    }
</script>
</body>
</html>
