<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المدية نظيفة 2026</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --gold: #D4AF37; --red: #d21034; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { margin: 0; min-height: 100vh; background: linear-gradient(135deg, rgba(27,94,32,0.2) 0%, rgba(255,255,255,0.9) 50%, rgba(210,16,52,0.2) 100%), url('https://raw.githubusercontent.com/rabf09-droid/rabf09-droid.github.io/main/1000052240.webp'); background-size: cover; background-position: center; background-attachment: fixed; }

        .header { background: rgba(255,255,255,0.95); padding: 10px; text-align: center; border-bottom: 5px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .page { display: none; padding: 15px; max-width: 800px; margin: auto; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn { border: none; padding: 15px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; color: white; font-size: 1.1rem; transition: 0.3s; }
        .input { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 10px; text-align: center; font-size: 1rem; }

        /* أيقونات الإدارة الكبيرة 180px */
        .admin-nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .nav-card-btn { height: 180px; border-radius: 30px; border: none; color: white; font-size: 1.4rem; font-weight: 900; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .nav-card-btn i { font-size: 4.5rem; }

        /* واجهة الشكر */
        #thanks-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--forest); color:white; flex-direction:column; align-items:center; justify-content:center; z-index:100000; text-align:center; padding: 20px; }
        .thanks-box { background: white; color: #333; padding: 15px; border-radius: 20px; width: 90%; max-width: 400px; text-align: right; margin-top: 15px; }

        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; }
        .modal-content { background:white; padding:30px; border-radius:30px; width:90%; max-width:400px; }
        .footer { background: white; padding: 15px; text-align: center; border-top: 4px solid var(--gold); margin-top: 10px; }
    </style>
</head>
<body onload="initApp()">

<div id="thanks-overlay">
    <i class="fas fa-heart fa-5x" style="color:var(--gold);"></i>
    <h1 style="font-size:1.8rem;">شكراً! معاً سنجعل بيئتنا نظيفة</h1>
    <div id="thanks-data" class="thanks-box"></div>
    <button class="btn" style="background:var(--navy); width:150px; margin-top:20px;" onclick="location.reload()">إغلاق</button>
</div>

<div class="header">
    <div style="font-size: 1.5rem; font-weight: 900; color: var(--emerald);">المـديـة نظيـفة 2026</div>
    <div style="display: flex; justify-content: space-around; font-weight: bold; margin-top: 5px;">
        <div id="clock">00:00:00</div>
        <div id="date-now">--/--/2026</div>
    </div>
</div>

<div id="pg-home" class="page active">
    <button class="btn" style="background:var(--forest); height: 230px; flex-direction: column; border-radius: 50px; font-size: 2rem; border: 5px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 20px;" onclick="navTo('pg-report')">
        <i class="fas fa-truck-loading" style="font-size: 6rem;"></i> إرســـــال تبلـيـــغ
    </button>
    <div class="card" style="background: rgba(255,255,255,0.7);">
        <p style="text-align:center; font-weight:bold;">رواق الموظفين</p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn" style="background:var(--navy); height: 60px;" onclick="auth('admin')">الإدارة</button>
            <button class="btn" style="background:var(--gold); height: 60px;" onclick="auth('driver')">السائقين</button>
        </div>
    </div>
</div>

<div id="pg-report" class="page">
    <div class="card">
        <div style="height:200px; border:3px dashed #ccc; border-radius:20px; display:flex; align-items:center; justify-content:center; overflow:hidden; margin-bottom:15px; position:relative; background:#eee;">
            <img id="out-img" style="width:100%; height:100%; object-fit:cover; display:none;">
            <label id="cam-label" style="background:var(--navy); color:white; padding:10px 20px; border-radius:15px; cursor:pointer;"><i class="fas fa-camera"></i> تصوير النفايات <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="handleImg(this)"></label>
        </div>
        <button class="btn" style="background:var(--forest); margin-bottom:10px;" onclick="getLoc()">تحديد الموقع</button>
        <input type="text" id="in-addr" class="input" placeholder="العنوان أو الحي">
        <input type="text" id="in-gps" class="input" readonly placeholder="إحداثيات GPS">
        <button id="send-btn" class="btn" style="background:var(--emerald); height: 70px;" onclick="sendReport()">إرسال البلاغ</button>
        <button class="btn" style="background:#888; margin-top:10px;" onclick="navTo('pg-home')">رجوع</button>
    </div>
</div>

<div id="pg-admin" class="page">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 style="margin:0;">الإدارة</h2>
        <button class="btn" style="background:var(--red); width:auto; padding:5px 15px;" onclick="location.reload()">خروج</button>
    </div>
    <div class="admin-nav-grid">
        <button class="nav-card-btn" style="background:orange;" onclick="showAdminList('new')"><i class="fas fa-exclamation-triangle"></i> البلاغات</button>
        <button class="nav-card-btn" style="background:var(--forest);" onclick="showAdminList('done')"><i class="fas fa-check-double"></i> المنجزة</button>
    </div>
    <div id="admin-list-container"></div>
    <div class="card" style="border: 2px solid blue;">
        <button class="btn" style="background:blue;" onclick="openStaffModal()">+ إضافة مسؤول أو سائق</button>
        <div id="staff-list-ui" style="margin-top:10px; font-size:0.8rem;"></div>
    </div>
</div>

<div id="pg-driver" class="page">
    <div id="dr-header" class="card" style="background:var(--emerald); color:white; text-align:center;"></div>
    <div id="dr-tasks"></div>
    <button class="btn" style="background:#444;" onclick="location.reload()">خروج</button>
</div>

<div id="staff-modal" class="modal">
    <div class="modal-content">
        <h3>إضافة جديد</h3>
        <select id="st-role" class="input" onchange="toggleFields()">
            <option value="سائق">سائق</option>
            <option value="مسؤول">مسؤول</option>
        </select>
        <input type="text" id="st-name" class="input" placeholder="الاسم الكامل">
        <input type="text" id="st-phone" class="input" placeholder="رقم الهاتف">
        <div id="dr-only">
            <input type="text" id="st-truck" class="input" placeholder="رقم الشاحنة">
            <select id="st-sector" class="input"><option value="بلدية">بلدية</option><option value="خاص">خاص</option></select>
        </div>
        <button class="btn" style="background:var(--forest)" onclick="saveStaff()">حفظ وتصفير الخانات</button>
        <button class="btn" style="background:var(--red); margin-top:5px;" onclick="closeStaffModal()">إلغاء</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://medea-clean-2026-v4-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let appData = { reports: [], staff: [] }, curUser = "", tempImg = "";

    function initApp() {
        db.ref('CLEAN_MEDEA_FINAL').on('value', snap => { if(snap.exists()) appData = snap.val(); updateUI(); });
        setInterval(() => { 
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-DZ'); 
            document.getElementById('date-now').innerText = new Date().toLocaleDateString('ar-DZ');
        }, 1000);
    }

    function navTo(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    function handleImg(input) {
        const reader = new FileReader();
        reader.onload = e => {
            tempImg = e.target.result;
            document.getElementById('out-img').src = tempImg;
            document.getElementById('out-img').style.display = 'block';
            document.getElementById('cam-label').style.display = 'none';
        };
        reader.readAsDataURL(input.files[0]);
    }

    function getLoc() {
        navigator.geolocation.getCurrentPosition(p => {
            const lat = p.coords.latitude.toFixed(6), lng = p.coords.longitude.toFixed(6);
            document.getElementById('in-gps').value = lat + "," + lng;
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=ar`).then(r=>r.json()).then(d=>{
                document.getElementById('in-addr').value = d.display_name.split(',').slice(0,3).join(',');
            });
        });
    }

    function sendReport() {
        const addr = document.getElementById('in-addr').value;
        if(!tempImg || !addr) return alert("الصورة والعنوان مطلوبان");
        const rep = { id: Date.now(), img: tempImg, addr: addr, gps: document.getElementById('in-gps').value, time: new Date().toLocaleTimeString('ar-DZ'), date: new Date().toLocaleDateString('ar-DZ'), status: 'new' };
        if(!appData.reports) appData.reports = [];
        appData.reports.push(rep);
        db.ref('CLEAN_MEDEA_FINAL').set(appData).then(() => {
            document.getElementById('thanks-data').innerHTML = `<img src="${rep.img}" style="width:100%; border-radius:10px;"><br>📍 ${rep.addr}<br>🕒 ${rep.time}`;
            document.getElementById('thanks-overlay').style.display = 'flex';
        });
    }

    // الدخول بالاسم فقط (سواء مسؤول أو سائق)
    function auth(role) {
        const name = prompt("أدخل اسمك الكامل المسجل:");
        if(!name) return;
        const isFathi = (name === "فتحي");
        const found = (appData.staff || []).find(s => s.name === name && (role === 'admin' ? s.role === 'مسؤول' : s.role === 'سائق'));
        if(isFathi || found) {
            curUser = name;
            navTo(role === 'admin' ? 'pg-admin' : 'pg-driver');
            updateUI();
        } else { alert("الاسم غير مسجل في قائمة " + role); }
    }

    // تصفير الخانات فور الحفظ
    function saveStaff() {
        const n = document.getElementById('st-name'), p = document.getElementById('st-phone'), t = document.getElementById('st-truck');
        const s = { role: document.getElementById('st-role').value, name: n.value, phone: p.value, truck: t.value || '---', sector: document.getElementById('st-sector').value };
        if(!s.name) return alert("الاسم مطلوب");
        if(!appData.staff) appData.staff = [];
        appData.staff.push(s);
        db.ref('CLEAN_MEDEA_FINAL').set(appData).then(() => {
            n.value = ""; p.value = ""; t.value = ""; // التصفير هنا
            alert("تمت الإضافة وتصفير الخانات بنجاح");
            closeStaffModal();
        });
    }

    function updateUI() {
        const list = document.getElementById('staff-list-ui');
        if(list) list.innerHTML = "<b>المسجلون:</b> " + (appData.staff || []).map(s => s.name).join(' - ');

        if(curUser && document.getElementById('pg-driver').classList.contains('active')) {
            const tasks = (appData.reports || []).filter(r => r.driverName === curUser && r.status === 'sent');
            document.getElementById('dr-header').innerHTML = `<h3>مرحباً ${curUser}</h3>`;
            document.getElementById('dr-tasks').innerHTML = tasks.map(t => `
                <div class="card"><img src="${t.img}" style="width:100%;"><p>📍 ${t.addr}</p>
                <button class="btn" style="background:orange" onclick="finishTask(${t.id})">إتمام المهمة</button></div>
            `).join('') || "لا مهام حالية.";
        }
    }

    function showAdminList(type) {
        const container = document.getElementById('admin-list-container');
        const filtered = (appData.reports || []).filter(r => type === 'new' ? r.status !== 'done' : r.status === 'done');
        container.innerHTML = filtered.map(r => `
            <div class="card" style="border-right:10px solid ${type==='done'?'green':'red'}">
                <img src="${r.img}" style="width:80px; height:80px; object-fit:cover; border-radius:10px;">
                <p>📍 ${r.addr}<br>🕒 ${r.time}</p>
                ${r.status==='new' ? `<button class="btn" style="background:var(--forest)" onclick="assignTo(${r.id})">توجيه لسائق</button>` : `<p style="color:green">بواسطة: ${r.driverName}</p>`}
            </div>
        `).join('');
    }

    function assignTo(id) {
        const name = prompt("أدخل اسم السائق المكلف:");
        if(name) {
            const r = appData.reports.find(x => x.id === id);
            r.status = 'sent'; r.driverName = name;
            db.ref('CLEAN_MEDEA_FINAL').set(appData);
        }
    }

    function finishTask(id) {
        const r = appData.reports.find(x => x.id === id);
        r.status = 'done';
        db.ref('CLEAN_MEDEA_FINAL').set(appData).then(() => alert("تم الإنجاز"));
    }

    function openStaffModal() { document.getElementById('staff-modal').style.display = 'flex'; }
    function closeStaffModal() { document.getElementById('staff-modal').style.display = 'none'; }
    function toggleFields() { document.getElementById('dr-only').style.display = document.getElementById('st-role').value==='سائق'?'block':'none'; }
</script>
</body>
</html>
