<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المدية نظيفة 2026</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --gold: #D4AF37; --navy: #14213D; --red: #d21034; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { margin: 0; background: url('https://raw.githubusercontent.com/rabf09-droid/rabf09-droid.github.io/main/1000052240.webp') fixed center/cover; }
        
        .header { background: rgba(255,255,255,0.9); padding: 10px; text-align: center; border-bottom: 5px solid var(--gold); }
        .page { display: none; padding: 10px; animation: fadeIn 0.3s; max-width: 600px; margin: auto; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* الصفحة الرئيسية - حسب الصورة */
        .giant-btn { background: var(--forest); height: 250px; border-radius: 50px; border: 6px solid white; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: 900; cursor: pointer; width: 100%; margin: 20px 0; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .giant-btn i { font-size: 7rem; }
        .staff-area { border: 2px dashed var(--navy); border-radius: 25px; padding: 15px; background: rgba(255,255,255,0.7); text-align: center; }

        /* صفحة التبليغ - تقليص المساحات */
        .card { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-top: 5px; }
        .cam-box { width: 100%; height: 180px; border: 2px dashed #999; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; position: relative; overflow: hidden; }
        .cam-box img { width: 100%; height: 100%; object-fit: cover; }
        .input-slim { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 10px; border: 1px solid #ddd; text-align: center; font-size: 1rem; }

        /* صفحة الإدارة - لمسات جمالية */
        .admin-nav { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .nav-card { padding: 20px; border-radius: 15px; color: white; text-align: center; cursor: pointer; font-weight: bold; border: none; font-size: 1.1rem; transition: 0.3s; }
        .report-item { background: white; border-radius: 15px; padding: 12px; margin-bottom: 10px; border-right: 8px solid var(--forest); }
        
        /* Modal إضافة موظف */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:2000; align-items:center; justify-content:center; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; }

        .btn { border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; color: white; }
    </style>
</head>
<body onload="initApp()">

<div class="header">
    <div style="font-size: 0.8rem; font-weight: bold;">الجمهورية الجزائرية الديمقراطية الشعبية</div>
    <div style="font-size: 1.6rem; font-weight: 900; color: var(--forest);">المـديـة نظيـفة</div>
    <div id="clock" style="font-weight: bold; color: var(--navy);">00:00:00</div>
</div>

<div id="pg-home" class="page active">
    <div class="giant-btn" onclick="navTo('pg-report')">
        <i class="fas fa-truck-loading"></i>
        <span>إرسال تبليغ</span>
    </div>
    <div class="staff-area">
        <p style="margin-top:0; font-weight:bold; color:var(--navy);">رواق الموظفين والمسؤولين</p>
        <div style="display: flex; gap:10px;">
            <button class="btn" style="background:var(--navy);" onclick="auth('admin')"><i class="fas fa-user-shield"></i> الإدارة</button>
            <button class="btn" style="background:var(--gold);" onclick="auth('driver')"><i class="fas fa-truck"></i> السائقين</button>
        </div>
    </div>
</div>

<div id="pg-report" class="page">
    <div class="card">
        <div class="cam-box" onclick="document.getElementById('file-in').click()">
            <i id="cam-icon" class="fas fa-camera fa-4x" style="color:#ccc;"></i>
            <img id="prev-img" style="display:none;">
        </div>
        <input type="file" id="file-in" accept="image/*" capture="environment" hidden onchange="handleFile(this)">
        <button class="btn" style="background:var(--forest); margin-bottom:10px;" onclick="getGPS()"><i class="fas fa-map-marker-alt"></i> تحديد الموقع</button>
        <input type="text" id="in-addr" class="input-slim" placeholder="اسم الحي أو الشارع">
        <input type="text" id="in-gps" class="input-slim" readonly placeholder="إحداثيات GPS">
        <button class="btn" style="background:var(--emerald); height: 60px; font-size:1.3rem;" onclick="sendReport()">إرسال البلاغ الآن</button>
        <button class="btn" style="background:#888;" onclick="navTo('pg-home')">رجوع</button>
    </div>
</div>

<div id="pg-admin" class="page">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="margin:0;">لوحة التحكم</h2>
        <button class="btn" style="background:var(--red); width:auto; padding:5px 15px;" onclick="navTo('pg-home')">خروج</button>
    </div>
    
    <div class="admin-nav">
        <button class="nav-card" style="background:orange;" onclick="renderAdminList('new')">بلاغات النفايات</button>
        <button class="nav-card" style="background:var(--forest);" onclick="renderAdminList('done')">البلاغات المنجزة</button>
    </div>

    <div id="admin-list"></div>

    <div class="staff-area" style="margin-top:20px; border-color: blue;">
        <h4 style="margin:5px 0;">خاص بإضافة موظف</h4>
        <button class="btn" style="background:blue;" onclick="openStaffModal()">+ إضافة مسؤول / سائق</button>
    </div>
</div>

<div id="pg-driver" class="page">
    <div id="driver-tasks"></div>
    <button class="btn" style="background:#555;" onclick="navTo('pg-home')">تسجيل الخروج</button>
</div>

<div id="staff-modal" class="modal">
    <div class="modal-content">
        <h3>إضافة موظف جديد</h3>
        <select id="st-type" class="input-slim" onchange="toggleStaffFields()">
            <option value="مسؤول">مسؤول (مشرف)</option>
            <option value="سائق">سائق شاحنة</option>
        </select>
        <input type="text" id="st-name" class="input-slim" placeholder="الاسم الكامل">
        <input type="text" id="st-phone" class="input-slim" placeholder="رقم الهاتف">
        <div id="driver-only-fields" style="display:none;">
            <input type="text" id="st-truck" class="input-slim" placeholder="رقم الشاحنة">
            <select id="st-sector" class="input-slim">
                <option value="البلدية">قطاع البلدية</option>
                <option value="خاص">قطاع خاص</option>
            </select>
        </div>
        <button class="btn" style="background:green;" onclick="saveStaff()">حفظ البيانات</button>
        <button class="btn" style="background:#888;" onclick="closeStaffModal()">إلغاء</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://medea-clean-2026-v4-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let appData = { reports: [], staff: [] };
    let tempImg = "", currentDriver = "";

    function initApp() {
        db.ref('APP_DATA_V5').on('value', s => { if(s.exists()){ appData = s.val(); } });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-DZ'); }, 1000);
    }

    function navTo(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    function handleFile(input) {
        const reader = new FileReader();
        reader.onload = e => {
            tempImg = e.target.result;
            document.getElementById('prev-img').src = tempImg;
            document.getElementById('prev-img').style.display = 'block';
            document.getElementById('cam-icon').style.display = 'none';
        };
        reader.readAsDataURL(input.files[0]);
    }

    function getGPS() {
        navigator.geolocation.getCurrentPosition(p => {
            document.getElementById('in-gps').value = p.coords.latitude.toFixed(6) + "," + p.coords.longitude.toFixed(6);
        });
    }

    function sendReport() {
        if(!tempImg || !document.getElementById('in-addr').value) return alert("البيانات ناقصة!");
        const rep = { id: Date.now(), img: tempImg, addr: document.getElementById('in-addr').value, gps: document.getElementById('in-gps').value, time: new Date().toLocaleTimeString('ar-DZ'), date: new Date().toLocaleDateString('ar-DZ'), status: 'new' };
        if(!appData.reports) appData.reports = [];
        appData.reports.push(rep);
        db.ref('APP_DATA_V5').set(appData).then(() => { alert("تم الإرسال بنجاح"); location.reload(); });
    }

    function renderAdminList(type) {
        const list = document.getElementById('admin-list');
        const filtered = (appData.reports || []).filter(r => type === 'new' ? r.status !== 'done' : r.status === 'done');
        list.innerHTML = `<h3>${type === 'new' ? 'بلاغات المواطنين' : 'البلاغات المنجزة'}</h3>`;
        filtered.forEach(r => {
            list.innerHTML += `
                <div class="report-item">
                    <img src="${r.img}" style="width:80px; border-radius:10px; float:left; margin-right:10px;">
                    ${r.doneImg ? `<img src="${r.doneImg}" style="width:80px; border-radius:10px; float:left; border:2px solid green;">` : ''}
                    <b>📍 ${r.addr}</b><br>
                    <small>📅 ${r.date} | 🕒 ${r.time}</small><br>
                    <small>🌍 GPS: ${r.gps}</small>
                    ${r.status === 'new' ? `<button class="btn" style="background:orange; padding:5px;" onclick="assignTask(${r.id})">توجيه لسائق</button>` : ''}
                    <div style="clear:both;"></div>
                </div>
            `;
        });
    }

    function auth(role) {
        const user = prompt("الاسم:");
        const pass = prompt("الرمز:");
        if(role === 'admin' && pass === '1234') navTo('pg-admin');
        if(role === 'driver' && pass === '5678') { currentDriver = user; navTo('pg-driver'); renderDriverTasks(); }
    }

    function renderDriverTasks() {
        const tasks = (appData.reports || []).filter(r => r.driver === currentDriver && r.status === 'sent');
        const container = document.getElementById('driver-tasks');
        container.innerHTML = `<h3>مهام السائق: ${currentDriver}</h3>`;
        tasks.forEach(t => {
            container.innerHTML += `
                <div class="card">
                    <img src="${t.img}" style="width:100%; border-radius:15px;">
                    <p>📍 الحي: ${t.addr} <br> 🕒 ${t.time} | ${t.date}</p>
                    <button class="btn" style="background:blue;" onclick="window.open('https://www.google.com/maps?q=${t.gps}')"><i class="fas fa-map"></i> فتح الخريطة</button>
                    <hr>
                    <p>تصوير النتيجة بعد التنظيف:</p>
                    <input type="file" accept="image/*" capture="environment" onchange="tempImg = e.target.result">
                    <button class="btn" style="background:green;" onclick="finishTask(${t.id})">إرسال صورة الإنجاز</button>
                </div>
            `;
        });
    }

    function finishTask(id) {
        const rep = appData.reports.find(x => x.id === id);
        rep.status = 'done';
        rep.doneImg = tempImg; // السائق يصور النتيجة
        db.ref('APP_DATA_V5').set(appData).then(() => { alert("تم تأكيد الإنجاز"); renderDriverTasks(); });
    }

    function assignTask(id) {
        const dName = prompt("اسم السائق المكلف:");
        if(dName) {
            const rep = appData.reports.find(x => x.id === id);
            rep.status = 'sent'; rep.driver = dName;
            db.ref('APP_DATA_V5').set(appData);
            alert("تم التوجيه بنجاح");
        }
    }

    // وظائف Modal الموظفين
    function openStaffModal() { document.getElementById('staff-modal').style.display='flex'; }
    function closeStaffModal() { document.getElementById('staff-modal').style.display='none'; }
    function toggleStaffFields() {
        document.getElementById('driver-only-fields').style.display = 
            document.getElementById('st-type').value === 'سائق' ? 'block' : 'none';
    }
    function saveStaff() {
        const staff = {
            type: document.getElementById('st-type').value,
            name: document.getElementById('st-name').value,
            phone: document.getElementById('st-phone').value,
            truck: document.getElementById('st-truck').value,
            sector: document.getElementById('st-sector').value
        };
        if(!appData.staff) appData.staff = [];
        appData.staff.push(staff);
        db.ref('APP_DATA_V5').set(appData).then(() => { alert("تم الحفظ"); closeStaffModal(); });
    }
</script>
</body>
</html>
