<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>المدية نظيفة 2026 - الإصدار الشامل V3</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
/* 1. تصميم الكود الثاني (الهوية الوطنية) */
:root {
  --green: #006233; --red: #C41E3A; --white: #FFFFFF; --gold: #D4AF37;
  --bg: #f5f7fa; --shadow: 0 4px 15px rgba(0,0,0,0.1);
}
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
body { background: var(--bg); color: #333; line-height: 1.6; }

/* 2. شاشة اختيار الجهاز (ميزة الكود الثاني) */
#deviceSelector {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(135deg, var(--green), var(--red));
  z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px;
}
.selector-card {
  background: white; padding: 30px; border-radius: 20px; text-align: center;
  box-shadow: var(--shadow); border: 3px solid var(--gold); max-width: 400px; width: 100%;
}

/* 3. واجهة المستخدم والتنقل */
.navbar { background: var(--white); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--green); sticky: top; z-index: 100; }
.points-badge { background: linear-gradient(45deg, var(--gold), #b8860b); color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }

/* 4. وظائف الخريطة والتتبع (المسترجعة من الكود الأول) */
#map, #routeMap { height: 350px; border-radius: 15px; border: 2px solid var(--green); margin: 15px 0; z-index: 1; }
.truck-marker { filter: drop-shadow(0 0 5px var(--red)); }

/* 5. النوافذ المنبثقة والتقارير */
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:2000; align-items:center; justify-content:center; }
.modal-content { background:white; width:95%; max-width:600px; border-radius:15px; padding:20px; max-height:90vh; overflow-y:auto; }

/* 6. التنبيهات (Toast) الملونة */
#toast-container { position:fixed; top:20px; left:20px; right:20px; z-index:9999; pointer-events:none; }
.toast { background:white; padding:15px; border-radius:10px; margin-bottom:10px; border-right:5px solid var(--green); box-shadow:var(--shadow); animation:slideIn 0.3s; }

/* 7. أزرار الأكشن والتصنيفات */
.btn { padding: 12px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
.btn-main { background: var(--green); color: white; width: 100%; justify-content: center; margin: 10px 0; }
.btn-red { background: var(--red); color: white; }

@keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
</style>
</head>
<body>

<div id="deviceSelector">
    <div class="selector-card">
        <div style="font-size: 3rem;">🇩🇿</div>
        <h2 style="color:var(--green); margin:10px 0;">نظام المدية نظيفة</h2>
        <p style="margin-bottom:20px;">يرجى اختيار واجهة الدخول المخصصة:</p>
        <button class="btn btn-main" onclick="startApp('desktop')">💻 مسؤول النظام (PC)</button>
        <button class="btn btn-main" style="background:var(--red)" onclick="startApp('mobile')">📱 عون ميداني (Mobile)</button>
    </div>
</div>

<div id="appBody" style="display:none">
    <nav class="navbar">
        <div class="user-info">
            <span id="userNameDisplay" style="font-weight:bold">الزائر</span>
            <div class="points-badge">🏆 <span id="userPoints">0</span> نقطة</div>
        </div>
        <h3 style="color:var(--green)">بلدية المدية</h3>
    </nav>

    <main style="padding: 15px;">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
            <div style="background:white; padding:15px; border-radius:12px; border-top:4px solid var(--green); text-align:center;">
                <h4 id="countReports">0</h4>
                <p>بلاغات اليوم</p>
            </div>
            <div style="background:white; padding:15px; border-radius:12px; border-top:4px solid var(--red); text-align:center;">
                <h4 id="countTonnage">0 طن</h4>
                <p>إجمالي المجمّع</p>
            </div>
        </div>

        <div style="background:white; padding:15px; border-radius:15px; box-shadow:var(--shadow);">
            <h3 style="margin-bottom:10px;">📍 الخريطة المباشرة للبلاغات والشاحنات</h3>
            <div id="map"></div>
            <button class="btn btn-main" onclick="openReportModal()">📸 إرسال بلاغ جديد (صورة + موقع)</button>
        </div>

        <div style="margin-top:20px; background:white; padding:15px; border-radius:15px;">
            <h3>📋 قائمة البلاغات النشطة</h3>
            <div id="reportsList" style="margin-top:10px;">
                <p style="text-align:center; color:#888;">جاري تحميل البيانات...</p>
            </div>
        </div>
    </main>
</div>

<div id="reportModal" class="modal">
    <div class="modal-content">
        <h3 style="color:var(--green); margin-bottom:15px;">إضافة بلاغ عن نفايات</h3>
        <input type="text" id="reportDesc" placeholder="وصف الحالة (مثال: نفايات صلبة، تراكم...)" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
        <div id="locationStatus" style="font-size:0.8rem; color:var(--red); margin-bottom:10px;">📍 الموقع غير محدد</div>
        <button class="btn btn-main" onclick="captureLocation()">📍 تحديد الموقع الحالي</button>
        <button class="btn btn-main" style="background:var(--gold)" onclick="submitReport()">🚀 إرسال البلاغ</button>
        <button class="btn" style="width:100%" onclick="closeModal()">إلغاء</button>
    </div>
</div>

<div id="toast-container"></div>

<script>
// 1. إعدادات Firebase (يجب وضع بياناتك هنا لتعمل)
const firebaseConfig = { databaseURL: "YOUR_DATABASE_URL" };
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let userPos = null;
let appMode = 'mobile';
let map, markers = {};

// 2. بدء التطبيق
function startApp(mode) {
    appMode = mode;
    document.getElementById('deviceSelector').style.display = 'none';
    document.getElementById('appBody').style.display = 'block';
    showToast("تم الدخول بنجاح - وضع " + (mode === 'desktop' ? 'المسؤول' : 'الميدان'));
    initMap();
    loadData();
}

// 3. إدارة الخريطة (وظيفة الكود الأول مع تصحيح الأداء)
function initMap() {
    map = L.map('map').setView([36.2675, 2.7539], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    
    // إضافة حدود بلدية المدية (افتراضي)
    L.circle([36.2675, 2.7539], {radius: 5000, color: 'green', fillOpacity: 0.05}).addTo(map);
}

// 4. البلاغات والموقع (تصحيح النقص في الكود الثاني)
function captureLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            document.getElementById('locationStatus').innerHTML = `✅ تم تحديد الموقع: ${userPos.lat.toFixed(4)}, ${userPos.lng.toFixed(4)}`;
            document.getElementById('locationStatus').style.color = "green";
        }, err => showToast("❌ فشل تحديد الموقع"));
    }
}

function openReportModal() { document.getElementById('reportModal').style.display = 'flex'; }
function closeModal() { document.getElementById('reportModal').style.display = 'none'; }

function submitReport() {
    const desc = document.getElementById('reportDesc').value;
    if (!userPos || !desc) return showToast("❌ يرجى تحديد الموقع وكتابة وصف");

    const reportData = {
        desc: desc,
        lat: userPos.lat,
        lng: userPos.lng,
        time: new Date().toISOString(),
        status: 'pending',
        user: "مواطن_رقم_" + Math.floor(Math.random()*1000)
    };

    db.ref('reports').push(reportData).then(() => {
        showToast("🚀 تم إرسال البلاغ.. شكراً لمساهمتك!");
        closeModal();
        updateUserPoints(10); // إضافة نقاط للمستخدم
    });
}

// 5. التحديث المباشر للبيانات (Real-time Sync)
function loadData() {
    db.ref('reports').on('value', snapshot => {
        const data = snapshot.val();
        const listDiv = document.getElementById('reportsList');
        listDiv.innerHTML = "";
        let count = 0;

        for (let id in data) {
            count++;
            const r = data[id];
            // إضافة ماركر للخريطة
            if (!markers[id]) {
                markers[id] = L.marker([r.lat, r.lng]).addTo(map)
                    .bindPopup(`<b>${r.desc}</b><br>الحالة: ${r.status}`);
            }

            // إضافة عنصر للقائمة
            listDiv.innerHTML += `
                <div style="border-bottom:1px solid #eee; padding:10px; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <strong>${r.desc}</strong><br>
                        <small>${new Date(r.time).toLocaleTimeString('ar-DZ')}</small>
                    </div>
                    <span style="color:${r.status==='pending'?'orange':'green'}">${r.status==='pending'?'⏳':'✅'}</span>
                </div>
            `;
        }
        document.getElementById('countReports').innerText = count;
    });
}

// 6. نظام النقاط والـ Toast
function updateUserPoints(pts) {
    let current = parseInt(document.getElementById('userPoints').innerText);
    document.getElementById('userPoints').innerText = current + pts;
}

function showToast(msg) {
    const container = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = 'toast';
    t.innerText = msg;
    container.appendChild(t);
    setTimeout(() => t.remove(), 4000);
}
</script>

</body>
</html>
