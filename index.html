<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المدية نظيفة 2026 - د. رابحي فتحي</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --glass: rgba(255, 255, 255, 0.95); --gold: #D4AF37; --red: #d21034; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; transition: 0.3s; }
        body { margin: 0; background: url('https://w0.peakpx.com/wallpaper/842/630/HD-wallpaper-garbage-truck-garbage-recycling-environment-trucks.jpg') no-repeat center center fixed; background-size: cover; min-height: 100vh; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: -1; }
        .top-bar { background: var(--glass); padding: 15px; text-align: center; border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .live-panel { display: flex; justify-content: space-between; padding: 5px 15px; font-weight: bold; color: var(--emerald); font-size: 0.85rem; background: rgba(255,255,255,0.5); border-radius: 10px; margin-top: 5px; }
        .screen { display: none; padding: 20px; padding-bottom: 100px; }
        .active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .glass-card { background: var(--glass); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); text-align: center; cursor: pointer; }
        .btn-prime { border: none; padding: 14px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; color: white; border: 1px solid rgba(255,255,255,0.2); }
        .input-style { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ccc; margin-bottom: 10px; font-size: 0.9rem; }
        #photo-placeholder { height: 250px; border-radius: 20px; border: 3px dashed var(--forest); margin-bottom: 10px; background: rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #photo-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
        .item-box { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: right; border-right: 6px solid var(--gold); position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .report-img-view { width: 100%; height: 180px; object-fit: cover; border-radius: 12px; margin: 10px 0; border: 1px solid #eee; background: #f0f0f0; }
        .footer-sig { position: fixed; bottom: 0; width: 100%; background: var(--glass); padding: 12px; text-align: center; font-weight: bold; color: var(--forest); border-top: 2px solid var(--gold); z-index: 1000; }
    </style>
</head>
<body onload="initApp()">
<div class="top-bar">
    <div id="lg-gov">الجمهورية الجزائرية الديمقراطية الشعبية</div>
    <div id="lg-dept" style="font-size: 1.1rem; font-weight: 700; color: var(--emerald);">بلدية المدية - المدية نظيفة</div>
    <div class="live-panel"><div id="clock">00:00:00</div><div id="date-display">--</div></div>
</div>

<div id="scr-main" class="screen active">
    <div class="glass-card" onclick="navTo('scr-report')"><i class="fas fa-bullhorn fa-3x" style="color:var(--forest)"></i><h3>تبليغ مواطن جديد</h3></div>
    <div class="glass-card" onclick="auth('admin')"><i class="fas fa-user-shield fa-3x" style="color:var(--emerald)"></i><h3>مصلحة النظافة (الإدارة)</h3></div>
    <div class="glass-card" onclick="auth('driver')"><i class="fas fa-truck-pickup fa-3x" style="color:var(--gold)"></i><h3>واجهة السائق الميداني</h3></div>
    <div class="glass-card" onclick="location.reload()" style="color:var(--red)"><i class="fas fa-power-off fa-2x"></i><h4>خروج</h4></div>
</div>

<div id="scr-report" class="screen">
    <div id="photo-placeholder">
        <i id="cam-icon" class="fas fa-camera fa-4x" style="color:var(--forest)"></i>
        <img id="photo-preview">
    </div>
    <label class="btn-prime" style="background:var(--navy);"><i class="fas fa-camera"></i> التقاط صورة النفايات <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="handleImg(this, 'citizen')"></label>
    <button class="btn-prime" style="background:var(--forest);" onclick="getMyLocation()"><i class="fas fa-location-arrow"></i> تحديد العنوان والإحداثيات</button>
    <input type="text" id="rep-addr" class="input-style" placeholder="العنوان...">
    <input type="text" id="rep-geo" class="input-style" placeholder="الإحداثيات" readonly>
    <button class="btn-prime" style="background:var(--emerald);" onclick="submitReport()"><i class="fas fa-paper-plane"></i> إرسال التبليغ</button>
    <button class="btn-prime" style="background:#666;" onclick="navTo('scr-main')">رجوع</button>
</div>
<div id="scr-admin" class="screen">
    <div id="admin-summary" class="glass-card" style="display:flex; justify-content:space-around;">
        <div style="color:var(--red)">جديد: <span id="st-new">0</span></div>
        <div style="color:var(--emerald)">تم: <span id="st-done">0</span></div>
    </div>
    <button class="btn-prime" style="background:var(--navy)" onclick="toggleView('admin-list')">عرض التبليغات</button>
    <div id="admin-list" style="display:none;"></div>
    <button class="btn-prime" style="background:var(--forest)" onclick="toggleView('driver-mgr')">إدارة السائقين</button>
    <div id="driver-mgr" style="display:none;" class="glass-card">
        <input type="text" id="d-name" class="input-style" placeholder="اسم السائق">
        <button class="btn-prime" style="background:var(--emerald)" onclick="addDriver()">إضافة</button>
        <div id="d-list-display"></div>
    </div>
    <button class="btn-prime" style="background:#333;" onclick="navTo('scr-main')">خروج</button>
</div>

<div id="scr-driver" class="screen">
    <h3 id="driver-welcome" style="color:white; text-align:center;"></h3>
    <div id="driver-tasks-container"></div>
    <button class="btn-prime" style="background:#333;" onclick="navTo('scr-main')">خروج</button>
</div>

<div class="footer-sig">د. رابحي فتحي | Medea Clean 2026</div>

<script>
    const firebaseConfig = { databaseURL: "https://medea-green-2026-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();

    let db = { reports: [], drivers: [], admins: ["فتحي"] };
    let currentCitizenImg = "", currentDriverImg = "", currentUser = "";

    function save() { rtdb.ref('medea_data').set(db); }

    function initApp() {
        rtdb.ref('medea_data').on('value', (snap) => {
            if (snap.exists()) { db = snap.val(); updateStats(); refreshLists(); }
        });
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('fr-FR');
            document.getElementById('date-display').innerText = now.toLocaleDateString('ar-DZ');
        }, 1000);
    }

    function handleImg(input, type) {
        const reader = new FileReader();
        reader.onload = e => { 
            if(type === 'citizen') { 
                currentCitizenImg = e.target.result;
                document.getElementById('photo-preview').src = e.target.result;
                document.getElementById('photo-preview').style.display = 'block';
                document.getElementById('cam-icon').style.display = 'none';
            } else { currentDriverImg = e.target.result; alert("✅ تم التقاط صورة الإنجاز"); }
        };
        if(input.files[0]) reader.readAsDataURL(input.files[0]);
    }

    function getMyLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude, lng = pos.coords.longitude;
                document.getElementById('rep-geo').value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
                    .then(r => r.json()).then(data => {
                        document.getElementById('rep-addr').value = data.display_name.split(',').slice(0,3).join(',');
                    });
            }, () => alert("يرجى تفعيل GPS"));
        }
    }

    function submitReport() {
        if(!currentCitizenImg || !document.getElementById('rep-addr').value) return alert("أكمل البيانات");
        if(!db.reports) db.reports = [];
        db.reports.push({ id: Date.now(), addr: document.getElementById('rep-addr').value, geo: document.getElementById('rep-geo').value, img: currentCitizenImg, status: 'new' });
        save(); alert("✅ تم الإرسال"); location.reload();
    }

    function auth(role) {
        const user = prompt("الإسم:");
        const pass = prompt("الرمز:");
        if(role === 'admin' && pass === '1234') { currentUser = user; navTo('scr-admin'); }
        else if(role === 'driver' && pass === '5678') { currentUser = user; navTo('scr-driver'); }
    }

    function navTo(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        refreshLists();
    }

    function refreshLists() {
        const list = document.getElementById('admin-list');
        if(list) list.innerHTML = (db.reports || []).slice().reverse().map(r => `
            <div class="item-box">
                <img src="${r.img}" class="report-img-view">
                📍 ${r.addr}<br>
                <button class="btn-prime" style="background:var(--navy); padding:5px;" onclick="window.open('https://www.google.com/maps?q=${r.geo}')">فتح الخريطة</button>
                <hr>
                ${r.status === 'new' ? `<select id="sel-${r.id}" class="input-style"><option value="">-- اختر سائقاً --</option>${(db.drivers||[]).map(d=>`<option value="${d.name}">${d.name}</option>`).join('')}</select><button class="btn-prime" style="background:var(--orange)" onclick="assignTask(${r.id})">إرسال المهمة</button>` : `محالة لـ: ${r.assignedTo}`}
            </div>`).join('');
            
        const dTasks = document.getElementById('driver-tasks-container');
        if(dTasks) dTasks.innerHTML = (db.reports || []).filter(r => r.assignedTo === currentUser && r.status === 'sent').map(r => `
            <div class="item-box">
                <img src="${r.img}" class="report-img-view">
                📍 الموقع: ${r.addr}<br>
                <button class="btn-prime" style="background:var(--navy)" onclick="window.open('https://www.google.com/maps?q=${r.geo}')">GPS</button>
                <hr>
                <label class="btn-prime" style="background:var(--gold);">تصوير النتيجة <input type="file" capture="environment" style="display:none;" onchange="handleImg(this, 'driver')"></label>
                <button class="btn-prime" style="background:var(--emerald)" onclick="completeTask(${r.id})">تأكيد التنظيف</button>
            </div>`).join('');
    }

    function assignTask(id) { 
        const drv = document.getElementById(`sel-${id}`).value; 
        if(drv) { const r = db.reports.find(x=>x.id===id); r.status='sent'; r.assignedTo=drv; save(); } 
    }
    
    function completeTask(id) { 
        if(!currentDriverImg) return alert("صور النتيجة"); 
        const r = db.reports.find(x=>x.id===id); r.status='done'; save(); alert("✅ تم"); 
    }

    function addDriver() { 
        const n = document.getElementById('d-name').value; 
        if(n) { if(!db.drivers) db.drivers = []; db.drivers.push({ name: n }); save(); } 
    }

    function toggleView(id) { const e = document.getElementById(id); e.style.display = e.style.display==='none'?'block':'none'; }
    function updateStats() {
        if(!db.reports) return;
        document.getElementById('st-new').innerText = db.reports.filter(r => r.status === 'new').length;
        document.getElementById('st-done').innerText = db.reports.filter(r => r.status === 'done').length;
    }
</script>
</body>
</html>
