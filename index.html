<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المدية نظيفة 2026 - د. رابحي</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --main: #1B5E20; --accent: #D4AF37; --bg: rgba(255,255,255,0.95); }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { margin: 0; background: url('https://w0.peakpx.com/wallpaper/842/630/HD-wallpaper-garbage-truck-garbage-recycling-environment-trucks.jpg') no-repeat center center fixed; background-size: cover; }
        .top-bar { background: var(--bg); padding: 10px; text-align: center; border-bottom: 3px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .screen { display: none; padding: 15px; padding-bottom: 80px; }
        .active { display: block; }
        .glass-card { background: var(--bg); border-radius: 15px; padding: 20px; margin-bottom: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .btn-prime { border: none; padding: 12px; border-radius: 25px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 10px; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .input-style { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; margin-bottom: 10px; }
        #map { height: 250px; border-radius: 15px; margin-bottom: 10px; border: 2px solid white; }
        .item-box { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-right: 5px solid var(--accent); position: relative; }
        .report-img-view { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; margin: 10px 0; background: #eee; }
        .footer-sig { position: fixed; bottom: 0; width: 100%; background: var(--bg); padding: 10px; text-align: center; font-weight: bold; color: var(--main); border-top: 2px solid var(--accent); }
    </style>
</head>
<body onload="initApp()">
<div class="top-bar">
    <div style="font-size: 0.8rem;">الجمهورية الجزائرية الديمقراطية الشعبية</div>
    <div style="font-weight: bold; color: var(--main);">بلدية المدية - نظافة المحيط</div>
    <div id="clock" style="font-size: 0.9rem; color: #666;"></div>
</div>

<div id="scr-main" class="screen active">
    <div class="glass-card" onclick="navTo('scr-report')"><i class="fas fa-bullhorn fa-3x" style="color:var(--main)"></i><h3>تبليغ عن نفايات</h3></div>
    <div class="glass-card" onclick="auth('admin')"><i class="fas fa-user-shield fa-3x" style="color:var(--main)"></i><h3>لوحة تحكم الإدارة</h3></div>
    <div class="glass-card" onclick="auth('driver')"><i class="fas fa-truck fa-3x" style="color:var(--accent)"></i><h3>دخول السائق</h3></div>
</div>

<div id="scr-report" class="screen">
    <div id="map"></div>
    <button class="btn-prime" style="background:var(--main);" onclick="getMyLocation()"><i class="fas fa-crosshairs"></i> تحديد موقعي</button>
    <input type="text" id="rep-addr" class="input-style" placeholder="وصف المكان...">
    <input type="text" id="rep-geo" class="input-style" placeholder="الإحداثيات" readonly>
    <label class="btn-prime" style="background:#14213D;"><i class="fas fa-camera"></i> تصوير النفايات <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="handleImg(this, 'citizen')"></label>
    <div id="img-status" style="display:none; color:green; text-align:center; font-weight:bold;">✅ الصورة جاهزة</div>
    <button class="btn-prime" style="background:#2E7D32;" onclick="submitReport()">إرسال الآن</button>
    <button class="btn-prime" style="background:#666;" onclick="navTo('scr-main')">رجوع</button>
</div>

<div id="scr-admin" class="screen">
    <div class="glass-card" style="display:flex; justify-content:space-around;">
        <div>جديد: <span id="st-new">0</span></div>
        <div>منجز: <span id="st-done">0</span></div>
    </div>
    <div id="admin-list"></div>
    <button class="btn-prime" style="background:#333;" onclick="navTo('scr-main')">خروج</button>
</div>

<div id="scr-driver" class="screen">
    <h3 id="driver-welcome" style="color:white; text-align:center;"></h3>
    <div id="driver-tasks"></div>
    <button class="btn-prime" style="background:#333;" onclick="navTo('scr-main')">خروج</button>
</div>

<div class="footer-sig">د. رابحي فتحي | Medea Clean 2026</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const firebaseConfig = { databaseURL: "https://medea-green-2026-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();

    let db = { reports: [], drivers: [{name: "سائق 1"}, {name: "سائق 2"}] };
    let map, marker, currentImg = "", driverImg = "", currentUser = "";

    function save() { rtdb.ref('medea_data').set(db); }

    function initApp() {
        rtdb.ref('medea_data').on('value', (snap) => {
            if (snap.exists()) { db = snap.val(); updateStats(); refresh(); }
        });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    }

    function navTo(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'scr-report') setTimeout(initMap, 500);
    }

    function initMap() {
        if(map) return;
        map = L.map('map').setView([36.2642, 2.7539], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        marker = L.marker([36.2642, 2.7539], {draggable: true}).addTo(map);
        marker.on('dragend', () => { 
            const p = marker.getLatLng();
            document.getElementById('rep-geo').value = p.lat.toFixed(6) + "," + p.lng.toFixed(6);
        });
    }

    function getMyLocation() {
        navigator.geolocation.getCurrentPosition(p => {
            const lat = p.coords.latitude, lng = p.coords.longitude;
            map.setView([lat, lng], 17); marker.setLatLng([lat, lng]);
            document.getElementById('rep-geo').value = lat.toFixed(6) + "," + lng.toFixed(6);
        });
    }

    function handleImg(input, type) {
        const reader = new FileReader();
        reader.onload = e => { 
            if(type === 'citizen') { currentImg = e.target.result; document.getElementById('img-status').style.display='block'; }
            else { driverImg = e.target.result; }
        };
        reader.readAsDataURL(input.files[0]);
    }

    function submitReport() {
        const addr = document.getElementById('rep-addr'), geo = document.getElementById('rep-geo');
        if(!currentImg || !addr.value) return alert("الرجاء تصوير النفايات وكتابة الوصف");
        if(!db.reports) db.reports = [];
        db.reports.push({
            id: Date.now(), addr: addr.value, geo: geo.value, img: currentImg,
            status: 'new', time: new Date().toLocaleString('ar-DZ'), done_time: "---"
        });
        save();
        // التصفير
        addr.value = ""; geo.value = ""; currentImg = "";
        document.getElementById('img-status').style.display='none';
        alert("تم التبليغ ✅"); navTo('scr-main');
    }

    function auth(role) {
        const user = prompt("الإسم:"), pass = prompt("الرقم السري:");
        if(role === 'admin' && pass === '1234') { currentUser = user; navTo('scr-admin'); }
        else if(role === 'driver' && pass === '5678') { currentUser = user; navTo('scr-driver'); }
    }

    function refresh() {
        const adminList = document.getElementById('admin-list');
        adminList.innerHTML = (db.reports || []).slice().reverse().map(r => `
            <div class="item-box">
                <img src="${r.img}" class="report-img-view">
                ${r.doneImg ? `<img src="${r.doneImg}" class="report-img-view" style="border:2px solid green">` : ''}
                📍 ${r.addr}<br>⏰ التبليغ: ${r.time}<br>✅ الإنجاز: ${r.done_time}<hr>
                ${r.status === 'new' ? `
                    <button class="btn-prime" style="background:var(--accent); color:black" onclick="assign('${r.id}')">إرسال للسائق</button>
                ` : `الحالة: ${r.status}`}
                <i class="fas fa-trash" style="color:red; cursor:pointer;" onclick="del('${r.id}')"></i>
            </div>
        `).join('');

        const driverTasks = document.getElementById('driver-tasks');
        driverTasks.innerHTML = (db.reports || []).filter(r => r.status === 'sent').map(r => `
            <div class="item-box">
                <img src="${r.img}" class="report-img-view">
                📍 المكان: ${r.addr}<br>
                <label class="btn-prime" style="background:var(--accent); color:black">📸 تصوير الإنجاز <input type="file" capture="environment" style="display:none;" onchange="handleImg(this, 'driver')"></label>
                <button class="btn-prime" style="background:var(--main)" onclick="complete('${r.id}')">تأكيد التنظيف</button>
            </div>
        `).join('');
    }

    function assign(id) { 
        const r = db.reports.find(x => x.id == id); 
        r.status = 'sent'; save(); alert("تم توجيه السائق");
    }

    function complete(id) {
        if(!driverImg) return alert("صوّر المكان بعد التنظيف");
        const r = db.reports.find(x => x.id == id);
        r.status = 'done'; r.doneImg = driverImg; r.done_time = new Date().toLocaleString('ar-DZ');
        driverImg = ""; save(); alert("عمل رائع ✅");
    }

    function del(id) { if(confirm("حذف؟")) { db.reports = db.reports.filter(x => x.id != id); save(); } }
    function toggleView(id) { const el = document.getElementById(id); el.style.display = el.style.display === 'none' ? 'block' : 'none'; }
    function updateStats() {
        if(!db.reports) return;
        document.getElementById('st-new').innerText = db.reports.filter(r=>r.status==='new').length;
        document.getElementById('st-done').innerText = db.reports.filter(r=>r.status==='done').length;
    }
</script>
</body>
</html>
