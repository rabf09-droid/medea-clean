<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدية خضراء 2026</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f4f4; text-align: center; }
        .header { background: #2e7d32; color: white; padding: 15px; font-size: 1.2rem; }
        .screen { display: none; padding: 20px; }
        .active { display: block; }
        .card { background: white; margin: 10px; padding: 20px; border-radius: 10px; shadow: 0 2px 5px rgba(0,0,0,0.2); cursor: pointer; }
        #map { height: 350px; width: 90%; margin: 10px auto; border-radius: 15px; border: 2px solid #2e7d32; }
        .btn { background: #2e7d32; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; width: 80%; margin: 5px; font-size: 1rem; }
    </style>
</head>
<body onload="initApp()">

<div class="header">مدية خضراء 2026 - مصلحة النظافة</div>

<div id="scr-main" class="screen active">
    <div class="card" onclick="navTo('scr-report')"><h2>📸 تبليغ مواطن جديد</h2></div>
    <div class="card" onclick="auth('admin')"><h2>👤 الإدارة (فتحي)</h2></div>
    <div class="card" onclick="auth('driver')"><h2>🚚 واجهة السائق</h2></div>
</div>

<div id="scr-report" class="screen">
    <h3>حدد موقع النفايات على الخريطة</h3>
    <div id="map"></div>
    <button class="btn" onclick="getLocation()">📍 تحديد موقعي الحالي بدقة</button>
    <br><br>
    <input type="text" id="rep-addr" placeholder="وصف المكان (مثال: حي الرمالي)" style="width:80%; padding:10px; margin:5px;">
    <input type="hidden" id="rep-geo">
    <button class="btn" style="background:#1565c0" onclick="document.getElementById('file-input').click()">📷 تصوير النفايات</button>
    <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none" onchange="handleImg(this)">
    <p id="status-msg"></p>
    <button class="btn" onclick="submitReport()">إرسال التبليغ ✅</button>
    <button class="btn" style="background:#666" onclick="navTo('scr-main')">رجوع</button>
</div>

<div id="scr-admin" class="screen">
    <h3>لوحة التحكم</h3>
    <div id="admin-list"></div>
    <button class="btn" style="background:#666" onclick="navTo('scr-main')">خروج</button>
</div>

<script>
    // إعدادات Firebase الخاصة بك
    const firebaseConfig = { databaseURL: "https://medea-green-2026-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();

    let map, marker, currentImg = "";

    function navTo(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'scr-report') { 
            setTimeout(initMap, 300); 
        }
    }

    function initMap() {
        if (!map) {
            // إنشاء الخريطة
            map = L.map('map').setView([36.2642, 2.7539], 16);

            // إضافة طبقة القمر الصناعي (Satellite)
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Esri Satellite'
            }).addTo(map);

            // إضافة العلامة (Marker)
            marker = L.marker([36.2642, 2.7539], {draggable: true}).addTo(map);
            
            marker.on('dragend', function() {
                let pos = marker.getLatLng();
                document.getElementById('rep-geo').value = pos.lat + "," + pos.lng;
            });
        }
    }

    // وظيفة تحديد الموقع الحقيقي باستخدام GPS الهاتف
    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                let lat = position.coords.latitude;
                let lng = position.coords.longitude;
                let newPos = new L.LatLng(lat, lng);
                map.setView(newPos, 18);
                marker.setLatLng(newPos);
                document.getElementById('rep-geo').value = lat + "," + lng;
                alert("تم تحديد موقعك بنجاح!");
            }, function() {
                alert("يرجى تفعيل الـ GPS في هاتفك والسماح للمتصفح بالوصول للموقع.");
            });
        }
    }

    function handleImg(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            currentImg = e.target.result;
            document.getElementById('status-msg').innerText = "✅ الصورة جاهزة";
        };
        reader.readAsDataURL(input.files[0]);
    }

    function submitReport() {
        let addr = document.getElementById('rep-addr').value;
        let geo = document.getElementById('rep-geo').value;
        if(!currentImg || !geo) return alert("يرجى التقاط صورة وتحديد الموقع!");

        rtdb.ref('reports').push({
            address: addr,
            location: geo,
            image: currentImg,
            time: new Date().toLocaleString('ar-DZ')
        }).then(() => {
            alert("تم الإرسال بنجاح!");
            location.reload();
        });
    }

    function auth(role) {
        let pass = prompt("الرمز السري:");
        if(role === 'admin' && pass === '1234') navTo('scr-admin');
        if(role === 'driver' && pass === '5678') alert("واجهة السائق قيد التحديث");
    }

    function initApp() {
        rtdb.ref('reports').on('value', (snap) => {
            const data = snap.val();
            let html = "";
            for(let id in data) {
                html += `<div class="card" style="text-align:right">
                    <img src="${data[id].image}" style="width:100%; border-radius:10px;">
                    <p>📍 الموقع: ${data[id].address}</p>
                    <p>🕒 الوقت: ${data[id].time}</p>
                    <a href="https://www.google.com/maps?q=${data[id].location}" target="_blank">فتح في خرائط جوجل</a>
                </div>`;
            }
            document.getElementById('admin-list').innerHTML = html;
        });
    }
</script>
</body>
</html>
