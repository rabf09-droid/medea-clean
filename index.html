<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظافة المدية 2026 - الإصدار المعتمد</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --glass: rgba(255, 255, 255, 0.98); --gold: #D4AF37; --red: #d21034; --orange: #fb8c00; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { margin: 0; background: #000; }
        .main-container { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://www.shutterstock.com/shutterstock/photos/1932338633/display_1500/stock-photo-garbage-truck-on-the-street-1932338633.jpg'); background-size: cover; min-height: 100vh; padding-bottom: 120px; }
        .header { background: var(--glass); padding: 15px; text-align: center; border-bottom: 4px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .page { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        .card { background: var(--glass); border-radius: 20px; padding: 20px; margin-bottom: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn { border: none; padding: 15px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; color: white; font-size: 1.1rem; }
        .input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ccc; margin-bottom: 10px; font-size: 1rem; text-align: center; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body onload="initApp()">

<div class="main-container">
    <div class="header">
        <div style="font-size: 0.8rem; font-weight: bold;">الجمهورية الجزائرية الديمقراطية الشعبية</div>
        <div style="font-size: 1.6rem; font-weight: 800; color: var(--emerald);">نظافة المدية 2026</div>
        <div style="display: flex; justify-content: space-between; padding: 5px 15px; font-weight: bold;">
            <div id="clock">00:00:00</div>
            <div>06 أفريل 2026</div>
        </div>
    </div>

    <div id="pg-home" class="page active">
        <div class="card" onclick="navTo('pg-report')"><i class="fas fa-bullhorn fa-4x" style="color:var(--forest)"></i><h2>إرسال تبليغ</h2></div>
        <div class="card" onclick="auth('admin')"><i class="fas fa-user-shield fa-4x" style="color:var(--emerald)"></i><h2>لوحة الإدارة</h2></div>
        <div class="card" onclick="auth('driver')"><i class="fas fa-truck fa-4x" style="color:var(--gold)"></i><h2>دخول السائقين</h2></div>
    </div>

    <div id="pg-report" class="page">
        <div class="card">
            <div id="cam-box" style="height:200px; border:2px dashed #ccc; border-radius:15px; margin-bottom:10px; overflow:hidden; background:#fff; display:flex; align-items:center; justify-content:center;">
                <img id="img-prev" style="width:100%; height:100%; object-fit:cover; display:none;">
                <i id="img-icon" class="fas fa-camera fa-4x" style="color:#eee"></i>
            </div>
            <label class="btn" style="background:var(--navy);">التقاط صورة للنفايات<input type="file" accept="image/*" capture="environment" style="display:none;" onchange="handleImage(this, 'cit')"></label>
            <button class="btn" style="background:var(--forest);" onclick="getGPS()">تحديد موقعي الآن</button>
            <input type="text" id="in-addr" class="input" placeholder="العنوان أو الحي">
            <input type="text" id="in-gps" class="input" readonly placeholder="إحداثيات الموقع">
            <button class="btn" style="background:var(--emerald);" onclick="submitReport()">إرسال التبليغ فوراً</button>
            <button class="btn" style="background:#666;" onclick="navTo('pg-home')">رجوع</button>
        </div>
    </div>

    <div id="pg-admin" class="page">
        <button class="btn" style="background:var(--navy)" onclick="toggleSect('sect-reps')">📦 التبليغات الواردة</button>
        <div id="sect-reps" style="display:none;"></div>

        <button class="btn" style="background:var(--emerald)" onclick="toggleSect('sect-drvs')">🚛 إدارة السائقين</button>
        <div id="sect-drvs" style="display:none;" class="card">
            <input type="text" id="adm-d-name" class="input" placeholder="اسم السائق">
            <input type="text" id="adm-d-truck" class="input" placeholder="رقم الشاحنة">
            <button class="btn" style="background:var(--forest)" onclick="addDriver()">إضافة سائق وتصفير</button>
            <div id="list-drivers" style="margin-top:10px; text-align:right;"></div>
        </div>

        <button class="btn" style="background:var(--red)" onclick="toggleSect('sect-adms')">🔑 إدارة المسؤولين</button>
        <div id="sect-adms" style="display:none;" class="card">
            <input type="text" id="adm-m-name" class="input" placeholder="اسم المسؤول الجديد">
            <button class="btn" style="background:var(--forest)" onclick="addAdmin()">إضافة مسؤول وتصفير</button>
            <div id="list-admins" style="margin-top:10px; text-align:right;"></div>
        </div>
        <button class="btn" style="background:#444;" onclick="navTo('pg-home')">خروج</button>
    </div>
<script>
    const firebaseConfig = { databaseURL: "https://medea-smart-clean-2026-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let appData = { reports: [], drivers: [], admins: ["المدية", "رابحي"] };
    let tmpCit = "", tmpDrv = "", currUser = "";

    function syncDB() { db.ref('MEDEA_STABLE_V1').set(appData); }

    function initApp() {
        db.ref('MEDEA_STABLE_V1').on('value', (s) => { if(s.exists()) appData = s.val(); updateUI(); });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
    }

    function handleImage(input, role) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const cvs = document.createElement('canvas');
                cvs.width = 400; cvs.height = (img.height/img.width)*400;
                cvs.getContext('2d').drawImage(img, 0, 0, cvs.width, cvs.height);
                const res = cvs.toDataURL('image/jpeg', 0.5);
                if(role === 'cit') {
                    tmpCit = res; document.getElementById('img-prev').src = res;
                    document.getElementById('img-prev').style.display = 'block';
                    document.getElementById('img-icon').style.display = 'none';
                } else { tmpDrv = res; alert("📸 تم التقاط النتيجة"); }
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }

    function getGPS() {
        navigator.geolocation.getCurrentPosition(p => {
            const lat = p.coords.latitude, lon = p.coords.longitude;
            document.getElementById('in-gps').value = lat.toFixed(6)+","+lon.toFixed(6);
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`).then(r=>r.json()).then(d=>{
                document.getElementById('in-addr').value = d.display_name.split(',').slice(0,3).join(',');
            });
        });
    }

    function submitReport() {
        const addr = document.getElementById('in-addr').value;
        if(!tmpCit || !addr) return alert("❌ يرجى التقاط الصورة وتحديد العنوان");
        
        const rep = {
            id: Date.now(), img: tmpCit, addr: addr, gps: document.getElementById('in-gps').value,
            time: new Date().toLocaleTimeString('fr-FR'), date: "06-04-2026", status: 'new'
        };
        if(!appData.reports) appData.reports = [];
        appData.reports.push(rep);
        syncDB();

        // التصفير الكامل بعد الإرسال
        tmpCit = "";
        document.getElementById('img-prev').style.display = 'none';
        document.getElementById('img-icon').style.display = 'block';
        document.getElementById('in-addr').value = "";
        document.getElementById('in-gps').value = "";
        
        alert(`✅ تم الإرسال بنجاح!\nالتوقيت: ${rep.time}\nالعنوان: ${rep.addr}`);
        navTo('pg-home');
    }

    function auth(role) {
        const u = prompt("الاسم:");
        const p = prompt("كلمة السر (1234):");
        if(p !== '1234') return alert("كلمة سر خاطئة");

        if(role === 'admin') {
            if(appData.admins.includes(u)) navTo('pg-admin');
            else alert("ليس لديك صلاحية مسؤول");
        } else {
            const d = (appData.drivers||[]).find(x => x.name === u);
            if(d) { currUser = u; document.getElementById('drv-tag').innerText = "السائق: " + u; navTo('pg-driver'); }
            else alert("سائق غير مسجل");
        }
    }

    function updateUI() {
        const rs = appData.reports || [];
        // تحديث الإدارة
        document.getElementById('sect-reps').innerHTML = rs.slice().reverse().map(r => `
            <div class="card" style="text-align:right;">
                <img src="${r.img}" style="width:100%; border-radius:10px;">
                <p>📍 ${r.addr}</p>
                <small>🕒 ${r.time} | ${r.date}</small>
                ${r.status==='new' ? `
                    <select id="sel-${r.id}" class="input">
                        <option value="">اختر السائق...</option>
                        ${(appData.drivers||[]).map(d=>`<option value="${d.name}">${d.name}</option>`).join('')}
                    </select>
                    <button class="btn" style="background:var(--forest)" onclick="assignTask(${r.id})">توجيه المهمة</button>
                ` : `<p style="color:orange">🚚 السائق: ${r.assignedTo}</p>`}
                ${r.doneImg ? `<p>✅ النتيجة:</p><img src="${r.doneImg}" style="width:100%; border-radius:10px; border:2px solid green;">` : ''}
                <button style="color:red; background:none; border:none;" onclick="del('rep', ${r.id})">🗑 حذف</button>
            </div>
        `).join('');

        document.getElementById('list-drivers').innerHTML = (appData.drivers||[]).map(d => `<div>${d.name} (${d.truck}) <i class="fas fa-trash" style="color:red" onclick="del('drv', ${d.id})"></i></div>`).join('');
        document.getElementById('list-admins').innerHTML = (appData.admins||[]).map(a => `<div>${a} <i class="fas fa-user-minus" style="color:red" onclick="del('adm', '${a}')"></i></div>`).join('');

        if(currUser) {
            const tasks = rs.filter(r => r.assignedTo === currUser && r.status === 'sent');
            document.getElementById('drv-tasks').innerHTML = tasks.map(r => `
                <div class="card">
                    <img src="${r.img}" style="width:100%;">
                    <p>${r.addr}</p>
                    <label class="btn" style="background:var(--gold);">📷 تصوير الإنجاز <input type="file" capture="environment" style="display:none;" onchange="handleImage(this, 'drv')"></label>
                    <button class="btn" style="background:var(--emerald)" onclick="finishTask(${r.id})">تأكيد الإنجاز</button>
                </div>
            `).join('');
        }
    }

    function addDriver() {
        const n = document.getElementById('adm-d-name').value, t = document.getElementById('adm-d-truck').value;
        if(n) { if(!appData.drivers) appData.drivers = []; appData.drivers.push({id:Date.now(), name:n, truck:t}); syncDB(); 
        document.getElementById('adm-d-name').value=""; document.getElementById('adm-d-truck').value=""; alert("✅ تمت الإضافة والتصفير"); }
    }

    function addAdmin() {
        const n = document.getElementById('adm-m-name').value;
        if(n) { appData.admins.push(n); syncDB(); document.getElementById('adm-m-name').value=""; alert("✅ تم إضافة المسؤول والتصفير"); }
    }

    function assignTask(id) {
        const d = document.getElementById('sel-'+id).value;
        if(d) { const r = appData.reports.find(x=>x.id===id); r.status='sent'; r.assignedTo=d; syncDB(); alert("🚀 تم التوجيه"); }
    }

    function finishTask(id) {
        if(!tmpDrv) return alert("يرجى تصوير النتيجة أولاً");
        const r = appData.reports.find(x=>x.id===id);
        r.status='done'; r.doneImg=tmpDrv; syncDB(); alert("✅ تم إبلاغ الإدارة بالإنجاز"); tmpDrv="";
    }

    function del(t, id) {
        if(confirm("حذف؟")) {
            if(t==='rep') appData.reports = appData.reports.filter(x=>x.id!==id);
            if(t==='drv') appData.drivers = appData.drivers.filter(x=>x.id!==id);
            if(t==='adm') appData.admins = appData.admins.filter(x=>x!==id);
            syncDB();
        }
    }

    function navTo(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); updateUI(); }
    function toggleSect(id) { const e=document.getElementById(id); e.style.display=e.style.display==='none'?'block':'none'; }
</script>
</body>
</html>

    <div id="pg-driver" class="page">
        <div id="drv-tag" class="card" style="background:var(--emerald); color:white;"></div>
        <div id="drv-tasks"></div>
        <button class="btn" style="background:#444;" onclick="navTo('pg-home')">تسجيل خروج</button>
    </div>
</div>
