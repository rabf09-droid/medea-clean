<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظافة المدية 2026 - الإصدار المطور 13</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --glass: rgba(255, 255, 255, 0.98); --gold: #D4AF37; --red: #d21034; --orange: #fb8c00; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { margin: 0; background: #000; }
        .main-container { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://www.shutterstock.com/shutterstock/photos/1932338633/display_1500/stock-photo-garbage-truck-on-the-street-1932338633.jpg'); background-size: cover; min-height: 100vh; padding-bottom: 180px; }
        .header { background: var(--glass); padding: 15px; text-align: center; border-bottom: 4px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .page { display: none; padding: 20px; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--glass); border-radius: 25px; padding: 20px; margin-bottom: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { border: none; padding: 16px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; color: white; font-size: 1.1rem; }
        .input { width: 100%; padding: 14px; border-radius: 15px; border: 2px solid #ddd; margin-bottom: 12px; font-size: 1rem; text-align: center; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--glass); padding: 15px; border-top: 3px solid var(--gold); z-index: 2000; }
        .lang-box { display: flex; gap: 8px; margin-bottom: 10px; }
        .lang-btn { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid #ccc; background: white; font-weight: bold; cursor: pointer; }
        .stat-grid { display: flex; gap: 8px; margin-bottom: 20px; }
        .stat-item { flex:1; color:white; padding:12px; border-radius:15px; text-align:center; font-size:0.9rem; }
    </style>
</head>
<body onload="initApp()">
<div class="main-container">
    <div class="header">
        <div id="l-country" style="font-size: 0.75rem; font-weight: bold;">الجمهورية الجزائرية الديمقراطية الشعبية</div>
        <div id="l-title" style="font-size: 1.4rem; font-weight: 800; color: var(--emerald);">نظافة المدية 2026</div>
        <div style="display: flex; justify-content: space-between; padding: 5px 20px; font-weight: bold; color: var(--navy);">
            <div id="clock">00:00:00</div>
            <div>06 أفريل 2026</div>
        </div>
    </div>

    <div id="pg-home" class="page active">
        <div class="card" onclick="navTo('pg-report')"><i class="fas fa-bullhorn fa-4x" style="color:var(--forest)"></i><h2 id="btn-rep">التبليغ</h2></div>
        <div class="card" onclick="auth('admin')"><i class="fas fa-user-shield fa-4x" style="color:var(--emerald)"></i><h2 id="btn-adm">الإدارة</h2></div>
        <div class="card" onclick="auth('driver')"><i class="fas fa-truck fa-4x" style="color:var(--gold)"></i><h2 id="btn-drv">السائق</h2></div>
        <div class="footer">
            <div class="lang-box">
                <button class="lang-btn" onclick="setLanguage('ar')">العربية</button>
                <button class="lang-btn" onclick="setLanguage('fr')">Français</button>
                <button class="lang-btn" onclick="setLanguage('en')">English</button>
            </div>
            <button class="btn" style="background:var(--red); margin:0;" onclick="exitApp()"><i class="fas fa-power-off"></i> <span id="btn-exit">خروج نهائي</span></button>
        </div>
    </div>

    <div id="pg-report" class="page">
        <div class="card">
            <div id="camera-preview" style="height:220px; border:3px dashed var(--forest); border-radius:20px; display:flex; align-items:center; justify-content:center; margin-bottom:15px; overflow:hidden; background:#fff;">
                <i id="cam-placeholder" class="fas fa-camera fa-4x" style="color:#ccc"></i>
                <img id="img-output" style="width:100%; height:100%; object-fit:cover; display:none;">
            </div>
            <label class="btn" style="background:var(--navy);">
                <i class="fas fa-camera"></i> <span id="l-take">التقاط صورة النفايات</span>
                <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="processImage(this, 'citizen')">
            </label>
            <button class="btn" style="background:var(--forest);" onclick="getLocation()"><i class="fas fa-map-marker-alt"></i> <span id="l-gps">تحديد الموقع</span></button>
            <input type="text" id="addr-in" class="input" placeholder="العنوان...">
            <input type="text" id="gps-in" class="input" readonly placeholder="الإحداثيات">
            <button id="send-btn" class="btn" style="background:var(--emerald);" onclick="submitData()"><i class="fas fa-paper-plane"></i> <span id="l-send">إرسال التبليغ الآن</span></button>
            <button class="btn" style="background:#666;" onclick="navTo('pg-home')">رجوع</button>
        </div>
    </div>

    <div id="pg-admin" class="page">
        <div class="stat-grid">
            <div class="stat-item" style="background:var(--red);">جديد<br><b id="count-1">0</b></div>
            <div class="stat-item" style="background:var(--orange);">مرسل<br><b id="count-2">0</b></div>
            <div class="stat-item" style="background:var(--forest);">تم<br><b id="count-3">0</b></div>
        </div>
        <button class="btn" style="background:var(--navy)" onclick="toggleSection('sec-reps')">📦 التبليغات الواردة</button>
        <div id="sec-reps" style="display:none;"></div>
        
        <button class="btn" style="background:var(--forest)" onclick="toggleSection('sec-drvs')">🚛 إضافة سائق جديد</button>
        <div id="sec-drvs" style="display:none;" class="card">
            <input type="text" id="d-name" class="input" placeholder="اسم السائق">
            <input type="tel" id="d-phone" class="input" placeholder="رقم الهاتف">
            <input type="text" id="d-truck" class="input" placeholder="رقم الشاحنة">
            <select id="d-sector" class="input">
                <option value="البلدية">البلدية</option>
                <option value="القطاع الخاص">القطاع الخاص</option>
            </select>
            <button class="btn" style="background:var(--emerald)" onclick="addDriver()">حفظ السائق وتصفير الحقول</button>
            <div id="list-drivers-ui"></div>
        </div>
        <button class="btn" style="background:#444;" onclick="navTo('pg-home')">رجوع</button>
    </div>

    <div id="pg-driver" class="page">
        <div id="driver-header" class="card" style="background:var(--emerald); color:white;"></div>
        <div id="driver-jobs"></div>
        <button class="btn" style="background:#444;" onclick="navTo('pg-home')">خروج</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://medea-smart-clean-2026-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let appData = { reports: [], drivers: [], admins: ["فتحي"] };
    let tempImgCit = "", tempImgDrv = "", currentUser = "";

    function syncDB() { db.ref('APP_V13_FIXED').set(appData); }

    function initApp() {
        db.ref('APP_V13_FIXED').on('value', (s) => { if(s.exists()) { appData = s.val(); updateUI(); } });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
        setLanguage('ar');
    }

    // تفعيل اللغات (تم الإصلاح)
    function setLanguage(l) {
        const dict = {
            ar: {c:"الجمهورية الجزائرية الديمقراطية الشعبية", t:"نظافة المدية 2026", r:"التبليغ", a:"الإدارة", d:"السائق", e:"خروج نهائي", tk:"التقاط صورة", g:"تحديد الموقع", s:"إرسال التبليغ"},
            fr: {c:"République Algérienne", t:"Médéa Propre 2026", r:"Signalement", a:"Admin", d:"Chauffeur", e:"Quitter", tk:"Prendre Photo", g:"Localiser", s:"Envoyer"},
            en: {c:"Algerian Republic", t:"Clean Medea 2026", r:"Reporting", a:"Management", d:"Driver", e:"Exit", tk:"Take Photo", g:"Get GPS", s:"Submit"}
        };
        document.getElementById('l-country').innerText = dict[l].c;
        document.getElementById('l-title').innerText = dict[l].t;
        document.getElementById('btn-rep').innerText = dict[l].r;
        document.getElementById('btn-adm').innerText = dict[l].a;
        document.getElementById('btn-drv').innerText = dict[l].d;
        document.getElementById('btn-exit').innerText = dict[l].e;
        document.getElementById('l-take').innerText = dict[l].tk;
        document.getElementById('l-gps').innerText = dict[l].g;
        document.getElementById('l-send').innerText = dict[l].s;
    }

    function processImage(input, role) {
        const reader = new FileReader();
        reader.onload = e => {
            const img = new Image();
            img.onload = () => {
                const cvs = document.createElement('canvas');
                cvs.width = 400; cvs.height = (img.height/img.width)*400;
                cvs.getContext('2d').drawImage(img, 0, 0, cvs.width, cvs.height);
                const res = cvs.toDataURL('image/jpeg', 0.5);
                if(role === 'citizen') {
                    tempImgCit = res; document.getElementById('img-output').src = res;
                    document.getElementById('img-output').style.display='block'; document.getElementById('cam-placeholder').style.display='none';
                } else { tempImgDrv = res; alert("📸 تم التقاط صورة الإنجاز"); }
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }

    function getLocation() {
        navigator.geolocation.getCurrentPosition(p => {
            const lat = p.coords.latitude, lng = p.coords.longitude;
            document.getElementById('gps-in').value = lat.toFixed(5)+","+lng.toFixed(5);
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
            .then(r=>r.json()).then(d=> { document.getElementById('addr-in').value = d.display_name.split(',').slice(0,2).join(','); });
        });
    }

    function submitData() {
        if(!tempImgCit || !document.getElementById('addr-in').value) return alert("أكمل البيانات");
        const r = { id:Date.now(), img:tempImgCit, addr:document.getElementById('addr-in').value, gps:document.getElementById('gps-in').value, status:'new', time:new Date().toLocaleTimeString('fr-FR'), date:"06 أفريل 2026" };
        if(!appData.reports) appData.reports=[]; appData.reports.push(r); syncDB(); alert("✅ تم الإرسال بنجاح"); location.reload();
    }

    function auth(role) {
        const u=prompt("الاسم:"), p=prompt("الرمز:");
        if(role==='admin' && (appData.admins||[]).includes(u) && p==='1234') { currentUser=u; navTo('pg-admin'); }
        else if(role==='driver' && p==='5678') {
            const d=(appData.drivers||[]).find(x=>x.name===u);
            if(d) { currentUser=u; document.getElementById('driver-header').innerHTML=`<h3>${u}</h3><p>🚛 شاحنة: ${d.truck}</p>`; navTo('pg-driver'); }
        }
    }

    function updateUI() {
        const rs = appData.reports || [];
        document.getElementById('count-1').innerText = rs.filter(r=>r.status==='new').length;
        document.getElementById('count-2').innerText = rs.filter(r=>r.status==='sent').length;
        document.getElementById('count-3').innerText = rs.filter(r=>r.status==='done').length;

        document.getElementById('sec-reps').innerHTML = rs.slice().reverse().map(r => `
            <div class="card" style="text-align:right;">
                <img src="${r.img}" style="width:100%; border-radius:15px;">
                <p>📍 ${r.addr}</p>
                ${r.status==='new'? `
                    <select id="sel-${r.id}" class="input">
                        <option value="">اختر سائق...</option>
                        ${(appData.drivers||[]).map(d=>`<option value="${d.name}">${d.name}</option>`).join('')}
                    </select>
                    <button class="btn" style="background:var(--forest)" onclick="assign(${r.id})">إرسال المهمة</button>
                ` : `<p style="color:var(--orange)">🚚 عند السائق: ${r.assignedTo}</p>`}
                ${r.doneImg ? `<div style="margin-top:10px; border-top:1px solid #ccc; padding-top:10px;"><b style="color:green">✅ صورة الإنجاز:</b><img src="${r.doneImg}" style="width:100%; border-radius:10px; border:2px solid green; margin-top:5px;"></div>` : ''}
                <button style="color:red; background:none; border:none; margin-top:10px;" onclick="del('rep', ${r.id})">🗑 حذف البلاغ</button>
            </div>
        `).join('');

        document.getElementById('list-drivers-ui').innerHTML = (appData.drivers||[]).map(d => `
            <div style="background:#eee; padding:10px; margin-top:5px; border-radius:10px; text-align:right;">
                <b>${d.name}</b> | 📞 ${d.phone} | 🚛 ${d.truck} (${d.sector})
                <i class="fas fa-trash" style="color:red; float:left;" onclick="del('drv', ${d.id})"></i>
            </div>
        `).join('');

        const tasks = rs.filter(r=>r.assignedTo===currentUser && r.status==='sent');
        document.getElementById('driver-jobs').innerHTML = tasks.map(r => `
            <div class="card" style="border:3px solid var(--orange); text-align:right;">
                <img src="${r.img}" style="width:100%; border-radius:15px;">
                <p>📍 الموقع: ${r.addr}</p>
                <button class="btn" style="background:var(--navy)" onclick="window.open('https://www.google.com/maps?q=${r.gps}')">📍 فتح الخريطة</button>
                <label class="btn" style="background:var(--gold);">📷 تصوير النتيجة <input type="file" capture="environment" style="display:none;" onchange="processImage(this, 'driver')"></label>
                <button class="btn" style="background:var(--emerald)" onclick="finish(${r.id})">تأكيد الإنجاز</button>
            </div>
        `).join('');
    }

    function addDriver() {
        const n=document.getElementById('d-name').value, p=document.getElementById('d-phone').value, t=document.getElementById('d-truck').value, s=document.getElementById('d-sector').value;
        if(n && p){
            if(!appData.drivers) appData.drivers=[];
            appData.drivers.push({id:Date.now(), name:n, phone:p, truck:t, sector:s});
            syncDB(); ["d-name","d-phone","d-truck"].forEach(id=>document.getElementById(id).value=""); alert("✅ تم الحفظ وتصفير الحقول");
        }
    }

    function assign(id) { const d=document.getElementById('sel-'+id).value; if(d){ const r=appData.reports.find(x=>x.id===id); r.status='sent'; r.assignedTo=d; syncDB(); alert("🚀 تم الإرسال"); } }
    function finish(id) { if(!tempImgDrv) return alert("صور النتيجة أولاً"); const r=appData.reports.find(x=>x.id===id); r.status='done'; r.doneImg=tempImgDrv; syncDB(); alert("✅ تم إبلاغ الإدارة"); }
    function del(t, id) { if(confirm("حذف؟")) { if(t==='rep') appData.reports=appData.reports.filter(x=>x.id!==id); if(t==='drv') appData.drivers=appData.drivers.filter(x=>x.id!==id); syncDB(); } }
    function navTo(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); updateUI(); }
    function toggleSection(id) { const e=document.getElementById(id); e.style.display=e.style.display==='none'?'block':'none'; }
    function exitApp() { if(confirm("خروج؟")) window.location.href="about:blank"; }
</script>
</body>
    </html>
