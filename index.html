<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظافة المدية 2026 - الإصدار النهائي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --glass: rgba(255, 255, 255, 0.98); --gold: #D4AF37; --red: #d21034; --orange: #fb8c00; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { margin: 0; background: #000; }
        .main-container { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://www.shutterstock.com/shutterstock/photos/1932338633/display_1500/stock-photo-garbage-truck-on-the-street-1932338633.jpg'); background-size: cover; min-height: 100vh; padding-bottom: 180px; }
        .header { background: var(--glass); padding: 15px; text-align: center; border-bottom: 4px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .page { display: none; padding: 20px; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--glass); border-radius: 25px; padding: 20px; margin-bottom: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { border: none; padding: 16px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; color: white; font-size: 1.1rem; }
        .input { width: 100%; padding: 14px; border-radius: 15px; border: 2px solid #ddd; margin-bottom: 12px; font-size: 1rem; text-align: center; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--glass); padding: 15px; border-top: 3px solid var(--gold); z-index: 2000; }
        .lang-box { display: flex; gap: 8px; margin-bottom: 10px; }
        .lang-btn { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid #ccc; background: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body onload="initApp()">
<div class="main-container">
    <div class="header">
        <div style="font-size: 0.75rem; font-weight: bold;">الجمهورية الجزائرية الديمقراطية الشعبية</div>
        <div style="font-size: 1.4rem; font-weight: 800; color: var(--emerald);">نظافة المدية 2026</div>
        <div style="display: flex; justify-content: space-between; padding: 5px 20px; font-weight: bold; color: var(--navy);">
            <div id="clock">00:00:00</div>
            <div>06 أفريل 2026</div>
        </div>
    </div>

    <div id="pg-home" class="page active">
        <div class="card" onclick="navTo('pg-report')"><i class="fas fa-bullhorn fa-4x" style="color:var(--forest)"></i><h2>التبليغ</h2></div>
        <div class="card" onclick="auth('admin')"><i class="fas fa-user-shield fa-4x" style="color:var(--emerald)"></i><h2>الإدارة</h2></div>
        <div class="card" onclick="auth('driver')"><i class="fas fa-truck fa-4x" style="color:var(--gold)"></i><h2>السائق</h2></div>
        <div class="footer">
            <div class="lang-box">
                <button class="lang-btn" onclick="setLanguage('ar')">العربية</button>
                <button class="lang-btn" onclick="setLanguage('fr')">Français</button>
                <button class="lang-btn" onclick="setLanguage('en')">English</button>
            </div>
            <button class="btn" style="background:var(--red); margin:0;" onclick="exitApp()"><i class="fas fa-power-off"></i> خروج نهائي</button>
        </div>
    </div>

    <div id="pg-report" class="page">
        <div class="card">
            <div id="camera-preview" style="height:220px; border:3px dashed var(--forest); border-radius:20px; display:flex; align-items:center; justify-content:center; margin-bottom:15px; overflow:hidden; background:#fff;">
                <i id="cam-placeholder" class="fas fa-camera fa-4x" style="color:#ccc"></i>
                <img id="img-output" style="width:100%; height:100%; object-fit:cover; display:none;">
            </div>
            <label class="btn" style="background:var(--navy);">
                <i class="fas fa-camera"></i> التقاط صورة النفايات
                <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="processImage(this, 'citizen')">
            </label>
            <button class="btn" style="background:var(--forest);" onclick="getLocation()"><i class="fas fa-map-marker-alt"></i> تحديد موقع النفايات</button>
            <input type="text" id="addr-in" class="input" placeholder="العنوان التقريبي">
            <input type="text" id="gps-in" class="input" readonly placeholder="الإحداثيات الجغرافية">
            <button id="send-btn" class="btn" style="background:var(--emerald);" onclick="submitData()"><i class="fas fa-paper-plane"></i> إرسال التبليغ الآن</button>
            <button class="btn" style="background:#666;" onclick="navTo('pg-home')">رجوع</button>
        </div>
    </div>

    <div id="pg-admin" class="page">
        <div style="display: flex; gap: 8px; margin-bottom: 20px;">
            <div style="flex:1; background:var(--red); color:white; padding:12px; border-radius:15px; text-align:center;">جديد<br><b id="count-1">0</b></div>
            <div style="flex:1; background:var(--orange); color:white; padding:12px; border-radius:15px; text-align:center;">مرسل<br><b id="count-2">0</b></div>
            <div style="flex:1; background:var(--forest); color:white; padding:12px; border-radius:15px; text-align:center;">تم<br><b id="count-3">0</b></div>
        </div>
        <button class="btn" style="background:var(--navy)" onclick="toggleSection('sec-reps')">📦 التبليغات الواردة</button>
        <div id="sec-reps" style="display:none;"></div>
        
        <button class="btn" style="background:var(--forest)" onclick="toggleSection('sec-drvs')">🚛 إضافة سائق</button>
        <div id="sec-drvs" style="display:none;" class="card">
            <input type="text" id="d-name" class="input" placeholder="اسم السائق">
            <input type="text" id="d-truck" class="input" placeholder="رقم الشاحنة">
            <button class="btn" style="background:var(--emerald)" onclick="addDriver()">حفظ السائق (تصفير)</button>
            <div id="list-drivers-ui"></div>
        </div>

        <div id="owner-zone" style="display:none;">
            <button class="btn" style="background:var(--gold); color:black;" onclick="toggleSection('sec-mgrs')">🔑 إدارة المسؤولين</button>
            <div id="sec-mgrs" style="display:none;" class="card">
                <input type="text" id="m-name" class="input" placeholder="اسم المسؤول">
                <button class="btn" style="background:var(--navy)" onclick="addAdmin()">إضافة مسؤول (تصفير)</button>
                <div id="list-admins-ui"></div>
            </div>
        </div>
        <button class="btn" style="background:#444;" onclick="navTo('pg-home')">رجوع</button>
    </div>

    <div id="pg-driver" class="page">
        <div id="driver-header" class="card" style="background:var(--emerald); color:white;"></div>
        <div id="driver-jobs"></div>
        <button class="btn" style="background:#444;" onclick="navTo('pg-home')">خروج</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://medea-smart-clean-2026-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let appData = { reports: [], drivers: [], admins: ["فتحي"] };
    let tempImgCit = "", tempImgDrv = "", currentUser = "";

    function syncDB() {
        db.ref('APP_V13_FINAL').set(appData, (error) => {
            if (error) { alert("فشل الإرسال: " + error.message); }
        });
    }

    function initApp() {
        db.ref('APP_V13_FINAL').on('value', (snapshot) => {
            if(snapshot.exists()) { appData = snapshot.val(); updateUI(); }
        });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
    }

    function exitApp() {
        if(confirm("هل تريد إغلاق التطبيق؟")) {
            if(navigator.app) { navigator.app.exitApp(); } 
            else { window.close(); window.location.href="about:blank"; }
        }
    }

    function processImage(input, role) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 400;
                const scale = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scale;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                const compressed = canvas.toDataURL('image/jpeg', 0.5);
                if(role === 'citizen') {
                    tempImgCit = compressed;
                    document.getElementById('img-output').src = compressed;
                    document.getElementById('img-output').style.display = 'block';
                    document.getElementById('cam-placeholder').style.display = 'none';
                } else { tempImgDrv = compressed; alert("📸 تم حفظ صورة النتيجة"); }
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }

    function getLocation() {
        navigator.geolocation.getCurrentPosition(p => {
            const lat = p.coords.latitude, lng = p.coords.longitude;
            document.getElementById('gps-in').value = lat.toFixed(6) + "," + lng.toFixed(6);
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
            .then(r => r.json()).then(d => { document.getElementById('addr-in').value = d.display_name.split(',').slice(0,3).join(','); });
        }, () => alert("يرجى تفعيل GPS الهاتف"));
    }

    function submitData() {
        const addr = document.getElementById('addr-in').value;
        const gps = document.getElementById('gps-in').value;
        if(!tempImgCit || !addr) return alert("أكمل تصوير النفايات وتحديد الموقع أولاً");
        const newReport = {
            id: Date.now(), img: tempImgCit, addr: addr, gps: gps,
            status: 'new', time: new Date().toLocaleTimeString('fr-FR'), date: "06 أفريل 2026"
        };
        if(!appData.reports) appData.reports = [];
        appData.reports.push(newReport);
        document.getElementById('send-btn').innerText = "جاري الإرسال...";
        db.ref('APP_V13_FINAL').set(appData).then(() => {
            alert("✅ تم وصول التبليغ للإدارة بنجاح تام");
            location.reload();
        });
    }

    function auth(role) {
        const u = prompt("الاسم:"), p = prompt("الرمز:");
        if(role==='admin' && (appData.admins||[]).includes(u) && p==='1234') { 
            currentUser=u; document.getElementById('owner-zone').style.display=(u==="فتحي"?'block':'none');
            navTo('pg-admin'); 
        } else if(role==='driver' && p==='5678') {
            const d = (appData.drivers||[]).find(x => x.name === u);
            if(d) { currentUser=u; document.getElementById('driver-header').innerHTML = `<h3>${u}</h3><p>🚛 شاحنة: ${d.truck}</p>`; navTo('pg-driver'); }
            else alert("غير مسجل");
        }
    }

    function navTo(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); updateUI(); }

    function updateUI() {
        const rs = appData.reports || [];
        document.getElementById('count-1').innerText = rs.filter(r => r.status === 'new').length;
        document.getElementById('count-2').innerText = rs.filter(r => r.status === 'sent').length;
        document.getElementById('count-3').innerText = rs.filter(r => r.status === 'done').length;

        document.getElementById('sec-reps').innerHTML = rs.slice().reverse().map(r => `
            <div class="card" style="text-align:right;">
                <img src="${r.img}" style="width:100%; border-radius:15px; height:150px; object-fit:cover;">
                <p>📍 ${r.addr}</p><p>🕒 ${r.time} | 📅 ${r.date}</p>
                ${r.status === 'new' ? `
                    <select id="assign-${r.id}" class="input">
                        <option value="">اختر السائق المراد إرسال الملف له...</option>
                        ${(appData.drivers||[]).map(d => `<option value="${d.name}">${d.name}</option>`).join('')}
                    </select>
                    <button class="btn" style="background:var(--forest)" onclick="assign(${r.id})">إرسال المهمة للسائق</button>
                ` : `<p style="color:var(--orange)">🚚 في عهدة: ${r.assignedTo}</p>`}
                <button style="color:red; background:none; border:none;" onclick="del('rep', ${r.id})"><i class="fas fa-trash"></i> حذف</button>
            </div>
        `).join('');
        document.getElementById('list-drivers-ui').innerHTML = (appData.drivers||[]).map(d => `<div style="background:#eee; padding:10px; margin-top:5px; border-radius:10px; text-align:right;">${d.name} | ${d.truck} <i class="fas fa-trash" style="color:red; float:left;" onclick="del('drv', ${d.id})"></i></div>`).join('');
        document.getElementById('list-admins-ui').innerHTML = (appData.admins||[]).map(a => `<div style="background:#eee; padding:10px; margin-top:5px; border-radius:10px;">${a} ${a!=='فتحي'?`<i class="fas fa-times" style="color:red; float:left;" onclick="del('adm', '${a}')"></i>`:''}</div>`).join('');
        const jobs = rs.filter(r => r.assignedTo === currentUser && r.status === 'sent');
        document.getElementById('driver-jobs').innerHTML = jobs.map(r => `
            <div class="card" style="border:3px solid var(--orange); text-align:right;">
                <h3 style="color:var(--red)">🚨 مهمة جديدة وصلتك:</h3>
                <img src="${r.img}" style="width:100%; border-radius:15px;">
                <p>📍 الموقع: ${r.addr}</p>
                <button class="btn" style="background:var(--navy)" onclick="window.open('http://googleusercontent.com/maps.google.com/q=${r.gps}')"><i class="fas fa-map-marked-alt"></i> الخريطة (GPS)</button>
                <hr>
                <label class="btn" style="background:var(--gold);">📷 تصوير النتيجة <input type="file" capture="environment" style="display:none;" onchange="processImage(this, 'driver')"></label>
                <button class="btn" style="background:var(--emerald)" onclick="finish(${r.id})">تأكيد الإنجاز</button>
            </div>
        `).join('');
    }

    function addDriver() {
        const n=document.getElementById('d-name').value, t=document.getElementById('d-truck').value;
        if(n){ if(!appData.drivers) appData.drivers=[];
        appData.drivers.push({id:Date.now(), name:n, truck:t}); syncDB(); document.getElementById('d-name').value=""; document.getElementById('d-truck').value=""; alert("✅ تم الحفظ وتصفير الخانات"); }
    }

    function addAdmin() { const n=document.getElementById('m-name').value; if(n){ if(!appData.admins) appData.admins=[]; appData.admins.push(n); syncDB(); document.getElementById('m-name').value=""; alert("✅ تمت الإضافة وتصفير الخانة"); } }
    function assign(id) { const d=document.getElementById('assign-'+id).value; if(d){ const r=appData.reports.find(x=>x.id===id); r.status='sent'; r.assignedTo=d; syncDB(); alert("🚀 تم الإرسال للسائق"); } }
    function finish(id) { if(!tempImgDrv) return alert("صور النتيجة أولاً"); const r=appData.reports.find(x=>x.id===id); r.status='done'; r.doneImg=tempImgDrv; syncDB(); alert("✅ تم إبلاغ الإدارة"); }
    function del(t, id) { if(confirm("حذف؟")) { if(t==='rep') appData.reports=appData.reports.filter(x=>x.id!==id); if(t==='drv') appData.drivers=appData.drivers.filter(x=>x.id!==id); if(t==='adm') appData.admins=appData.admins.filter(x=>x!==id); syncDB(); } }
    function toggleSection(id) { const e=document.getElementById(id); e.style.display=e.style.display==='none'?'block':'none'; }
</script>
</body>
                </html>
