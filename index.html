<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المدية نظيفة - النسخة النهائية</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --gold: #D4AF37; --red: #d21034; --orange: #fb8c00; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        
        body { 
            margin: 0; 
            background: #000 url('https://raw.githubusercontent.com/rabf09-droid/rabf09-droid.github.io/main/1000052240.webp') no-repeat center center fixed; 
            background-size: cover;
        }

        .overlay { background: rgba(0, 0, 0, 0.65); min-height: 100vh; padding-bottom: 150px; }

        .header { background: rgba(255,255,255,0.95); padding: 15px; text-align: center; border-bottom: 4px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .page { display: none; padding: 20px; animation: fadeIn 0.4s; max-width: 800px; margin: auto; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: rgba(255,255,255,0.95); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
        .btn { border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; color: white; font-size: 1.1rem; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }
        .input { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #ddd; margin-bottom: 10px; text-align: center; font-size: 1rem; }
        
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 10px; border-top: 3px solid var(--gold); text-align: center; z-index: 2000; }
        .counter-container { display: flex; gap: 8px; margin-bottom: 15px; }
        .counter-box { flex:1; padding:12px; border-radius:15px; color:white; text-align:center; font-weight:bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .item-list { background: #fff; padding: 12px; border-radius: 10px; margin-top: 8px; border-right: 6px solid var(--emerald); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .lang-bar { margin-bottom: 10px; display: flex; justify-content: center; gap: 5px; }
        .lang-btn { padding: 5px 15px; border-radius: 8px; border: 1px solid #ccc; background: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body onload="initApp()">

<div class="overlay">
    <div class="header">
        <div id="txt-country" style="font-size: 0.85rem; font-weight: bold;">الجمهورية الجزائرية الديمقراطية الشعبية</div>
        <div id="txt-dept" style="font-size: 0.75rem; color: var(--forest); font-weight: bold; margin: 3px 0;">مصلحة النظافة و الوقاية الصحية بلدية المدية</div>
        <div id="txt-title" style="font-size: 1.8rem; font-weight: 900; color: var(--emerald);">المدية نظيفة</div>
        <div style="display: flex; justify-content: space-around; padding: 8px 0; border-top: 1px solid #eee; margin-top: 5px;">
            <div id="clock" style="font-weight: bold; color: var(--navy);">00:00:00</div>
            <div id="txt-date" style="font-weight: bold;">07 أفريل 2026</div>
        </div>
    </div>

    <div id="pg-home" class="page active">
        <div class="card" onclick="navTo('pg-report')"><i class="fas fa-bullhorn fa-4x" style="color:var(--forest)"></i><h2 id="lbl-main-rep">التبليغ</h2></div>
        <div class="card" onclick="auth('admin')"><i class="fas fa-user-shield fa-4x" style="color:var(--emerald)"></i><h2 id="lbl-main-adm">الإدارة</h2></div>
        <div class="card" onclick="auth('driver')"><i class="fas fa-truck fa-4x" style="color:var(--gold)"></i><h2 id="lbl-main-drv">السائقين</h2></div>
    </div>

    <div id="pg-report" class="page">
        <div class="card">
            <div id="cam-box" style="height:220px; border:3px dashed #bbb; border-radius:15px; display:flex; align-items:center; justify-content:center; background:#fff; margin-bottom:15px; overflow:hidden;">
                <i id="ico-cam" class="fas fa-camera fa-4x" style="color:#ccc"></i>
                <img id="out-img" style="width:100%; height:100%; object-fit:cover; display:none;">
            </div>
            <label class="btn" style="background:var(--navy);"><i class="fas fa-camera"></i> <span id="lbl-take">التقاط صورة</span><input type="file" accept="image/*" capture="environment" style="display:none;" onchange="handleImg(this, 'citizen')"></label>
            <button class="btn" style="background:var(--forest);" onclick="getLoc()"><i class="fas fa-map-marker-alt"></i> <span id="lbl-loc">تحديد الموقع</span></button>
            <input type="text" id="in-addr" class="input" placeholder="العنوان">
            <input type="text" id="in-gps" class="input" readonly placeholder="الإحداثيات">
            <button class="btn" style="background:var(--emerald);" onclick="sendReport()"><i class="fas fa-paper-plane"></i> <span id="lbl-send">إرسال التبليغ</span></button>
            <button class="btn" style="background:#666;" onclick="navTo('pg-home')">رجوع</button>
        </div>
    </div>

    <div id="pg-admin" class="page">
        <div class="counter-container">
            <div class="counter-box" style="background:var(--red);"><i class="fas fa-bullhorn"></i><br><span id="c1">0</span></div>
            <div class="counter-box" style="background:var(--orange);"><i class="fas fa-truck"></i><br><span id="c2">0</span></div>
            <div class="counter-box" style="background:var(--forest);"><i class="fas fa-check-circle"></i><br><span id="c3">0</span></div>
        </div>

        <div id="admin-list-area"></div>

        <div class="card">
            <h3>إضافة سائق / شاحنة</h3>
            <input type="text" id="dr-n" class="input" placeholder="اسم السائق">
            <input type="text" id="dr-p" class="input" placeholder="رقم الهاتف">
            <input type="text" id="dr-t" class="input" placeholder="رقم الشاحنة">
            <select id="dr-s" class="input"><option value="البلدية">البلدية</option><option value="القطاع الخاص">القطاع الخاص</option></select>
            <button class="btn" style="background:var(--emerald)" onclick="addDr()">حفظ السائق</button>
            <div id="ui-drivers-list"></div>
        </div>

        <div class="card" id="root-tools" style="display:none;">
            <h3>النظافة مسؤولية (المسؤولين)</h3>
            <input type="text" id="ad-n" class="input" placeholder="اسم المسؤول">
            <button class="btn" style="background:var(--navy)" onclick="addAd()">إضافة مسؤول</button>
            <div id="ui-admins-list"></div>
        </div>
        <button class="btn" style="background:#444;" onclick="navTo('pg-home')">تسجيل الخروج</button>
    </div>

    <div id="pg-driver" class="page">
        <div id="dr-welcome" class="card" style="background:var(--emerald); color:white; text-align:center;"></div>
        <div id="dr-tasks"></div>
        <button class="btn" style="background:#444;" onclick="navTo('pg-home')">رجوع</button>
    </div>

    <div class="footer">
        <div class="lang-bar">
            <button class="lang-btn" onclick="setLang('ar')">عربية</button>
            <button class="lang-btn" onclick="setLang('fr')">Français</button>
            <button class="lang-btn" onclick="setLang('en')">English</button>
        </div>
        <div style="font-size: 0.75rem; font-weight: bold; color: var(--navy);">إعداد د. رابحي فتحي</div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://medea-smart-clean-2026-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let appData = { reports: [], drivers: [], admins: ["فتحي"] };
    let curImgCit = "", curImgDrv = "", curUser = "";

    function initApp() {
        db.ref('FINAL_OFFICIAL_DATA').on('value', s => { if(s.exists()){ appData=s.val(); updateUI(); } });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
    }

    function handleImg(input, role) {
        const reader = new FileReader();
        reader.onload = e => {
            if(role === 'citizen') {
                curImgCit = e.target.result;
                document.getElementById('out-img').src = curImgCit;
                document.getElementById('out-img').style.display = 'block';
                document.getElementById('ico-cam').style.display = 'none';
            } else { curImgDrv = e.target.result; alert("تمت إضافة صورة الإنجاز"); }
        };
        reader.readAsDataURL(input.files[0]);
    }

    function getLoc() {
        navigator.geolocation.getCurrentPosition(p => {
            const lat = p.coords.latitude, lng = p.coords.longitude;
            document.getElementById('in-gps').value = lat.toFixed(6) + "," + lng.toFixed(6);
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=ar`).then(r=>r.json()).then(d=>{
                document.getElementById('in-addr').value = d.display_name.split(',').slice(0,2).join(',');
            });
        });
    }

    function sendReport() {
        const addr = document.getElementById('in-addr').value;
        if(!curImgCit || !addr) return alert("يرجى التقاط صورة وتحديد الموقع");

        const report = {
            id: Date.now(), img: curImgCit, addr: addr, gps: document.getElementById('in-gps').value,
            time: new Date().toLocaleTimeString('fr-FR'), date: "07 أفريل 2026", status: 'new'
        };

        if(!appData.reports) appData.reports = [];
        appData.reports.push(report);

        db.ref('FINAL_OFFICIAL_DATA').set(appData).then(() => {
            // تصفير فوري
            curImgCit=""; document.getElementById('out-img').style.display='none'; 
            document.getElementById('ico-cam').style.display='block';
            document.getElementById('in-addr').value=""; document.getElementById('in-gps').value="";

            if(confirm("هل لديك تبليغ آخر؟")) {
                window.scrollTo(0,0);
            } else {
                alert("تم الإرسال بنجاح.. شكراً لتعاونكم");
                navTo('pg-home');
            }
        });
    }

    function updateUI() {
        const rs = appData.reports || [];
        document.getElementById('c1').innerText = rs.filter(r=>r.status==='new').length;
        document.getElementById('c2').innerText = rs.filter(r=>r.status==='sent').length;
        document.getElementById('c3').innerText = rs.filter(r=>r.status==='done').length;

        // الإدارة: بلاغات ومهام منجزة
        document.getElementById('admin-list-area').innerHTML = rs.slice().reverse().map(r => `
            <div class="card" style="border-right:10px solid ${r.status==='done'?'green':(r.status==='sent'?'orange':'red')};">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <b style="color:var(--navy)">🕒 ${r.time} - ${r.date}</b>
                    <i class="fas fa-trash" style="color:red; cursor:pointer;" onclick="delRep(${r.id})"></i>
                </div>
                <p><b>[التبليغ المرسل]:</b></p>
                <img src="${r.img}" style="width:100%; border-radius:10px; margin-bottom:8px;">
                <p>📍 ${r.addr} | 🌍 ${r.gps}</p>
                ${r.status==='new' ? `<button class="btn" style="background:var(--forest)" onclick="assign(${r.id})">توجيه للسائق</button>` : `<p style="color:var(--orange)">🚚 المكلف: ${r.driver}</p>`}
                ${r.status==='done' ? `
                    <div style="margin-top:10px; border-top:2px dashed green; padding-top:10px; background:#f0fff0; border-radius:10px; padding:10px;">
                        <b style="color:green">✅ [تم الإنجاز]:</b>
                        <img src="${r.doneImg}" style="width:100%; border-radius:10px; margin:8px 0;">
                        <p>🕒 وقت الإنجاز: ${r.doneTime} | ${r.doneDate}</p>
                    </div>
                ` : ''}
            </div>
        `).join('');

        // قوائم الأسماء (سائقين ومسؤولين) مع التصفير
        document.getElementById('ui-drivers-list').innerHTML = (appData.drivers || []).map(d => `
            <div class="item-list"><span>${d.name} (${d.phone}) - ${d.truck}</span><i class="fas fa-trash-alt" style="color:red" onclick="delDr(${d.id})"></i></div>
        `).join('');
        document.getElementById('ui-admins-list').innerHTML = (appData.admins || []).map(a => `
            <div class="item-list"><span>${a}</span>${a!=='فتحي'?`<i class="fas fa-trash-alt" style="color:red" onclick="delAd('${a}')"></i>`:''}</div>
        `).join('');

        // واجهة السائق
        if(curUser) {
            document.getElementById('dr-welcome').innerHTML = `<h3>السائق: ${curUser}</h3><p>تاريخ: 07 أفريل 2026</p>`;
            const tasks = rs.filter(r=>r.driver===curUser && r.status==='sent');
            document.getElementById('dr-tasks').innerHTML = tasks.length ? tasks.map(t => `
                <div class="card">
                    <p style="color:red; font-weight:bold;">مهمة مرسلة من الإدارة:</p>
                    <img src="${t.img}" style="width:100%; border-radius:10px;">
                    <p>📍 ${t.addr} | 🕒 ${t.time}</p>
                    <button class="btn" style="background:var(--navy)" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${t.gps}')"><i class="fas fa-map"></i> تحديد الموقع على الخريطة</button>
                    <label class="btn" style="background:var(--gold)"><i class="fas fa-camera"></i> أخذ صورة بعد التنفيذ<input type="file" capture="environment" style="display:none;" onchange="handleImg(this, 'driver')"></label>
                    <button class="btn" style="background:var(--forest)" onclick="finishJob(${t.id})">تأكيد الإنجاز</button>
                </div>
            `).join('') : '<p style="color:white; text-align:center;">لا توجد مهام جديدة</p>';
        }
    }

    function addDr() {
        const n=document.getElementById('dr-n').value;
        if(n) {
            if(!appData.drivers) appData.drivers = [];
            appData.drivers.push({id:Date.now(), name:n, phone:document.getElementById('dr-p').value, truck:document.getElementById('dr-t').value, sector:document.getElementById('dr-s').value});
            db.ref('FINAL_OFFICIAL_DATA').set(appData);
            document.getElementById('dr-n').value=""; document.getElementById('dr-p').value=""; document.getElementById('dr-t').value="";
        }
    }
    function addAd() { const n=document.getElementById('ad-n').value; if(n){ appData.admins.push(n); db.ref('FINAL_OFFICIAL_DATA').set(appData); document.getElementById('ad-n').value=""; }}
    function delDr(id) { if(confirm("حذف؟")){ appData.drivers=appData.drivers.filter(x=>x.id!==id); db.ref('FINAL_OFFICIAL_DATA').set(appData); }}
    function delAd(n) { if(confirm("حذف؟")){ appData.admins=appData.admins.filter(x=>x!==n); db.ref('FINAL_OFFICIAL_DATA').set(appData); }}
    function delRep(id) { if(confirm("حذف البلاغ؟")){ appData.reports=appData.reports.filter(x=>x.id!==id); db.ref('FINAL_OFFICIAL_DATA').set(appData); }}
    
    function assign(id) { 
        const n = prompt("اسم السائق المكلف:"); 
        if(n) { 
            const r = appData.reports.find(x=>x.id===id); 
            r.status='sent'; r.driver=n; 
            db.ref('FINAL_OFFICIAL_DATA').set(appData); 
        } 
    }

    function finishJob(id) {
        if(!curImgDrv) return alert("يرجى تصوير النتيجة أولاً");
        const r = appData.reports.find(x=>x.id===id);
        r.status='done'; r.doneImg=curImgDrv; r.doneTime=new Date().toLocaleTimeString('fr-FR'); r.doneDate="07 أفريل 2026";
        db.ref('FINAL_OFFICIAL_DATA').set(appData).then(() => { curImgDrv=""; alert("تم بنجاح.. شكراً لك"); });
    }

    function auth(role) {
        const u = prompt("الاسم:"), p = prompt("الرمز:");
        if(role==='admin' && (appData.admins||[]).includes(u) && p==='1234') {
            document.getElementById('root-tools').style.display = (u==='فتحي')?'block':'none'; navTo('pg-admin');
        } else if(role==='driver' && p==='5678') {
            if((appData.drivers||[]).find(x=>x.name===u)){ curUser=u; navTo('pg-driver'); } else alert("الاسم غير مسجل");
        }
    }

    function setLang(l) {
        const t = {
            ar: { c: "الجمهورية الجزائرية الديمقراطية الشعبية", d: "مصلحة النظافة و الوقاية الصحية بلدية المدية", t: "المدية نظيفة", r: "التبليغ", a: "الإدارة", dr: "السائقين" },
            fr: { c: "République Algérienne Démocratique et Populaire", d: "Service d'Hygiène - Médéa", t: "Médéa Propre", r: "Signalement", a: "Administration", dr: "Chauffeurs" },
            en: { c: "People's Democratic Republic of Algeria", d: "Hygiene Service - Medea", t: "Clean Medea", r: "Reporting", a: "Management", dr: "Drivers" }
        }[l];
        document.getElementById('txt-country').innerText = t.c;
        document.getElementById('txt-dept').innerText = t.d;
        document.getElementById('txt-title').innerText = t.t;
        document.getElementById('lbl-main-rep').innerText = t.r;
        document.getElementById('lbl-main-adm').innerText = t.a;
        document.getElementById('lbl-main-drv').innerText = t.dr;
        document.dir = (l === 'ar' ? 'rtl' : 'ltr');
    }

    function navTo(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
</script>
</body>
                </html>
