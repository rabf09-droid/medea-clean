<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المدية نظيفة</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, sans-serif;
    }

    body {
        width: 100%;
        height: 100vh;
        background: linear-gradient(to bottom, #006233, #FFFFFF, #D21034);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    .flag {
        font-size: 80px;
        margin-bottom: 20px;
        animation: wave 2s ease-in-out infinite;
    }

    @keyframes wave {
        0%, 100% { transform: rotate(-5deg); }
        50% { transform: rotate(5deg); }
    }

    .title {
        font-size: 48px;
        font-weight: 900;
        color: #006233;
        margin-bottom: 10px;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    }

    .subtitle {
        font-size: 32px;
        font-weight: 800;
        color: #D21034;
        margin-bottom: 50px;
    }

    .buttons-container {
        display: flex;
        gap: 30px;
        align-items: center;
    }

    .device-btn {
        width: 200px;
        height: 200px;
        border-radius: 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        border: none;
    }

    .device-btn:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 30px rgba(0,0,0,0.3);
    }

    .btn-phone {
        background: #D21034;
    }

    .btn-computer {
        background: #006233;
    }

    .btn-icon {
        font-size: 60px;
    }

    .footer-text {
        position: absolute;
        bottom: 30px;
        text-align: center;
        color: #333;
        font-size: 16px;
        line-height: 1.8;
    }

    .footer-text p {
        margin: 5px 0;
    }
</style>
</head>
<body>
    <div class="flag">🇩🇿</div>
    <div class="title">النظافة من الإيمان</div>
    <div class="subtitle">المدية نظيفة</div>

    <div class="buttons-container">
        <button class="device-btn btn-computer" onclick="selectDevice('desktop')">
            <span class="btn-icon">💻</span>
        </button>
        <button class="device-btn btn-phone" onclick="selectDevice('mobile')">
            <span class="btn-icon">📱</span>
        </button>
    </div>

    <div class="footer-text">
        <p>مصلحة النظافة والوقاية الصحية - بلدية المدية</p>
        <p>التطبيق من إعداد د.رابحي فتحي</p>
        <p>سيتم حفظ اختيارك للزيارات القادمة</p>
    </div>

    <script>
        function selectDevice(type) {
            localStorage.setItem('app_mode', type);
            if(type === 'desktop') {
                window.location.href = 'computer.html';
            } else {
                window.location.href = 'mobile.html';
            }
        }
    </script>
</body>
</html>
