<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المدية نظيفة</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --glass: rgba(255, 255, 255, 0.98); --gold: #D4AF37; --red: #d21034; --orange: #fb8c00; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { margin: 0; background: #000; overflow-x: hidden; }
        .main-container { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://www.shutterstock.com/shutterstock/photos/1932338633/display_1500/stock-photo-garbage-truck-on-the-street-1932338633.jpg'); background-size: cover; background-position: center; background-attachment: fixed; min-height: 100vh; padding-bottom: 180px; }
        .header { background: var(--glass); padding: 15px; text-align: center; border-bottom: 4px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .page { display: none; padding: 20px; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--glass); border-radius: 25px; padding: 20px; margin-bottom: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { border: none; padding: 16px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; color: white; font-size: 1.1rem; }
        .input { width: 100%; padding: 14px; border-radius: 15px; border: 2px solid #ddd; margin-bottom: 12px; font-size: 1rem; text-align: center; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--glass); padding: 15px; border-top: 3px solid var(--gold); z-index: 2000; text-align: center; }
        .lang-box { display: flex; gap: 8px; margin-bottom: 10px; }
        .lang-btn { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid #ccc; background: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body onload="initApp()">
<div class="main-container">
    <div class="header">
        <div id="txt-country" style="font-size: 0.8rem; font-weight: bold; color: var(--navy);">الجمهورية الجزائرية الديمقراطية الشعبية</div>
        <div id="txt-dept" style="font-size: 0.75rem; color: var(--forest); font-weight: bold;">مصلحة النظافة والوقاية الصحية بلدية المدية</div>
        <div id="txt-title" style="font-size: 1.6rem; font-weight: 800; color: var(--emerald); margin: 5px 0;">المدية نظيفة</div>
        <div style="display: flex; justify-content: space-between; padding: 5px 20px; font-weight: bold;">
            <div id="clock">00:00:00</div>
            <div id="txt-date">06 أفريل 2026</div>
        </div>
    </div>

    <div id="pg-home" class="page active">
        <div class="card" onclick="navTo('pg-report')"><i class="fas fa-bullhorn fa-4x" style="color:var(--forest)"></i><h2 id="lbl-report">التبليغ</h2></div>
        <div class="card" onclick="auth('admin')"><i class="fas fa-user-shield fa-4x" style="color:var(--emerald)"></i><h2 id="lbl-admin">الإدارة</h2></div>
        <div class="card" onclick="auth('driver')"><i class="fas fa-truck fa-4x" style="color:var(--gold)"></i><h2 id="lbl-driver">الشاحنة</h2></div>
        
        <div class="footer">
            <div class="lang-box">
                <button class="lang-btn" onclick="setLang('ar')">العربية</button>
                <button class="lang-btn" onclick="setLang('fr')">Français</button>
                <button class="lang-btn" onclick="setLang('en')">English</button>
            </div>
            <button class="btn" style="background:var(--red); margin-bottom:5px;" onclick="exitApp()"><i class="fas fa-power-off"></i> <span id="lbl-exit">خروج</span></button>
            <div style="font-size: 0.7rem; font-weight: bold; color: var(--navy);">التطبيق من إعداد د. رابحي فتحي</div>
        </div>
    </div>

    <div id="pg-report" class="page">
        <div class="card">
            <div id="cam-box" style="height:200px; border:2px dashed #ccc; border-radius:15px; display:flex; align-items:center; justify-content:center; overflow:hidden; background:#fff; margin-bottom:15px;">
                <i id="ico-cam" class="fas fa-camera fa-3x" style="color:#ddd"></i>
                <img id="out-img" style="width:100%; height:100%; object-fit:cover; display:none;">
            </div>
            <label class="btn" style="background:var(--navy);"><i class="fas fa-camera"></i> <span id="lbl-take">التقاط صورة</span><input type="file" accept="image/*" capture="environment" style="display:none;" onchange="handleImg(this)"></label>
            <button class="btn" style="background:var(--forest);" onclick="getLoc()"><i class="fas fa-map-marker-alt"></i> <span id="lbl-loc">تحديد الموقع</span></button>
            <input type="text" id="in-addr" class="input" placeholder="العنوان">
            <input type="text" id="in-gps" class="input" readonly placeholder="الإحداثيات">
            <button class="btn" style="background:var(--emerald);" onclick="sendReport()"><i class="fas fa-paper-plane"></i> <span id="lbl-send">إرسال</span></button>
            <button class="btn" style="background:#666;" onclick="navTo('pg-home')">رجوع</button>
        </div>
    </div>

    <div id="pg-admin" class="page">
        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <div style="flex:1; background:var(--red); color:#fff; border-radius:10px; padding:10px;"><i class="fas fa-clock"></i><br><b id="c1">0</b></div>
            <div style="flex:1; background:var(--orange); color:#fff; border-radius:10px; padding:10px;"><i class="fas fa-truck"></i><br><b id="c2">0</b></div>
            <div style="flex:1; background:var(--forest); color:#fff; border-radius:10px; padding:10px;"><i class="fas fa-check-circle"></i><br><b id="c3">0</b></div>
        </div>
        <button class="btn" style="background:var(--navy)" onclick="toggleSection('sec-reps')">عرض التبليغات</button>
        <div id="sec-reps" style="display:none;"></div>
        
        <button class="btn" style="background:var(--forest)" onclick="toggleSection('sec-add')">إدارة السائقين والمسؤولين</button>
        <div id="sec-add" style="display:none;" class="card">
            <input type="text" id="dr-n" class="input" placeholder="اسم السائق">
            <input type="text" id="dr-p" class="input" placeholder="رقم الهاتف">
            <input type="text" id="dr-t" class="input" placeholder="رقم الشاحنة">
            <select id="dr-s" class="input"><option value="البلدية">البلدية</option><option value="القطاع الخاص">القطاع الخاص</option></select>
            <button class="btn" style="background:var(--emerald)" onclick="addDr()">حفظ السائق</button>
            <hr>
            <div id="main-admin-only" style="display:none;">
                <input type="text" id="ad-n" class="input" placeholder="اسم المسؤول الجديد">
                <button class="btn" style="background:var(--navy)" onclick="addAd()">إضافة مسؤول</button>
            </div>
            <div id="dr-list-ui" style="text-align:right;"></div>
        </div>
        <button class="btn" style="background:#444;" onclick="navTo('pg-home')">خروج</button>
    </div>

    <div id="pg-driver" class="page">
        <div id="dr-head" class="card" style="background:var(--emerald); color:white;"></div>
        <div id="dr-tasks"></div>
        <button class="btn" style="background:#444;" onclick="navTo('pg-home')">رجوع</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://medea-smart-clean-2026-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let appData = { reports: [], drivers: [], admins: ["فتحي"] };
    let curImg = "", curUser = "";

    function setLang(l) {
        const d = {
            ar: { title: "المدية نظيفة", rep: "التبليغ", adm: "الإدارة", drv: "الشاحنة", exit: "خروج", take: "التقاط صورة", loc: "تحديد الموقع", send: "إرسال" },
            fr: { title: "Médéa Propre", rep: "Signalement", adm: "Admin", drv: "Camion", exit: "Sortie", take: "Prendre Photo", loc: "Localiser", send: "Envoyer" },
            en: { title: "Clean Medea", rep: "Report", adm: "Admin", drv: "Truck", exit: "Exit", take: "Take Photo", loc: "Locate", send: "Send" }
        };
        document.getElementById('txt-title').innerText = d[l].title;
        document.getElementById('lbl-report').innerText = d[l].rep;
        document.getElementById('lbl-admin').innerText = d[l].adm;
        document.getElementById('lbl-driver').innerText = d[l].drv;
        document.getElementById('lbl-exit').innerText = d[l].exit;
        document.getElementById('lbl-take').innerText = d[l].take;
        document.getElementById('lbl-loc').innerText = d[l].loc;
        document.getElementById('lbl-send').innerText = d[l].send;
        document.dir = (l === 'ar' ? 'rtl' : 'ltr');
    }

    function initApp() {
        db.ref('MEDEA_APP_DB').on('value', s => { if(s.exists()){ appData=s.val(); updateUI(); } });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
    }

    function handleImg(input) {
        const reader = new FileReader();
        reader.onload = e => {
            curImg = e.target.result;
            document.getElementById('out-img').src = curImg;
            document.getElementById('out-img').style.display = 'block';
            document.getElementById('ico-cam').style.display = 'none';
        };
        reader.readAsDataURL(input.files[0]);
    }

    function getLoc() {
        navigator.geolocation.getCurrentPosition(p => {
            const lat = p.coords.latitude, lng = p.coords.longitude;
            document.getElementById('in-gps').value = lat.toFixed(6) + "," + lng.toFixed(6);
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`).then(r=>r.json()).then(d=>{
                document.getElementById('in-addr').value = d.display_name.split(',').slice(0,3).join(',');
            });
        });
    }

    function sendReport() {
        if(!curImg || !document.getElementById('in-addr').value) return alert("أكمل البيانات");
        const rep = {
            id: Date.now(), img: curImg, addr: document.getElementById('in-addr').value,
            gps: document.getElementById('in-gps').value, status: 'new',
            time: new Date().toLocaleTimeString('fr-FR'), date: "06 أفريل 2026"
        };
        if(!appData.reports) appData.reports = [];
        appData.reports.push(rep);
        db.ref('MEDEA_APP_DB').set(appData).then(() => {
            if(confirm("هل لك تبليغ آخر؟")) { clrRep(); }
            else { alert("شكرا لتعاونك معنا تم الإرسال"); clrRep(); navTo('pg-home'); }
        });
    }

    function clrRep() { 
        curImg=""; document.getElementById('out-img').style.display='none'; 
        document.getElementById('ico-cam').style.display='block';
        document.getElementById('in-addr').value=""; document.getElementById('in-gps').value=""; 
    }

    function auth(role) {
        const u = prompt("الاسم:"), p = prompt("الرمز:");
        if(role==='admin' && (appData.admins||[]).includes(u) && p==='1234') {
            document.getElementById('main-admin-only').style.display = (u==='فتحي')?'block':'none';
            navTo('pg-admin');
        } else if(role==='driver' && p==='5678') {
            const d = (appData.drivers||[]).find(x=>x.name===u);
            if(d) { curUser=u; navTo('pg-driver'); }
        }
    }

    function updateUI() {
        const rs = appData.reports || [];
        document.getElementById('c1').innerText = rs.filter(r=>r.status==='new').length;
        document.getElementById('c2').innerText = rs.filter(r=>r.status==='sent').length;
        document.getElementById('c3').innerText = rs.filter(r=>r.status==='done').length;

        document.getElementById('sec-reps').innerHTML = rs.slice().reverse().map(r => `
            <div class="card" style="text-align:right;">
                <img src="${r.img}" style="width:100%; border-radius:15px;">
                <p>📍 ${r.addr}</p><small>🕒 ${r.time} | 📅 ${r.date}</small>
                ${r.status==='new' ? `<button class="btn" style="background:var(--forest)" onclick="assign(${r.id})">إرسال للسائق</button>` : `<p style="color:var(--orange)">🚚 مرسل إلى: ${r.driver}</p>`}
                ${r.doneImg ? `<hr><p style="color:green">✅ تم الإنجاز في: ${r.doneTime}</p><img src="${r.doneImg}" style="width:100%; border-radius:10px;">` : ''}
                <button onclick="delRep(${r.id})" style="color:red; background:none; border:none;">حذف</button>
            </div>
        `).join('');

        document.getElementById('dr-list-ui').innerHTML = (appData.drivers||[]).map(d => `
            <div style="background:#eee; padding:5px; margin-top:5px; border-radius:5px;">
                ${d.name} | ${d.truck} <i class="fas fa-trash" style="color:red" onclick="delDr(${d.id})"></i>
            </div>
        `).join('');

        if(curUser) {
            document.getElementById('dr-head').innerHTML = `<h3>السائق: ${curUser}</h3>`;
            const jobs = rs.filter(r=>r.driver===curUser && r.status==='sent');
            document.getElementById('dr-tasks').innerHTML = jobs.map(j => `
                <div class="card">
                    <img src="${j.img}" style="width:100%; border-radius:15px;">
                    <button class="btn" style="background:var(--navy)" onclick="window.open('https://www.google.com/maps?q=${j.gps}')">تحديد الموقع على الخريطة</button>
                    <label class="btn" style="background:var(--gold)">تصوير بعد التنفيذ<input type="file" capture="environment" style="display:none;" onchange="handleDrvImg(this, ${j.id})"></label>
                    <div id="prev-${j.id}"></div>
                    <button class="btn" style="background:var(--forest)" onclick="finishJob(${j.id})">تم الإنجاز</button>
                </div>
            `).join('');
        }
    }

    let drvTempImg = "";
    function handleDrvImg(input, id) {
        const reader = new FileReader();
        reader.onload = e => {
            drvTempImg = e.target.result;
            document.getElementById(`prev-${id}`).innerHTML = `<img src="${drvTempImg}" style="width:100px; margin-top:10px;">`;
        };
        reader.readAsDataURL(input.files[0]);
    }

    function finishJob(id) {
        if(!drvTempImg) return alert("التقط صورة الإنجاز");
        const r = appData.reports.find(x=>x.id===id);
        r.status = 'done'; r.doneImg = drvTempImg; 
        r.doneTime = new Date().toLocaleTimeString('fr-FR');
        db.ref('MEDEA_APP_DB').set(appData).then(() => { drvTempImg=""; alert("أحسنت! تم الإنجاز"); });
    }

    function assign(id) {
        const n = prompt("اسم السائق:");
        if(n) { const r=appData.reports.find(x=>x.id===id); r.status='sent'; r.driver=n; db.ref('MEDEA_APP_DB').set(appData); }
    }

    function addDr() {
        const n=document.getElementById('dr-n').value, p=document.getElementById('dr-p').value, t=document.getElementById('dr-t').value, s=document.getElementById('dr-s').value;
        if(n) { if(!appData.drivers) appData.drivers=[]; appData.drivers.push({id:Date.now(), name:n, phone:p, truck:t, sector:s}); db.ref('MEDEA_APP_DB').set(appData); clrDr(); }
    }
    function clrDr() { document.getElementById('dr-n').value=""; document.getElementById('dr-p').value=""; document.getElementById('dr-t').value=""; }

    function addAd() { const n=prompt("اسم المسؤول:"); if(n){ if(!appData.admins) appData.admins=[]; appData.admins.push(n); db.ref('MEDEA_APP_DB').set(appData); }}
    function navTo(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); updateUI(); }
    function toggleSection(id) { const e=document.getElementById(id); e.style.display=e.style.display==='none'?'block':'none'; }
    function exitApp() { if(confirm("خروج؟")) window.close(); }
    function delRep(id) { appData.reports=appData.reports.filter(x=>x.id!==id); db.ref('MEDEA_APP_DB').set(appData); }
    function delDr(id) { appData.drivers=appData.drivers.filter(x=>x.id!==id); db.ref('MEDEA_APP_DB').set(appData); }
</script>
</body>
        </html>
