<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المدية نظيفة 2026</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Tajawal',sans-serif}
html,body{overflow-x:hidden;width:100%;background:#f5f7fa}
.conn{position:fixed;top:0;left:0;right:0;padding:8px;text-align:center;font-size:.85rem;font-weight:700;z-index:10000}
.conn.ok{background:#4CAF50;color:#fff}
.conn.no{background:#f44336;color:#fff}
.conn.wait{background:#FF9800;color:#fff}
.hdr{background:#fff;padding:12px;text-align:center;border-bottom:3px solid #D4AF37;margin-top:35px}
.hdr .t{font-size:1.8rem;color:#1B5E20;font-weight:900}
.ib{display:flex;justify-content:space-around;padding:8px;background:#fff8e1;border-bottom:2px solid #D4AF37}
.pg{display:none;padding:15px;max-width:600px;margin:auto}
.pg.a{display:block}
.btn{width:100%;padding:14px;border:none;border-radius:15px;font-size:1rem;font-weight:700;cursor:pointer;margin:8px 0;color:#fff}
.bg{background:#2E7D32}.bb{background:#14213D}.by{background:#f39c12}.br{background:#d21034}.bx{background:#757575}
.cd{background:#fff;border-radius:18px;padding:18px;margin:12px 0;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.in{width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:12px;margin:8px 0;text-align:center}
.cb{position:relative;height:220px;border:3px dashed #bdbdbd;border-radius:18px;display:flex;align-items:center;justify-content:center;background:#fafafa;margin:12px 0}
.cb img{width:100%;height:100%;object-fit:cover}
.cmb{position:absolute;bottom:12px;background:#14213D;color:#fff;padding:8px 16px;border-radius:20px;cursor:pointer}
.sp{border:3px solid rgba(255,255,255,.3);border-top:3px solid #fff;border-radius:50%;width:22px;height:22px;animation:sp 1s linear infinite;display:inline-block}
@keyframes sp{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
.md{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);z-index:9999;align-items:center;justify-content:center}
.mdc{background:#fff;padding:25px;border-radius:22px;width:90%;max-width:380px;text-align:center}
#to{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#2E7D32;color:#fff;flex-direction:column;align-items:center;justify-content:center;z-index:10000;text-align:center;padding:20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mb{height:140px;font-size:1.4rem;flex-direction:column;gap:10px}
.sb2{height:60px}
.ri{width:70px;height:70px;border-radius:12px;object-fit:cover}
</style>
</head>
<body>

<div id="cs" class="conn wait">⏳ جاري الاتصال...</div>

<div id="to"><h1 style="font-size:2rem;margin:10px 0">شكراً لكم!</h1><p>تم إرسال بلاغكم بنجاح</p><div style="margin-top:25px;padding:12px 35px;border:2px solid #FFD700;border-radius:40px">معاً لمدية أنظف 2026</div></div>

<div id="sm" class="md"><div class="mdc"><h3>إضافة موظف</h3>
<select id="sr" class="in"><option value="سائق">سائق</option><option value="مسؤول">مسؤول</option></select>
<input type="text" id="sn" class="in" placeholder="الاسم">
<input type="text" id="sp" class="in" placeholder="الهاتف">
<div id="df"><input type="text" id="st" class="in" placeholder="رقم الشاحنة"></div><button class="btn bg" onclick="ss()" style="margin-top:15px">حفظ</button>
<button class="btn br" onclick="cm()">إغلاق</button></div></div>

<div class="hdr"><div class="t">المـديـة نظيـفة</div></div>
<div class="ib"><div>📅 <span id="cd">--/--/----</span></div><div>🕐 <span id="ck">00:00:00</span></div></div>

<div id="hm" class="pg a">
<button class="btn bg mb" onclick="nt('rp')">🚛 إرسال تبليغ</button>
<div class="cd"><h3 style="text-align:center;margin-bottom:12px">رواق الموظفين 👥</h3>
<div class="g2">
<button class="btn bb sb2" onclick="au('ad')">🛡️ الإدارة</button>
<button class="btn by sb2" onclick="au('dr')">🚚 السائقين</button>
</div></div></div>

<div id="rp" class="pg"><div class="cd">
<div class="cb"><i id="ci" style="font-size:3rem;color:#bdbdbd">📷</i><img id="co" style="display:none">
<label class="cmb">📷 صورة<input type="file" accept="image/*" capture="environment" style="display:none" onchange="hi(this)"></label></div>
<button class="btn bg" onclick="gl()">📍 الموقع</button>
<input type="text" id="ad" class="in" placeholder="اسم الحي">
<input type="text" id="gp" class="in" readonly placeholder="GPS">
<button id="sb" class="btn bg" onclick="srp()">إرسال البلاغ</button>
<button class="btn bx" onclick="nt('hm')">رجوع</button></div></div>

<div id="ad" class="pg"><div style="display:flex;justify-content:space-between;margin-bottom:15px">
<h2>لوحة التحكم</h2>
<button class="btn br" onclick="location.reload()" style="width:auto;padding:8px 18px">خروج</button></div>
<button class="btn bb" onclick="ed()">📊 تصدير Excel</button>
<div class="g2" style="margin:15px 0">
<button class="btn by" onclick="sl('nw')" style="height:90px">⚠️ جديدة</button>
<button class="btn bg" onclick="sl('dn')" style="height:90px">✅ منجزة</button></div>
<div class="cd" style="border:2px solid #1976D2;background:#f0f7ff"><h4 style="margin-bottom:12px">الموظفين</h4>
<button class="btn bb" onclick="om()">+ إضافة</button><div id="sl" style="margin-top:12px"></div></div><div id="rl" style="margin-top:15px"></div></div>

<div id="dr" class="pg"><div class="cd" style="background:#2E7D32;color:#fff;text-align:center;padding:20px"><h3 id="dn">المهام</h3></div><div id="dt"></div><button class="btn bx" onclick="location.reload()">خروج</button></div>

<script>
const SK="medea_v2",STK="staff_v2";
let R=JSON.parse(localStorage.getItem(SK)||'[]'),S=JSON.parse(localStorage.getItem(STK)||'[]'),CU='',CR='',TI='',TDI='',DB=null,FR=false;

function uc(s){const e=document.getElementById('cs');if(!e)return;if(s==='c'){e.className='conn ok';e.innerHTML='✅ متصل'}else if(s==='o'){e.className='conn no';e.innerHTML='❌ غير متصل'}else{e.className='conn wait';e.innerHTML='⏳ جاري الاتصال...'}}

function ifb(){try{
const fc={databaseURL:"https://medea-clean-2026-default-rtdb.firebaseio.com/"};
if(!firebase.apps.length)firebase.initializeApp(fc);
DB=firebase.database();
DB.ref(".info/connected").on("value",sn=>{FR=sn.val()===true;if(FR){uc('c');lf()}else uc('w')});
setTimeout(()=>{if(!FR)uc('o')},10000)
}catch(e){console.error(e);uc('o')}}

function lf(){if(!DB)return;DB.ref('CLEAN_MEDEA_FINAL').once('value',sn=>{if(sn.exists()){const d=sn.val();if(d.reports){R=d.reports;localStorage.setItem(SK,JSON.stringify(R))}if(d.staff){S=d.staff;localStorage.setItem(STK,JSON.stringify(S))}}ia()});DB.ref('CLEAN_MEDEA_FINAL').on('value',sn=>{if(sn.exists()){const d=sn.val();if(d.reports)R=d.reports;if(d.staff)S=d.staff;uu()}})}
function ia(){ut();setInterval(ut,1000);uu()}
function ut(){const n=new Date();document.getElementById('cd').textContent=n.toLocaleDateString('ar-DZ');document.getElementById('ck').textContent=n.toLocaleTimeString('fr-FR')}
function nt(id){document.querySelectorAll('.pg').forEach(p=>p.classList.remove('a'));document.getElementById(id).classList.add('a')}

function hi(inp){if(!inp.files[0])return;const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');let w=img.width,h=img.height;if(w>640){h=Math.round(h*640/w);w=640}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);TI=c.toDataURL('image/jpeg',0.6);document.getElementById('co').src=TI;document.getElementById('co').style.display='block';document.getElementById('ci').style.display='none'};img.src=e.target.result};r.readAsDataURL(inp.files[0])}

function gl(){const btn=event.target;btn.innerHTML='<div class="sp"></div>';btn.disabled=true;if(navigator.geolocation){navigator.geolocation.getCurrentPosition(pos=>{const lat=pos.coords.latitude,lng=pos.coords.longitude;document.getElementById('gp').value=lat+', '+lng;fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lng+'&accept-language=ar').then(r=>r.json()).then(d=>{if(d.display_name)document.getElementById('ad').value=d.display_name.split(',').slice(0,3).join(',');btn.innerHTML='📍 الموقع';btn.disabled=false}).catch(()=>{document.getElementById('ad').placeholder='اكتب العنوان يدوياً';btn.innerHTML='📍 الموقع';btn.disabled=false})},()=>{document.getElementById('ad').placeholder='اكتب العنوان يدوياً';btn.innerHTML='📍 الموقع';btn.disabled=false},{timeout:5000})}else{btn.innerHTML='📍 الموقع';btn.disabled=false}}

async function srp(){const addr=document.getElementById('ad').value.trim();if(!addr){alert('أدخل العنوان');return}const btn=document.getElementById('sb');btn.disabled=true;btn.innerHTML='⏳ جاري...';const rp={id:Date.now(),img:TI||"no",addr,gps:document.getElementById('gp').value||"-",time:new Date().toLocaleTimeString(),date:new Date().toLocaleDateString(),status:'new',driverName:null,doneImg:null,hasImage:!!TI,deleted:false};R.push(rp);localStorage.setItem(SK,JSON.stringify(R));if(DB&&FR){try{await DB.ref('CLEAN_MEDEA_FINAL/reports').push(rp)}catch(e){}}document.getElementById('to').style.display='flex';TI='';document.getElementById('co').style.display='none';document.getElementById('ci').style.display='block';document.getElementById('ad').value='';document.getElementById('gp').value='';btn.disabled=false;btn.innerHTML='إرسال البلاغ';setTimeout(()=>{document.getElementById('to').style.display='none';nt('hm')},3000)}

function au(role){const name=prompt("الاسم:"),code=prompt("الرمز:");if(!name||!code)return;if((name==="فتحي"&&code==="1234")||(role==='ad'&&code==="1234")){CU=name;CR='ad';nt('ad');uu()}else if(role==='dr'&&code==="5678"){CU=name;CR='dr';nt('dr');uu()}else alert("خطأ")}

function sl(type){const c=document.getElementById('rl');const act=R.filter(r=>!r.deleted),fil=type==='nw'?act.filter(r=>r.status!=='dn'):act.filter(r=>r.status==='dn');c.innerHTML='<h3 style="margin-bottom:15px">'+(type==='nw'?'جديدة':'منجزة')+' ('+fil.length+')</h3>';if(!fil.length){c.innerHTML+='<p style="text-align:center;padding:20px">لا توجد بيانات</p>';return}c.innerHTML+=fil.map(r=>'<div class="cd" style="margin-bottom:12px;padding:14px"><div style="display:flex;gap:10px;margin-bottom:10px">'+(r.hasImage?'<img src="'+r.img+'" class="ri">':'<div style="width:70px;height:70px;background:#ddd;border-radius:12px"></div>')+(r.doneImg?'<img src="'+r.doneImg+'" class="ri" style="border:2px solid green">':'')+'</div><p style="font-size:.9rem;margin:8px 0"><i class="fas fa-map-marker-alt"></i> '+r.addr+'<br><i class="fas fa-globe"></i> '+r.gps+'</p><span style="display:inline-block;padding:5px 12px;border-radius:15px;background:'+(r.status==='nw'?'#ffeb3b':r.status==='st'?'#2196F3':'#4CAF50')+'">'+(r.status==='nw'?'جديد':r.status==='st'?'قيد التنفيذ':'منجز')+'</span>'+(r.driverName?'<div style="margin-top:8px;color:green"><i class="fas fa-user"></i> '+r.driverName+'</div>':'')+(type==='nw'&&r.status==='nw'?'<button class="btn bg" onclick="at('+r.id+')" style="margin-top:10px">توجيه</button>':'')+'</div>').join('')}

function at(id){const nm=prompt("اسم السائق:");if(!nm)return;const r=R.find(x=>x.id===id);if(r){r.status='st';r.driverName=nm;slc();sl('nw');alert('تم لـ '+nm)}}

function ed(){if(!R.length){alert('لا بيانات');return}let csv="المعرف,التاريخ,العنوان,الحالة,السائق\n";R.filter(r=>!r.deleted).forEach(r=>csv+=r.id+','+r.date+','+r.addr+','+r.status+','+(r.driverName||'-')+'\n');const blob=new Blob([csv],{type:'text/csv'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='archive.csv';a.click()}

function uu(){const sl=document.getElementById('sl');if(sl){sl.innerHTML=S.length?S.map(s=>'<div style="padding:10px;border-bottom:1px solid #eee"><b>'+s.role+'</b>: '+s.name+'</div>').join(''):'<p style="text-align:center;padding:15px">لا موظفين</p>'}if(CU&&document.getElementById('dr').classList.contains('a')){const ts=R.filter(r=>r.driverName===CU&&r.status==='st'&&!r.deleted);document.getElementById('dn').innerHTML='مهام: '+CU;document.getElementById('dt').innerHTML=ts.length?ts.map(t=>'<div class="cd" style="margin-bottom:18px;padding:16px"><img src="'+t.img+'" style="width:100%;border-radius:15px;margin-bottom:14px"><p style="font-weight:700;margin-bottom:10px"><i class="fas fa-map-marker-alt"></i> '+t.addr+'</p><a href="https://www.google.com/maps/dir/?api=1&destination='+t.gps.split(',')[0]+','+t.gps.split(',')[1]+'" target="_blank" class="btn bb" style="margin-bottom:10px">🗺️ الخريطة</a><label class="btn by" style="margin-bottom:10px">📷 تصوير<input type="file" accept="image/*" capture="environment" style="display:none" onchange="hdi(this,'+t.id+')"></label><button class="btn bg" onclick="ct('+t.id+')">✅ إنجاز</button></div>').join(''):'<p style="text-align:center;padding:30px">🎉 لا مهام</p>'}}

function hdi(inp,id){if(!inp.files[0])return;const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');let w=img.width,h=img.height;if(w>640){h=Math.round(h*640/w);w=640}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);TDI=c.toDataURL('image/jpeg',0.6)};img.src=e.target.result};r.readAsDataURL(inp.files[0])}

function ct(id){if(!TDI){alert('صور أولاً');return}const r=R.find(x=>x.id===id);if(r){r.status='dn';r.doneImg=TDI;slc();uu();alert('تم!');TDI=''}}

function om(){if(CR!=='ad'){alert('للمشرف');return}document.getElementById('sm').style.display='flex'}
function cm(){document.getElementById('sm').style.display='none'}
function ss(){if(CR!=='ad')return;const nm=document.getElementById('sn').value.trim();if(!nm){alert('الاسم مطلوب');return}S.push({role:document.getElementById('sr').value,name:nm,phone:document.getElementById('sp').value.trim(),truck:document.getElementById('st').value.trim()||'-'});localStorage.setItem(STK,JSON.stringify(S));cm();uu();document.getElementById('sn').value='';document.getElementById('sp').value='';document.getElementById('st').value=''}
function slc(){localStorage.setItem(SK,JSON.stringify(R));if(DB&&FR)DB.ref('CLEAN_MEDEA_FINAL').update({reports:R,staff:S})}

window.addEventListener('load',()=>{uc('w');ifb()});
</script>
</body>
</html>
