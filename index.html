<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المدية نظيفة 2026</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --gold: #D4AF37; --red: #d21034; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { margin: 0; min-height: 100vh; background: linear-gradient(135deg, rgba(27,94,32,0.1), rgba(255,255,255,0.9)), url('https://raw.githubusercontent.com/rabf09-droid/rabf09-droid.github.io/main/1000052240.webp'); background-size: cover; background-attachment: fixed; }

        .header { background: white; padding: 10px; text-align: center; border-bottom: 5px solid var(--gold); }
        .page { display: none; padding: 15px; max-width: 600px; margin: auto; }
        .page.active { display: block; }

        .card { background: rgba(255,255,255,0.95); border-radius: 25px; padding: 20px; margin-bottom: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .btn { border: none; padding: 15px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; color: white; font-size: 1.1rem; }
        
        .giant-btn { background: var(--forest); height: 230px; flex-direction: column; border-radius: 50px; font-size: 2.1rem; border: 6px solid white; box-shadow: 0 15px 45px rgba(46,125,50,0.3); }
        .giant-btn i { font-size: 6.5rem; }

        .input { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 10px; text-align: center; font-size: 1rem; }
        .footer { background: white; padding: 15px; text-align: center; border-top: 4px solid var(--gold); margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body onload="initApp()">

<div class="header">
    <div style="font-size: 0.7rem;">الجمهورية الجزائرية الديمقراطية الشعبية</div>
    <div style="font-size: 1.6rem; font-weight: 900; color: var(--emerald);">المـديـة نظيـفة</div>
    <div style="display: flex; justify-content: space-around; margin-top: 5px;">
        <div id="clock" style="font-weight: bold;">00:00:00</div>
        <div style="font-weight: bold;">09 أفريل 2026</div>
    </div>
</div>

<div id="pg-home" class="page active">
    <button class="btn giant-btn" onclick="navTo('pg-report')">
        <i class="fas fa-truck-loading"></i>
        <span>إرســـــال تبلـيـــغ</span>
    </button>
    <div class="card" style="border: 2px dashed var(--navy); background: rgba(255,255,255,0.7);">
        <p style="text-align: center; font-weight: bold;">دخول الموظفين</p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn" style="background:var(--navy)" onclick="login('admin')">الإدارة</button>
            <button class="btn" style="background:var(--gold)" onclick="login('driver')">السائقين</button>
        </div>
    </div>
</div>

<div id="pg-report" class="page">
    <div class="card">
        <div style="height:200px; border:3px dashed #ccc; border-radius:20px; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; background:white;">
            <i id="cam-ico" class="fas fa-camera fa-4x" style="color:#eee"></i>
            <img id="img-prev" style="width:100%; height:100%; object-fit:cover; display:none;">
            <input type="file" accept="image/*" capture="environment" id="file-in" style="display:none" onchange="preview(this)">
            <button class="btn" style="position:absolute; bottom:10px; width:auto; background:var(--navy)" onclick="document.getElementById('file-in').click()">تصوير</button>
        </div>
        <button class="btn" style="background:var(--forest); margin-top:15px;" onclick="getLoc()">تحديد الموقع</button>
        <input type="text" id="in-addr" class="input" placeholder="اسم الحي">
        <input type="text" id="in-gps" class="input" readonly placeholder="إحداثيات GPS">
        <button class="btn" style="background:var(--emerald); height:70px;" onclick="send()">إرسال الآن</button>
        <button class="btn" style="background:#888" onclick="navTo('pg-home')">رجوع</button>
    </div>
</div>

<div id="pg-admin" class="page">
    <div class="card">
        <h3>لوحة التحكم</h3>
        <div id="admin-list"></div>
        <button class="btn" style="background:var(--red)" onclick="location.reload()">خروج</button>
    </div>
</div>

<div id="pg-driver" class="page">
    <div class="card" style="background:var(--emerald); color:white; text-align:center;">
        <h3 id="dr-header">صفحة السائق</h3>
    </div>
    <div id="driver-list"></div>
    <button class="btn" style="background:#444" onclick="location.reload()">خروج</button>
</div>

<div class="footer">
    إعداد وإشراف د. رابحي فتحي - بلدية المدية 2026 ©
</div>

<script>
    const firebaseConfig = { databaseURL: "https://medea-clean-2026-v4-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let data = { reports: [], staff: [] };
    let im = "";

    function initApp() {
        db.ref('CLEAN_DATA').on('value', s => { if(s.exists()) data = s.val(); render(); });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
    }

    function navTo(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    function preview(input) {
        const r = new FileReader();
        r.onload = e => {
            im = e.target.result;
            document.getElementById('img-prev').src = im;
            document.getElementById('img-prev').style.display = 'block';
            document.getElementById('cam-ico').style.display = 'none';
        };
        r.readAsDataURL(input.files[0]);
    }

    function getLoc() {
        navigator.geolocation.getCurrentPosition(p => {
            document.getElementById('in-gps').value = p.coords.latitude.toFixed(6) + "," + p.coords.longitude.toFixed(6);
        });
    }

    function send() {
        if(!im || !document.getElementById('in-addr').value) return alert("أكمل البيانات");
        const r = { 
            id: Date.now(), img: im, addr: document.getElementById('in-addr').value, 
            gps: document.getElementById('in-gps').value, time: new Date().toLocaleTimeString(), date: new Date().toLocaleDateString()
        };
        if(!data.reports) data.reports = [];
        data.reports.push(r);
        db.ref('CLEAN_DATA').set(data).then(() => {
            alert("تم الإرسال بنجاح");
            location.reload();
        });
    }

    function login(type) {
        const n = prompt("الاسم:");
        if(n === "فتحي") navTo(type === 'admin' ? 'pg-admin' : 'pg-driver');
    }

    function render() {
        const list = data.reports || [];
        const h = list.map(r => `<div class="card"><img src="${r.img}" style="width:100px;"><p>${r.addr}</p></div>`).join('');
        document.getElementById('admin-list').innerHTML = h;
        document.getElementById('driver-list').innerHTML = h;
    }
</script>
</body>
</html>
