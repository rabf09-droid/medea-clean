<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المدية نظيفة 2026</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --gold: #D4AF37; --red: #d21034; --navy: #14213D; --orange: #f39c12; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { margin: 0; min-height: 100vh; background: #fdfdfd; background-image: url('https://raw.githubusercontent.com/rabf09-droid/rabf09-droid.github.io/main/1000052240.webp'); background-size: cover; background-position: center; background-attachment: fixed; }

        .header { background: white; padding: 10px; text-align: center; border-bottom: 5px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .page { display: none; padding: 15px; animation: fadeIn 0.4s; max-width: 800px; margin: auto; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn { border: none; padding: 15px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; color: white; font-size: 1.1rem; transition: 0.3s; }
        .input { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 10px; text-align: center; font-size: 1rem; }

        .giant-btn { background: var(--forest); height: 230px; flex-direction: column; border-radius: 50px; font-size: 2.1rem; border: 6px solid white; box-shadow: 0 15px 45px rgba(46,125,50,0.3); }
        .giant-btn i { font-size: 6.5rem; }

        .cam-box-wrapper { position: relative; height: 200px; border: 3px dashed #bbb; border-radius: 20px; display: flex; align-items: center; justify-content: center; background: #eee; margin-bottom: 15px; overflow: hidden; }
        .cam-inner-btn { position: absolute; bottom: 15px; background: var(--navy); color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; }

        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center; }
        .modal-content { background:white; padding:30px; border-radius:30px; text-align:center; width:90%; max-width:400px; }

        #thanks-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--forest); color:white; flex-direction:column; align-items:center; justify-content:center; z-index:100000; text-align:center; }

        .footer { background: white; padding: 15px; text-align: center; border-top: 4px solid var(--gold); margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body onload="initApp()">

<div id="thanks-overlay">
    <i class="fas fa-check-circle fa-6x" style="color:var(--gold); margin-bottom:20px;"></i>
    <h1 style="font-size:2.5rem;">شكراً لكم!</h1>
    <p style="font-size:1.3rem; padding: 0 20px;">تم إرسال بلاغكم بنجاح. معاً لمدية أنظف.</p>
</div>

<div id="staff-modal" class="modal">
    <div class="modal-content">
        <h3>إضافة موظف جديد</h3>
        <select id="st-role" class="input" onchange="toggleStaffFields()">
            <option value="سائق">سائق</option>
            <option value="مسؤول">مسؤول (مشرف)</option>
        </select>
        <input type="text" id="st-name" class="input" placeholder="الاسم الكامل">
        <input type="text" id="st-phone" class="input" placeholder="رقم الهاتف">
        <div id="driver-specifics">
            <input type="text" id="st-truck" class="input" placeholder="رقم الشاحنة">
            <select id="st-sector" class="input">
                <option value="قطاع البلدية">قطاع البلدية</option>
                <option value="قطاع خاص">قطاع خاص</option>
            </select>
        </div>
        <button class="btn" style="background:var(--forest)" onclick="saveStaff()">حفظ البيانات</button>
        <button class="btn" style="background:var(--red)" onclick="closeStaffModal()">إغلاق</button>
    </div>
</div>

<div class="header">
    <div style="font-size: 0.8rem;">الجمهورية الجزائرية الديمقراطية الشعبية</div>
    <div style="color: var(--forest); font-weight: bold;">مصلحة النظافة لبلدية المدية</div>
    <div style="font-size: 1.8rem; font-weight: 900; color: var(--emerald);">المـديـة نظيـفة</div>
    <div id="clock" style="font-weight: bold; color: var(--navy);">00:00:00</div>
</div>

<div id="pg-home" class="page active">
    <button class="btn giant-btn" onclick="navTo('pg-report')">
        <i class="fas fa-truck-pickup"></i>
        <span>إرســـــال تبلـيـــغ</span>
    </button>
    <div class="card" style="border: 2px dashed var(--navy); background: rgba(255,255,255,0.8);">
        <p style="text-align: center; font-weight: bold;">رواق الموظفين والمسؤولين</p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn" style="background:var(--navy)" onclick="auth('admin')"><i class="fas fa-user-shield"></i> الإدارة</button>
            <button class="btn" style="background:var(--gold)" onclick="auth('driver')"><i class="fas fa-truck"></i> السائقين</button>
        </div>
    </div>
</div>

<div id="pg-report" class="page">
    <div class="card">
        <div class="cam-box-wrapper">
            <i id="ico-cam" class="fas fa-camera fa-4x" style="color:#aaa"></i>
            <img id="out-img" style="width:100%; height:100%; object-fit:cover; display:none;">
            <label class="cam-inner-btn">
                <i class="fas fa-camera"></i> التقاط الصورة
                <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="handleImg(this)">
            </label>
        </div>
        <button class="btn" style="background:var(--forest)" onclick="getLoc()"><i class="fas fa-map-marker-alt"></i> تحديد الموقع</button>
        <input type="text" id="in-addr" class="input" placeholder="اسم الحي أو الشارع">
        <input type="text" id="in-gps" class="input" readonly placeholder="إحداثيات GPS">
        <button id="send-btn" class="btn" style="background:var(--emerald); height: 70px; font-size:1.4rem;" onclick="sendReport()">إرسال البلاغ الآن</button>
        <button class="btn" style="background:#888;" onclick="navTo('pg-home')">رجوع</button>
    </div>
</div>

<div id="pg-admin" class="page">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <h2 style="margin:0;">لوحة التحكم</h2>
        <button class="btn" style="background:var(--red); width:auto; padding:8px 15px;" onclick="location.reload()">خروج</button>
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
        <button class="btn" style="background:var(--orange); height: 80px;" onclick="showAdminList('new')">بلاغات النفايات</button>
        <button class="btn" style="background:var(--forest); height: 80px;" onclick="showAdminList('done')">البلاغات المنجزة</button>
    </div>
    
    <div id="admin-list-container"></div>

    <div class="card" style="border: 2px solid blue;">
        <h4 style="margin:0 0 10px 0; color:blue; text-align:center;">إدارة الموظفين</h4>
        <button class="btn" style="background:blue" onclick="openStaffModal()">+ إضافة (مسؤول / سائق)</button>
        <button class="btn" style="background:var(--navy); margin-top:10px;" onclick="exportArchive()">
            <i class="fas fa-save"></i> حفظ الأرشيف (ملف مدية نظيفة)
        </button>
        <div id="staff-list-ui" style="margin-top:10px;"></div>
    </div>
</div>

<div id="pg-driver" class="page">
    <div id="dr-header" class="card" style="background:var(--emerald); color:white; text-align:center;"></div>
    <div id="dr-tasks"></div>
    <button class="btn" style="background:#444;" onclick="location.reload()">خروج</button>
</div>

<div class="footer">
    إشراف د. رابحي فتحي - بلدية المدية 2026 ©
</div>

<script>
    // تهيئة Firebase (يرجى التأكد من أن الرابط صحيح لمشروعك)
    const firebaseConfig = { databaseURL: "https://medea-clean-2026-v4-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let appData = { reports: [], staff: [] };
    let currentLoggedUser = "", tempImg = "";

    function initApp() {
        db.ref('CLEAN_MEDEA_DATA').on('value', snap => {
            if(snap.exists()){ 
                appData = snap.val(); 
                if(!appData.reports) appData.reports = [];
                if(!appData.staff) appData.staff = [];
                updateUI(); 
            }
        });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-DZ'); }, 1000);
    }

    function navTo(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // تصفير الخانات في صفحة التبليغ بعد الإرسال
    function clearReportForm() {
        tempImg = "";
        document.getElementById('out-img').src = "";
        document.getElementById('out-img').style.display = 'none';
        document.getElementById('ico-cam').style.display = 'block';
        document.getElementById('in-addr').value = "";
        document.getElementById('in-gps').value = "";
        const btn = document.getElementById('send-btn');
        btn.disabled = false;
        btn.innerText = "إرسال البلاغ الآن";
    }

    function handleImg(input) {
        const reader = new FileReader();
        reader.onload = e => {
            tempImg = e.target.result;
            document.getElementById('out-img').src = tempImg;
            document.getElementById('out-img').style.display = 'block';
            document.getElementById('ico-cam').style.display = 'none';
        };
        reader.readAsDataURL(input.files[0]);
    }

    function getLoc() {
        navigator.geolocation.getCurrentPosition(p => {
            const coords = `${p.coords.latitude},${p.coords.longitude}`;
            document.getElementById('in-gps').value = coords;
            // يمكن إضافة API لجلب اسم الحي هنا
        });
    }

    function sendReport() {
        if(!tempImg || !document.getElementById('in-addr').value) return alert("الرجاء التقاط صورة وكتابة العنوان");
        
        const btn = document.getElementById('send-btn');
        btn.disabled = true;
        btn.innerText = "جاري الحفظ...";

        const newReport = {
            id: Date.now(),
            img: tempImg,
            addr: document.getElementById('in-addr').value,
            gps: document.getElementById('in-gps').value,
            time: new Date().toLocaleString('ar-DZ'),
            status: 'new'
        };

        appData.reports.push(newReport);
        db.ref('CLEAN_MEDEA_DATA').set(appData).then(() => {
            // إظهار رسالة الشكر وتصفير الحقول
            document.getElementById('thanks-overlay').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('thanks-overlay').style.display = 'none';
                clearReportForm();
                navTo('pg-home');
            }, 3000);
        });
    }

    // إصلاح مشكلة الدخول بالاسم فقط
    function auth(role) {
        const nameInput = prompt("الرجاء إدخال اسمك المسجل:");
        if(!nameInput) return;

        // حالة خاصة للمشرف العام "فتحي"
        if(nameInput === "فتحي") {
            currentLoggedUser = "د. فتحي";
            navTo('pg-admin');
            return;
        }

        const user = appData.staff.find(s => s.name.trim() === nameInput.trim());
        
        if(user) {
            currentLoggedUser = user.name;
            if(role === 'admin' && user.role === 'مسؤول') {
                navTo('pg-admin');
            } else if(role === 'driver' && user.role === 'سائق') {
                navTo('pg-driver');
                updateUI();
            } else {
                alert("عذراً، هذا الحساب ليس لديه صلاحيات " + (role === 'admin' ? "الإدارة" : "السائقين"));
            }
        } else {
            alert("بيانات الدخول غير صحيحة أو الموظف غير مسجل.");
        }
    }

    function openStaffModal() { document.getElementById('staff-modal').style.display = 'flex'; }
    function closeStaffModal() { 
        // تصفير خانات الإضافة عند الإغلاق
        document.getElementById('st-name').value = "";
        document.getElementById('st-phone').value = "";
        document.getElementById('st-truck').value = "";
        document.getElementById('staff-modal').style.display = 'none'; 
    }
    function toggleStaffFields() { document.getElementById('driver-specifics').style.display = document.getElementById('st-role').value==='سائق'?'block':'none'; }

    function saveStaff() {
        const name = document.getElementById('st-name').value;
        if(!name) return alert("الاسم مطلوب");

        const newStaff = {
            role: document.getElementById('st-role').value,
            name: name,
            phone: document.getElementById('st-phone').value,
            truck: document.getElementById('st-truck').value || '---',
            sector: document.getElementById('st-sector').value || '---'
        };

        appData.staff.push(newStaff);
        db.ref('CLEAN_MEDEA_DATA').set(appData).then(() => {
            alert("تمت إضافة الموظف بنجاح");
            closeStaffModal(); // سيقوم بالتصفير تلقائياً
        });
    }

    function updateUI() {
        // تحديث قائمة الموظفين في لوحة التحكم
        const listUI = document.getElementById('staff-list-ui');
        if(listUI) {
            listUI.innerHTML = appData.staff.map((s, idx) => `
                <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;">
                    <span><b>${s.role}:</b> ${s.name}</span>
                    <i class="fas fa-trash" style="color:red" onclick="deleteStaff(${idx})"></i>
                </div>
            `).join('');
        }

        // تحديث مهام السائق
        if(document.getElementById('pg-driver').classList.contains('active')) {
            const tasks = appData.reports.filter(r => r.driver === currentLoggedUser && r.status === 'sent');
            document.getElementById('dr-header').innerHTML = `<h3>مرحباً ${currentLoggedUser} - مهامك</h3>`;
            document.getElementById('dr-tasks').innerHTML = tasks.map(t => `
                <div class="card">
                    <img src="${t.img}" style="width:100%; border-radius:15px;">
                    <p>📍 ${t.addr}</p>
                    <button class="btn" style="background:green" onclick="completeTask(${t.id})">تأكيد الإنجاز ✅</button>
                </div>
            `).join('') || "<p>لا توجد مهام حالية</p>";
        }
    }

    function showAdminList(type) {
        const container = document.getElementById('admin-list-container');
        const filtered = type === 'new' ? appData.reports.filter(r => r.status !== 'done') : appData.reports.filter(r => r.status === 'done');
        
        container.innerHTML = filtered.map(r => `
            <div class="card" style="border-right: 8px solid ${r.status==='done'?'green':'orange'}">
                <img src="${r.img}" style="width:80px; height:80px; border-radius:10px; float:left;">
                <p>📍 ${r.addr}<br><small>${r.time}</small></p>
                ${r.status === 'new' ? `<button class="btn" style="background:var(--forest); font-size:0.9rem;" onclick="assignTask(${r.id})">توجيه لسائق</button>` : `<p style="color:green">بواسطة: ${r.driver || 'غير محدد'}</p>`}
            </div>
        `).join('') || "<p style='text-align:center'>القائمة فارغة</p>";
    }

    function assignTask(id) {
        const dName = prompt("أدخل اسم السائق المكلف:");
        if(dName) {
            const report = appData.reports.find(r => r.id === id);
            report.status = 'sent';
            report.driver = dName;
            db.ref('CLEAN_MEDEA_DATA').set(appData);
        }
    }

    function completeTask(id) {
        const report = appData.reports.find(r => r.id === id);
        report.status = 'done';
        db.ref('CLEAN_MEDEA_DATA').set(appData);
    }

    function deleteStaff(idx) {
        if(confirm("هل تريد حذف الموظف؟")) {
            appData.staff.splice(idx, 1);
            db.ref('CLEAN_MEDEA_DATA').set(appData);
        }
    }

    // وظيفة الأرشيف: تصدير البيانات كملف نصي في الذاكرة
    function exportArchive() {
        const dataStr = JSON.stringify(appData, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "أرشيف_مدية_نظيفة_2026.json";
        link.click();
        alert("تم تجهيز ملف الأرشيف للتحميل");
    }
</script>
</body>
</html>
