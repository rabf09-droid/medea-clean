<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المدية نظيفة 2026</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #4CAF50; color: #333; text-align: center; }
        .top-bar { background: white; padding: 15px; border-bottom: 3px solid #FFD700; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .screen { display: none; padding: 20px; }
        .active { display: block !important; }
        .card { background: white; padding: 20px; margin: 15px auto; border-radius: 15px; width: 90%; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; }
        .btn { background: #1B5E20; color: white; border: none; padding: 15px; width: 100%; border-radius: 25px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 10px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ccc; }
        .footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 10px; font-size: 0.8rem; border-top: 2px solid #FFD700; }
    </style>
</head>
<body>

<div class="top-bar">
    <h2 style="margin:0; color:#1B5E20;">المدية نظيفة 2026</h2>
    <p id="clock" style="margin:5px 0; font-size:0.9rem;">00:00:00</p>
</div>

<div id="scr-main" class="screen active">
    <div class="card" onclick="openScreen('scr-report')">
        <i class="fas fa-bullhorn fa-3x" style="color:#2E7D32"></i>
        <h3>تبليغ مواطن جديد</h3>
    </div>
    <div class="card" onclick="openScreen('scr-admin')">
        <i class="fas fa-user-shield fa-3x" style="color:#1B5E20"></i>
        <h3>مصلحة النظافة (الإدارة)</h3>
    </div>
    <div class="card" onclick="alert('واجهة السائق قيد التفعيل')">
        <i class="fas fa-truck fa-3x" style="color:#D4AF37"></i>
        <h3>واجهة السائق</h3>
    </div>
</div>

<div id="scr-report" class="screen">
    <div class="card">
        <h3>أرسل بلاغك الآن</h3>
        <input type="text" id="rep-addr" placeholder="أدخل العنوان هنا...">
        <label class="btn" style="background:#14213D;">
            📸 تصوير النفايات 
            <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="alert('تم اختيار الصورة')">
        </label>
        <button class="btn" onclick="submitFast()">إرسال التبليغ ✅</button>
        <button class="btn" style="background:#666;" onclick="openScreen('scr-main')">رجوع</button>
    </div>
</div>

<div id="scr-admin" class="screen">
    <div class="card">
        <h3>لوحة الإدارة</h3>
        <p>البلاغات تظهر هنا تلقائياً</p>
        <div id="list-data"></div>
        <button class="btn" style="background:#333;" onclick="openScreen('scr-main')">خروج</button>
    </div>
</div>

<div class="footer">د. رابحي فتحي | بلدية المدية</div>

<script>
    // تغيير الشاشات بطريقة مضمونة
    function openScreen(id) {
        // إخفاء جميع الشاشات يدوياً
        var screens = document.getElementsByClassName('screen');
        for (var i = 0; i < screens.length; i++) {
            screens[i].style.display = 'none';
        }
        // إظهار الشاشة المطلوبة
        document.getElementById(id).style.display = 'block';
        window.scrollTo(0,0);
    }

    // إرسال سريع للتجربة
    function submitFast() {
        var addr = document.getElementById('rep-addr').value;
        if(addr == "") { alert("يرجى كتابة العنوان"); return; }
        alert("تم إرسال بلاغك بنجاح للمصلحة المعنية!");
        openScreen('scr-main');
    }

    // الساعة
    setInterval(function() {
        document.getElementById('clock').innerHTML = new Date().toLocaleTimeString();
    }, 1000);
</script>

</body>
</html>
