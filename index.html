<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المدية نظيفة 2026 - الإصدار الرسمي المعتمد</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --gold: #D4AF37; --red: #d21034; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        
        body { 
            margin: 0; min-height: 100vh;
            background: linear-gradient(135deg, rgba(27,94,32,0.2) 0%, rgba(255,255,255,0.8) 50%, rgba(210,16,52,0.2) 100%),
                        url('https://raw.githubusercontent.com/rabf09-droid/rabf09-droid.github.io/main/1000052240.webp');
            background-size: cover; background-position: center; background-attachment: fixed;
            display: flex; justify-content: center;
        }

        .app-container { width: 100%; max-width: 480px; background: rgba(255,255,255,0.9); min-height: 100vh; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.1); }
        
        /* استرجاع الهيدر الملكي كما في صورة 1000052268 */
        .header { background: white; padding: 20px; text-align: center; border-bottom: 5px solid var(--gold); }
        .header-top { font-size: 0.8rem; font-weight: bold; color: #444; }
        .header-mid { font-size: 1rem; color: var(--forest); font-weight: bold; margin: 5px 0; }
        .header-main { font-size: 2.2rem; font-weight: 900; color: var(--emerald); line-height: 1.1; }

        .page { display: none; padding: 20px; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* زر التبليغ العملاق الأصلي */
        .giant-btn {
            background: var(--forest); height: 260px; border-radius: 45px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; border: 7px solid white; box-shadow: 0 15px 35px rgba(46,125,50,0.3);
            cursor: pointer; margin: 30px 0; transition: 0.3s;
        }
        .giant-btn i { font-size: 7.5rem; margin-bottom: 15px; }
        .giant-btn span { font-size: 2.3rem; font-weight: bold; }

        /* رواق الموظفين المنقط */
        .staff-zone {
            border: 3px dashed var(--navy); border-radius: 30px; padding: 20px;
            background: rgba(255,255,255,0.6); text-align: center; margin-top: 40px;
        }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .btn-action { border: none; padding: 15px; border-radius: 15px; font-weight: bold; font-size: 1.1rem; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .input-field { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 12px; text-align: center; font-size: 1rem; }
    </style>
</head>
<body onload="initApp()">

<div class="app-container">
    <div class="header">
        <div class="header-top">الجمهورية الجزائرية الديمقراطية الشعبية</div>
        <div class="header-mid">مصلحة النظافة لبلدية المدية</div>
        <div class="header-main">المدية نظيفة</div>
        <div style="font-weight: bold; color: var(--navy); margin-top: 10px;" id="clock">00:00:00</div>
    </div>

    <div id="pg-home" class="page active">
        <div class="giant-btn" onclick="navTo('pg-report')">
            <i class="fas fa-truck-pickup"></i>
            <span>إرســــال تبلـيـــغ</span>
        </div>

        <div class="staff-zone">
            <div style="font-weight: bold; color: var(--navy);">رواق الموظفين والمسؤولين</div>
            <div class="btn-row">
                <button class="btn-action" style="background:var(--navy)" onclick="auth('admin')"><i class="fas fa-user-shield"></i> الإدارة</button>
                <button class="btn-action" style="background:var(--gold)" onclick="auth('driver')"><i class="fas fa-truck"></i> السائق</button>
            </div>
        </div>
    </div>

    <div id="pg-report" class="page">
        <div class="card">
            <div id="cam-box" style="height:250px; border:3px dashed #ccc; border-radius:20px; background:#f9f9f9; display:flex; align-items:center; justify-content:center; overflow:hidden; margin-bottom:15px;">
                <i id="cam-ico" class="fas fa-camera fa-5x" style="color:#ddd"></i>
                <img id="img-prev" style="width:100%; height:100%; object-fit:cover; display:none;">
            </div>
            <label class="btn-action" style="background:var(--navy); width:100%;"><i class="fas fa-camera"></i> التقاط الصورة<input type="file" accept="image/*" capture="environment" style="display:none;" onchange="handleFile(this)"></label>
            <button class="btn-action" style="background:var(--forest); width:100%; margin-top:10px;" onclick="getLoc()"><i class="fas fa-map-marker-alt"></i> تحديد الموقع</button>
            <input type="text" id="addr" class="input-field" placeholder="اسم الحي" style="margin-top:10px;">
            <input type="text" id="gps" class="input-field" readonly placeholder="إحداثيات الموقع">
            <button class="btn-action" style="background:var(--emerald); width:100%; height:70px; font-size:1.4rem;" onclick="pushReport()">إرسال التبليغ الآن</button>
            <button class="btn-action" style="background:#666; width:100%; margin-top:10px;" onclick="navTo('pg-home')">رجوع</button>
        </div>
    </div>

    <div id="pg-admin" class="page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3>لوحة الإدارة</h3>
            <button class="btn-action" style="background:var(--red); padding:5px 15px;" onclick="logout()">خروج</button>
        </div>
        <div id="admin-feed"></div>
    </div>

    <div id="pg-driver" class="page">
        <div id="dr-header" class="card" style="background:var(--emerald); color:white; text-align:center;"></div>
        <div id="dr-tasks"></div>
        <button class="btn-action" style="background:#444; width:100%;" onclick="navTo('pg-home')">خروج</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://medea-clean-final-v1-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let appData = { reports: [], drivers: [], admins: ["فتحي"] };
    let tempImg = "", currentDriver = "";

    function initApp() {
        db.ref('OFFICIAL_V4').on('value', s => { if(s.exists()){ appData = s.val(); updateUI(); } });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
    }

    function handleFile(input) {
        const reader = new FileReader();
        reader.onload = e => {
            tempImg = e.target.result;
            document.getElementById('img-prev').src = tempImg;
            document.getElementById('img-prev').style.display = 'block';
            document.getElementById('cam-ico').style.display = 'none';
        };
        reader.readAsDataURL(input.files[0]);
    }

    function getLoc() {
        navigator.geolocation.getCurrentPosition(p => {
            document.getElementById('gps').value = p.coords.latitude.toFixed(6) + "," + p.coords.longitude.toFixed(6);
            document.getElementById('addr').value = "حي ببلدية المدية";
        });
    }

    function pushReport() {
        if(!tempImg) return alert("يرجى تصوير النفايات أولاً");
        const r = { id: Date.now(), img: tempImg, addr: document.getElementById('addr').value, gps: document.getElementById('gps').value, time: new Date().toLocaleTimeString('fr-FR'), status: 'new' };
        if(!appData.reports) appData.reports = [];
        appData.reports.push(r);
        db.ref('OFFICIAL_V4').set(appData).then(() => { alert("تم الإرسال شكراً على تفاعلك"); location.reload(); });
    }

    function updateUI() {
        const rs = appData.reports || [];
        document.getElementById('admin-feed').innerHTML = rs.slice().reverse().map(r => `
            <div class="card" style="border-right: 10px solid ${r.status==='done'?'green':'red'};">
                <img src="${r.img}" style="width:100%; border-radius:15px; margin-bottom:10px;">
                <p>📍 ${r.addr}</p>
                <button class="btn-action" style="background:var(--forest); width:100%;" onclick="assignDriver(${r.id})">إرسال للسائق</button>
            </div>
        `).join('');
    }

    function auth(role) {
        const u = prompt("الاسم:"), p = prompt("الرمز:");
        if(role==='admin' && p==='1234') navTo('pg-admin');
        else if(role==='driver' && p==='5678') { currentDriver=u; navTo('pg-driver'); }
    }

    function navTo(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
    function logout() { document.getElementById('admin-feed').innerHTML=""; navTo('pg-home'); }
</script>
</body>
    </html>
