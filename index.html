<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المدية نظيفة 2026</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --gold: #D4AF37; --red: #d21034; --navy: #14213D; --orange: #f39c12; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        
        body { margin: 0; min-height: 100vh; background: #fdfdfd; }

        .header { background: white; padding: 10px; text-align: center; border-bottom: 3px solid var(--gold); }
        .page { display: none; padding: 15px; max-width: 500px; margin: auto; }
        .page.active { display: block; }

        /* التصميم الذي يظهر في صورك (المربعات الكبيرة الملونة) */
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .grid-item { border-radius: 30px; height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; cursor: pointer; text-decoration: none; border: none; font-size: 1.4rem; font-weight: 900; box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .grid-item i { font-size: 4rem; margin-bottom: 10px; }
        
        .orange-btn { background-color: #f39c12; }
        .green-btn { background-color: #2E7D32; }
        .blue-card { border: 2px solid blue; border-radius: 30px; padding: 20px; margin-top: 20px; text-align: center; }

        .btn { border: none; padding: 15px; border-radius: 20px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; color: white; font-size: 1.1rem; margin-bottom: 10px; }
        .input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 10px; text-align: center; font-size: 1rem; background: #f9faff; }

        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center; }
        .modal-content { background:white; padding:25px; border-radius:35px; text-align:center; width:90%; max-width:400px; }

        #thanks-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--forest); color:white; flex-direction:column; align-items:center; justify-content:center; z-index:100000; text-align:center; }
        .footer { text-align: center; padding: 20px; font-size: 0.9rem; border-top: 1px solid #eee; margin-top: 20px; }
    </style>
</head>
<body onload="initApp()">

<div id="thanks-overlay">
    <i class="fas fa-check-circle fa-6x"></i>
    <h1>تم الإرسال بنجاح</h1>
</div>

<div id="staff-modal" class="modal">
    <div class="modal-content">
        <h3>إضافة موظف جديد</h3>
        <select id="st-role" class="input" onchange="toggleStaffFields()">
            <option value="سائق">سائق</option>
            <option value="مسؤول">مسؤول</option>
        </select>
        <input type="text" id="st-name" class="input" placeholder="الاسم">
        <input type="text" id="st-phone" class="input" placeholder="رقم الهاتف / الرمز">
        <div id="driver-specifics">
            <input type="text" id="st-truck" class="input" placeholder="رقم الشاحنة">
            <select id="st-sector" class="input">
                <option value="قطاع البلدية">قطاع البلدية</option>
                <option value="قطاع خاص">قطاع خاص</option>
            </select>
        </div>
        <button class="btn" style="background:var(--forest)" onclick="saveStaff()">حفظ البيانات</button>
        <button class="btn" style="background:var(--red)" onclick="closeStaffModal()">إغلاق</button>
    </div>
</div>

<div class="header">
    <div>الجمهورية الجزائرية الديمقراطية الشعبية</div>
    <div style="color:var(--forest); font-weight:bold;">مصلحة النظافة لبلدية المدية</div>
    <h1 style="margin:5px 0;">المدية نظيفة</h1>
    <div id="datetime" style="display:flex; justify-content:space-around; font-weight:bold;">
        <span id="date">--</span>
        <span id="clock">00:00:00</span>
    </div>
</div>

<div id="pg-home" class="page active">
    <div class="admin-grid">
        <button class="grid-item orange-btn" onclick="navTo('pg-report')">
            <i class="fas fa-exclamation-circle"></i>
            بلاغات النفايات
        </button>
        <button class="grid-item green-btn" onclick="navTo('pg-done-list')">
            <i class="fas fa-check-double"></i>
            البلاغات المنجزة
        </button>
    </div>

    <div class="blue-card">
        <h3 style="color:blue; margin-top:0;">رواق المسؤولين والسائقين</h3>
        <button class="btn" style="background:blue;" onclick="openStaffModal()">+ إضافة مسؤول / سائق</button>
        <button class="btn" style="background:var(--navy);" onclick="auth('admin')"><i class="fas fa-user-shield"></i> الإدارة</button>
        <button class="btn" style="background:var(--gold);" onclick="auth('driver')"><i class="fas fa-truck"></i> السائقين</button>
    </div>
</div>

<div id="pg-admin" class="page">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>لوحة التحكم</h2>
        <button class="btn" style="background:var(--red); width:auto; padding:5px 15px;" onclick="location.reload()">خروج</button>
    </div>
    <div id="admin-reports"></div>
    <button class="btn" style="background:#444;" onclick="navTo('pg-home')">رجوع للرئيسية</button>
</div>

<div id="pg-driver" class="page">
    <div id="dr-header" class="btn" style="background:var(--forest); pointer-events:none;"></div>
    <div id="dr-tasks"></div>
    <button class="btn" style="background:#444;" onclick="location.reload()">تسجيل الخروج</button>
</div>

<div class="footer">
    إشراف د. رابحي فتحي - بلدية المدية 2026 ©
</div>

<script>
    const firebaseConfig = { databaseURL: "https://medea-clean-2026-v4-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let appData = { reports: [], staff: [] };
    let currentLoggedUser = "";

    function initApp() {
        db.ref('CLEAN_MEDEA_FINAL').on('value', snap => { if(snap.exists()){ appData = snap.val(); updateUI(); } });
        setInterval(() => { 
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('ar-DZ');
            document.getElementById('date').innerText = now.toLocaleDateString('ar-DZ');
        }, 1000);
    }

    function navTo(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    // الميزة 1: تصفير الخانات فوراً بعد الحفظ
    function saveStaff() {
        const name = document.getElementById('st-name');
        const phone = document.getElementById('st-phone');
        const truck = document.getElementById('st-truck');
        
        if(!name.value) return alert("الاسم مطلوب");

        const s = { 
            role: document.getElementById('st-role').value, 
            name: name.value, 
            phone: phone.value, 
            truck: truck.value || '---',
            sector: document.getElementById('st-sector').value
        };

        if(!appData.staff) appData.staff = [];
        appData.staff.push(s);

        db.ref('CLEAN_MEDEA_FINAL').set(appData).then(() => {
            // تصفير الحقول هنا
            name.value = "";
            phone.value = "";
            truck.value = "";
            alert("تم حفظ الموظف وتصفير البيانات بنجاح");
            closeStaffModal();
        });
    }

    // الميزة 2: الدخول بالاسم والتحقق من القائمة
    function auth(role) {
        const name = prompt("أدخل الاسم المسجل في النظام:");
        if(!name) return;

        // التحقق من وجود الاسم في قائمة الموظفين (staff)
        const found = (appData.staff || []).find(s => s.name === name && (role === 'admin' ? s.role === 'مسؤول' : s.role === 'سائق'));

        if(name === "فتحي" || found) {
            currentLoggedUser = name;
            navTo(role === 'admin' ? 'pg-admin' : 'pg-driver');
            updateUI();
        } else {
            alert(`عذراً، الاسم (${name}) غير مسجل في قائمة الـ ${role}`);
        }
    }

    function updateUI() {
        // تحديث واجهة السائق أو الإدارة بناءً على الهيكل الجمالي في صورك
        if(currentLoggedUser && document.getElementById('pg-driver').classList.contains('active')) {
            document.getElementById('dr-header').innerText = `مرحباً بالسائق: ${currentLoggedUser}`;
        }
    }

    function openStaffModal() { document.getElementById('staff-modal').style.display = 'flex'; }
    function closeStaffModal() { document.getElementById('staff-modal').style.display = 'none'; }
    function toggleStaffFields() { document.getElementById('driver-specifics').style.display = document.getElementById('st-role').value==='سائق'?'block':'none'; }
</script>

</body>
</html>
