<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المدية نظيفة 2026</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* التزام تام بالألوان والتصميم الموجود في صورك */
        :root { --emerald: #1B5E20; --forest: #2E7D32; --gold: #D4AF37; --red: #d21034; --navy: #14213D; --orange: #f39c12; --blue-admin: #0000FF; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { margin: 0; background: #fdfdfd; }
        
        /* تصميم الهيدر كما في الصورة */
        .header { background: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--gold); }
        .header h2 { color: var(--emerald); margin: 5px 0; font-weight: 900; }
        
        .page { display: none; padding: 15px; max-width: 500px; margin: auto; }
        .page.active { display: block; }

        /* تصميم الأزرار الملونة الكبيرة من صورك */
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .nav-box { height: 120px; border-radius: 20px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.4rem; font-weight: bold; cursor: pointer; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .btn-blue { background: var(--blue-admin); width: 100%; padding: 20px; border-radius: 20px; color: white; font-size: 1.3rem; border: none; margin-top: 20px; font-weight: bold; }
        .btn-red { background: var(--red); color: white; padding: 8px 20px; border-radius: 12px; border: none; }
        
        .input { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #eee; margin-bottom: 10px; background: #f9f9f9; text-align: center; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 30px; width: 90%; }
    </style>
</head>
<body onload="initApp()">

<div class="header">
    <div style="font-size: 0.8rem; font-weight: bold;">الجمهورية الجزائرية الديمقراطية الشعبية</div>
    <h2>المـديـة نظيـفة</h2>
    <div style="display: flex; justify-content: space-around; font-weight: bold; color: #444;">
        <div id="clock">00:00:00</div>
        <div>08 أفريل 2026</div>
    </div>
</div>

<div id="pg-admin" class="page active">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h2 style="margin:0;">لوحة التحكم</h2>
        <button class="btn-red" onclick="location.reload()">خروج</button>
    </div>

    <div class="admin-grid">
        <button class="nav-box" style="background: var(--orange);">بلاغات النفايات</button>
        <button class="nav-box" style="background: var(--forest);">البلاغات المنجزة</button>
    </div>

    <div style="text-align: center; margin: 20px 0;">
        <h3 style="color: #666;">سجل الإنجازات</h3>
        <p>لا توجد بيانات حالياً</p>
    </div>

    <div style="border: 2px solid blue; padding: 15px; border-radius: 25px;">
        <p style="text-align:center; color:blue; font-weight:bold;">إدارة الموظفين</p>
        <button class="btn-blue" onclick="openStaffModal()">+ إضافة (مسؤول / سائق)</button>
        <div id="staff-list-ui" style="margin-top:15px;"></div>
    </div>
</div>

<div id="staff-modal" class="modal">
    <div class="modal-content">
        <h3>إضافة موظف جديد</h3>
        <select id="st-role" class="input">
            <option value="سائق">سائق</option>
            <option value="مسؤول">مسؤول (مشرف)</option>
        </select>
        <input type="text" id="st-name" class="input" placeholder="الاسم الكامل">
        <input type="text" id="st-phone" class="input" placeholder="رقم الهاتف">
        <button class="btn-blue" style="margin-top:10px;" onclick="saveStaff()">حفظ البيانات</button>
        <button class="btn-red" style="width:100%; margin-top:5px; padding:15px;" onclick="closeStaffModal()">إغلاق</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://medea-clean-2026-v4-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let appData = { staff: [] };

    function initApp() {
        db.ref('CLEAN_MEDEA_FINAL').on('value', snap => { if(snap.exists()){ appData = snap.val(); updateUI(); } });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
    }

    // الحل الأول: التصفير التام بعد الحفظ
    function saveStaff() {
        const n = document.getElementById('st-name'), p = document.getElementById('st-phone');
        if(!n.value) return alert("الاسم مطلوب");
        
        const member = { role: document.getElementById('st-role').value, name: n.value.trim(), phone: p.value };
        if(!appData.staff) appData.staff = [];
        appData.staff.push(member);

        db.ref('CLEAN_MEDEA_FINAL').set(appData).then(() => {
            alert("تم الحفظ بنجاح");
            n.value = ""; p.value = ""; // تصفير الخانات
            closeStaffModal();
        });
    }

    // الحل الثاني: منطق الدخول للموظفين الجدد
    function auth(role) {
        const name = prompt("الاسم الكامل كما هو مسجل:");
        if(!name) return;
        
        // التحقق من وجود الاسم في قائمة الموظفين التي أضفتها أنت
        const staffList = appData.staff || [];
        const found = staffList.find(s => s.name === name.trim() && (role === 'admin' ? s.role === 'مسؤول' : s.role === 'سائق'));

        if(name === "فتحي" || found) {
            alert("أهلاً بك " + name);
            // الانتقال للصفحة المطلوبة
        } else {
            alert("عذراً، هذا الاسم غير مضاف في النظام.");
        }
    }

    function updateUI() {
        const ui = document.getElementById('staff-list-ui');
        if(ui) ui.innerHTML = (appData.staff || []).map(s => `<div style="padding:8px; border-bottom:1px solid #eee;">• ${s.name} (${s.role})</div>`).join('');
    }

    function openStaffModal() { document.getElementById('staff-modal').style.display = 'flex'; }
    function closeStaffModal() { document.getElementById('staff-modal').style.display = 'none'; }
</script>
</body>
</html>
