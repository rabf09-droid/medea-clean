<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المدية نظيفة - نسخة كاملة 100%</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script><style>
body{margin:0;font-family:Tahoma;background:#f4f4f4}
.page{display:none;padding:15px}
.page.active{display:block}
.btn{width:100%;padding:12px;margin:5px 0;border:none;border-radius:8px;background:#006233;color:#fff;font-weight:bold}
.input{width:100%;padding:10px;margin:5px 0;border-radius:6px;border:1px solid #ccc}
.card{background:#fff;padding:10px;margin:10px 0;border-radius:10px}
#map{height:280px;border-radius:10px}
</style></head>
<body><div id="toast"></div><div id="home" class="page active">
<h3>🏠 الرئيسية</h3>
<button class="btn" onclick="nav('report')">إرسال بلاغ</button>
<button class="btn" onclick="nav('reports')">البلاغات</button>
<button class="btn" onclick="nav('tracking')">التتبع</button>
<button class="btn" onclick="nav('dashboard')">الإحصائيات</button>
<button class="btn" onclick="exportPDF()">PDF</button>
</div><div id="report" class="page">
<h3>بلاغ</h3>
<input id="addr" class="input" placeholder="العنوان">
<input id="gps" class="input" readonly>
<button class="btn" onclick="gps()">GPS</button>
<button class="btn" onclick="voice()">🎤</button>
<button class="btn" onclick="send()">إرسال</button>
<div id="qr"></div>
<button class="btn" onclick="nav('home')">رجوع</button>
</div><div id="reports" class="page">
<h3>البلاغات</h3>
<div id="list"></div>
<button class="btn" onclick="nav('home')">رجوع</button>
</div><div id="tracking" class="page">
<h3>التتبع</h3>
<div id="map"></div>
<button class="btn" onclick="record()">تسجيل نقطة</button>
<button class="btn" onclick="nav('home')">رجوع</button>
</div><div id="dashboard" class="page">
<h3>الإحصائيات</h3>
<div class="card">عدد البلاغات: <span id="count"></span></div>
<button class="btn" onclick="nav('home')">رجوع</button>
</div><script>
let reports=JSON.parse(localStorage.getItem('reports')||'[]');
let route=JSON.parse(localStorage.getItem('route')||'[]');
let map;

function nav(id){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
 document.getElementById(id).classList.add('active');
 if(id==='reports') render();
 if(id==='tracking') initMap();
 if(id==='dashboard') stats();
}

function toast(t){
 let d=document.createElement('div');
 d.textContent=t;
 d.style="background:#fff;padding:8px;margin:5px;border-radius:6px";
 document.getElementById('toast').appendChild(d);
 setTimeout(()=>d.remove(),2000);
}

function gps(){
 navigator.geolocation.getCurrentPosition(p=>{
  document.getElementById('gps').value=p.coords.latitude+','+p.coords.longitude;
 });
}

function voice(){
 if(!('webkitSpeechRecognition' in window)) return;
 let r=new webkitSpeechRecognition();
 r.lang='ar';
 r.start();
 r.onresult=e=>document.getElementById('addr').value=e.results[0][0].transcript;
}

function send(){
 let a=document.getElementById('addr').value;
 if(!a) return toast('أدخل العنوان');
 let g=document.getElementById('gps').value;
 let id=Date.now();
 let obj={id,a,g,status:'pending',date:new Date().toLocaleString()};
 reports.push(obj);
 localStorage.setItem('reports',JSON.stringify(reports));
 makeQR(id);
 toast('تم');
}

function makeQR(id){
 document.getElementById('qr').innerHTML='';
 new QRCode(document.getElementById('qr'),'report-'+id);
}

function render(){
 let l=document.getElementById('list');
 l.innerHTML='';
 reports.forEach(r=>{
  let d=document.createElement('div');
  d.className='card';
  d.innerHTML=`${r.a}<br>${r.date}<br>${r.status}`;
  l.appendChild(d);
 });
}

function initMap(){
 if(map) return;
 map=L.map('map').setView([36.26,2.22],13);
 L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
 route.forEach(p=>L.marker([p.lat,p.lng]).addTo(map));
}

function record(){
 navigator.geolocation.getCurrentPosition(p=>{
  let lat=p.coords.latitude,lng=p.coords.longitude;
  route.push({lat,lng});
  localStorage.setItem('route',JSON.stringify(route));
  L.marker([lat,lng]).addTo(map);
 });
}

function stats(){
 document.getElementById('count').textContent=reports.length;
}

function exportPDF(){
 html2pdf().from(document.body).save('reports.pdf');
}

</script></body>
</html>
