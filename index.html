<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدية خضراء 2026 - د. رابحي فتحي</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --glass: rgba(255, 255, 255, 0.95); --gold: #D4AF37; --red: #d21034; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; transition: 0.3s; }
        body { margin: 0; background: url('https://w0.peakpx.com/wallpaper/842/630/HD-wallpaper-garbage-truck-garbage-recycling-environment-trucks.jpg') no-repeat center center fixed; background-size: cover; min-height: 100vh; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: -1; }
        .top-bar { background: var(--glass); padding: 15px; text-align: center; border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .live-panel { display: flex; justify-content: space-between; padding: 5px 15px; font-weight: bold; color: var(--emerald); font-size: 0.85rem; background: rgba(255,255,255,0.5); border-radius: 10px; margin-top: 5px; }
        .screen { display: none; padding: 20px; padding-bottom: 100px; }
        .active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .glass-card { background: var(--glass); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); text-align: center; }
        .btn-prime { border: none; padding: 14px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; color: white; }
        .input-style { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ccc; margin-bottom: 10px; }
        #map { height: 250px; border-radius: 20px; border: 3px solid white; margin-bottom: 10px; }
        .item-box { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: right; border-right: 6px solid var(--gold); position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .report-img-view { width: 100%; border-radius: 12px; margin: 10px 0; }
        .del-btn { color: var(--red); float: left; cursor: pointer; font-size: 1.2rem; }
        .footer-sig { position: fixed; bottom: 0; width: 100%; background: var(--glass); padding: 12px; text-align: center; font-weight: bold; color: var(--forest); border-top: 2px solid var(--gold); }
    </style>
</head>
<body onload="initApp()">

<div class="top-bar">
    <div id="lg-gov">الجمهورية الجزائرية الديمقراطية الشعبية</div>
    <div id="lg-dept" style="font-size: 1.1rem; font-weight: 700; color: var(--emerald);">بلدية المدية - مصلحة النظافة</div>
    <div class="live-panel"><div id="clock">00:00:00</div><div id="date-display">--</div></div>
</div>

<div id="scr-main" class="screen active">
    <div class="glass-card" onclick="navTo('scr-report')"><i class="fas fa-bullhorn fa-3x" style="color:var(--forest)"></i><h3 id="h-report">تبليغ مواطن جديد</h3></div>
    <div class="glass-card" onclick="auth('admin')"><i class="fas fa-user-shield fa-3x" style="color:var(--emerald)"></i><h3 id="h-admin">مصلحة النظافة (الإدارة)</h3></div>
    <div class="glass-card" onclick="auth('driver')"><i class="fas fa-truck-pickup fa-3x" style="color:var(--gold)"></i><h3 id="h-driver">واجهة السائق الميداني</h3></div>
    <div style="display: flex; gap: 10px;">
        <div class="glass-card" onclick="navTo('scr-settings')" style="flex:1;"><i class="fas fa-language fa-2x"></i><h4 id="h-lang">اللغة</h4></div>
        <div class="glass-card" onclick="location.reload()" style="flex:1; color:var(--red)"><i class="fas fa-power-off fa-2x"></i><h4 id="h-exit">خروج</h4></div>
    </div>
</div>

<div id="scr-settings" class="screen">
    <div class="glass-card">
        <h3>Choose Language / اختر اللغة</h3>
        <button class="btn-prime" style="background:var(--emerald)" onclick="setLang('ar')">العربية</button>
        <button class="btn-prime" style="background:var(--navy)" onclick="setLang('fr')">Français</button>
        <button class="btn-prime" style="background:var(--forest)" onclick="setLang('en')">English</button>
    </div>
    <button class="btn-prime" style="background:#666;" onclick="navTo('scr-main')">Back / رجوع</button>
</div>

<div id="scr-report" class="screen">
    <div id="map"></div>
    <button class="btn-prime" style="background:var(--forest);" onclick="getMyLocation()"><i class="fas fa-location-arrow"></i> <span id="b-loc">تحديد موقعي</span></button>
    <input type="text" id="rep-addr" class="input-style" placeholder="العنوان...">
    <input type="text" id="rep-geo" class="input-style" placeholder="الإحداثيات" readonly>
    <label class="btn-prime" style="background:var(--navy);"><i class="fas fa-camera"></i> <span id="b-cam">تصوير النفايات</span> <input type="file" id="img-input" accept="image/*" capture="environment" style="display:none;" onchange="handleImg(this)"></label>
    <div id="img-status" style="display:none; color:var(--emerald); font-weight:bold; text-align:center;">✅ Ready</div>
    <button id="send-btn" class="btn-prime" style="background:var(--emerald);" onclick="submitReport()"><span id="b-send">إرسال</span></button>
    <button class="btn-prime" style="background:#666;" onclick="navTo('scr-main')">رجوع</button>
</div>

<div id="scr-admin" class="screen">
    <div class="glass-card" style="display:flex; justify-content:space-around;">
        <div>🆕 <span id="st-new">0</span></div>
        <div>🚚 <span id="st-sent">0</span></div>
        <div>✅ <span id="st-done">0</span></div>
    </div>
    <button class="btn-prime" style="background:var(--navy)" onclick="toggleView('admin-list')">عرض التبليغات</button>
    <div id="admin-list" style="display:none;"></div>
    
    <button class="btn-prime" style="background:var(--forest)" onclick="toggleView('driver-mgr')">إدارة السائقين</button>
    <div id="driver-mgr" style="display:none;" class="glass-card">
        <input type="text" id="d-name" class="input-style" placeholder="اسم السائق">
        <button class="btn-prime" style="background:var(--emerald)" onclick="addDriver()">إضافة سائق</button>
        <div id="d-list-display"></div>
    </div>
    <button class="btn-prime" style="background:#333;" onclick="navTo('scr-main')">خروج</button>
</div>

<div id="scr-driver" class="screen">
    <h3 id="drv-welcome" style="color:white; text-align:center;"></h3>
    <div id="driver-tasks"></div>
    <button class="btn-prime" style="background:#333;" onclick="navTo('scr-main')">خروج</button>
</div>

<div class="footer-sig">د. رابحي فتحي | Medea Green 2026</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const firebaseConfig = { databaseURL: "https://medea-green-2026-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();

    let db = { reports: [], drivers: [], admins: ["فتحي"] };
    let map, marker, currentImg = "", currentLang = 'ar';

    const langData = {
        ar: { gov: "الجمهورية الجزائرية الديمقراطية الشعبية", dept: "بلدية المدية - مصلحة النظافة", report: "تبليغ مواطن جديد", admin: "مصلحة النظافة (الإدارة)", driver: "واجهة السائق الميداني", lang: "اللغة", exit: "خروج", b_loc: "تحديد موقعي", b_cam: "تصوير النفايات", b_send: "إرسال" },
        fr: { gov: "République Algérienne Démocratique et Populaire", dept: "Commune de Médéa - Service d'Hygiène", report: "Nouveau Signalement", admin: "Administration", driver: "Interface Chauffeur", lang: "Langue", exit: "Quitter", b_loc: "Ma Position", b_cam: "Prendre Photo", b_send: "Envoyer" },
        en: { gov: "People's Democratic Republic of Algeria", dept: "Medea Municipality - Hygiene Dept", report: "New Citizen Report", admin: "Administration", driver: "Driver Interface", lang: "Language", exit: "Exit", b_loc: "My Location", b_cam: "Take Photo", b_send: "Submit" }
    };

    function initApp() {
        rtdb.ref('medea_data').on('value', (snap) => {
            if (snap.exists()) {
                db = snap.val();
                updateStats();
                renderReports();
                renderDrivers();
            }
        });
        setInterval(updateClock, 1000);
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('fr-FR');
        document.getElementById('date-display').innerText = now.toLocaleDateString(currentLang === 'ar' ? 'ar-DZ' : 'fr-FR');
    }

    function setLang(l) {
        currentLang = l;
        const d = langData[l];
        document.getElementById('lg-gov').innerText = d.gov;
        document.getElementById('lg-dept').innerText = d.dept;
        document.getElementById('h-report').innerText = d.report;
        document.getElementById('h-admin').innerText = d.admin;
        document.getElementById('h-driver').innerText = d.driver;
        document.getElementById('h-lang').innerText = d.lang;
        document.getElementById('h-exit').innerText = d.exit;
        document.getElementById('b-loc').innerText = d.b_loc;
        document.getElementById('b-cam').innerText = d.b_cam;
        document.getElementById('b-send').innerText = d.b_send;
        document.dir = (l === 'ar' ? 'rtl' : 'ltr');
        navTo('scr-main');
    }

    function handleImg(input) {
        const file = input.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const max = 800;
                let w = img.width, h = img.height;
                if (w > h) { if (w > max) { h *= max / w; w = max; } }
                else { if (h > max) { w *= max / h; h = max; } }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                currentImg = canvas.toDataURL('image/jpeg', 0.6); // ضغط 60%
                document.getElementById('img-status').style.display = 'block';
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function submitReport() {
        if(!currentImg) return alert("الرجاء التصوير!");
        const newRep = {
            id: Date.now(),
            addr: document.getElementById('rep-addr').value || "Medea",
            geo: document.getElementById('rep-geo').value,
            img: currentImg,
            status: 'new',
            time: new Date().toLocaleString()
        };
        if(!db.reports) db.reports = [];
        db.reports.push(newRep);
        rtdb.ref('medea_data').set(db).then(() => {
            alert("تم الإرسال ✅");
            location.reload();
        });
    }

    function renderReports() {
        const list = document.getElementById('admin-list');
        list.innerHTML = (db.reports || []).slice().reverse().map(r => `
            <div class="item-box">
                <i class="fas fa-trash del-btn" onclick="deleteReport(${r.id})"></i>
                <img src="${r.img}" class="report-img-view">
                <p>📍 ${r.addr}</p>
                <small>🕒 ${r.time}</small>
                <hr>
                ${r.status === 'new' ? `
                    <select id="sel-${r.id}" class="input-style">
                        <option value="">-- اختر سائقاً --</option>
                        ${(db.drivers || []).map(d => `<option value="${d.name}">${d.name}</option>`).join('')}
                    </select>
                    <button class="btn-prime" style="background:var(--gold); color:black" onclick="assignTask(${r.id})">إرسال للسائق</button>
                ` : `<p style="color:var(--forest)">إلى: ${r.assignedTo} (${r.status})</p>`}
            </div>
        `).join('');
    }

    function assignTask(id) {
        const drvName = document.getElementById(`sel-${id}`).value;
        if(!drvName) return alert("اختر سائقاً!");
        const rep = db.reports.find(x => x.id === id);
        rep.status = 'sent';
        rep.assignedTo = drvName;
        rtdb.ref('medea_data').set(db);
    }

    function renderDriverTasks(name) {
        const container = document.getElementById('driver-tasks');
        container.innerHTML = (db.reports || []).filter(r => r.assignedTo === name && r.status !== 'done').map(r => `
            <div class="item-box">
                <img src="${r.img}" class="report-img-view">
                <p>📍 ${r.addr}</p>
                <button class="btn-prime" style="background:var(--emerald)" onclick="completeTask(${r.id})">تم التنظيف ✅</button>
            </div>
        `).join('');
    }

    function completeTask(id) {
        const rep = db.reports.find(x => x.id === id);
        rep.status = 'done';
        rtdb.ref('medea_data').set(db);
    }

    function addDriver() {
        const n = document.getElementById('d-name').value;
        if(!n) return;
        if(!db.drivers) db.drivers = [];
        db.drivers.push({ id: Date.now(), name: n });
        rtdb.ref('medea_data').set(db);
        document.getElementById('d-name').value = "";
    }

    function renderDrivers() {
        document.getElementById('d-list-display').innerHTML = (db.drivers || []).map(d => `
            <div style="padding:10px; border-bottom:1px solid #ddd;">
                ${d.name} <i class="fas fa-user-minus del-btn" onclick="deleteDriver(${d.id})"></i>
            </div>
        `).join('');
    }

    function deleteReport(id) { if(confirm("حذف البلاغ؟")) { db.reports = db.reports.filter(x => x.id !== id); rtdb.ref('medea_data').set(db); } }
    function deleteDriver(id) { if(confirm("حذف السائق؟")) { db.drivers = db.drivers.filter(x => x.id !== id); rtdb.ref('medea_data').set(db); } }

    function auth(role) {
        const user = prompt("Name:");
        const pass = prompt("PIN:");
        if(role === 'admin' && db.admins.includes(user) && pass === '1234') navTo('scr-admin');
        else if(role === 'driver' && pass === '5678') {
            const d = (db.drivers || []).find(x => x.name === user);
            if(d) {
                document.getElementById('drv-welcome').innerText = "مرحباً: " + user;
                navTo('scr-driver');
                renderDriverTasks(user);
            } else alert("غير مسجل!");
        }
    }

    function navTo(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'scr-report') setTimeout(initMap, 500);
    }

    function initMap() {
        if(map) return;
        map = L.map('map').setView([36.2642, 2.7539], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{y}/{x}.png').addTo(map);
        marker = L.marker([36.2642, 2.7539], {draggable: true}).addTo(map);
        marker.on('dragend', () => {
            const p = marker.getLatLng();
            document.getElementById('rep-geo').value = p.lat.toFixed(6) + "," + p.lng.toFixed(6);
        });
    }

    function getMyLocation() {
        navigator.geolocation.getCurrentPosition(p => {
            const lat = p.coords.latitude, lng = p.coords.longitude;
            map.setView([lat, lng], 18); marker.setLatLng([lat, lng]);
            document.getElementById('rep-geo').value = lat.toFixed(6) + "," + lng.toFixed(6);
        });
    }

    function updateStats() {
        if(!db.reports) return;
        document.getElementById('st-new').innerText = db.reports.filter(r => r.status === 'new').length;
        document.getElementById('st-sent').innerText = db.reports.filter(r => r.status === 'sent').length;
        document.getElementById('st-done').innerText = db.reports.filter(r => r.status === 'done').length;
    }

    function toggleView(id) {
        const e = document.getElementById(id);
        e.style.display = e.style.display === 'none' ? 'block' : 'none';
    }
</script>
</body>
</html>
