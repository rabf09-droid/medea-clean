<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المدية نظيفة 2026</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --gold: #D4AF37; --red: #d21034; --navy: #14213D; --orange: #f39c12; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { margin: 0; background: #fdfdfd; background-image: url('https://raw.githubusercontent.com/rabf09-droid/rabf09-droid.github.io/main/1000052240.webp'); background-size: cover; background-position: center; background-attachment: fixed; }

        .header { background: white; padding: 10px; text-align: center; border-bottom: 5px solid var(--gold); }
        .page { display: none; padding: 15px; animation: fadeIn 0.4s; max-width: 500px; margin: auto; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn { border: none; padding: 15px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; color: white; font-size: 1.1rem; }
        .input { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 10px; text-align: center; font-size: 1rem; }

        /* واجهة الشكر */
        #thanks-overlay { display:none; position:fixed; inset:0; background:var(--forest); color:white; flex-direction:column; align-items:center; justify-content:center; z-index:10000; text-align:center; }
        
        .giant-btn { background: var(--forest); height: 230px; flex-direction: column; border-radius: 50px; font-size: 2.1rem; border: 6px solid white; box-shadow: 0 15px 45px rgba(46,125,50,0.3); }
        .giant-btn i { font-size: 6.5rem; }

        .modal { display: none; position: fixed; inset:0; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center; }
        .modal-content { background:white; padding:30px; border-radius:30px; width:90%; max-width:400px; text-align:center; }
    </style>
</head>
<body onload="initApp()">

<div id="thanks-overlay">
    <i class="fas fa-heart fa-6x" style="color:var(--gold); margin-bottom:20px;"></i>
    <h1 style="font-size:2.5rem; font-weight:900;">شكراً لكم!</h1>
    <p style="font-size:1.3rem;">تم إرسال بلاغكم لمصالح بلدية المدية بنجاح.<br>نحن نقدر حرصكم على نظافة مدينتنا.</p>
    <div style="margin-top:30px; border:2px solid var(--gold); padding:10px 30px; border-radius:50px; color:var(--gold); font-weight:bold;">معاً لمدية أنظف 2026</div>
</div>

<div class="header">
    <div style="font-size: 0.7rem; font-weight: bold;">الجمهورية الجزائرية الديمقراطية الشعبية</div>
    <div style="font-size: 1.6rem; font-weight: 900; color: var(--emerald);">المـديـة نظيـفة</div>
    <div id="clock" style="font-weight: bold; color: var(--navy); border-top:1px solid #eee; margin-top:5px;">00:00:00</div>
</div>

<div id="pg-home" class="page active">
    <button class="btn giant-btn" onclick="navTo('pg-report')">
        <i class="fas fa-truck-loading"></i>
        <span>إرســـــال تبلـيـــغ</span>
    </button>
    <div class="card" style="border: 2px dashed var(--navy); background: rgba(255,255,255,0.7);">
        <p style="text-align: center; font-weight: bold; margin: 0 0 10px 0;">رواق الموظفين والمسؤولين</p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn" style="background:var(--navy)" onclick="auth('admin')"><i class="fas fa-user-shield"></i> الإدارة</button>
            <button class="btn" style="background:var(--gold)" onclick="auth('driver')"><i class="fas fa-truck"></i> السائقين</button>
        </div>
    </div>
</div>

<div id="pg-report" class="page">
    <div class="card">
        <div style="height:200px; border:3px dashed #ccc; border-radius:20px; display:flex; align-items:center; justify-content:center; margin-bottom:15px; position:relative; overflow:hidden;">
            <i id="ico-cam" class="fas fa-camera fa-4x" style="color:#ddd"></i>
            <img id="out-img" style="width:100%; height:100%; object-fit:cover; display:none;">
            <label style="position:absolute; bottom:10px; background:var(--navy); color:white; padding:8px 15px; border-radius:20px; cursor:pointer;">
                <i class="fas fa-camera"></i> تصوير النفايات
                <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="handleImg(this)">
            </label>
        </div>
        <button class="btn" style="background:var(--forest)" onclick="getLoc()">تحديد الموقع تلقائياً</button>
        <input type="text" id="in-addr" class="input" placeholder="اسم الحي أو الشارع">
        <input type="text" id="in-gps" class="input" readonly placeholder="إحداثيات GPS">
        <button id="send-btn" class="btn" style="background:var(--emerald); height:70px; font-size:1.3rem;" onclick="sendReport()">إرسال البلاغ الآن</button>
        <button class="btn" style="background:#666;" onclick="navTo('pg-home')">رجوع</button>
    </div>
</div>

<div id="pg-admin" class="page">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h3>لوحة التحكم</h3>
        <button class="btn" style="background:var(--red); width:auto; padding:5px 15px;" onclick="location.reload()">خروج</button>
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom:15px;">
        <button class="btn" style="background:var(--orange); height:100px;">بلاغات النفايات</button>
        <button class="btn" style="background:var(--forest); height:100px;">المنجزة</button>
    </div>
    <div class="card" style="border: 2px solid blue;">
        <h4 style="text-align:center; color:blue; margin-top:0;">إدارة الموظفين</h4>
        <button class="btn" style="background:blue" onclick="openModal()">+ إضافة موظف جديد</button>
        <div id="staff-list-ui"></div>
    </div>
</div>

<div id="staff-modal" class="modal">
    <div class="modal-content">
        <h3>إضافة موظف جديد</h3>
        <select id="st-role" class="input">
            <option value="سائق">سائق</option>
            <option value="مسؤول">مسؤول (مشرف)</option>
        </select>
        <input type="text" id="st-name" class="input" placeholder="الاسم الكامل">
        <input type="text" id="st-phone" class="input" placeholder="رقم الهاتف">
        <input type="text" id="st-truck" class="input" placeholder="رقم الشاحنة (للسائقين)">
        <button class="btn" style="background:var(--forest)" onclick="saveStaff()">حفظ وإضافة</button>
        <button class="btn" style="background:var(--red)" onclick="closeModal()">إلغاء</button>
    </div>
</div>

<div id="pg-driver" class="page">
    <div class="card" style="background:var(--emerald); color:white; text-align:center;">
        <h2 id="dr-welcome">مرحباً بالسائق</h2>
    </div>
    <div id="dr-tasks"></div>
    <button class="btn" style="background:#444;" onclick="location.reload()">تسجيل الخروج</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://medea-clean-2026-v4-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let appData = { reports: [], staff: [] };
    let currentLoggedUser = "", tempImg = "";

    function initApp() {
        db.ref('CLEAN_MEDEA_FINAL').on('value', snap => { if(snap.exists()){ appData = snap.val(); updateUI(); } });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-DZ'); }, 1000);
    }

    function navTo(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    function handleImg(input) {
        const reader = new FileReader();
        reader.onload = e => {
            tempImg = e.target.result;
            document.getElementById('out-img').src = tempImg;
            document.getElementById('out-img').style.display = 'block';
            document.getElementById('ico-cam').style.display = 'none';
        };
        reader.readAsDataURL(input.files[0]);
    }

    function getLoc() {
        navigator.geolocation.getCurrentPosition(p => {
            document.getElementById('in-gps').value = p.coords.latitude.toFixed(5) + "," + p.coords.longitude.toFixed(5);
        });
    }

    // إرسال التبليغ + إظهار رسالة الشكر + تصفير
    function sendReport() {
        if(!tempImg || !document.getElementById('in-addr').value) return alert("يرجى التقاط صورة وتحديد العنوان");
        
        const report = {
            id: Date.now(), img: tempImg, addr: document.getElementById('in-addr').value,
            gps: document.getElementById('in-gps').value, status: 'new', date: new Date().toLocaleDateString()
        };

        if(!appData.reports) appData.reports = [];
        appData.reports.push(report);

        db.ref('CLEAN_MEDEA_FINAL').set(appData).then(() => {
            document.getElementById('thanks-overlay').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('thanks-overlay').style.display = 'none';
                // تصفير الخانات
                tempImg = ""; document.getElementById('out-img').style.display='none';
                document.getElementById('ico-cam').style.display='block';
                document.getElementById('in-addr').value=""; document.getElementById('in-gps').value="";
                navTo('pg-home');
            }, 4000);
        });
    }

    // الدخول بالاسم فقط (اصلاح مشكلة التداخل)
    function auth(role) {
        const name = prompt("الرجاء إدخال الاسم الكامل المسجل:");
        if(!name) return;

        // حالة خاصة لـ فتحي
        if(name === "فتحي" && role === 'admin') {
            currentLoggedUser = "فتحي"; navTo('pg-admin'); return;
        }

        const staff = (appData.staff || []).find(s => s.name === name.trim());
        
        if(staff) {
            if(role === 'admin' && staff.role === 'مسؤول') {
                currentLoggedUser = staff.name; navTo('pg-admin');
            } else if(role === 'driver' && staff.role === 'سائق') {
                currentLoggedUser = staff.name; 
                document.getElementById('dr-welcome').innerText = "مرحباً السائق: " + staff.name;
                navTo('pg-driver');
            } else {
                alert("هذا الاسم غير مسجل كـ " + (role==='admin'?'مسؤول':'سائق'));
            }
        } else {
            alert("الاسم غير موجود في النظام. يرجى مراجعة الإدارة.");
        }
    }

    // حفظ الموظف وتصفير الخانات فوراً
    function saveStaff() {
        const name = document.getElementById('st-name'), 
              phone = document.getElementById('st-phone'), 
              truck = document.getElementById('st-truck'),
              role = document.getElementById('st-role').value;

        if(!name.value) return alert("الاسم مطلوب");

        const newMember = { name: name.value.trim(), phone: phone.value, truck: truck.value, role: role };
        
        if(!appData.staff) appData.staff = [];
        appData.staff.push(newMember);

        db.ref('CLEAN_MEDEA_FINAL').set(appData).then(() => {
            alert("تم الحفظ بنجاح");
            // تصفير الخانات
            name.value = ""; phone.value = ""; truck.value = "";
            closeModal();
        });
    }

    function updateUI() {
        const list = document.getElementById('staff-list-ui');
        if(list) {
            list.innerHTML = (appData.staff || []).map(s => `
                <div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
                    <span>${s.name} (${s.role})</span>
                    <i class="fas fa-trash" style="color:red;" onclick="deleteStaff('${s.name}')"></i>
                </div>
            `).join('');
        }
    }

    function openModal() { document.getElementById('staff-modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('staff-modal').style.display = 'none'; }
    function deleteStaff(name) { if(confirm("حذف الموظف؟")) { appData.staff = appData.staff.filter(s=>s.name !== name); db.ref('CLEAN_MEDEA_FINAL').set(appData); } }
</script>
</body>
</html>
