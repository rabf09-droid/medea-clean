<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المدية نظيفة</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --glass: rgba(255, 255, 255, 0.98); --gold: #D4AF37; --red: #d21034; --orange: #fb8c00; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; transition: 0.3s; }
        body { margin: 0; background: #000; color: #333; }
        .main-container { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://www.shutterstock.com/shutterstock/photos/1932338633/display_1500/stock-photo-garbage-truck-on-the-street-1932338633.jpg'); background-size: cover; background-attachment: fixed; min-height: 100vh; padding-bottom: 180px; }
        .header { background: var(--glass); padding: 15px; text-align: center; border-bottom: 4px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .page { display: none; padding: 20px; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--glass); border-radius: 25px; padding: 20px; margin-bottom: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { border: none; padding: 16px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; color: white; font-size: 1.1rem; }
        .input { width: 100%; padding: 14px; border-radius: 15px; border: 2px solid #ddd; margin-bottom: 12px; font-size: 1rem; text-align: center; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--glass); padding: 10px; border-top: 3px solid var(--gold); z-index: 2000; text-align: center; }
        .lang-box { display: flex; gap: 8px; margin-bottom: 8px; justify-content: center; }
        .lang-btn { flex: 1; padding: 10px; border-radius: 12px; border: 2px solid var(--emerald); background: white; font-weight: bold; cursor: pointer; color: var(--emerald); }
    </style>
</head>
<body onload="initApp()">
<div class="main-container">
    <div class="header">
        <div id="txt-country" style="font-size: 0.85rem; font-weight: bold; color: var(--navy);">الجمهورية الجزائرية الديمقراطية الشعبية</div>
        <div id="txt-dept" style="font-size: 0.75rem; color: var(--forest); font-weight: bold; margin: 3px 0;">مصلحة النظافة و الوقاية الصحية بلدية المدية</div>
        <div id="txt-app-title" style="font-size: 1.6rem; font-weight: 800; color: var(--emerald);">المدية نظيفة</div>
        <div style="display: flex; justify-content: space-between; padding: 5px 20px; font-weight: bold; color: var(--navy); border-top: 1px solid #eee; margin-top:5px;">
            <div id="clock">00:00:00</div>
            <div id="txt-date-display">07 أفريل 2026</div>
        </div>
    </div>

    <div id="pg-home" class="page active">
        <div class="card" onclick="navTo('pg-report')"><i class="fas fa-bullhorn fa-4x" style="color:var(--forest)"></i><h2 class="tr" id="lbl-report">التبليغ</h2></div>
        <div class="card" onclick="auth('admin')"><i class="fas fa-user-shield fa-4x" style="color:var(--emerald)"></i><h2 class="tr" id="lbl-admin">الإدارة</h2></div>
        <div class="card" onclick="auth('driver')"><i class="fas fa-truck fa-4x" style="color:var(--gold)"></i><h2 class="tr" id="lbl-driver">الشاحنة</h2></div>
    </div>

    <div id="pg-report" class="page">
        <div class="card">
            <div id="cam-box" style="height:200px; border:3px dashed var(--forest); border-radius:15px; display:flex; align-items:center; justify-content:center; overflow:hidden; background:#fff; margin-bottom:15px;">
                <i id="ico-cam" class="fas fa-camera fa-4x" style="color:#ccc"></i>
                <img id="out-img" style="width:100%; height:100%; object-fit:cover; display:none;">
            </div>
            <label class="btn" style="background:var(--navy);"><i class="fas fa-camera"></i> <span id="lbl-take">التقاط صورة</span><input type="file" accept="image/*" capture="environment" style="display:none;" onchange="handleImg(this, 'citizen')"></label>
            <button class="btn" style="background:var(--forest);" onclick="getLoc()"><i class="fas fa-map-marker-alt"></i> <span id="lbl-loc">تحديد العنوان و الأحداثيات</span></button>
            <input type="text" id="in-addr" class="input tr-ph" placeholder="العنوان">
            <input type="text" id="in-gps" class="input tr-ph" readonly placeholder="الإحداثيات">
            <button class="btn" style="background:var(--emerald);" onclick="sendReport()"><i class="fas fa-paper-plane"></i> <span id="lbl-send">إرسال التبليغ</span></button>
            <button class="btn" style="background:#666;" onclick="navTo('pg-home')">رجوع</button>
        </div>
    </div>

    <div id="pg-admin" class="page">
        <div style="display:flex; gap:8px; margin-bottom:15px;">
            <div style="flex:1; background:var(--red); color:#fff; border-radius:15px; padding:10px; text-align:center;"><i class="fas fa-clock"></i><br><b id="c1">0</b></div>
            <div style="flex:1; background:var(--orange); color:#fff; border-radius:15px; padding:10px; text-align:center;"><i class="fas fa-truck"></i><br><b id="c2">0</b></div>
            <div style="flex:1; background:var(--forest); color:#fff; border-radius:15px; padding:10px; text-align:center;"><i class="fas fa-check-circle"></i><br><b id="c3">0</b></div>
        </div>
        
        <div id="sec-reps" style="margin-bottom: 20px;"></div>

        <div class="card">
            <h3>إضافة سائق</h3>
            <input type="text" id="dr-n" class="input" placeholder="اسم السائق">
            <input type="text" id="dr-p" class="input" placeholder="رقم الهاتف">
            <input type="text" id="dr-t" class="input" placeholder="رقم الشاحنة">
            <select id="dr-s" class="input">
                <option value="">-- اختر القطاع --</option>
                <option value="البلدية">البلدية</option>
                <option value="القطاع الخاص">القطاع الخاص</option>
            </select>
            <button class="btn" style="background:var(--emerald)" onclick="addDr()">حفظ السائق</button>
            <div id="main-admin-only" style="display:none; border-top:2px solid #ddd; margin-top:15px; padding-top:15px;">
                <input type="text" id="ad-n" class="input" placeholder="اسم المسؤول الجديد">
                <button class="btn" style="background:var(--navy)" onclick="addAd()">إضافة مسؤول</button>
                <button class="btn" style="background:var(--red)" onclick="delAd()">حذف مسؤول</button>
            </div>
        </div>
        <button class="btn" style="background:#444;" onclick="navTo('pg-home')">تسجيل الخروج</button>
    </div>

    <div id="pg-driver" class="page">
        <div id="dr-head" class="card" style="background:var(--emerald); color:white;"></div>
        <div id="dr-tasks"></div>
        <button class="btn" style="background:#444;" onclick="navTo('pg-home')">رجوع</button>
    </div>

    <div class="footer">
        <div class="lang-box">
            <button class="lang-btn" onclick="setLang('ar')">عربية</button>
            <button class="lang-btn" onclick="setLang('fr')">Français</button>
            <button class="lang-btn" onclick="setLang('en')">English</button>
        </div>
        <button class="btn" style="background:var(--red); margin:0;" onclick="if(confirm('خروج؟')) window.close()"><i class="fas fa-power-off"></i> <span id="lbl-exit">خروج</span></button>
        <div style="font-size: 0.75rem; font-weight: bold; color: var(--navy); margin-top: 5px;">التطبيق من إعداد د. رابحي فتحي</div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://medea-clean-smart-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let appData = { reports: [], drivers: [], admins: ["فتحي"] };
    let curImgCit = "", curImgDrv = "", curUser = "";

    function setLang(l) {
        const trans = {
            ar: { country: "الجمهورية الجزائرية الديمقراطية الشعبية", dept: "مصلحة النظافة و الوقاية الصحية بلدية المدية", title: "المدية نظيفة", report: "التبليغ", admin: "الإدارة", driver: "الشاحنة", take: "التقاط صورة", loc: "تحديد الموقع", send: "إرسال التبليغ", exit: "خروج", addr: "العنوان", gps: "الإحداثيات" },
            fr: { country: "République Algérienne Démocratique et Populaire", dept: "Service d'Hygiène et de Prévention - Commune de Médéa", title: "Médéa Propre", report: "Signalement", admin: "Administration", driver: "Camion", take: "Prendre Photo", loc: "Localiser", send: "Envoyer", exit: "Sortie", addr: "Adresse", gps: "Coordonnées" },
            en: { country: "People's Democratic Republic of Algeria", dept: "Hygiene and Health Dept - Medea Municipality", title: "Clean Medea", report: "Reporting", admin: "Management", driver: "Truck", take: "Take Photo", loc: "Get Location", send: "Send Report", exit: "Exit", addr: "Address", gps: "GPS Coordinates" }
        };
        const t = trans[l];
        document.getElementById('txt-country').innerText = t.country;
        document.getElementById('txt-dept').innerText = t.dept;
        document.getElementById('txt-app-title').innerText = t.title;
        document.getElementById('lbl-report').innerText = t.report;
        document.getElementById('lbl-admin').innerText = t.admin;
        document.getElementById('lbl-driver').innerText = t.driver;
        document.getElementById('lbl-take').innerText = t.take;
        document.getElementById('lbl-loc').innerText = t.loc;
        document.getElementById('lbl-send').innerText = t.send;
        document.getElementById('lbl-exit').innerText = t.exit;
        document.getElementById('in-addr').placeholder = t.addr;
        document.getElementById('in-gps').placeholder = t.gps;
        document.dir = (l === 'ar' ? 'rtl' : 'ltr');
    }

    function initApp() {
        db.ref('MEDEA_APP_2026').on('value', s => { if(s.exists()){ appData=s.val(); updateUI(); } });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
    }

    function handleImg(input, role) {
        const reader = new FileReader();
        reader.onload = e => {
            if(role === 'citizen') {
                curImgCit = e.target.result;
                document.getElementById('out-img').src = curImgCit;
                document.getElementById('out-img').style.display = 'block';
                document.getElementById('ico-cam').style.display = 'none';
            } else { curImgDrv = e.target.result; alert("✅ تم التقاط صورة الإنجاز"); }
        };
        reader.readAsDataURL(input.files[0]);
    }

    function getLoc() {
        navigator.geolocation.getCurrentPosition(p => {
            const lat = p.coords.latitude, lng = p.coords.longitude;
            document.getElementById('in-gps').value = lat.toFixed(6) + "," + lng.toFixed(6);
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`).then(r=>r.json()).then(d=>{
                document.getElementById('in-addr').value = d.display_name.split(',').slice(0,3).join(',');
            });
        });
    }

    // ثانياً: دالة الإرسال مع منطق الرسائل المتتالي الصارم
    function sendReport() {
        const addr = document.getElementById('in-addr').value;
        const gps = document.getElementById('in-gps').value;
        if(!curImgCit || !addr) return alert("يرجى التقاط صورة وتحديد الموقع");

        const report = {
            id: Date.now(), img: curImgCit, addr: addr, gps: gps,
            time: new Date().toLocaleTimeString('fr-FR'), date: "07 أفريل 2026", status: 'new'
        };

        if(!appData.reports) appData.reports = [];
        appData.reports.push(report);

        db.ref('MEDEA_APP_2026').set(appData).then(() => {
            // التصفير فوراً
            clrRep();
            // السؤال الصارم
            const q = confirm("هل لديك تبليغ آخر؟");
            if (!q) {
                alert("شكرا لتعاونك معنا تم الإرسال");
                navTo('pg-home');
            }
        });
    }

    function clrRep() {
        curImgCit=""; document.getElementById('out-img').style.display='none'; 
        document.getElementById('ico-cam').style.display='block';
        document.getElementById('in-addr').value=""; document.getElementById('in-gps').value=""; 
    }

    function auth(role) {
        const u = prompt("الاسم:"), p = prompt("الرمز:");
        if(role==='admin' && (appData.admins||[]).includes(u) && p==='1234') {
            document.getElementById('main-admin-only').style.display = (u==='فتحي')?'block':'none';
            navTo('pg-admin');
        } else if(role==='driver' && p==='5678') {
            const d = (appData.drivers||[]).find(x=>x.name===u);
            if(d) { curUser=u; navTo('pg-driver'); } else alert("سائق غير مسجل");
        }
    }

    // ثالثاً: عرض البيانات في الإدارة والسائق
    function updateUI() {
        const rs = appData.reports || [];
        document.getElementById('c1').innerText = rs.filter(r=>r.status==='new').length;
        document.getElementById('c2').innerText = rs.filter(r=>r.status==='sent').length;
        document.getElementById('c3').innerText = rs.filter(r=>r.status==='done').length;

        document.getElementById('sec-reps').innerHTML = rs.slice().reverse().map(r => `
            <div class="card" style="text-align:right; border-top:5px solid ${r.status==='done'?'#2E7D32':'#d21034'};">
                <p style="color:red; font-weight:bold;">📸 التبليغ:</p>
                <img src="${r.img}" style="width:100%; border-radius:15px;">
                <p>📍 ${r.addr} | 🌍 ${r.gps}</p>
                <p>🕒 ${r.time} - ${r.date}</p>
                ${r.status==='new' ? `<button class="btn" style="background:var(--forest)" onclick="assign(${r.id})">إرسال للسائق</button>` : `<p style="color:orange">🚚 مرسل للسائق: ${r.driver}</p>`}
                ${r.status==='done' ? `
                    <div style="border-top:2px solid green; margin-top:10px; padding-top:10px;">
                        <p style="color:green; font-weight:bold;">✅ المنجز:</p>
                        <img src="${r.doneImg}" style="width:100%; border-radius:15px;">
                        <p>📍 ${r.addr} | 🌍 ${r.gps}</p>
                        <p>🕒 ${r.doneTime} - ${r.doneDate}</p>
                    </div>
                ` : ''}
            </div>
        `).join('');

        if(curUser) {
            document.getElementById('dr-head').innerHTML = `<h3>مرحباً ${curUser}</h3>`;
            const jobs = rs.filter(r=>r.driver===curUser && r.status==='sent');
            document.getElementById('dr-tasks').innerHTML = jobs.map(j => `
                <div class="card">
                    <p style="font-weight:bold;">📥 تبليغ وارد:</p>
                    <img src="${j.img}" style="width:100%; border-radius:15px;">
                    <p>📍 ${j.addr} | 🌍 ${j.gps}</p>
                    <p>🕒 ${j.time} | ${j.date}</p>
                    <button class="btn" style="background:var(--navy)" onclick="window.open('https://www.google.com/maps?q=${j.gps}')"><i class="fas fa-map"></i> الموقع على الخريطة</button>
                    <label class="btn" style="background:var(--gold)">📸 صورة بعد التنفيذ<input type="file" capture="environment" style="display:none;" onchange="handleImg(this, 'driver')"></label>
                    <button class="btn" style="background:var(--forest)" onclick="finishJob(${j.id})">تم الإنجاز</button>
                </div>
            `).join('');
        }
    }

    function assign(id) {
        const n = prompt("اسم السائق:");
        if(n) { const r = appData.reports.find(x=>x.id===id); r.status = 'sent'; r.driver = n; db.ref('MEDEA_APP_2026').set(appData); }
    }

    function finishJob(id) {
        if(!curImgDrv) return alert("الرجاء التقاط صورة الإنجاز");
        const r = appData.reports.find(x=>x.id===id);
        r.status = 'done'; r.doneImg = curImgDrv;
        r.doneTime = new Date().toLocaleTimeString('fr-FR'); r.doneDate = "07 أفريل 2026";
        db.ref('MEDEA_APP_2026').set(appData).then(() => { curImgDrv=""; alert("تم إرسال المنجز"); });
    }

    function addDr() {
        const n=document.getElementById('dr-n').value, t=document.getElementById('dr-t').value;
        if(n && t) {
            if(!appData.drivers) appData.drivers=[];
            appData.drivers.push({id:Date.now(), name:n, phone:document.getElementById('dr-p').value, truck:t, sector:document.getElementById('dr-s').value});
            db.ref('MEDEA_APP_2026').set(appData);
            document.getElementById('dr-n').value=""; document.getElementById('dr-p').value=""; document.getElementById('dr-t').value="";
            alert("✅ تم الحفظ وتصفير الخانة");
        }
    }

    function addAd() { const n=prompt("المسؤول:"); if(n){ appData.admins.push(n); db.ref('MEDEA_APP_2026').set(appData); }}
    function delAd() { const n=prompt("حذف:"); if(n){ appData.admins=appData.admins.filter(x=>x!==n); db.ref('MEDEA_APP_2026').set(appData); }}
    function navTo(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); updateUI(); window.scrollTo(0,0); }
</script>
</body>
</html>
