<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المدية نظيفة 2026</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --gold: #D4AF37; --red: #d21034; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { margin: 0; background: #f8f9fa; }
        .header { background: white; padding: 15px; text-align: center; border-bottom: 5px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .page { display: none; padding: 15px; max-width: 600px; margin: auto; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        .btn { border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; color: white; transition: 0.3s; }
        .input { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #eee; margin-bottom: 10px; text-align: center; }
        /* أزرار الإدارة الكبيرة */
        .admin-nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .nav-card-btn { height: 180px; border-radius: 25px; border: none; color: white; font-size: 1.3rem; font-weight: 900; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .nav-card-btn i { font-size: 4rem; }
    </style>
</head>
<body onload="initApp()">

<div class="header">
    <div style="font-size: 0.7rem; font-weight: bold;">الجمهورية الجزائرية الديمقراطية الشعبية</div>
    <h1 style="margin: 5px 0; color: var(--emerald); font-size: 1.5rem;">نظام المدية نظيفة 2026</h1>
    <div id="live-time" style="font-weight: bold; color: var(--navy);"></div>
</div>

<div id="pg-home" class="page active">
    <button class="btn" style="background:var(--forest); height: 180px; border-radius:30px; font-size:1.8rem; flex-direction:column;" onclick="navTo('pg-report')">
        <i class="fas fa-camera fa-3x"></i> إرسال تبليغ
    </button>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
        <button class="btn" style="background:var(--navy); height: 60px;" onclick="authFlow('admin')">الإدارة</button>
        <button class="btn" style="background:var(--gold); height: 60px;" onclick="authFlow('driver')">السائقين</button>
    </div>
</div>

<div id="pg-report" class="page">
    <div class="card">
        <div id="cam-area" onclick="document.getElementById('file-in').click()" style="height:200px; border:2px dashed #ccc; border-radius:15px; display:flex; align-items:center; justify-content:center; background:#f9f9f9; overflow:hidden;">
            <span id="cam-txt">إضغط لتصوير النفايات</span>
            <img id="prev-img" style="display:none; width:100%; height:100%; object-fit:cover;">
        </div>
        <input type="file" id="file-in" accept="image/*" capture="environment" style="display:none" onchange="handleImg(this)">
        <input type="text" id="rep-addr" class="input" placeholder="الحي أو الشارع" style="margin-top:15px;">
        <button class="btn" style="background:var(--emerald)" onclick="submitRep()">إرسال الآن</button>
        <button class="btn" style="background:#888; margin-top:10px;" onclick="navTo('pg-home')">رجوع</button>
    </div>
</div>

<div id="pg-admin" class="page">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <button class="btn" style="background:var(--red); width:auto; padding:5px 15px;" onclick="location.reload()">خروج</button>
        <h3>لوحة التحكم</h3>
    </div>
    <div class="admin-nav-grid">
        <button class="nav-card-btn" style="background:orange" onclick="showReports('new')"><i class="fas fa-clock"></i> البلاغات</button>
        <button class="nav-card-btn" style="background:var(--forest)" onclick="showReports('done')"><i class="fas fa-check"></i> المنجزة</button>
    </div>
    <div id="admin-list" style="margin-top:15px;"></div>
    
    <div class="card" style="border:2px solid blue; margin-top:20px;">
        <h4 style="margin:0 0 10px 0;">إضافة موظف (سائق/مسؤول)</h4>
        <input type="text" id="st-name" class="input" placeholder="الاسم الكامل">
        <select id="st-role" class="input">
            <option value="سائق">سائق</option>
            <option value="admin">مسؤول</option>
        </select>
        <button class="btn" style="background:blue" onclick="addStaff()">حفظ وتصفير الخانات</button>
    </div>
</div>

<div id="pg-driver" class="page">
    <div id="dr-header" class="card" style="background:var(--navy); color:white; text-align:center;"></div>
    <div id="dr-list"></div>
    <button class="btn" style="background:#555" onclick="location.reload()">خروج</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://medea-clean-2026-v4-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let appData = { reports: [], staff: [] }, curUser = "", tempImg = "";

    function initApp() {
        db.ref('CLEAN_FINAL_DATA').on('value', snap => {
            if(snap.exists()) appData = snap.val();
        });
        setInterval(() => { document.getElementById('live-time').innerText = new Date().toLocaleString('ar-DZ'); }, 1000);
    }

    function navTo(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function handleImg(input) {
        let r = new FileReader();
        r.onload = e => {
            tempImg = e.target.result;
            document.getElementById('prev-img').src = tempImg;
            document.getElementById('prev-img').style.display = 'block';
            document.getElementById('cam-txt').style.display = 'none';
        };
        r.readAsDataURL(input.files[0]);
    }

    // دخول السائق والمسؤول (تم الربط بالداتا)
    function authFlow(role) {
        let n = prompt("أدخل اسمك الكامل:");
        if(!n) return;
        let found = (appData.staff || []).find(s => s.name === n && (role === 'admin' ? s.role === 'admin' : s.role === 'سائق'));
        if(n === "فتحي" || found) {
            curUser = n;
            navTo(role === 'admin' ? 'pg-admin' : 'pg-driver');
            if(role === 'driver') updateDriverUI();
        } else { alert("الاسم غير مسجل!"); }
    }

    // تصفير الخانات فور الحفظ
    function addStaff() {
        let nameField = document.getElementById('st-name');
        let roleField = document.getElementById('st-role');
        if(!nameField.value) return alert("الاسم مطلوب");
        
        if(!appData.staff) appData.staff = [];
        appData.staff.push({ name: nameField.value, role: roleField.value });
        
        db.ref('CLEAN_FINAL_DATA').set(appData).then(() => {
            nameField.value = ""; // التصفير الحقيقي
            alert("تمت الإضافة بنجاح وتصفير الخانة");
        });
    }

    function submitRep() {
        let addr = document.getElementById('rep-addr').value;
        if(!tempImg || !addr) return alert("الصورة والعنوان مطلوبان");
        let rep = { id: Date.now(), img: tempImg, addr: addr, status: 'new', time: new Date().toLocaleString() };
        if(!appData.reports) appData.reports = [];
        appData.reports.push(rep);
        db.ref('CLEAN_FINAL_DATA').set(appData).then(() => { alert("تم الإرسال!"); location.reload(); });
    }

    function showReports(type) {
        let list = (appData.reports || []).filter(r => type === 'new' ? r.status !== 'done' : r.status === 'done');
        document.getElementById('admin-list').innerHTML = list.map(r => `
            <div class="card" style="display:flex; gap:10px; border-right:8px solid ${type==='done'?'green':'orange'}">
                <img src="${r.img}" style="width:60px; height:60px; object-fit:cover; border-radius:8px;">
                <div style="flex:1">
                    <b>📍 ${r.addr}</b><br>
                    ${r.status === 'new' ? `<button onclick="assign('${r.id}')" style="background:var(--navy); color:white; border:none; border-radius:5px; padding:5px 10px;">توجيه</button>` : `<small>بواسطة: ${r.driver}</small>`}
                </div>
            </div>
        `).join('') || "لا يوجد بيانات";
    }

    function assign(id) {
        let dr = prompt("اسم السائق:");
        if(!dr) return;
        let rep = appData.reports.find(x => x.id == id);
        rep.status = 'sent';
        rep.driver = dr;
        db.ref('CLEAN_FINAL_DATA').set(appData).then(() => showReports('new'));
    }

    function updateDriverUI() {
        document.getElementById('dr-header').innerHTML = `<h3>مرحباً سائق: ${curUser}</h3>`;
        let tasks = (appData.reports || []).filter(r => r.driver === curUser && r.status === 'sent');
        document.getElementById('dr-list').innerHTML = tasks.map(t => `
            <div class="card">
                <img src="${t.img}" style="width:100%; border-radius:10px;">
                <p>📍 الموقع: ${t.addr}</p>
                <button class="btn" style="background:var(--emerald)" onclick="doneTask(${t.id})">تأكيد الإنجاز</button>
            </div>
        `).join('') || "لا توجد مهام موكلة إليك.";
    }

    function doneTask(id) {
        let rep = appData.reports.find(x => x.id == id);
        rep.status = 'done';
        db.ref('CLEAN_FINAL_DATA').set(appData).then(() => { alert("عمل رائع!"); updateDriverUI(); });
    }
</script>
</body>
    </html>
