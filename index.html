<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المدية نظيفة 2026</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --emerald: #006633; /* أخضر قوي */
            --red: #D21034; /* أحمر قوي */
            --gold: #D4AF37;
            --navy: #14213D;
        }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        
        body { 
            margin: 0; min-height: 100vh;
            background: linear-gradient(135deg, rgba(0,102,51,0.2), rgba(210,16,52,0.2)),
                        url('https://raw.githubusercontent.com/rabf09-droid/rabf09-droid.github.io/main/1000052240.webp');
            background-size: cover; background-position: center; background-attachment: fixed;
            display: flex; flex-direction: column;
        }

        /* الجزء العلوي (Header) */
        .header { background: white; padding: 10px; text-align: center; border-bottom: 4px solid var(--gold); }
        .header-top { font-size: 0.8rem; font-weight: bold; }
        .header-mid { font-size: 0.85rem; color: var(--emerald); font-weight: bold; }
        .header-main { font-size: 2rem; font-weight: 900; color: var(--emerald); margin: 0; }
        
        .time-bar { display: flex; justify-content: space-around; background: #f8f9fa; padding: 5px; font-weight: bold; border-bottom: 1px solid #ddd; font-size: 0.9rem; }

        /* حاوية الأزرار الرئيسية - مثل الصورة تماماً */
        .main-container { flex: 1; padding: 15px; display: flex; flex-direction: column; gap: 15px; align-items: center; justify-content: center; }

        .action-card {
            background: white; width: 100%; max-width: 400px; padding: 20px; border-radius: 30px;
            display: flex; align-items: center; gap: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            cursor: pointer; transition: 0.3s; border: 2px solid transparent;
        }
        .action-card:active { transform: scale(0.95); }

        /* أيقونة دائرية كبيرة */
        .icon-circle {
            width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-size: 2.5rem; color: white; flex-shrink: 0;
        }
        .card-text { font-size: 1.6rem; font-weight: 900; color: var(--navy); }

        /* ألوان مخصصة لكل زر */
        .bg-green { background: linear-gradient(45deg, var(--emerald), var(--forest)); }
        .bg-navy { background: linear-gradient(45deg, var(--navy), #2a3d66); }
        .bg-gold { background: linear-gradient(45deg, var(--gold), #b8860b); }

        /* الفوتر (Footer) */
        .footer { background: white; padding: 15px; text-align: center; border-top: 4px solid var(--gold); }
        .btn-exit { background: var(--red); color: white; border: none; padding: 8px 25px; border-radius: 12px; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
        .lang-btns { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; }
        .lang-btns span { font-weight: bold; cursor: pointer; padding: 2px 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 0.8rem; }
    </style>
</head>
<body onload="initApp()">

<div class="header">
    <div class="header-top">الجمهورية الجزائرية الديمقراطية الشعبية</div>
    <div class="header-mid">مصلحة النظافة والوقاية الصحية بلدية المدية</div>
    <div class="header-main">المدية نظيفة</div>
</div>

<div class="time-bar">
    <div id="clock">00:00:00</div>
    <div>08 أفريل 2026</div>
</div>

<div class="main-container">
    <div class="action-card" onclick="navTo('pg-report')">
        <div class="icon-circle bg-green">
            <i class="fas fa-bullhorn"></i>
        </div>
        <div class="card-text">تبليغ عن نفايات</div>
    </div>

    <div class="action-card" onclick="auth('admin')">
        <div class="icon-circle bg-navy">
            <i class="fas fa-user-tie"></i>
        </div>
        <div class="card-text">إدارة النظام</div>
    </div>

    <div class="action-card" onclick="auth('driver')">
        <div class="icon-circle bg-gold">
            <i class="fas fa-truck-moving"></i>
        </div>
        <div class="card-text">رواق السائق</div>
    </div>
</div>

<div class="footer">
    <button class="btn-exit" onclick="alert('خروج...')"><i class="fas fa-sign-out-alt"></i> خروج</button>
    <div class="lang-btns">
        <span>العربية</span> | <span>Français</span> | <span>English</span>
    </div>
    <div style="font-weight: bold; color: var(--navy); font-size: 0.9rem;">
        إعداد د. رابحي فتحي (2026) ©
    </div>
</div>

<script>
    function initApp() {
        setInterval(() => { 
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('fr-FR', {hour12: false}); 
        }, 1000);
    }
    function navTo(id) { alert('الانتقال لصفحة ' + id); }
    function auth(role) { prompt("أدخل رمز الدخول لـ " + role); }
</script>

</body>
</html>
