<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المدية نظيفة 2026</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --gold: #D4AF37; --red: #d21034; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        
        body { margin: 0; background: url('https://raw.githubusercontent.com/rabf09-droid/rabf09-droid.github.io/main/1000052240.webp') fixed center/cover; }

        /* الهيدر الموحد */
        .header { background: rgba(255,255,255,0.95); padding: 10px; text-align: center; border-bottom: 5px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .page { display: none; padding: 15px; max-width: 800px; margin: auto; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* الصفحة الرئيسية - التزام تام بالصورة */
        .giant-btn { background: var(--forest); height: 230px; border-radius: 50px; border: 6px solid white; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 2.1rem; font-weight: 900; cursor: pointer; margin: 10px 0; box-shadow: 0 15px 45px rgba(46, 125, 50, 0.4); }
        .giant-btn i { font-size: 6.5rem; margin-bottom: 5px; }
        .staff-area { border: 2px dashed var(--navy); border-radius: 25px; padding: 15px; background: rgba(255,255,255,0.6); text-align: center; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .btn-navy { background: var(--navy); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; }
        .btn-gold { background: var(--gold); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; }

        /* صفحة التبليغ - تقليص المساحات الحمراء */
        .card { background: white; border-radius: 25px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .cam-box { height: 200px; border: 3px dashed #bbb; border-radius: 20px; display: flex; align-items: center; justify-content: center; background: #fff; margin-bottom: 10px; overflow: hidden; position: relative; }
        .input-slim { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 8px; text-align: center; }

        /* صفحة الإدارة - حسب طلبك */
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .nav-btn { height: 80px; border-radius: 15px; border: none; color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .list-item { background: white; border-radius: 15px; padding: 15px; margin-bottom: 10px; border-right: 10px solid var(--forest); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* المودال */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 25px; width: 90%; max-width: 400px; text-align: center; }

        .btn-action { width: 100%; padding: 15px; border-radius: 15px; border: none; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body onload="initApp()">

<div class="header">
    <div style="font-size: 0.75rem; font-weight: bold;">الجمهورية الجزائرية الديمقراطية الشعبية</div>
    <div style="font-size: 0.8rem; color: var(--forest); font-weight: bold;">مصلحة النظافة لبلدية المدية</div>
    <div style="font-size: 1.6rem; font-weight: 900; color: var(--emerald);">المـديـة نظيـفة</div>
    <div style="display: flex; justify-content: space-around; font-weight: bold; color: var(--navy); border-top: 1px solid #eee; margin-top: 5px; padding-top: 5px;">
        <div id="clock">00:00:00</div>
        <div>08 أفريل 2026</div>
    </div>
</div>

<div id="pg-home" class="page active">
    <div class="giant-btn" onclick="navTo('pg-report')">
        <i class="fas fa-truck-loading"></i>
        <span>إرســـــال تبلـيـــغ</span>
    </div>
    <div class="staff-area">
        <p style="margin: 0 0 10px 0; font-weight: bold; color: var(--navy);">رواق الموظفين والمسؤولين</p>
        <div class="btn-row">
            <button class="btn-navy" onclick="auth('admin')"><i class="fas fa-user-shield"></i> الإدارة</button>
            <button class="btn-gold" onclick="auth('driver')"><i class="fas fa-truck"></i> السائقين</button>
        </div>
    </div>
</div>

<div id="pg-report" class="page">
    <div class="card">
        <div class="cam-box" onclick="document.getElementById('cit-file').click()">
            <i id="cam-ico" class="fas fa-camera fa-5x" style="color:#ddd"></i>
            <img id="cit-prev" style="width:100%; height:100%; object-fit:cover; display:none;">
        </div>
        <input type="file" id="cit-file" accept="image/*" capture="environment" hidden onchange="handleImage(this)">
        
        <button class="btn-navy" style="background:var(--forest); width:100%; margin-bottom:10px;" onclick="getGPS()">
            <i class="fas fa-map-marker-alt"></i> تحديد الموقع
        </button>
        
        <input type="text" id="cit-addr" class="input-slim" placeholder="اسم الحي أو الشارع">
        <input type="text" id="cit-gps" class="input-slim" readonly placeholder="إحداثيات GPS">
        
        <button class="btn-navy" style="background:var(--emerald); width:100%; height:70px; font-size:1.4rem;" onclick="sendReport()">إرسال البلاغ الآن</button>
        <button class="btn-navy" style="background:#888; width:100%; margin-top:10px;" onclick="navTo('pg-home')">رجوع</button>
    </div>
</div>

<div id="pg-admin" class="page">
    <div style="display:flex; justify-content:space-between; align-items:center; background:white; padding:10px; border-radius:15px;">
        <h2 style="margin:0;">لوحة التحكم</h2>
        <button onclick="navTo('pg-home')" style="border:none; background:var(--red); color:white; padding:8px 15px; border-radius:10px;">خروج</button>
    </div>

    <div class="admin-grid">
        <button class="nav-btn" style="background:orange;" onclick="loadReports('new')">بلاغات النفايات</button>
        <button class="nav-btn" style="background:var(--forest);" onclick="loadReports('done')">البلاغات المنجزة</button>
    </div>

    <div id="admin-display"></div>

    <div class="staff-area" style="margin-top:20px; border-color: blue; background: #e3f2fd;">
        <p style="font-weight:bold; color:blue;">إضافة موظف جديد</p>
        <button class="btn-navy" style="background:blue; width:100%;" onclick="openStaffModal()">فتح نموذج الإضافة</button>
    </div>
</div>

<div id="pg-driver" class="page">
    <div id="driver-header" class="card" style="background:var(--emerald); color:white; text-align:center; margin-bottom:15px;"></div>
    <div id="driver-tasks"></div>
    <button class="btn-navy" style="background:#444; width:100%;" onclick="navTo('pg-home')">رجوع</button>
</div>

<div id="modal-staff" class="modal">
    <div class="modal-content">
        <h3 id="modal-title">إضافة موظف</h3>
        <select id="staff-type" class="input-slim" onchange="toggleStaffFields()">
            <option value="مسؤول">مسؤول (مشرف)</option>
            <option value="سائق">سائق</option>
        </select>
        <input type="text" id="staff-name" class="input-slim" placeholder="الاسم الكامل">
        <input type="text" id="staff-phone" class="input-slim" placeholder="رقم الهاتف">
        
        <div id="driver-fields" style="display:none;">
            <input type="text" id="staff-truck" class="input-slim" placeholder="رقم الشاحنة">
            <select id="staff-sector" class="input-slim">
                <option value="بلدية">البلدية</option>
                <option value="خاص">قطاع خاص</option>
            </select>
        </div>
        
        <button class="btn-action" style="background:green;" onclick="saveStaff()">حفظ</button>
        <button class="btn-action" style="background:#888;" onclick="closeStaffModal()">إلغاء</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://medea-clean-2026-v4-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let appData = { reports: [], staff: [] };
    let tempImg = "", currentDriver = "";

    function initApp() {
        db.ref('APP_DATA_V6').on('value', s => { if(s.exists()) appData = s.val(); });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
    }

    function navTo(id) { 
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function handleImage(input) {
        const reader = new FileReader();
        reader.onload = e => {
            tempImg = e.target.result;
            document.getElementById('cit-prev').src = tempImg;
            document.getElementById('cit-prev').style.display = 'block';
            document.getElementById('cam-ico').style.display = 'none';
        };
        reader.readAsDataURL(input.files[0]);
    }

    function getGPS() {
        navigator.geolocation.getCurrentPosition(p => {
            document.getElementById('cit-gps').value = p.coords.latitude.toFixed(6) + "," + p.coords.longitude.toFixed(6);
        });
    }

    function sendReport() {
        if(!tempImg || !document.getElementById('cit-addr').value) return alert("البيانات ناقصة");
        const rep = {
            id: Date.now(), img: tempImg, addr: document.getElementById('cit-addr').value,
            gps: document.getElementById('cit-gps').value, time: new Date().toLocaleTimeString('ar-DZ'),
            date: new Date().toLocaleDateString('ar-DZ'), status: 'new'
        };
        if(!appData.reports) appData.reports = [];
        appData.reports.push(rep);
        db.ref('APP_DATA_V6').set(appData).then(() => { alert("تم الإرسال"); location.reload(); });
    }

    function loadReports(type) {
        const display = document.getElementById('admin-display');
        const rs = (appData.reports || []).filter(r => type === 'new' ? r.status !== 'done' : r.status === 'done');
        display.innerHTML = rs.map(r => `
            <div class="list-item">
                <div style="display:flex; gap:10px;">
                    <img src="${r.img}" style="width:100px; border-radius:10px;">
                    ${r.doneImg ? `<img src="${r.doneImg}" style="width:100px; border-radius:10px; border:3px solid green;">` : ''}
                </div>
                <p>📍 العنوان: ${r.addr}<br>🌍 GPS: ${r.gps}<br>🕒 الوقت: ${r.time} - ${r.date}</p>
                ${r.status === 'new' ? `<button class="btn-navy" style="width:100%" onclick="assignToDriver(${r.id})">توجيه للسائق</button>` : `<p style="color:green; font-weight:bold;">✅ أنجزت بواسطة: ${r.driverName}</p>`}
            </div>
        `).join('') || "<p style='text-align:center'>لا توجد بيانات</p>";
    }

    function auth(role) {
        const pass = prompt("الرمز:");
        if(role === 'admin' && pass === '1234') navTo('pg-admin');
        if(role === 'driver' && pass === '5678') {
            currentDriver = prompt("اسم السائق:");
            document.getElementById('driver-header').innerHTML = `<h3>مهام السائق: ${currentDriver}</h3>`;
            renderDriverTasks();
            navTo('pg-driver');
        }
    }

    function renderDriverTasks() {
        const tasks = (appData.reports || []).filter(r => r.driverName === currentDriver && r.status === 'sent');
        document.getElementById('driver-tasks').innerHTML = tasks.map(t => `
            <div class="card">
                <img src="${t.img}" style="width:100%; border-radius:15px;">
                <p>📍 ${t.addr} | 🕒 ${t.time} ${t.date} <br> GPS: ${t.gps}</p>
                <button class="btn-navy" style="background:blue; width:100%; margin-bottom:5px;" onclick="window.open('https://www.google.com/maps?q=${t.gps}')"><i class="fas fa-map"></i> فتح الخريطة</button>
                <input type="file" capture="environment" onchange="handleImage(this)">
                <button class="btn-navy" style="background:green; width:100%;" onclick="finishTask(${t.id})">إرسال صورة الإنجاز</button>
            </div>
        `).join('') || "لا توجد مهام";
    }

    function assignToDriver(id) {
        const name = prompt("اسم السائق المكلف:");
        if(name) {
            const rep = appData.reports.find(r => r.id === id);
            rep.status = 'sent'; rep.driverName = name;
            db.ref('APP_DATA_V6').set(appData);
        }
    }

    function finishTask(id) {
        if(!tempImg) return alert("صور الإنجاز أولاً");
        const rep = appData.reports.find(r => r.id === id);
        rep.status = 'done'; rep.doneImg = tempImg;
        db.ref('APP_DATA_V6').set(appData).then(() => { alert("ممتاز!"); renderDriverTasks(); });
    }

    function openStaffModal() { document.getElementById('modal-staff').style.display='flex'; }
    function closeStaffModal() { document.getElementById('modal-staff').style.display='none'; }
    function toggleStaffFields() {
        document.getElementById('driver-fields').style.display = document.getElementById('staff-type').value === 'سائق' ? 'block' : 'none';
    }

    function saveStaff() {
        const s = {
            type: document.getElementById('staff-type').value,
            name: document.getElementById('staff-name').value,
            phone: document.getElementById('staff-phone').value,
            truck: document.getElementById('staff-truck').value || 'N/A',
            sector: document.getElementById('staff-sector').value
        };
        if(!appData.staff) appData.staff = [];
        appData.staff.push(s);
        db.ref('APP_DATA_V6').set(appData).then(() => { alert("تم الحفظ"); closeStaffModal(); });
    }
</script>
</body>
</html>
