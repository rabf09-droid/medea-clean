<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المدية نظيفة 2026 - النسخة المعتمدة</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --gold: #D4AF37; --red: #d21034; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        
        body { 
            margin: 0; min-height: 100vh;
            background: linear-gradient(135deg, rgba(27,94,32,0.2) 0%, rgba(255,255,255,0.8) 50%, rgba(210,16,52,0.2) 100%),
                        url('https://raw.githubusercontent.com/rabf09-droid/rabf09-droid.github.io/main/1000052240.webp');
            background-size: cover; background-position: center; background-attachment: fixed;
            display: flex; justify-content: center;
        }

        .app-container { width: 100%; max-width: 480px; background: rgba(255,255,255,0.9); min-height: 100vh; position: relative; border-left: 1px solid #ddd; border-right: 1px solid #ddd; }
        .header { background: white; padding: 15px; text-align: center; border-bottom: 5px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .page { display: none; padding: 20px; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* الكروت والتنسيق الذي ظهر في صورك */
        .card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); border: 1px solid #eee; }
        .btn { border: none; padding: 15px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; color: white; font-size: 1.1rem; }
        .input { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 10px; text-align: center; }

        /* زر التبليغ العملاق - كما في الصورة */
        .giant-report-btn {
            background: var(--forest); height: 260px; flex-direction: column; border-radius: 45px;
            font-size: 2.2rem; box-shadow: 0 15px 35px rgba(46, 125, 50, 0.3); border: 6px solid white; margin: 30px 0;
        }
        .giant-report-btn i { font-size: 7rem; margin-bottom: 10px; }

        .stat-circle { width: 60px; height: 60px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: bold; margin: auto; }
        .report-img { width: 100%; border-radius: 20px; border: 3px solid var(--emerald); margin-bottom: 10px; }
    </style>
</head>
<body onload="initApp()">

<div class="app-container">
    <div class="header">
        <div style="font-size: 0.7rem; font-weight: bold; color: #666;">الجمهورية الجزائرية الديمقراطية الشعبية</div>
        <div style="font-size: 1.6rem; font-weight: 900; color: var(--emerald);">المـديـة نظيـفة</div>
        <div id="clock" style="font-weight: bold; color: var(--navy);">00:00:00</div>
    </div>

    <div id="pg-home" class="page active">
        <button class="btn giant-report-btn" onclick="navTo('pg-citizen')">
            <i class="fas fa-truck-pickup"></i>
            <span id="txt-main">إرســــال تبلـيـــغ</span>
        </button>

        <div style="margin-top: 50px; border-top: 3px solid var(--gold); padding-top: 20px;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <button class="btn" style="background:var(--navy)" onclick="auth('admin')"><i class="fas fa-user-shield"></i> الإدارة</button>
                <button class="btn" style="background:var(--gold)" onclick="auth('driver')"><i class="fas fa-truck"></i> السائق</button>
            </div>
            <div style="text-align: center; margin-top: 20px;">
                <button onclick="setLang('ar')" style="border:none; background:none; font-weight:bold; cursor:pointer;">العربية</button> | 
                <button onclick="setLang('fr')" style="border:none; background:none; cursor:pointer;">Français</button> | 
                <button onclick="setLang('en')" style="border:none; background:none; cursor:pointer;">English</button>
            </div>
        </div>
    </div>

    <div id="pg-citizen" class="page">
        <div class="card">
            <div id="cam-view" style="height:250px; border:3px dashed #ccc; border-radius:20px; display:flex; align-items:center; justify-content:center; background:#f9f9f9; overflow:hidden; margin-bottom:15px;">
                <i id="cam-ico" class="fas fa-camera fa-5x" style="color:#ddd"></i>
                <img id="img-preview" style="width:100%; height:100%; object-fit:cover; display:none;">
            </div>
            <label class="btn" style="background:var(--navy);"><i class="fas fa-camera"></i> التقاط الصورة<input type="file" accept="image/*" capture="environment" style="display:none;" onchange="handleFile(this, 'cit')"></label>
            <button class="btn" style="background:var(--forest);" onclick="getLocation()"><i class="fas fa-map-marker-alt"></i> تحديد الموقع تلقائياً</button>
            <input type="text" id="in-addr" class="input" placeholder="اسم الحي أو الشارع">
            <input type="text" id="in-gps" class="input" readonly placeholder="إحداثيات GPS">
            <button class="btn" style="background:var(--emerald); height: 70px;" onclick="sendReport()">إرسال التبليغ</button>
            <button class="btn" style="background:#888;" onclick="navTo('pg-home')">رجوع</button>
        </div>
    </div>

    <div id="pg-admin" class="page">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 style="margin:0;">لوحة الإدارة</h3>
            <button class="btn" style="background:var(--red); width:auto; padding:5px 15px;" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px;">
            <div style="text-align:center"><div class="stat-circle" style="background:var(--red);" id="s1">0</div><small>جديد</small></div>
            <div style="text-align:center"><div class="stat-circle" style="background:orange;" id="s2">0</div><small>مرسل</small></div>
            <div style="text-align:center"><div class="stat-circle" style="background:var(--forest);" id="s3">0</div><small>منجز</small></div>
        </div>

        <div id="admin-feed"></div>

        <div class="card">
            <h4>إضافة سائق / مسؤول</h4>
            <input id="u-name" class="input" placeholder="الاسم">
            <input id="u-phone" class="input" placeholder="رقم الهاتف">
            <select id="u-type" class="input"><option value="سائق">سائق</option><option value="مسؤول">مسؤول</option></select>
            <button class="btn" style="background:var(--emerald)" onclick="addUser()">حفظ</button>
            <div id="user-list" style="font-size:0.8rem; margin-top:10px;"></div>
        </div>
    </div>

    <div id="pg-driver" class="page">
        <div id="dr-header" class="card" style="background:var(--emerald); color:white; text-align:center;"></div>
        <div id="dr-tasks"></div>
        <button class="btn" style="background:#444;" onclick="navTo('pg-home')">تسجيل الخروج</button>
    </div>
</div>

<script>
    // تهيئة Firebase - المسار الرسمي
    const firebaseConfig = { databaseURL: "https://medea-clean-2026-v100-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let appData = { reports: [], members: [] };
    let tempImgCit = "", tempImgDrv = "", currentDriver = "";

    function initApp() {
        db.ref('OFFICIAL_V4').on('value', s => { if(s.exists()){ appData = s.val(); updateUI(); } });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
    }

    function handleFile(input, role) {
        const reader = new FileReader();
        reader.onload = e => {
            if(role==='cit') {
                tempImgCit = e.target.result;
                document.getElementById('img-preview').src = tempImgCit;
                document.getElementById('img-preview').style.display = 'block';
                document.getElementById('cam-ico').style.display = 'none';
            } else { tempImgDrv = e.target.result; alert("تم التقاط صورة الإنجاز"); }
        };
        reader.readAsDataURL(input.files[0]);
    }

    function getLocation() {
        navigator.geolocation.getCurrentPosition(p => {
            document.getElementById('in-gps').value = p.coords.latitude.toFixed(6) + "," + p.coords.longitude.toFixed(6);
            document.getElementById('in-addr').value = "حي بوسط المدينة - المدية";
        });
    }

    function sendReport() {
        if(!tempImgCit || !document.getElementById('in-addr').value) return alert("يرجى ملء البيانات");
        const rep = {
            id: Date.now(), img: tempImgCit, addr: document.getElementById('in-addr').value, gps: document.getElementById('in-gps').value,
            time: new Date().toLocaleTimeString('fr-FR'), date: "07 أفريل 2026", status: 'new'
        };
        if(!appData.reports) appData.reports = [];
        appData.reports.push(rep);
        db.ref('OFFICIAL_V4').set(appData).then(() => {
            alert("تم الإرسال شكراً على تفاعلك");
            location.reload();
        });
    }

    function updateUI() {
        const rs = appData.reports || [];
        document.getElementById('s1').innerText = rs.filter(r=>r.status==='new').length;
        document.getElementById('s2').innerText = rs.filter(r=>r.status==='sent').length;
        document.getElementById('s3').innerText = rs.filter(r=>r.status==='done').length;

        document.getElementById('admin-feed').innerHTML = rs.slice().reverse().map(r => `
            <div class="card" style="border-right: 10px solid ${r.status==='done'?'green':(r.status==='sent'?'orange':'red')};">
                <div style="display:flex; justify-content:space-between;"><b>⏰ ${r.time}</b><i class="fas fa-trash" style="color:red" onclick="delItem('rep', ${r.id})"></i></div>
                <img src="${r.img}" class="report-img">
                <p>📍 ${r.addr}<br>🌍 ${r.gps}</p>
                ${r.status==='new' ? `<button class="btn" style="background:var(--forest)" onclick="assign(${r.id})">توجيه للسائق</button>` : `<p style="color:orange">🚚 السائق: ${r.driver}</p>`}
                ${r.status==='done' ? `<img src="${r.doneImg}" class="report-img" style="border-color:green">` : ''}
            </div>
        `).join('');

        if(currentDriver) {
            document.getElementById('dr-header').innerHTML = `<h3>السائق: ${currentDriver}</h3>`;
            const tasks = rs.filter(r => r.driver === currentDriver && r.status === 'sent');
            document.getElementById('dr-tasks').innerHTML = tasks.length ? tasks.map(t => `
                <div class="card">
                    <img src="${t.img}" class="report-img">
                    <p>📍 ${t.addr}<br>⏰ ${t.time}</p>
                    <button class="btn" style="background:var(--navy)" onclick="window.open('https://www.google.com/maps?q=${t.gps}')"><i class="fas fa-map-marker-alt"></i> فتح الموقع</button>
                    <label class="btn" style="background:var(--gold)"><i class="fas fa-camera"></i> تصوير الإنجاز<input type="file" capture="environment" style="display:none" onchange="handleFile(this, 'dr')"></label>
                    <button class="btn" style="background:var(--forest)" onclick="finish(${t.id})">تأكيد الإنجاز</button>
                </div>
            `).join('') : '<p style="text-align:center">لا توجد مهام</p>';
        }
    }

    function auth(role) {
        const u = prompt("الاسم:"), p = prompt("الرمز:");
        if(role==='admin' && p==='1234') navTo('pg-admin');
        else if(role==='driver' && p==='5678') { currentDriver=u; navTo('pg-driver'); }
    }

    function assign(id) {
        const n = prompt("اسم السائق:");
        if(n) {
            const r = appData.reports.find(x=>x.id===id);
            r.status='sent'; r.driver=n;
            db.ref('OFFICIAL_V4').set(appData);
        }
    }

    function finish(id) {
        if(!tempImgDrv) return alert("يرجى التصوير أولاً");
        const r = appData.reports.find(x=>x.id===id);
        r.status='done'; r.doneImg=tempImgDrv;
        db.ref('OFFICIAL_V4').set(appData).then(() => { tempImgDrv=""; alert("تم بنجاح"); });
    }

    function addUser() {
        const n = document.getElementById('u-name').value;
        if(n) {
            if(!appData.members) appData.members = [];
            appData.members.push({name:n, phone:document.getElementById('u-phone').value, type:document.getElementById('u-type').value});
            db.ref('OFFICIAL_V4').set(appData);
        }
    }

    function delItem(type, id) {
        if(confirm("حذف؟")) {
            if(type==='rep') appData.reports = appData.reports.filter(x=>x.id!==id);
            db.ref('OFFICIAL_V4').set(appData);
        }
    }

    function logout() { document.getElementById('admin-feed').innerHTML = ""; navTo('pg-home'); }
    function navTo(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function setLang(l) { const t={ar:"إرســــال تبلـيـــغ", fr:"Envoyer Signal", en:"Send Report"}; document.getElementById('txt-main').innerText=t[l]; }
</script>
</body>
                </html>
