<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المدية نظيفة 2026</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --gold: #D4AF37; --red: #d21034; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { margin: 0; min-height: 100vh; background: #f4f4f4; background-image: url('https://raw.githubusercontent.com/rabf09-droid/rabf09-droid.github.io/main/1000052240.webp'); background-size: cover; background-attachment: fixed; }
        .header { background: white; padding: 10px; text-align: center; border-bottom: 5px solid var(--gold); }
        .page { display: none; padding: 15px; max-width: 800px; margin: auto; }
        .page.active { display: block; }
        .card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn { border: none; padding: 15px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; color: white; margin-bottom: 10px; }
        .input { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 10px; text-align: center; }
        #thanks-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--forest); color:white; flex-direction:column; align-items:center; justify-content:center; z-index:100000; text-align:center; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; }
        .modal-content { background:white; padding:30px; border-radius:30px; width:90%; max-width:400px; }
    </style>
</head>
<body onload="initApp()">

<div id="thanks-overlay">
    <i class="fas fa-heart fa-6x" style="color:var(--gold); margin-bottom:20px;"></i>
    <h1>شكراً لكم!</h1>
    <p>تم إرسال بلاغكم بنجاح. معاً لمدية أنظف.</p>
</div>

<div id="staff-modal" class="modal">
    <div class="modal-content">
        <h3>إضافة موظف جديد</h3>
        <select id="st-role" class="input" onchange="document.getElementById('dr-fields').style.display=this.value==='سائق'?'block':'none'">
            <option value="سائق">سائق</option>
            <option value="مسؤول">مسؤول (مشرف)</option>
        </select>
        <input type="text" id="st-name" class="input" placeholder="الاسم الكامل">
        <input type="text" id="st-phone" class="input" placeholder="رقم الهاتف">
        <div id="dr-fields">
            <input type="text" id="st-truck" class="input" placeholder="رقم الشاحنة">
        </div>
        <button class="btn" style="background:var(--forest)" onclick="saveStaff()">حفظ البيانات</button>
        <button class="btn" style="background:var(--red)" onclick="document.getElementById('staff-modal').style.display='none'">إغلاق</button>
    </div>
</div>

<div class="header">
    <div style="font-size: 0.8rem; color: var(--forest); font-weight: bold;">مصلحة النظافة لبلدية المدية</div>
    <div style="font-size: 1.6rem; font-weight: 900; color: var(--emerald);">المـديـة نظيـفة</div>
    <div id="clock" style="font-weight: bold;">00:00:00</div>
</div>

<div id="pg-home" class="page active">
    <button class="btn" style="background:var(--forest); height: 200px; font-size: 2rem; border-radius: 40px;" onclick="navTo('pg-report')">
        <i class="fas fa-truck-loading fa-2x"></i> إرسال تبليغ
    </button>
    <div class="card" style="border: 2px dashed var(--navy); margin-top: 20px;">
        <p style="text-align: center; font-weight: bold;">رواق الموظفين والمسؤولين</p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn" style="background:var(--navy)" onclick="auth('admin')"><i class="fas fa-user-shield"></i> الإدارة</button>
            <button class="btn" style="background:var(--gold)" onclick="auth('driver')"><i class="fas fa-truck"></i> السائقين</button>
        </div>
    </div>
</div>

<div id="pg-report" class="page">
    <div class="card">
        <div style="height: 150px; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; margin-bottom: 10px;">
            <img id="out-img" style="width:100%; height:100%; object-fit:cover; display:none;">
            <label id="cam-ico" style="cursor:pointer"><i class="fas fa-camera fa-3x"></i><input type="file" accept="image/*" capture="environment" style="display:none" onchange="handleImg(this)"></label>
        </div>
        <button class="btn" style="background:var(--forest)" onclick="getLoc()">تحديد الموقع</button>
        <input type="text" id="in-addr" class="input" placeholder="اسم الحي أو الشارع">
        <input type="text" id="in-gps" class="input" readonly placeholder="إحداثيات GPS">
        <button id="send-btn" class="btn" style="background:var(--emerald)" onclick="sendReport()">إرسال البلاغ الآن</button>
        <button class="btn" style="background:#888" onclick="navTo('pg-home')">رجوع</button>
    </div>
</div>

<div id="pg-admin" class="page">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>لوحة التحكم</h2>
        <button class="btn" style="background:var(--red); width:auto; padding:5px 15px;" onclick="location.reload()">خروج</button>
    </div>
    <div id="admin-list"></div>
    <div id="fathi-tools" style="display:none; margin-top:20px;" class="card">
        <button class="btn" style="background:blue" onclick="document.getElementById('staff-modal').style.display='flex'">+ إضافة مسؤول / سائق</button>
        <div id="staff-display"></div>
    </div>
</div>

<div id="pg-driver" class="page">
    <h3 id="dr-title"></h3>
    <div id="dr-tasks"></div>
    <button class="btn" style="background:#444" onclick="location.reload()">خروج</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://medea-clean-2026-v4-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let appData = { reports: [], staff: [] };
    let currentLoggedUser = "", tempImg = "";

    function initApp() {
        db.ref('CLEAN_MEDEA_FINAL').on('value', snap => { if(snap.exists()) { appData = snap.val(); updateUI(); } });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
    }

    function navTo(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    function handleImg(input) {
        const reader = new FileReader();
        reader.onload = e => { 
            tempImg = e.target.result; 
            document.getElementById('out-img').src = tempImg; 
            document.getElementById('out-img').style.display='block';
            document.getElementById('cam-ico').style.display='none';
        };
        reader.readAsDataURL(input.files[0]);
    }

    function getLoc() {
        navigator.geolocation.getCurrentPosition(p => {
            document.getElementById('in-gps').value = p.coords.latitude + "," + p.coords.longitude;
        });
    }

    function sendReport() {
        const addr = document.getElementById('in-addr').value;
        if(!tempImg || !addr) return alert("الرجاء إكمال البيانات");
        
        const rep = { id: Date.now(), img: tempImg, addr: addr, gps: document.getElementById('in-gps').value, status: 'new' };
        if(!appData.reports) appData.reports = [];
        appData.reports.push(rep);

        db.ref('CLEAN_MEDEA_FINAL').set(appData).then(() => {
            // تصفير الخانات
            document.getElementById('in-addr').value = "";
            document.getElementById('in-gps').value = "";
            tempImg = "";
            // إظهار رسالة الشكر
            document.getElementById('thanks-overlay').style.display = 'flex';
            setTimeout(() => { location.reload(); }, 5000);
        });
    }

    function auth(role) {
        const name = prompt("الاسم الكامل:");
        if(!name) return;
        const pass = prompt("رمز الدخول:");

        const isFathi = (name === "فتحي" && pass === "1234");
        const user = (appData.staff || []).find(s => s.name === name);

        if(role === 'admin') {
            if(isFathi || (user && user.role === 'مسؤول' && pass === "1234")) {
                currentLoggedUser = name;
                navTo('pg-admin');
                document.getElementById('fathi-tools').style.display = isFathi ? 'block' : 'none';
                showAdminList();
            } else { alert("بيانات دخول الإدارة غير صحيحة"); }
        } else {
            if(user && user.role === 'سائق' && pass === "5678") {
                currentLoggedUser = name;
                navTo('pg-driver');
                updateUI();
            } else { alert("بيانات السائق غير صحيحة"); }
        }
    }

    function saveStaff() {
        const s = { 
            role: document.getElementById('st-role').value, 
            name: document.getElementById('st-name').value, 
            phone: document.getElementById('st-phone').value,
            truck: document.getElementById('st-truck').value || '---'
        };
        if(!s.name) return alert("أدخل الاسم");
        if(!appData.staff) appData.staff = [];
        appData.staff.push(s);
        db.ref('CLEAN_MEDEA_FINAL').set(appData).then(() => {
            // تصفير خانات الإضافة
            document.getElementById('st-name').value = "";
            document.getElementById('st-phone').value = "";
            document.getElementById('st-truck').value = "";
            document.getElementById('staff-modal').style.display = 'none';
        });
    }

    function showAdminList() {
        const container = document.getElementById('admin-list');
        const news = (appData.reports || []).filter(r => r.status === 'new');
        container.innerHTML = news.map(r => `
            <div class="card">
                <img src="${r.img}" style="width:70px; border-radius:10px;">
                <p>${r.addr}</p>
                <button class="btn" style="background:var(--forest)" onclick="assignTo(${r.id})">توجيه لسائق</button>
            </div>
        `).join('') || "لا توجد بلاغات جديدة";
    }

    function assignTo(id) {
        const dr = prompt("اسم السائق:");
        if(dr) {
            const r = appData.reports.find(x => x.id === id);
            r.status = 'sent'; r.driverName = dr;
            db.ref('CLEAN_MEDEA_FINAL').set(appData).then(() => showAdminList());
        }
    }

    function updateUI() {
        if(currentLoggedUser && document.getElementById('pg-driver').classList.contains('active')) {
            document.getElementById('dr-title').innerText = "مهام: " + currentLoggedUser;
            const tasks = (appData.reports || []).filter(r => r.driverName === currentLoggedUser && r.status === 'sent');
            document.getElementById('dr-tasks').innerHTML = tasks.map(t => `<div class="card"><p>${t.addr}</p></div>`).join('') || "لا مهام موكلة";
        }
        const sd = document.getElementById('staff-display');
        if(sd) sd.innerHTML = (appData.staff || []).map(s => `<div>${s.role}: ${s.name}</div>`).join('');
    }
</script>
</body>
</html>
