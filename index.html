<script>
// === المتغيرات العامة ===
let allReports=[],currentLang='ar',tempImage=null,tempAfterImage=null,currentDriver='',userPoints=0,currentDriverSector='';

// === === === === === === === === === === === === === === === ===
// 🔧 إصلاح شاشة التحميل نهائياً - شبكة الأمان
// === === === === === === === === === === === === === === === ===

// دالة إخفاء شاشة التحميل الآمنة
function forceHideSplash() {
  try {
    const splash = document.getElementById('splash');
    if (splash && splash.style.display !== 'none') {
      splash.style.opacity = '0';
      setTimeout(() => { splash.style.display = 'none'; }, 300);
      console.log('✅ Splash hidden');
    }
  } catch(e) {
    // حتى لو فشل كل شيء، نحاول الإخفاء
    try { document.getElementById('splash').style.display = 'none'; } catch(err) {}
  }
}

// === تحميل التطبيق (مُصلح ومحمي) ===
window.addEventListener('load', function(){
  console.log('🚀 App starting...');
  
  // 🛡️ شبكة الأمان: إخفاء إجباري بعد 3 ثوانٍ كحد أقصى
  setTimeout(forceHideSplash, 3000);
  
  // محاولة التحميل الطبيعي
  setTimeout(function(){
    try {
      console.log('🔄 Initializing...');
      
      // تحديث الوقت
      if(typeof updateTime === 'function') updateTime();
      setInterval(function(){ try{ updateTime(); }catch(e){} }, 1000);
      
      // تحميل البيانات بأمان
      try{ loadReports(); }catch(e){ console.log('Reports load skipped'); allReports=[]; }
      try{ loadUserPoints(); }catch(e){ userPoints=0; }
      try{ loadSchedule(); }catch(e){}
      try{ loadTonnageRecords(); }catch(e){}
      try{ loadRequests(); }catch(e){}
      
      // تحميل اللغة
      try{
        const savedLang=localStorage.getItem('medea_lang');
        if(savedLang && translations[savedLang]){
          currentLang=savedLang;
          document.querySelectorAll('.lang-btn').forEach(b=>{
            b.classList.remove('active');
            if((savedLang==='ar'&&b.textContent.includes('العربية'))||
               (savedLang==='fr'&&b.textContent.includes('Français'))||
               (savedLang==='en'&&b.textContent.includes('English')))
              b.classList.add('active');
          });
        }
        applyTranslations();
      }catch(e){console.log('Lang load skipped');}
      
      try{ updatePublicStats(); }catch(e){}
      
      // إخفاء الشاشة بعد النجاح
      forceHideSplash();
      console.log('✅ App loaded successfully');
      
    } catch(e) {
      console.error('❌ Init error:', e);
      // إخفاء إجباري في حالة الخطأ
      forceHideSplash();
    }
  }, 500);
});

// === باقي الدوال (نفس الكود الأصلي تماماً) ===
// === نظام الإشعارات ===
function showToast(msg, type='success'){
  try{
    const container=document.getElementById('toast-container');
    if(!container) return;
    const toast=document.createElement('div');
    toast.className='toast';
    toast.innerHTML=`<span>${type==='success'?'✅':'ℹ️'}</span><span>${msg}</span>`;
    container.appendChild(toast);
    setTimeout(()=>{toast.style.opacity='0';setTimeout(()=>toast.remove(),300);},3000);
  }catch(e){console.log('Toast error:',e);}
}

// === نظام النقاط ===
function loadUserPoints(){try{userPoints=parseInt(localStorage.getItem('medea_points')||'0');}catch(e){userPoints=0;}updatePointsDisplay();}
function updatePointsDisplay(){try{document.getElementById('userPoints').textContent=userPoints;}catch(e){}}
function addPoints(amount){userPoints+=amount;try{localStorage.setItem('medea_points',userPoints);}catch(e){}updatePointsDisplay();}

// === تغيير اللغة ===
function changeLang(l,btn){
  try{
    currentLang=l;
    document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    localStorage.setItem('medea_lang',l);
    applyTranslations();
    updateTime();
  }catch(e){console.log('Lang change error:',e);}
}

function applyTranslations(){
  try{
    const t=translations[currentLang];
    if(!t) return;
    document.querySelectorAll('[data-key]').forEach(el=>{const key=el.getAttribute('data-key');if(t[key]) el.innerHTML=t[key];});
    document.querySelectorAll('[data-ph]').forEach(el=>{const key=el.getAttribute('data-ph');if(t[key]) el.placeholder=t[key];});
    document.documentElement.dir = currentLang==='ar' ? 'rtl' : 'ltr';
  }catch(e){console.log('Translation error:',e);}
}

// === الوقت والتاريخ ===
function updateTime(){
  try{
    const n=new Date();
    const locale = currentLang==='ar'?'ar-DZ':currentLang==='fr'?'fr-FR':'en-US';
    const ck=document.getElementById('ck');
    const cd=document.getElementById('cd');
    if(ck) ck.textContent=n.toLocaleTimeString(locale);
    if(cd) cd.textContent=n.toLocaleDateString(locale);
  }catch(e){}
}

// === تحميل وحفظ البيانات ===
function loadReports(){
  try{
    const data = localStorage.getItem('medea_reports');
    if(data) {
      allReports = JSON.parse(data);
      if(!Array.isArray(allReports)) allReports = [];
    } else {
      allReports = [];
    }
    updateStats();
  }catch(e){ allReports = []; }
}

function saveReport(r){
  try{
    allReports.push(r);
    localStorage.setItem('medea_reports',JSON.stringify(allReports));
    updateStats();
    updatePublicStats();
  }catch(e){ showToast('⚠️ خطأ في الحفظ','error'); }
}

function updateReport(id,upd){
  try{
    const i=allReports.findIndex(x=>x.id==id);
    if(i!==-1){
      allReports[i]={...allReports[i],...upd};
      localStorage.setItem('medea_reports',JSON.stringify(allReports));
      updateStats();
      if(document.getElementById('reportsPage').classList.contains('active')) showReportsPage();
    }
  }catch(e){}
}

// === الإحصائيات ===
function updateStats(){
  try{
    document.getElementById('statTotal').textContent=allReports.length;
    document.getElementById('statDone').textContent=allReports.filter(r=>r.status==='done').length;
    document.getElementById('statPending').textContent=allReports.filter(r=>r.status!=='done').length;
    if(document.getElementById('dashboard').classList.contains('active')) renderChart();
  }catch(e){}
}

// === التنقل بين الصفحات ===
function showPage(id){
  try{
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    const el=document.getElementById(id);
    if(el) el.classList.add('active');
    if(id==='dashboard') setTimeout(renderChart,100);
    if(id==='reportsPage') showReportsPage();
    if(id==='publicStats') updatePublicStats();
    if(id==='schedule') displaySchedule();
    if(id==='tonnageRecords') loadTonnageRecords();
    if(id==='scheduleManager') loadScheduleSectors();
    if(id==='adminRequests') loadAdminRequests();
    if(id==='requests') loadMyRequests();
    if(id==='driverTonnage') prepareDriverTonnage();
    window.scrollTo(0,0);
  }catch(e){}
}

// === الإدخال الصوتي ===
function startVoiceInput(){
  try{
    if(!('webkitSpeechRecognition' in window)){showToast('⚠️ متصفحك لا يدعم الصوت','error');return;}
    const recognition=new webkitSpeechRecognition();
    recognition.lang=currentLang==='ar'?'ar-DZ':currentLang==='fr'?'fr-FR':'en-US';
    recognition.onstart=()=>showToast('🎤 جاري الاستماع...');
    recognition.onresult=(event)=>{document.getElementById('addrInput').value=event.results[0][0].transcript;showToast('✅ تم الإملاء');};
    recognition.onerror=()=>showToast('⚠️ خطأ في الصوت','error');
    recognition.start();
  }catch(e){showToast('⚠️ خطأ في الصوت','error');}
}

// === تحديد الموقع ===
function getLocation(){
  try{
    const btn=document.getElementById('getLocationBtn');
    const addr=document.getElementById('addrInput');
    const gps=document.getElementById('gpsInput');
    if(!navigator.geolocation){showToast('⚠️ GPS غير مدعوم','error');return;}
    btn.innerHTML='⏳ جاري...';btn.disabled=true;
    navigator.geolocation.getCurrentPosition(pos=>{
      const lat=pos.coords.latitude,lng=pos.coords.longitude;
      gps.value=lat.toFixed(6)+', '+lng.toFixed(6);
      fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=${currentLang==='ar'?'ar':currentLang==='fr'?'fr':'en'}&zoom=18&addressdetails=1`)
        .then(r=>r.json()).then(d=>{
          let full='المدية، الجزائر';
          if(d.address){
            const parts=[];
            if(d.address.road||d.address.street) parts.push(d.address.road||d.address.street);
            if(d.address.neighbourhood||d.address.suburb) parts.push(d.address.neighbourhood||d.address.suburb);
            if(d.address.city||d.address.town) parts.push(d.address.city||d.address.town);
            if(parts.length) full=parts.join(' - ');
          }
          addr.value=full;btn.innerHTML='📍 تحديد الموقع GPS';btn.disabled=false;
          showToast('✅ '+full);
        }).catch(()=>{addr.value='المدية (تقريبي)';btn.innerHTML='📍 تحديد الموقع GPS';btn.disabled=false;showToast('⚠️ عنوان تقريبي');});
    },()=>{btn.innerHTML='📍 تحديد الموقع GPS';btn.disabled=false;showToast('⚠️ فشل تحديد الموقع','error');},{enableHighAccuracy:true,timeout:20000});
  }catch(e){showToast('⚠️ خطأ في الموقع','error');}
}

function manualLocation(){const a=prompt('أدخل العنوان:','حي الزيتون - المدية');if(a){document.getElementById('addrInput').value=a;document.getElementById('gpsInput').value='36.2642, 2.7545';}}

// === التقاط الصورة ===
function takePhoto(){
  try{
    const i=document.createElement('input');i.type='file';i.accept='image/*';i.capture='environment';
    i.onchange=e=>{if(e.target.files[0]){const r=new FileReader();r.onload=ev=>{tempImage=ev.target.result;document.getElementById('camImg').src=tempImage;document.getElementById('camImg').style.display='block';document.querySelector('.cam-icon').style.display='none';};r.readAsDataURL(e.target.files[0]);}};
    i.click();
  }catch(e){showToast('⚠️ خطأ في الكاميرا','error');}
}

// === إرسال البلاغ ===
function sendReport(){
  try{
    const a=document.getElementById('addrInput').value.trim();
    if(!a){showToast('⚠️ أدخل العنوان','error');return;}
    const btn=document.getElementById('sendBtn'),orig=btn.innerHTML;
    btn.innerHTML='⏳ جاري...';btn.disabled=true;
    const isRecurring=document.getElementById('recurringCheck').checked;
    saveReport({id:Date.now(),addr:a,gps:document.getElementById('gpsInput').value||'غير محدد',image:tempImage,doneImage:null,date:new Date().toLocaleDateString('ar-DZ'),time:new Date().toLocaleTimeString('ar-DZ'),doneTime:null,status:'new',driverName:null,recurring:isRecurring});
    addPoints(10);
    showToast('✅ تم الإرسال! +10 نقاط 🎉');
    document.getElementById('thanksOverlay').style.display='flex';
    tempImage=null;document.getElementById('camImg').style.display='none';document.querySelector('.cam-icon').style.display='block';
    document.getElementById('addrInput').value='';document.getElementById('gpsInput').value='';document.getElementById('recurringCheck').checked=false;
    setTimeout(()=>{document.getElementById('thanksOverlay').style.display='none';showPage('home');btn.innerHTML=orig;btn.disabled=false;},3000);
  }catch(e){showToast('⚠️ خطأ في الإرسال','error');}
}

// === الإدارة ===
function loginAdmin(){if(document.getElementById('adminCode').value==='1234'){document.getElementById('adminLogin').classList.add('hidden');document.getElementById('adminPanel').classList.remove('hidden');updateStats();showToast('✓ دخول ناجح');}else showToast('✗ رمز خاطئ','error');}
function logoutAdmin(){document.getElementById('adminLogin').classList.remove('hidden');document.getElementById('adminPanel').classList.add('hidden');document.getElementById('adminName').value='';document.getElementById('adminCode').value='';showToast('✓ خروج');}

// === دالة آمنة لعرض البلاغات ===
function safeShowReports(){
  try{
    if(!allReports || allReports.length===0){
      showToast('لا توجد بلاغات لعرضها');
      showPage('reportsPage');
      document.getElementById('reportsList').innerHTML='<p style="text-align:center;color:#666;padding:40px">لا توجد بلاغات</p>';
      return;
    }
    showPage('reportsPage');
    applyFilters();
    showToast('✅ تم تحميل البلاغات');
  }catch(e){
    showToast('⚠️ حدث خطأ','error');
    document.getElementById('reportsList').innerHTML='<div style="padding:20px;background:#ffebee;color:#c62828;border-radius:10px;text-align:center">⚠️ حدث خطأ في عرض البلاغات<br><button class="btn br" style="margin-top:10px" onclick="emergencyClearData()">🚨 مسح البيانات التالفة</button></div>';
  }
}

// === طوارئ: مسح البيانات التالفة ===
function emergencyClearData(){
  if(confirm('⚠️ تحذير: سيتم مسح جميع البلاغات والبيانات!\nهل أنت متأكد؟')){
    try{
      localStorage.removeItem('medea_reports');
      localStorage.removeItem('medea_tonnage');
      localStorage.removeItem('medea_requests');
      localStorage.removeItem('medea_schedule');
      allReports=[];
      updateStats();
      showToast('✅ تم مسح البيانات التالفة');
      setTimeout(()=>location.reload(),1000);
    }catch(e){ showToast('⚠️ خطأ في المسح','error'); }
  }
}

// === السائقين ===
function loginDriver(){
  const n=document.getElementById('driverName').value.trim();
  if(!n){showToast('⚠️ أدخل الاسم','error');return;}
  const st=JSON.parse(localStorage.getItem('medea_staff')||'[]');
  const driver=st.find(s=>s.name===n&&s.role.includes('سائق'));
  if(driver){
    currentDriver=n;
    const sectors=JSON.parse(localStorage.getItem('medea_schedule')||'[]');
    const sector=sectors.find(s=>s.driver===n);
    currentDriverSector=sector?sector.num:'غير محدد';
    document.getElementById('driverLogin').classList.add('hidden');
    document.getElementById('driverPanel').classList.remove('hidden');
    renderDriverTasks();
    showToast('✓ مرحباً '+n);
  }else showToast('❌ غير مسجل','error');
}
function logoutDriver(){currentDriver='';currentDriverSector='';document.getElementById('driverLogin').classList.remove('hidden');document.getElementById('driverPanel').classList.add('hidden');document.getElementById('driverName').value='';tempAfterImage=null;showToast('✓ خروج');}

// === تحضير صفحة تسجيل الكمية للسائق ===
function prepareDriverTonnage(){
  document.getElementById('driverTonnageName').value=currentDriver;
  document.getElementById('driverTonnageSector').value=currentDriverSector;
  document.getElementById('driverTonnageWeight').value='';
  document.getElementById('driverTonnageRegNum').value='';
}

// === حفظ كمية النفايات من السائق ===
function saveDriverTonnage(){
  try{
    const weight=document.getElementById('driverTonnageWeight').value;
    const regNum=document.getElementById('driverTonnageRegNum').value.trim();
    if(!weight||!regNum){showToast('⚠️ أدخل الوزن ورقم التسجيل','error');return;}
    const records=JSON.parse(localStorage.getItem('medea_tonnage')||'[]');
    const now=new Date();
    records.push({ id:Date.now(), driver:currentDriver, sector:currentDriverSector, weight:parseFloat(weight), regNum:regNum, date:now.toLocaleDateString('ar-DZ'), time:now.toLocaleTimeString('ar-DZ') });
    localStorage.setItem('medea_tonnage',JSON.stringify(records));
    showToast('✅ تم حفظ الكمية: '+weight+' طن');
    document.getElementById('driverTonnageWeight').value='';
    document.getElementById('driverTonnageRegNum').value='';
    showPage('driver');
  }catch(e){showToast('⚠️ خطأ في الحفظ','error');}
}

// === التحميل ===
function downloadImage(d,f){if(!d){showToast('⚠️ لا صورة','error');return;}const l=document.createElement('a');l.href=d;l.download=f;document.body.appendChild(l);l.click();document.body.removeChild(l);showToast('✅ تم التحميل');}
function downloadReportText(id){const r=allReports.find(x=>x.id==id);if(!r){showToast('⚠️ غير موجود','error');return;}const c=`بلاغ #${r.id}\nالعنوان: ${r.addr}\nGPS: ${r.gps}\nالتاريخ: ${r.date} ${r.time}\nالحالة: ${r.status}\nالسائق: ${r.driverName||'-'}`;const b=new Blob([c],{type:'text/plain'});const l=document.createElement('a');l.href=URL.createObjectURL(b);l.download='report_'+id+'.txt';document.body.appendChild(l);l.click();document.body.removeChild(l);showToast('✅ تم التحميل');}

// === بيانات تجريبية ===
function loadDemoData(){if(!confirm('تحميل بيانات تجريبية؟'))return;[{id:1001,addr:'حي الزيتون - شارع الشهداء - المدية',gps:'36.2642, 2.7545',image:'https://via.placeholder.com/300x200/f44336/fff?text=قبل',doneImage:'https://via.placeholder.com/300x200/4CAF50/fff?text=بعد',date:'2026-04-10',time:'09:30',doneTime:'2026-04-10 11:15',status:'done',driverName:'أحمد'},{id:1002,addr:'وسط المدينة - شارع الاستقلال - المدية',gps:'36.2650, 2.7550',image:'https://via.placeholder.com/300x200/f44336/fff?text=قبل',doneImage:null,date:'2026-04-11',time:'14:20',doneTime:null,status:'assigned',driverName:'محمد'}].forEach(r=>saveReport(r));showToast('✅ تم التحميل');showReportsPage();}

// === عرض البلاغات ===
function showReportsPage(){ try{ applyFilters(); }catch(e){ document.getElementById('reportsList').innerHTML='<div style="padding:20px;background:#ffebee;color:#c62828;border-radius:10px;text-align:center">⚠️ حدث خطأ<br><button class="btn br" style="margin-top:10px" onclick="emergencyClearData()">🚨 مسح البيانات</button></div>'; } }

function applyFilters(){
  try{
    const st=document.getElementById('filterStatus')?.value||'all';
    const sr=document.getElementById('searchInput')?.value.toLowerCase()||'';
    let f=allReports;
    if(st!=='all')f=f.filter(r=>st==='pending'?r.status==='new'||r.status==='assigned':r.status===st);
    if(sr)f=f.filter(r=>r.addr.toLowerCase().includes(sr)||(r.driverName&&r.driverName.toLowerCase().includes(sr)));
    renderReportsList(f);
  }catch(e){}
}

function filterByStatus(s){showPage('reportsPage');if(document.getElementById('filterStatus')){document.getElementById('filterStatus').value=s==='pending'?'assigned':s;applyFilters();}}

function renderReportsList(reps){
  try{
    const c=document.getElementById('reportsList');
    if(!reps || reps.length===0){c.innerHTML='<p style="text-align:center;color:#666;padding:40px">لا توجد بلاغات</p>';return;}
    const displayReports=reps.slice(0,50);
    if(reps.length>50){ c.innerHTML=`<div style="background:#fff3cd;padding:10px;border-radius:8px;margin-bottom:10px;text-align:center;color:#856404">يتم عرض أول 50 بلاغ فقط من أصل ${reps.length}</div>`; }
    else{ c.innerHTML=''; }
    c.innerHTML+=displayReports.map(r=>{
      if(!r) return '';
      const d1=r.image?`<button class="download-btn" onclick="downloadImage('${r.image}','before_${r.id}.jpg')">⬇️ تحميل صورة قبل</button>`:'';
      const d2=r.doneImage?`<button class="download-btn" onclick="downloadImage('${r.doneImage}','after_${r.id}.jpg')">⬇️ تحميل صورة بعد</button>`:'';
      const d3=`<button class="download-btn download-all" onclick="downloadReportText(${r.id})">📄 التقرير الكامل</button>`;
      const q=`<button class="download-btn purple" onclick="showQR(${r.id})">📱 QR Code</button>`;
      const img1=r.image?`<div class="img-container"><img src="${r.image}"><div class="img-label">📷 قبل (${r.date})</div></div>${d1}`:'';
      const img2=r.doneImage?`<div class="img-container"><img src="${r.doneImage}"><div class="img-label done-label">✅ بعد (${r.doneTime||''})</div></div>${d2}`:'';
      let act='';if(r.status==='new'||r.status==='assigned') act+=`<button class="btn bo" onclick="assignDriver(${r.id})" style="margin-bottom:8px">📤 توجيه للسائق</button>`;act+=`<button class="btn br" onclick="deleteReport(${r.id})">🗑️ حذف</button>`;
      const recurringBadge=r.recurring?'<span style="background:#FF9800;color:#fff;padding:2px 8px;border-radius:10px;font-size:0.7rem;margin-right:5px">🔄 متكرر</span>':'';
      return`<div class="report-card ${r.status}"><div class="info-row"><b>📍 العنوان:</b> ${recurringBadge}${r.addr}</div><div class="info-row"><b>🌍 GPS:</b> ${r.gps}</div><div class="info-row"><b>📅 التاريخ:</b> ${r.date} ${r.time}</div>${r.driverName?`<div class="info-row"><b>👷 السائق:</b> ${r.driverName}</div>`:''}<div class="info-row"><b>📊 الحالة:</b> <span style="color:${r.status==='done'?'#4CAF50':r.status==='assigned'?'#FF9800':'#f44336'}">${r.status==='done'?'✅ منجز':r.status==='assigned'?'🚚 قيد التنفيذ':'🆕 جديد'}</span></div>${img1}${img2}<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px">${q}${d3}</div><div style="margin-top:10px">${act}</div></div>`;
    }).join('');
  }catch(e){ document.getElementById('reportsList').innerHTML='<div style="padding:20px;background:#ffebee;color:#c62828;border-radius:10px;text-align:center">⚠️ خطأ في العرض</div>'; }
}

// === QR Code ===
function showQR(id){
  try{
    const r=allReports.find(x=>x.id==id);
    if(!r){showToast('⚠️ غير موجود','error');return;}
    document.getElementById('qrModal').style.display='flex';
    document.getElementById('qrReportId').textContent=r.id;
    const qc=document.getElementById('qrcode');qc.innerHTML='';
    if(typeof QRCode!=='undefined'){try{new QRCode(qc,{text:String(r.id),width:200,height:200,colorDark:'#1B5E20',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});}catch(e){qc.innerHTML='<div style="color:red;padding:20px">⚠️ فشل QR</div>';}}
    else{qc.innerHTML='<div style="color:red;padding:20px">⚠️ المكتبة غير محملة</div>';}
  }catch(e){showToast('⚠️ خطأ في QR','error');}
}

// === توجيه للسائق ===
function assignDriver(id){
  try{
    const st=JSON.parse(localStorage.getItem('medea_staff')||'[]');
    const dr=st.filter(s=>s.role.includes('سائق'));
    if(!dr.length){showToast('⚠️ لا يوجد سائقون','error');return;}
    const n=prompt('اسم السائق:\n'+dr.map(d=>d.name).join('\n'));
    if(!n)return;
    const f=dr.find(d=>d.name.toLowerCase()===n.toLowerCase());
    if(!f){showToast('❌ غير موجود','error');return;}
    updateReport(id,{driverName:f.name,status:'assigned'});
    showToast('✅ تم التوجيه لـ '+f.name);
    showReportsPage();
  }catch(e){showToast('⚠️ خطأ في التوجيه','error');}
}

function deleteReport(id){if(!confirm('حذف البلاغ؟'))return;allReports=allReports.filter(r=>r.id!=id);try{localStorage.setItem('medea_reports',JSON.stringify(allReports));}catch(e){}showReportsPage();updateStats();updatePublicStats();showToast('✅ تم الحذف');}

// === الموظفين ===
function loadStaffList(){
  try{
    let s=[];
    try{s=JSON.parse(localStorage.getItem('medea_staff')||'[]');}catch(e){}
    const c=document.getElementById('staffList');
    if(!s.length){c.innerHTML='<p style="text-align:center;color:#666;padding:30px">لا يوجد موظفون</p>';return;}
    c.innerHTML=s.map((x,i)=>`<div class="staff-item"><div><b style="color:#1B5E20">${x.role}:</b> ${x.name}${x.phone?`<br><a href="tel:${x.phone}" class="phone-link">📞 ${x.phone}</a>`:''}</div><div class="action-btns"><button class="edit-btn" onclick="editStaff(${i})">✏️</button><button class="delete-btn" onclick="deleteStaff(${i})">✕</button></div></div>`).join('');
  }catch(e){}
}
function addStaff(){const n=document.getElementById('newStaffName').value.trim();const r=document.getElementById('newStaffRole').value.trim();const p=document.getElementById('newStaffPhone').value.trim();if(!n||!r){showToast('⚠️ الاسم والمنصب مطلوبان','error');return;}let s=[];try{s=JSON.parse(localStorage.getItem('medea_staff')||'[]');}catch(e){}s.push({name:n,role:r,phone:p});try{localStorage.setItem('medea_staff',JSON.stringify(s));}catch(e){}document.getElementById('newStaffName').value='';document.getElementById('newStaffRole').value='';document.getElementById('newStaffPhone').value='';loadStaffList();showToast('✅ تم الإضافة');}
function editStaff(i){let s=[];try{s=JSON.parse(localStorage.getItem('medea_staff')||'[]');}catch(e){}const st=s[i];const nn=prompt('الاسم الجديد:',st.name);if(!nn)return;const nr=prompt('المنصب الجديد:',st.role);if(!nr)return;const np=prompt('الهاتف الجديد:',st.phone||'');s[i]={name:nn,role:nr,phone:np};try{localStorage.setItem('medea_staff',JSON.stringify(s));}catch(e){}loadStaffList();showToast('✅ تم التعديل');}
function deleteStaff(i){if(!confirm('حذف الموظف؟'))return;let s=[];try{s=JSON.parse(localStorage.getItem('medea_staff')||'[]');}catch(e){}s.splice(i,1);try{localStorage.setItem('medea_staff',JSON.stringify(s));}catch(e){}loadStaffList();}
function manageStaffPage(){showPage('staffPage');loadStaffList();}
function backToAdmin(){showPage('admin');}

// === مهام السائق والتقييم ===
function renderDriverTasks(){try{const t=allReports.filter(r=>r.driverName===currentDriver&&r.status!=='done');const c=document.getElementById('tasksList');if(!t.length){c.innerHTML='<p style="text-align:center;color:#4CAF50;padding:40px">✓ لا توجد مهام</p>';return;}c.innerHTML=t.map(x=>{const img=x.image?`<div class="img-container"><img src="${x.image}"><div class="img-label">📷 صورة البلاغ (${x.date} ${x.time})</div></div>`:'';const map=x.gps?`<a href="https://www.google.com/maps/dir/?api=1&destination=${x.gps.split(',')[0]},${x.gps.split(',')[1]}" target="_blank" class="btn map-btn">🗺️ الدخول للخريطة</a>`:'';const stars=`<div class="star-rating" id="stars-${x.id}"><span class="star" onclick="rateTask(${x.id},1)">★</span><span class="star" onclick="rateTask(${x.id},2)">★</span><span class="star" onclick="rateTask(${x.id},3)">★</span><span class="star" onclick="rateTask(${x.id},4)">★</span><span class="star" onclick="rateTask(${x.id},5)">★</span></div>`;return`<div class="report-card assigned"><div class="info-row"><b>📍 العنوان:</b> ${x.addr}</div><div class="info-row"><b>🌍 GPS:</b> ${x.gps}</div>${img}<p style="font-size:0.8rem;color:#666;margin:5px 0">قيم جودة الإنجاز:</p>${stars}<button class="btn bo" onclick="driverTakePhoto(${x.id})" style="margin:10px 0">📷 أخذ صورة بعد التنفيذ</button>${map}<button class="btn bg" onclick="completeTask(${x.id})" style="margin-top:10px">✅ تأكيد الإنجاز</button></div>`;}).join('');}catch(e){}}
function rateTask(id,stars){try{const i=allReports.findIndex(r=>r.id==id);if(i!==-1){allReports[i].rating=stars;try{localStorage.setItem('medea_reports',JSON.stringify(allReports));}catch(e){}document.querySelectorAll(`#stars-${id} .star`).forEach((s,idx)=>{s.classList.toggle('active',idx<stars);});showToast(`⭐ تقييم: ${stars}/5`);}}catch(e){}}
function driverTakePhoto(id){try{const i=document.createElement('input');i.type='file';i.accept='image/*';i.capture='environment';i.onchange=e=>{if(e.target.files[0]){const r=new FileReader();r.onload=ev=>{tempAfterImage=ev.target.result;showToast('✓ تم حفظ الصورة');};r.readAsDataURL(e.target.files[0]);}};i.click();}catch(e){showToast('⚠️ خطأ في الكاميرا','error');}}
function completeTask(id){try{if(!tempAfterImage&&!confirm('لم يتم التصوير. متابعة؟'))return;const u={status:'done',doneTime:new Date().toLocaleString('ar-DZ')};if(tempAfterImage)u.doneImage=tempAfterImage;updateReport(id,u);tempAfterImage=null;showToast('✅ تم الإنجاز!');renderDriverTasks();updateStats();updatePublicStats();}catch(e){showToast('⚠️ خطأ في الإنجاز','error');}}

// === طلبات الخدمات ===
function submitRequest(){
  try{
    const type=document.getElementById('reqType').value;
    const desc=document.getElementById('reqDesc').value.trim();
    const location=document.getElementById('reqLocation').value.trim();
    if(!desc||!location){showToast('⚠️ أكمل جميع الحقول','error');return;}
    const requests=JSON.parse(localStorage.getItem('medea_requests')||'[]');
    requests.push({id:Date.now(),type,desc,location,date:new Date().toLocaleDateString('ar-DZ'),time:new Date().toLocaleTimeString('ar-DZ'),status:'pending'});
    localStorage.setItem('medea_requests',JSON.stringify(requests));
    showToast('✅ تم إرسال طلبك');
    document.getElementById('reqDesc').value='';
    document.getElementById('reqLocation').value='';
    loadMyRequests();
  }catch(e){showToast('⚠️ خطأ في الطلب','error');}
}

function loadMyRequests(){
  try{
    const requests=JSON.parse(localStorage.getItem('medea_requests')||'[]');
    const list=document.getElementById('myRequestsList');
    if(!requests.length){ list.innerHTML='<p style="text-align:center;color:#666;padding:20px">لا توجد طلبات سابقة</p>'; return; }
    list.innerHTML=requests.slice().reverse().map(r=>`<div class="tonnage-card"><div class="tonnage-info"><b>📝 النوع:</b> ${r.type==='bin'?'حاوية جديدة':r.type==='repair'?'صيانة':r.type==='clean'?'تنظيف':'أخر'}</div><div class="tonnage-info"><b>📍 الموقع:</b> ${r.location}</div><div class="tonnage-info"><b>📅 التاريخ:</b> ${r.date} ${r.time}</div><div class="tonnage-info"><b>📊 الحالة:</b> <span style="color:${r.status==='pending'?'#FF9800':'#4CAF50'}">${r.status==='pending'?'قيد المراجعة':'تمت المعالجة'}</span></div></div>`).join('');
  }catch(e){}
}

function loadAdminRequests(){
  try{
    const requests=JSON.parse(localStorage.getItem('medea_requests')||'[]');
    const list=document.getElementById('adminRequestsList');
    if(!requests.length){ list.innerHTML='<p style="text-align:center;color:#666;padding:20px">لا توجد طلبات</p>'; return; }
    list.innerHTML=requests.slice().reverse().map(r=>`<div class="tonnage-card"><div class="tonnage-info"><b>📝 النوع:</b> ${r.type==='bin'?'حاوية جديدة':r.type==='repair'?'صيانة':r.type==='clean'?'تنظيف':'أخر'}</div><div class="tonnage-info"><b>📍 الموقع:</b> ${r.location}</div><div class="tonnage-info"><b>📝 التفاصيل:</b> ${r.desc}</div><div class="tonnage-info"><b>📅 التاريخ:</b> ${r.date} ${r.time}</div><div class="tonnage-info"><b>📊 الحالة:</b> <span style="color:${r.status==='pending'?'#FF9800':'#4CAF50'}">${r.status==='pending'?'قيد المراجعة':'تمت المعالجة'}</span></div>${r.status==='pending'?`<button class="btn bg" style="margin-top:10px;padding:8px" onclick="processRequest(${r.id})">✅ معالجة الطلب</button>`:''}</div>`).join('');
  }catch(e){}
}

function processRequest(id){
  try{
    let requests=JSON.parse(localStorage.getItem('medea_requests')||'[]');
    const i=requests.findIndex(r=>r.id==id);
    if(i!==-1){ requests[i].status='done'; localStorage.setItem('medea_requests',JSON.stringify(requests)); showToast('✅ تمت معالجة الطلب'); loadAdminRequests(); }
  }catch(e){showToast('⚠️ خطأ في المعالجة','error');}
}

function loadRequests(){loadMyRequests();}

function renderChart(){try{const done=allReports.filter(r=>r.status==='done').length;const assigned=allReports.filter(r=>r.status==='assigned').length;const newR=allReports.filter(r=>r.status==='new').length;const total=allReports.length;const visual=document.getElementById('chartVisual');const legend=document.getElementById('chartLegend');if(!visual||!legend) return;if(total===0){visual.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#999;font-size:1.1rem">لا توجد بيانات</div>';legend.innerHTML='';return;}const donePct=(done/total)*100;const assignedPct=(assigned/total)*100;visual.style.background=`conic-gradient(#4CAF50 0deg ${donePct*3.6}deg,#FF9800 ${donePct*3.6}deg ${(donePct+assignedPct)*3.6}deg,#f44336 ${(donePct+assignedPct)*3.6}deg 360deg)`;visual.style.borderRadius='50%';visual.style.boxShadow='0 5px 20px rgba(0,0,0,0.2)';legend.innerHTML=`<div class="legend-item"><div class="legend-color" style="background:#4CAF50"></div><span>منجز: ${done}</span></div><div class="legend-item"><div class="legend-color" style="background:#FF9800"></div><span>قيد التنفيذ: ${assigned}</span></div><div class="legend-item"><div class="legend-color" style="background:#f44336"></div><span>جديد: ${newR}</span></div>`;}catch(e){}}

// === نظام إدارة جدول جمع النفايات ===
function addScheduleSector(){
  try{
    const num=document.getElementById('sectorNum').value.trim();
    const type=document.getElementById('sectorType').value;
    const name=document.getElementById('sectorName').value.trim();
    const days=document.getElementById('sectorDays').value.trim();
    const time=document.getElementById('sectorTime').value.trim();
    const catchup=document.getElementById('sectorCatchup').value.trim();
    const driver=document.getElementById('sectorDriver').value.trim();
    const phone=document.getElementById('sectorPhone').value.trim();
    if(!name||!days||!time){showToast('⚠️ أكمل الحقول الأساسية','error');return;}
    const sectors=JSON.parse(localStorage.getItem('medea_schedule')||'[]');
    sectors.push({id:Date.now(),num,type,name,days,time,catchup,driver,phone});
    localStorage.setItem('medea_schedule',JSON.stringify(sectors));
    showToast('✅ تم إضافة القطاع');
    document.getElementById('sectorNum').value='';document.getElementById('sectorName').value='';document.getElementById('sectorDays').value='';document.getElementById('sectorTime').value='';document.getElementById('sectorCatchup').value='';document.getElementById('sectorDriver').value='';document.getElementById('sectorPhone').value='';
    loadScheduleSectors();
  }catch(e){showToast('⚠️ خطأ في الإضافة','error');}
}

function loadScheduleSectors(){
  try{
    const sectors=JSON.parse(localStorage.getItem('medea_schedule')||'[]');
    const list=document.getElementById('scheduleList');
    if(!sectors.length){ list.innerHTML='<p style="text-align:center;color:#666;padding:20px">لا توجد قطاعات مسجلة</p>'; return; }
    list.innerHTML=sectors.map(s=>`<div class="tonnage-card"><div class="tonnage-info"><b>🏷️ رقم القطاع:</b> ${s.num||'-'}</div><div class="tonnage-info"><b>🏛️ النوع:</b> ${s.type}</div><div class="tonnage-info"><b>📍 الأحياء:</b> ${s.name}</div><div class="tonnage-info"><b>📅 الأيام:</b> ${s.days}</div><div class="tonnage-info"><b>🕐 وقت المرور:</b> ${s.time}</div><div class="tonnage-info"><b>⏳ الاستدراك:</b> ${s.catchup||'-'}</div><div class="tonnage-info"><b>👤 السائق:</b> ${s.driver||'-'} ${s.phone?`<a href="tel:${s.phone}" class="phone-link">📞 ${s.phone}</a>`:''}</div><button class="btn br" style="margin-top:10px;padding:8px" onclick="deleteScheduleSector(${s.id})">🗑️ حذف</button></div>`).join('');
  }catch(e){}
}

function deleteScheduleSector(id){
  if(!confirm('حذف القطاع؟'))return;
  try{
    let sectors=JSON.parse(localStorage.getItem('medea_schedule')||'[]');
    sectors=sectors.filter(s=>s.id!=id);
    localStorage.setItem('medea_schedule',JSON.stringify(sectors));
    showToast('✅ تم الحذف');
    loadScheduleSectors();
  }catch(e){showToast('⚠️ خطأ في الحذف','error');}
}

function loadSchedule(){
  try{
    const sectors=JSON.parse(localStorage.getItem('medea_schedule')||'[]');
    const display=document.getElementById('scheduleDisplay');
    if(!sectors.length){ display.innerHTML='<p style="text-align:center;color:#666;padding:20px">لم يتم إضافة جدول بعد</p>'; return; }
    let html='<table class="schedule-table"><tr><th>الحي / المنطقة</th><th>الأيام</th><th>الوقت</th></tr>';
    sectors.forEach(s=>{ html+=`<tr><td>${s.name}</td><td>${s.days}</td><td>${s.time}</td></tr>`; });
    html+='</table>';
    display.innerHTML=html;
  }catch(e){}
}

function displaySchedule(){loadSchedule();}

// === نظام الطباعة ===
let currentPrintType = null;

function openPrintDialog() {
  document.getElementById('printModal').classList.add('active');
  document.getElementById('printPreviewContainer').style.display='none';
  document.getElementById('printDialogActions').style.display='flex';
}

function closePrintDialog() {
  document.getElementById('printModal').classList.remove('active');
  currentPrintType = null;
}

function backToPrintOptions() {
  document.getElementById('printPreviewContainer').style.display='none';
  document.getElementById('printDialogActions').style.display='flex';
  currentPrintType = null;
}

function printSection(type) {
  currentPrintType = type;
  let title = '', tableHTML = '';
  
  switch(type) {
    case 'reports': title = '📊 تقرير البلاغات'; tableHTML = generateReportsTable(); break;
    case 'tonnage': title = '⚖️ تقرير الكميات'; tableHTML = generateTonnageTable(); break;
    case 'staff': title = '👥 تقرير الموظفين'; tableHTML = generateStaffTable(); break;
    case 'requests': title = '🛠️ تقرير الطلبات'; tableHTML = generateRequestsTable(); break;
    case 'schedule': title = '📅 تقرير الجدول'; tableHTML = generateScheduleTable(); break;
    case 'stats': title = '📈 تقرير الإحصائيات'; tableHTML = generateStatsTable(); break;
  }
  
  const headerHTML = `<div class="print-preview-header"><h3>${title}</h3><p>بلدية المدية - مصلحة النظافة</p><p>تاريخ: ${new Date().toLocaleDateString('ar-DZ')}</p><p>إعداد: د. رابحي فتحي | 2026</p></div>`;
  document.getElementById('printContent').innerHTML = headerHTML + tableHTML;
  document.getElementById('printPreviewContainer').style.display='block';
  document.getElementById('printDialogActions').style.display='none';
}

function generateReportsTable() {
  if(!allReports || allReports.length===0) return '<p style="text-align:center;padding:20px;color:#666">لا توجد بلاغات</p>';
  let html = '<table><thead><tr><th>#</th><th>العنوان</th><th>GPS</th><th>التاريخ</th><th>السائق</th><th>الحالة</th></tr></thead><tbody>';
  allReports.forEach((r,i)=>{ const statusText = r.status==='done'?'✅ منجز':r.status==='assigned'?'🚚 قيد التنفيذ':'🆕 جديد'; html += `<tr><td>${i+1}</td><td>${r.addr}</td><td>${r.gps}</td><td>${r.date} ${r.time}</td><td>${r.driverName||'-'}</td><td>${statusText}</td></tr>`; });
  html += '</tbody></table><div style="margin-top:15px;padding:10px;background:#f5f7fa;border-radius:8px;text-align:center"><b>الإجمالي: '+allReports.length+' بلاغ</b></div>';
  return html;
}

function generateTonnageTable() {
  const records = JSON.parse(localStorage.getItem('medea_tonnage')||'[]');
  if(!records || records.length===0) return '<p style="text-align:center;padding:20px;color:#666">لا توجد سجلات</p>';
  let totalWeight = records.reduce((sum,r)=>sum+r.weight,0);
  let html = '<table><thead><tr><th>#</th><th>السائق</th><th>القطاع</th><th>الوزن (طن)</th><th>رقم التسجيل</th><th>التاريخ</th><th>الوقت</th></tr></thead><tbody>';
  records.forEach((r,i)=>{ html += `<tr><td>${i+1}</td><td>${r.driver||'-'}</td><td>${r.sector||'-'}</td><td><b>${r.weight}</b></td><td>${r.regNum}</td><td>${r.date}</td><td>${r.time}</td></tr>`; });
  html += '</tbody></table><div style="margin-top:15px;padding:10px;background:#e8f5e9;border-radius:8px;text-align:center"><b>📊 المجموع: '+totalWeight.toFixed(2)+' طن</b></div>';
  return html;
}

function generateStaffTable() {
  const staff = JSON.parse(localStorage.getItem('medea_staff')||'[]');
  if(!staff || staff.length===0) return '<p style="text-align:center;padding:20px;color:#666">لا يوجد موظفون</p>';
  let html = '<table><thead><tr><th>#</th><th>الاسم</th><th>المنصب</th><th>الهاتف</th></tr></thead><tbody>';
  staff.forEach((s,i)=>{ html += `<tr><td>${i+1}</td><td>${s.name}</td><td>${s.role}</td><td>${s.phone||'-'}</td></tr>`; });
  html += '</tbody></table><div style="margin-top:15px;padding:10px;background:#f5f7fa;border-radius:8px;text-align:center"><b>الإجمالي: '+staff.length+' موظف</b></div>';
  return html;
}

function generateRequestsTable() {
  const requests = JSON.parse(localStorage.getItem('medea_requests')||'[]');
  if(!requests || requests.length===0) return '<p style="text-align:center;padding:20px;color:#666">لا توجد طلبات</p>';
  const typeNames = {bin:'حاوية',repair:'صيانة',clean:'تنظيف',other:'أخر'};
  let html = '<table><thead><tr><th>#</th><th>النوع</th><th>الموقع</th><th>التفاصيل</th><th>التاريخ</th><th>الحالة</th></tr></thead><tbody>';
  requests.forEach((r,i)=>{ const statusText = r.status==='pending'?'⏳ قيد المراجعة':'✅ تمت'; html += `<tr><td>${i+1}</td><td>${typeNames[r.type]||r.type}</td><td>${r.location}</td><td>${r.desc}</td><td>${r.date} ${r.time}</td><td>${statusText}</td></tr>`; });
  html += '</tbody></table><div style="margin-top:15px;padding:10px;background:#f5f7fa;border-radius:8px;text-align:center"><b>الإجمالي: '+requests.length+' طلب</b></div>';
  return html;
}

function generateScheduleTable() {
  const sectors = JSON.parse(localStorage.getItem('medea_schedule')||'[]');
  if(!sectors || sectors.length===0) return '<p style="text-align:center;padding:20px;color:#666">لا توجد قطاعات</p>';
  let html = '<table><thead><tr><th>#</th><th>الحي</th><th>الأيام</th><th>الوقت</th><th>السائق</th></tr></thead><tbody>';
  sectors.forEach((s,i)=>{ html += `<tr><td>${i+1}</td><td>${s.name}</td><td>${s.days}</td><td>${s.time}</td><td>${s.driver||'-'}</td></tr>`; });
  html += '</tbody></table><div style="margin-top:15px;padding:10px;background:#f5f7fa;border-radius:8px;text-align:center"><b>الإجمالي: '+sectors.length+' قطاع</b></div>';
  return html;
}

function generateStatsTable() {
  const total = allReports.length;
  const done = allReports.filter(r=>r.status==='done').length;
  const rate = total>0?Math.round((done/total)*100):0;
  return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;margin:20px 0"><div style="background:#f5f7fa;padding:20px;border-radius:12px;text-align:center"><div style="font-size:2rem;font-weight:900;color:#1B5E20">${total}</div><div style="color:#666">إجمالي البلاغات</div></div><div style="background:#e8f5e9;padding:20px;border-radius:12px;text-align:center"><div style="font-size:2rem;font-weight:900;color:#4CAF50">${rate}%</div><div style="color:#666">نسبة الإنجاز</div></div></div>`;
}

function printNow() {
  const content = document.getElementById('printContent').innerHTML;
  const win = window.open('', '_blank', 'width=900,height=700');
  win.document.write(`<html dir="rtl"><head><meta charset="UTF-8"><title>طباعة</title><style>body{font-family:sans-serif;padding:20px}table{width:100%;border-collapse:collapse}th{background:#1B5E20;color:#fff;padding:8px}td{padding:8px;border:1px solid #ddd}@media print{.no-print{display:none}}</style></head><body>${content}<script>window.print()<\/script></body></html>`);
  win.document.close();
}

function downloadPDF() {
  const element = document.getElementById('printContent');
  if(typeof html2pdf !== 'undefined') {
    showToast('📥 جاري إنشاء PDF...');
    html2pdf().from(element).set({margin:10,filename:`تقرير_${Date.now()}.pdf`,html2canvas:{scale:2},jsPDF:{format:'a4'}}).save().then(()=>{ showToast('✅ تم التحميل'); closePrintDialog(); });
  } else { printNow(); }
}

// === حاسبة التدوير ===
function calculateConversion(){
  const type = document.getElementById('wasteType').value;
  const weight = parseFloat(document.getElementById('wasteWeight').value);
  if(!weight || weight<=0){ showToast('⚠️ أدخل الوزن'); return; }
  const factors = { organic: { energy: 2500, oil: 0, co2: 0.8 }, plastic: { energy: 12000, oil: 750, co2: 1.5 }, metal: { energy: 8000, oil: 0, co2: 2.0 }, mixed: { energy: 800, oil: 50, co2: 0.4 } };
  const f = factors[type];
  document.getElementById('resEnergy').textContent = (weight * f.energy).toLocaleString('ar-DZ');
  document.getElementById('resOil').textContent = (weight * f.oil).toLocaleString('ar-DZ');
  document.getElementById('resCO2').textContent = (weight * f.co2).toFixed(2);
  document.getElementById('conversionResult').style.display='block';
  showToast('✅ تم الحساب');
}
</script>
