<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المدية نظيفة 2026 - د. رابحي فتحي</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root { --emerald: #1B5E20; --forest: #2E7D32; --glass: rgba(255, 255, 255, 0.95); --gold: #D4AF37; --red: #d21034; --navy: #14213D; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; transition: 0.3s; }
        body { margin: 0; background: url('https://w0.peakpx.com/wallpaper/842/630/HD-wallpaper-garbage-truck-garbage-recycling-environment-trucks.jpg') no-repeat center center fixed; background-size: cover; min-height: 100vh; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: -1; }
        .top-bar { background: var(--glass); padding: 15px; text-align: center; border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .live-panel { display: flex; justify-content: space-between; padding: 5px 15px; font-weight: bold; color: var(--emerald); font-size: 0.85rem; background: rgba(255,255,255,0.5); border-radius: 10px; margin-top: 5px; }
        .screen { display: none; padding: 20px; padding-bottom: 100px; }
        .active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .glass-card { background: var(--glass); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); text-align: center; }
        .btn-prime { border: none; padding: 14px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; color: white; }
        .input-style { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ccc; margin-bottom: 10px; font-size: 0.9rem; }
        #map { height: 250px; border-radius: 20px; border: 3px solid white; margin-bottom: 10px; }
        .item-box { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: right; border-right: 6px solid var(--gold); position: relative; }
        .report-img-view { width: 100%; height: 180px; object-fit: cover; border-radius: 12px; margin: 10px 0; border: 1px solid #eee; background: #eee; }
        .del-icon { color: var(--red); cursor: pointer; float: left; font-size: 1.2rem; padding: 5px; }
        .footer-sig { position: fixed; bottom: 0; width: 100%; background: var(--glass); padding: 12px; text-align: center; font-weight: bold; color: var(--forest); border-top: 2px solid var(--gold); z-index: 1000; }
        .status-badge { padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; color: white; display: inline-block; margin-bottom: 5px; }
    </style>
</head>
<body onload="initApp()">

<div class="top-bar">
    <div>الجمهورية الجزائرية الديمقراطية الشعبية</div>
    <div style="font-size: 1.1rem; font-weight: 700; color: var(--emerald);">بلدية المدية - تطبيق "مدينتي"</div>
    <div class="live-panel"><div id="clock">00:00:00</div><div id="date-display">--</div></div>
</div>

<div id="scr-main" class="screen active">
    <div class="glass-card" onclick="navTo('scr-report')" style="cursor:pointer;"><i class="fas fa-bullhorn fa-3x" style="color:var(--forest)"></i><h3>تبليغ عن نفايات</h3></div>
    <div class="glass-card" onclick="auth('admin')" style="cursor:pointer;"><i class="fas fa-user-shield fa-3x" style="color:var(--emerald)"></i><h3>الإدارة</h3></div>
    <div class="glass-card" onclick="auth('driver')" style="cursor:pointer;"><i class="fas fa-truck-pickup fa-3x" style="color:var(--gold)"></i><h3>السائق الميداني</h3></div>
</div>

<div id="scr-report" class="screen">
    <div id="map"></div>
    <button class="btn-prime" style="background:var(--forest);" onclick="getMyLocation()"><i class="fas fa-location-arrow"></i> تحديد موقعي</button>
    <input type="text" id="rep-addr" class="input-style" placeholder="العنوان...">
    <input type="text" id="rep-geo" class="input-style" placeholder="الإحداثيات" readonly>
    <label class="btn-prime" style="background:var(--navy);"><i class="fas fa-camera"></i> تصوير النفايات <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="handleImg(this, 'citizen')"></label>
    <div id="citizen-img-preview" style="display:none; color:green; font-weight:bold; text-align:center; margin-bottom:10px;">✅ تم التقاط الصورة</div>
    <button class="btn-prime" style="background:var(--emerald);" onclick="submitReport()">إرسال التبليغ</button>
    <button class="btn-prime" style="background:#666;" onclick="navTo('scr-main')">رجوع</button>
</div>

<div id="scr-admin" class="screen">
    <div class="glass-card" style="display:flex; justify-content:space-around; padding:10px;">
        <div>جديد: <span id="st-new">0</span></div>
        <div>محول: <span id="st-sent">0</span></div>
        <div>منجز: <span id="st-done">0</span></div>
    </div>
    <button class="btn-prime" style="background:var(--navy)" onclick="toggleView('admin-list')">عرض التبليغات</button>
    <div id="admin-list" style="display:none;"></div>
    
    <button class="btn-prime" style="background:var(--forest)" onclick="toggleView('driver-mgr')">إدارة السائقين</button>
    <div id="driver-mgr" style="display:none;" class="glass-card">
        <input type="text" id="d-name" class="input-style" placeholder="اسم السائق">
        <button class="btn-prime" style="background:var(--emerald)" onclick="addDriver()">إضافة سائق</button>
        <div id="d-list-display"></div>
    </div>
    <button class="btn-prime" style="background:#333;" onclick="navTo('scr-main')">خروج</button>
</div>

<div id="scr-driver" class="screen">
    <h3 id="drv-name-head" style="color:white; text-align:center;"></h3>
    <div id="driver-tasks"></div>
    <button class="btn-prime" style="background:#333;" onclick="navTo('scr-main')">خروج</button>
</div>

<div class="footer-sig">د. رابحي فتحي | Medea Clean 2026</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const firebaseConfig = { databaseURL: "https://medea-green-2026-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();

    let db = { reports: [], drivers: [], admins: ["فتحي"] };
    let map, marker, tempImg = "", driverTempImg = "", currentUser = "";

    function save() { rtdb.ref('medea_data').set(db); }

    function initApp() {
        rtdb.ref('medea_data').on('value', (snap) => {
            if (snap.exists()) {
                db = snap.val();
                updateStats();
                refreshLists();
            }
        });
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('fr-FR');
            document.getElementById('date-display').innerText = now.toLocaleDateString('ar-DZ');
        }, 1000);
    }

    function navTo(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'scr-report') setTimeout(initMap, 500);
    }

    function initMap() {
        if(map) return;
        map = L.map('map').setView([36.2642, 2.7539], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        marker = L.marker([36.2642, 2.7539], {draggable: true}).addTo(map);
    }

    function getMyLocation() {
        navigator.geolocation.getCurrentPosition(p => {
            const lat = p.coords.latitude, lng = p.coords.longitude;
            map.setView([lat, lng], 17); marker.setLatLng([lat, lng]);
            document.getElementById('rep-geo').value = `${lat.toFixed(6)},${lng.toFixed(6)}`;
        });
    }

    function handleImg(input, type) {
        const reader = new FileReader();
        reader.onload = e => {
            if(type === 'citizen') {
                tempImg = e.target.result;
                document.getElementById('citizen-img-preview').style.display = 'block';
            } else {
                driverTempImg = e.target.result;
                alert("✅ تم التقاط صورة الإنجاز");
            }
        };
        reader.readAsDataURL(input.files[0]);
    }

    function submitReport() {
        const addr = document.getElementById('rep-addr').value;
        const geo = document.getElementById('rep-geo').value;
        if(!tempImg || !addr || !geo) return alert("أكمل البيانات والصورة");
        if(!db.reports) db.reports = [];
        db.reports.push({ id: Date.now(), addr, geo, img: tempImg, status: 'new', time: new Date().toLocaleString() });
        save(); tempImg = ""; document.getElementById('citizen-img-preview').style.display = 'none';
        alert("تم الإرسال"); navTo('scr-main');
    }

    function auth(role) {
        const user = prompt("الاسم:");
        const pin = prompt("الكود:");
        if(role === 'admin' && pin === '1234') { currentUser = user; navTo('scr-admin'); }
        else if(role === 'driver' && pin === '5678') {
            if(db.drivers.find(d => d.name === user)) { currentUser = user; document.getElementById('drv-name-head').innerText = user; navTo('scr-driver'); }
            else alert("سائق غير مسجل");
        }
    }

    function openMaps(geo) {
        window.open(`https://www.google.com/maps/search/?api=1&query=${geo}`, '_blank');
    }

    function refreshLists() {
        // إدارة البلاغات
        const list = document.getElementById('admin-list');
        list.innerHTML = (db.reports || []).slice().reverse().map(r => `
            <div class="item-box">
                <i class="fas fa-trash del-icon" onclick="deleteReport(${r.id})"></i>
                <i class="fas fa-eraser del-icon" style="color:blue" onclick="clearImgs(${r.id})" title="حذف الصور فقط"></i>
                <div style="display:flex; gap:5px;">
                    ${r.img ? `<img src="${r.img}" class="report-img-view" style="width:50%">` : '<div class="report-img-view" style="width:50%; display:flex; align-items:center; justify-content:center;">بلا صورة</div>'}
                    ${r.doneImg ? `<img src="${r.doneImg}" class="report-img-view" style="width:50%; border:2px solid green">` : ''}
                </div>
                <p>📍 <b>العنوان:</b> ${r.addr}</p>
                <p>🧭 <b>الإحداثيات:</b> ${r.geo}</p>
                <button class="btn-prime" style="background:var(--navy); padding:5px" onclick="openMaps('${r.geo}')">🗺️ فتح في الخريطة</button>
                <p>🕒 ${r.time}</p>
                ${r.status === 'new' ? `
                    <select id="sel-${r.id}" class="input-style">${db.drivers.map(d=>`<option>${d.name}</option>`).join('')}</select>
                    <button class="btn-prime" style="background:var(--orange)" onclick="assign(${r.id})">إرسال للسائق</button>
                ` : `<b style="color:green">المكلف: ${r.assignedTo}</b>`}
            </div>
        `).join('');

        // قائمة مهام السائق
        const drvTasks = document.getElementById('driver-tasks');
        drvTasks.innerHTML = (db.reports || []).filter(r => r.assignedTo === currentUser && r.status === 'sent').map(r => `
            <div class="item-box">
                <img src="${r.img}" class="report-img-view">
                <p>📍 ${r.addr}</p>
                <button class="btn-prime" style="background:var(--navy)" onclick="openMaps('${r.geo}')">🧭 توجه للمكان (خريطة)</button>
                <hr>
                <label class="btn-prime" style="background:var(--gold)">📷 صور بعد التنظيف <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="handleImg(this, 'driver')"></label>
                <button class="btn-prime" style="background:var(--emerald)" onclick="completeTask(${r.id})">✅ تأكيد الإنجاز</button>
            </div>
        `).join('');

        // قائمة السائقين
        document.getElementById('d-list-display').innerHTML = (db.drivers || []).map(d => `<div class="glass-card" style="padding:5px; margin:5px">${d.name}</div>`).join('');
    }

    function assign(id) {
        const drv = document.getElementById(`sel-${id}`).value;
        const r = db.reports.find(x => x.id === id);
        r.status = 'sent'; r.assignedTo = drv; save();
    }

    function completeTask(id) {
        if(!driverTempImg) return alert("يجب التقاط صورة للإنجاز أولاً!");
        const r = db.reports.find(x => x.id === id);
        r.status = 'done';
        r.doneImg = driverTempImg;
        driverTempImg = ""; // تصفير الصورة المؤقتة
        save(); alert("تم التنظيف بنجاح!");
    }

    function clearImgs(id) {
        if(confirm("هل تريد حذف الصور المرفقة لتوفير مساحة التخزين؟")) {
            const r = db.reports.find(x => x.id === id);
            r.img = ""; r.doneImg = ""; save();
        }
    }

    function deleteReport(id) { if(confirm("حذف نهائي؟")) { db.reports = db.reports.filter(x => x.id !== id); save(); } }

    function addDriver() {
        const name = document.getElementById('d-name').value;
        if(name) { if(!db.drivers) db.drivers = []; db.drivers.push({name}); save(); }
    }

    function toggleView(id) { const el = document.getElementById(id); el.style.display = el.style.display === 'none' ? 'block' : 'none'; }

    function updateStats() {
        if(!db.reports) return;
        document.getElementById('st-new').innerText = db.reports.filter(r => r.status === 'new').length;
        document.getElementById('st-sent').innerText = db.reports.filter(r => r.status === 'sent').length;
        document.getElementById('st-done').innerText = db.reports.filter(r => r.status === 'done').length;
    }
</script>
</body>
</html>
